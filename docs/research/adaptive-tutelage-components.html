<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>Adaptive Tutelage Components</title>
<style>
  :root {
    --paper: #f4eedd;
    --paper-2: #fbf6e8;
    --ink: #14100c;
    --ink-2: #2c241b;
    --ink-3: #5c5040;
    --rule: rgba(20, 16, 12, 0.18);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--paper);
    color: var(--ink-2);
    font-family: Georgia, Cambria, "Times New Roman", serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(140% 90% at 50% 0%, transparent 55%, rgba(20, 16, 12, 0.08)),
      radial-gradient(80% 70% at 8% 92%, rgba(165, 62, 46, 0.06), transparent 70%);
  }

  main {
    width: min(96rem, calc(100vw - 2rem));
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 3rem) 0;
  }

  .kicker {
    margin: 0 0 0.5rem;
    color: var(--ink-3);
    font: 0.75rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  h1 {
    max-width: 62rem;
    margin: 0 0 0.75rem;
    color: var(--ink);
    font-size: clamp(2rem, 1.25rem + 3vw, 4.4rem);
    line-height: 1;
    letter-spacing: 0;
  }

  .intro {
    max-width: 54rem;
    margin: 0 0 1.5rem;
    color: var(--ink-3);
    font-size: 1.05rem;
    line-height: 1.55;
  }

  .panel {
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: rgba(251, 246, 232, 0.88);
    padding: clamp(0.8rem, 2vw, 1.4rem);
  }
</style>
</head>
<body>
<main>
  <p class="kicker">Mermaid HTML render</p>
  <h1>Adaptive Tutelage Components</h1>
  <p class="intro">
    This page is generated from <code>adaptive-tutelage-components.mmd</code>.
    The diagram renders through the reusable <code>mermaid-file-viewer</code>
    component and embeds the Mermaid source for review.
  </p>
  <section class="panel">
    <mermaid-file-viewer
      title="Adaptive Tutelage Components"
      caption="Editable Mermaid rendering of the adaptive tutelage control loop, generated from the repo .mmd source."
      src="adaptive-tutelage-components.mmd"
    >
      <script type="text/plain" data-mermaid-source>flowchart LR
  subgraph baseline["Baseline: single-agent tutor"]
    b1["Learner asks"] --> b2["One LLM tutor"]
    b2 --> b3["Explanation"]
    b3 --> b4["Learner response"]
  end

  subgraph adaptive["Adaptive tutelage control loop"]
    target["Learning target / proof DAG"]:::state
    calendar["Release calendar"]:::state
    transcript["Learner transcript"]:::state
    visible["Visible uptake signals"]:::state
    ledger["Learner state ledger"]:::state

    ego["Tutor ego: drafts next move"]:::agent
    superego["Tutor superego: critiques conduct"]:::agent

    pacing["Pacing guard: hold until uptake"]:::guard
    proofDebt["Proof-debt guard: repair dropped premise"]:::guard

    action["Evidence release or restore"]:::action
    learner["Learner response"]:::learner
    logs["Trace logs"]:::log
    classifier["Failure classifier"]:::log

    target --> pacing
    calendar --> pacing
    transcript --> visible
    transcript --> ego
    visible --> pacing
    visible --> proofDebt
    ledger --> proofDebt
    target --> proofDebt

    ego <--> superego
    ego --> action
    superego --> action
    pacing --> action
    proofDebt --> action

    action --> learner
    learner --> transcript
    learner --> ledger

    ego --> logs
    superego --> logs
    action --> logs
    learner --> logs
    logs --> classifier

    classifier --> early["early pull: released too soon"]:::failure
    classifier --> decay["decay debt: premise decayed unrepaired"]:::failure
    classifier --> leap["lucky leap: assertion outruns evidence"]:::failure
  end

  baseline -. "simple prompt-response path" .- adaptive

  classDef agent fill:#dbeafe,stroke:#2563eb,color:#0f172a,stroke-width:2px;
  classDef state fill:#dcfce7,stroke:#16a34a,color:#0f172a,stroke-width:2px;
  classDef guard fill:#fef3c7,stroke:#d97706,color:#0f172a,stroke-width:2px;
  classDef action fill:#ede9fe,stroke:#7c3aed,color:#0f172a,stroke-width:2px;
  classDef log fill:#f3f4f6,stroke:#6b7280,color:#0f172a,stroke-width:2px;
  classDef learner fill:#f5f3ff,stroke:#9333ea,color:#0f172a,stroke-width:2px;
  classDef failure fill:#fee2e2,stroke:#dc2626,color:#7f1d1d,stroke-width:2px;</script>
    </mermaid-file-viewer>
  </section>
</main>
<script src="../../public/components/mermaid-file-viewer.js"></script>
</body>
</html>
