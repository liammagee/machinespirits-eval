# Geist Atlas manifest — a PROJECTION of paper-full-2.0.md into the research-atlas
# form (short spine + semi-autonomous modules), per
# notes/geist_dialogue_research_atlas_note.html §4.
#
# paper-full-2.0.md remains the single source of truth. This file does NOT carry
# prose; it declares which heading anchors of the paper compose each module, plus
# each module's claim-status. `sections:` are matched by section number
# ("6.3" → "### 6.3 …", exact on the token) — robust to title edits.
# Validate after editing the paper:  npm run atlas:validate
# Build:                             npm run atlas:build

atlas:
  title: "Geist in the Machine"
  subtitle: "What Helps an AI Tutor Teach — and What Doesn't"
  source: paper-full-2.0.md

  # PROSE BELOW IS SHARED by two consumers: the web hub
  # (scripts/publish-atlas-to-site.js → genHub) and the spine PDF
  # (scripts/build-atlas.js → buildSpine). Keep it plain-language and
  # source-faithful — every result restated here already lives in a module claim
  # (and thus a paper §). Add no new numbers; this is framing, not new evidence.

  orientation: |
    This project asks a straightforward question: can an AI tutor teach better if we
    change how it prepares an answer, rather than simply giving it a larger model?

    We tried several ways of doing that. We gave the tutor an internal critic. We asked
    it to treat the learner as a thinking partner rather than an empty vessel. We gave
    it explicit records, pacing rules, strategy prompts, and — later — a small trained
    model responsible for one narrow teaching move.

    The answers are mixed, which is exactly why the atlas exists. Some changes help.
    Some duplicate work the model already knows how to do. Some alter the tutor's
    behaviour without improving the lesson. This page tells the whole story at a human
    scale. Open a module when you want the evidence and technical detail.

  core_idea: |
    **Give the tutor a second look.** Two ideas started the programme.

    The first is self-critique. Instead of sending the first answer it produces, the
    tutor drafts a reply, lets an internal critic ask what is wrong or missing, and then
    revises. We use Freud's names — *ego* for the drafter and *superego* for the critic —
    but the everyday idea is simply “check your work before you speak.”

    The second is recognition. A tutor can treat a learner as a gap to be filled, or as
    a person whose reasoning is worth meeting — mistakes included. In practice that
    means asking for the learner's thinking and building from it, rather than writing
    over it. The philosophical source is Hegel, but one of our main questions was
    whether the philosophy words mattered at all.

    From there the questions became concrete. Does the critic catch real mistakes?
    Does the learner-facing stance improve the answer or merely change the tone? Does a
    detailed model of the learner add anything the tutor cannot already infer? And when
    advice fails to change behaviour, can a small model be trained to own one move?

  families_intro: |
    The findings fall into three broad families. Each label says how firmly we can hold
    the result. Here is the short version before the detail.

  findings:
    - family: "Meeting the learner raises the floor"
      verdict: settled
      body: |
        Asking the tutor to meet the learner's reasoning improves the weakest parts of
        its answer most and makes the answer more even. The effect remains when the
        Hegelian vocabulary is replaced with plain teaching language. The useful part
        is the stance toward the learner, not the theory words. The internal critic also
        catches and corrects real errors.
      caveat: >-
        The critic adds much more on weaker models than on stronger ones. With a capable
        model, the learner-facing stance already captures most of the gain.
    - family: "Voice and drama can help — and crowd the learner out"
      verdict: exploratory
      body: |
        A parallel line gives the tutor a strong, performed voice and measures that
        presence separately from ordinary teaching quality. The design can produce a
        striking tutor voice. We are still testing whether productive internal tension
        can become a reliable teaching resource rather than just convincing role-play.
      caveat: >-
        Strong performance can crowd out the learner: the most charismatic tutors were
        not the best at drawing out the learner's own thinking. This line remains exploratory.
    - family: "More machinery often changed behaviour, not outcomes"
      verdict: killed
      body: |
        We gave the tutor increasingly detailed records of the learner, asked it to
        imagine alternative moves, prompted it to choose strategies, and routed its
        speaking stance. These additions often made the tutor act differently, but they
        did not reliably improve the lesson against a leaner baseline.
      caveat: >-
        One early advantage disappeared after a turn-counting error was fixed. The
        durable contribution is the testing method — especially the trap scenarios,
        explicit checks, and delivery audits — rather than a richer model of the learner.

  maps:
    methodological: |
      The checking system matters as much as the ideas being tested.

      **The numbers check themselves.** Important claims in the paper are tied to the
      stored evidence. If the paper's prose and data disagree, validation fails. This
      atlas is hand-written from that paper, so every module names its source sections
      and the empirical wording receives a separate claim audit before release.

      **We keep the working, not just the answer.** Drafts, critiques, revisions, and
      delivery paths are recorded. That lets us ask why something helped, where it was
      lost, and whether the learner actually received the text that passed the check.

      **The ruler is part of the research.** The tutoring rubric changed over four
      versions as we learned what “good tutoring” should mean in measurable terms. We
      treat that as part of the method, not as background maintenance.
    evidence: |
      Each module below opens one part of the paper. Filter by status, browse the short
      summaries, or open a PDF for the full evidence. The page and the PDFs come from
      the same map, so their labels stay together.

  glossary:
    "Ego / superego": >-
      Our names for the drafter and the internal critic. The drafter keeps final say;
      the critic checks the draft before it reaches the learner.
    "Recognition": >-
      Treating the learner as a thinking partner, not a gap to fill: ask for their
      reasoning and build on it.
    "Calibration": >-
      Raising the weakest parts of an answer and making its quality more even — lifting
      the floor more than the ceiling.
    "Claim-status": >-
      A short label saying how firmly we can hold a result and where its limits begin.
    "Trap suite": >-
      A set of lessons designed to tempt the tutor into a known mistake, so we can see
      whether it notices and changes course.
    "Provable discourse": >-
      Automatic checks that keep the paper's important numbers tied to the evidence behind them.
    "Id-director": >-
      A design that gives the tutor a durable source of voice and repeatedly turns it
      into a fresh speaking persona.

  whats_open: |
    Two limits matter as much as the results.

    First, these studies mostly judge tutor responses with language models while the
    tutor speaks to simulated learners. We do not yet know whether the supported changes
    improve learning for real people. The human pilot is built, but recruitment waits
    on approval, final consent language, and final learning materials.

    Second, a strong base model still sets the ceiling. An internal critic can add a lot
    to a weaker model and almost nothing to a stronger one. The small-model training
    programme produced partial traction, and the live committee passed its scoped
    delivery test only after every text path it owned was checked; the hard-safety
    guardrail still failed. These are bounded research results, not deployment claims.

  # Numbered body sections deliberately not assigned to a module: §1 Introduction
  # and §9 Conclusion are folded into this spine; §2 Related Work is shared context;
  # §4 System Architecture is shared apparatus summarised in the methodological map.
  exclude: ["1", "2", "4", "9"]

families:
  recognition: "Meeting the Learner"
  apparatus: "How We Checked the Work"
  drama-charisma: "Voice, Drama, and Presence"
  ontology-state: "What the Tutor Needs to Know"
  translation: "What Comes Next"

modules:
  - id: recognition-calibration
    n: 1
    title: "Meeting the Learner Raises the Floor"
    family: recognition
    status: settled
    claim: >-
      Prompts that treat the learner as a thinking partner improve the weakest parts of
      the tutor's answer most and make quality more even. The effect does not require a
      separate critic or Hegelian vocabulary.
    abstract: >-
      This module follows the programme's clearest prompt-level result: the learner-facing
      stance raises the floor rather than the ceiling. Matched teaching prompts show that
      the practical orientation, not the philosophical wording, carries the effect.
    sections: ["3.2", "6.1", "7.9", "7.10"]
    cross_refs: ["superego-error-correction", "adaptive-null", "model-dependence"]

  - id: superego-error-correction
    n: 2
    title: "The Inner Critic Catches Real Mistakes"
    family: recognition
    status: settled
    claim: >-
      The internal critic corrects real mistakes. Once the tutor already meets the
      learner well, however, the critic adds little on strong models and much more on weak ones.
    abstract: >-
      What the critic catches, how the tutor responds, and why two useful mechanisms do
      not simply add together. Across three models, their combined result falls about
      15–17% short of simple addition.
    sections: ["6.2", "6.4", "7.3"]
    cross_refs: ["recognition-calibration", "model-dependence"]

  - id: adaptive-null
    n: 3
    title: "The Tutor Did Not Become More Adaptive"
    family: recognition
    status: killed
    claim: >-
      None of the tested changes altered improvement across a dialogue (all d ≤ 0.15,
      with power to detect d ≥ 0.27). One promising single-scenario result disappeared
      in a pre-registered replication.
    abstract: >-
      A well-powered negative result: better prompts and self-critique improve answer
      quality, but did not make the tutor change course more effectively from turn to turn.
    sections: ["6.3"]
    cross_refs: ["ontology-state-interior"]

  - id: provable-discourse
    n: 4
    title: "How We Checked Every Claim"
    family: apparatus
    status: methods
    claim: >-
      Keeping drafts, critiques, revisions, evidence links, and automatic claim checks
      together is a reusable research method, not just background engineering.
    abstract: >-
      A tour of the audit trail: how critiques are classified, how important numbers are
      checked against stored evidence, and how a result can be reproduced from source to claim.
    sections: ["5.3", "5.9", "5.11", "7.4"]
    cross_refs: ["rubrics-as-instruments"]

  - id: drama-machine
    n: 5
    title: "Can Productive Tension Improve Teaching?"
    family: drama-charisma
    status: planned
    claim: >-
      Can a tutor use genuine internal disagreement to teach better, rather than merely
      performing the appearance of conflict?
    abstract: >-
      An active line of work on disagreement, distinct roles, and resistance to easy
      agreement. The paper section is still being developed; this module remains a scaffold.
    sections: []
    cross_refs: ["superego-error-correction", "id-director-charisma"]

  - id: teaching-drama-axiom-transfer
    n: 11
    title: "Can a Teaching Move Travel?"
    family: drama-charisma
    status: scope-bound
    claim: >-
      Can one bounded replay result become a reusable guide for tutor speaking moves
      without turning into a claim about human learning, deployment, or changed model weights?
    abstract: >-
      A18 remains the main evidence: 10 of 14 bounded cases. A19 found two promising
      n=1 candidates in one model family, but neither repeated in a two-seed stability
      check. There is no pooled A19 rate or confirmed transfer effect, and no human-learning,
      deployment, or weight-learning claim.
    sections: ["7.9"]
    cross_refs: ["drama-machine", "adaptive-null", "ontology-state-interior", "provable-discourse"]

  - id: id-director-charisma
    n: 6
    title: "A Strong Voice Can Crowd Out the Learner"
    family: drama-charisma
    status: exploratory
    claim: >-
      A designed charismatic voice can be striking, but it trades off against drawing
      out the learner's own reasoning. The main variants are different design choices,
      not pieces of one ideal tutor.
    abstract: >-
      A parallel family in which a durable source of voice repeatedly creates a fresh
      speaking persona. Charisma is measured separately from ordinary tutoring quality.
    sections: ["6.7", "8.9"]
    cross_refs: ["drama-machine", "recognition-calibration"]

  - id: ontology-state-interior
    n: 7
    title: "A Bigger Learner Model Did Not Help"
    family: ontology-state
    status: killed
    claim: >-
      Detailed learner records, theory-of-mind additions, replay of alternative moves,
      fitted policies, and a logged hidden interior did not beat a lean baseline. An
      early advantage also disappeared after a turn-counting error was fixed: the gap
      was about 1.1× on both trap suites, within N≈24 noise.
    abstract: >-
      A mostly negative arc with a useful by-product: strong trap scenarios and an
      auditable runner. The tutor did not need a richer written portrait of the learner;
      the testing apparatus was the durable result.
    sections: ["6.8", "6.9", "6.10"]
    cross_refs: ["adaptive-null", "provable-discourse"]

  - id: rubrics-as-instruments
    n: 8
    title: "The Ruler Is Part of the Research"
    family: apparatus
    status: methods
    claim: >-
      Revising the rubric changed how the project defined good tutoring. The same rubric
      can tune prompts, but those gains transfer unevenly between models — helpful in
      one direction and harmful in the other.
    abstract: >-
      Four rubric versions, the problems they exposed, and why prompt tuning must be
      checked separately for each model family.
    sections: ["5.2", "5.6", "7.7", "7.8"]
    cross_refs: ["provable-discourse"]

  - id: human-learning-translation
    n: 9
    title: "The Human-Learning Question"
    family: translation
    status: future
    claim: >-
      The studies show differences in tutor output with simulated learners. Whether any
      supported change improves learning for real people remains open.
    abstract: >-
      Why better-looking tutor responses are not the same as better human learning, and
      what the built-but-not-yet-recruited human pilot is meant to test.
    sections: ["6.5", "8.1", "8.2"]
    cross_refs: ["recognition-calibration"]

  - id: model-dependence
    n: 10
    title: "The Model Still Sets the Ceiling"
    family: recognition
    status: settled
    claim: >-
      The supported mechanisms appear across capable models, but their size depends on
      generation quality. A six-model test (N=947) also rejects Paper 1.0's proposed
      capability threshold for bidirectional profiling.
    abstract: >-
      Stronger base models leave less work for the critic. This module follows that
      pattern across the main model comparisons, the Writing Pad test, and the six-model
      check that did not find the predicted helpful-then-harmful profiling pattern.
    sections: ["5.7", "5.8", "6.6", "8.3"]
    cross_refs: ["recognition-calibration", "superego-error-correction"]

  - id: composition-small-kernel
    n: 12
    title: "More Layers Do Not Mean More Benefit"
    family: recognition
    status: settled
    claim: >-
      A three-part tutor — learner-facing stance, conversation memory, and speaking-style
      routing — matches the full stack on every measured surface. Stacking does not hurt,
      but it does not add benefit either. Repeated instructions converge; genuinely new,
      checkable information is what accumulates.
    abstract: >-
      A pre-registered comparison of a small kernel and the full mechanism stack across
      resistance, suggestion, and trap suites, at n=6 per cell-scenario. It explains why
      several good instructions often substitute for one another instead of adding up.
    sections: ["6.14", "7.11"]
    cross_refs: ["recognition-calibration", "superego-error-correction", "id-director-charisma", "ontology-state-interior"]

  - id: register-selection-boundary
    n: 13
    title: "Adaptive Speaking Style Did Not Hold Up"
    family: ontology-state
    status: scope-bound
    claim: >-
      A pre-registered two-family test did not find a reliable benefit from adapting
      speaking style to the learner profile. Terra failed the profile-manipulation gate;
      Sonnet passed that gate but returned no interaction.
    abstract: >-
      A 120-dialogue confirmatory study in one simulated detective world. It closes this
      field selector on the present evidence, while keeping the result separate from any
      claim about an isolated tutor model or human learning.
    sections: ["6.17"]
    cross_refs: ["ontology-state-interior", "adaptive-null", "composition-small-kernel", "provable-discourse"]

  - id: advice-versus-enforcement
    n: 14
    title: "Advice, Enforcement, and the Cost of Control"
    family: ontology-state
    status: scope-bound
    claim: >-
      Standing playbooks, coached reflection, and point-of-action advice did not reliably
      change the target behaviour. The study's main trigger did not fire often enough for
      a verdict. On its denser descriptive channel, mechanical enforcement moved macro
      compliance by +0.452 and +0.420 across the two tutor families, but cost about 0.13
      of proof coverage.
    abstract: >-
      A ladder from “remember this advice” to “do this now” to a compiled constraint.
      Better-timed information still missed its behavioural bar. Enforcement changed the
      action by taking the choice away from the model, but that result is descriptive and
      paid for its control elsewhere.
    sections: ["6.15", "6.16", "6.18"]
    cross_refs: ["adaptive-null", "composition-small-kernel", "program2-trained-move"]

  - id: transparent-sensor-boundary
    n: 15
    title: "The Hidden State Was Not Actually Hidden"
    family: apparatus
    status: killed
    claim: >-
      The learner-state sensor programme closed on its current benchmark because an
      exact filter recovered the authored state from public history with 0.0000 bits of
      uncertainty at the horizon on every trajectory. There was nothing concealed for a
      better sensor to discover.
    abstract: >-
      A zero-call reanalysis showed that the first negative result was partly a
      data-starved instrument, then exposed a deeper problem: the synthetic benchmark
      was fully observable. A future sensor test needs a genuinely ambiguous substrate.
    sections: ["6.19"]
    cross_refs: ["ontology-state-interior", "provable-discourse"]

  - id: program2-trained-move
    n: 16
    title: "Training One Teaching Move into a Small Model"
    family: translation
    status: scope-bound
    claim: >-
      Training produced partial traction but no solo arm passed its frozen gates. A live
      small-model-plus-frontier committee passed its scoped compliance endpoint only
      after checks covered every delivered-text path it owned; the hard-safety guardrail
      still failed.
    abstract: >-
      The trained model nearly learned the missing warrant cue in its weights. In the
      final live run, the fully checked committee reached 0.477 (42/88) against 0.136
      (22/162) for pooled controls, +0.341 with CI95 [0.223, 0.457], at no coverage cost
      and seam parity. The result is development-tier, one move, two worlds, one live
      tutor family, simulated learners, and no human-learning or deployment claim.
    sections: ["6.20", "6.21", "6.22"]
    cross_refs: ["advice-versus-enforcement", "composition-small-kernel", "human-learning-translation", "provable-discourse"]
