version: 1
description: "Mechanistic claims for Paper 2.0 — calibration, error correction, adaptive responsiveness"

claims:
  # ── Calibration mechanism ─────────────────────────────────────
  - id: paper2.calibration.variance_reduction
    description: "Recognition narrows tutor output distribution (lower cross-dimension variance)."
    source_keys:
      - "stat|0|dimension variance reduction"
    statement:
      pattern: "recognition narrows.*output distribution"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: dimension_variance
      group_by: recognition
      output: cohens_d
      filters:
        not_null: [tutor_first_turn_score]
        like:
          judge_model: "%claude%"
    assertion:
      op: lte
      expected: -0.3
    remediation:
      - "If variance reduction d drifts above -0.3, update calibration claims or re-scope runs."

  - id: paper2.calibration.recognition_cluster_d
    description: "Recognition-theoretic dimensions show large recognition effect (d > 0.50)."
    source_keys:
      - "stat|0|recognition cluster effect"
    statement:
      pattern: "recognition.theoretic dimensions.*d"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: dimension_cluster_effect
      cluster: recognition_theoretic
      group_by: recognition
      dimension_clusters:
        recognition_theoretic:
          - mutual_recognition
          - dialectical_responsiveness
          - transformative_potential
        pedagogy:
          - pedagogical
          - actionability
          - tutor_adaptation
          - productive_struggle
        infrastructure:
          - relevance
          - specificity
          - tone
          - personalization
          - memory_integration
          - epistemic_honesty
          - learner_growth
      filters:
        not_null: [tutor_first_turn_score]
        like:
          judge_model: "%claude%"
    assertion:
      op: gte
      expected: 0.50
    remediation:
      - "If recognition cluster d falls below 0.50, reconsider the targeted-calibration narrative."

  - id: paper2.calibration.infrastructure_cluster_d
    description: "Infrastructure dimensions show smaller recognition effect than recognition-theoretic dims."
    source_keys:
      - "stat|0|infrastructure cluster effect"
    statement:
      pattern: "infrastructure dimensions"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: dimension_cluster_effect
      cluster: infrastructure
      group_by: recognition
      dimension_clusters:
        recognition_theoretic:
          - mutual_recognition
          - dialectical_responsiveness
          - transformative_potential
        pedagogy:
          - pedagogical
          - actionability
          - tutor_adaptation
          - productive_struggle
        infrastructure:
          - relevance
          - specificity
          - tone
          - personalization
          - memory_integration
          - epistemic_honesty
          - learner_growth
      filters:
        not_null: [tutor_first_turn_score]
        like:
          judge_model: "%claude%"
    assertion:
      op: abs_lte
      expected: 0.70
    remediation:
      - "Infrastructure cluster shows moderate recognition spillover (~d=0.56). Gradient claim relies on relative difference vs recognition cluster, not zero effect."

  # ── Error correction mechanism (Superego Taxonomy) ────────────
  - id: paper2.taxonomy.corpus_size
    description: "Superego critique taxonomy built from N≥200 classified critiques."
    source_keys:
      - "stat|0|superego taxonomy corpus"
    statement:
      pattern: "classif.*critiqu|critiqu.*classif|taxonomy.*superego"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: jsonl_critique_stats
      file: data/superego-critiques-classified.jsonl
      metric: total_count
    assertion:
      op: gte
      expected: 200
    remediation:
      - "If classified critique corpus drops below 200, re-run extraction pipeline."

  - id: paper2.taxonomy.recognition_failure_dominant
    description: "Recognition Failure is the most frequent non-approval superego critique category (≥15% of full corpus including approvals)."
    source_keys:
      - "stat|0|recognition failure frequency"
    statement:
      pattern: "recognition.failure|most.frequent.*critiqu"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: jsonl_critique_stats
      file: data/superego-critiques-classified.jsonl
      metric: category_pct
      category: RECOGNITION_FAILURE
    assertion:
      op: gte
      expected: 15.0
    remediation:
      - "If RECOGNITION_FAILURE drops below 15%, the dominant critique framing needs revision. Note: 41% of critiques are APPROVAL; RECOGNITION_FAILURE is ~16% of full corpus but ~28% of non-approval critiques."

  - id: paper2.taxonomy.persistence_rate
    description: "Superego critique persistence rate ≥25% (same category repeats across turns)."
    source_keys:
      - "stat|0|critique persistence"
    statement:
      pattern: "persist|same.category.*repeat|repeat.*critiqu"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: jsonl_critique_stats
      file: data/superego-critiques-classified.jsonl
      metric: persistence_rate
    assertion:
      op: gte
      expected: 0.25
    remediation:
      - "If persistence rate drops below 25%, the stalling narrative weakens. Re-examine ego revision effectiveness."

  - id: paper2.taxonomy.stalling_rate
    description: "Some dialogues show stalling (3+ consecutive same critique)."
    source_keys:
      - "stat|0|dialogue stalling"
    statement:
      pattern: "stall|3.*consecutive.*same|same.*critiqu.*3"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: jsonl_critique_stats
      file: data/superego-critiques-classified.jsonl
      metric: stalling_rate
    assertion:
      op: gte
      expected: 0.05
    remediation:
      - "If stalling rate falls below 5%, the ego-compliance/stalling discussion needs revision."

  - id: paper2.taxonomy.escalation_balance
    description: "De-escalation (critique→APPROVAL) at least as common as escalation (APPROVAL→critique)."
    source_keys:
      - "stat|0|escalation balance"
    statement:
      pattern: "de-escalat|escalat.*balance"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: jsonl_critique_stats
      file: data/superego-critiques-classified.jsonl
      metric: escalation_balance
    assertion:
      op: gte
      expected: 0.8
    remediation:
      - "If de-escalation/escalation ratio falls below 0.8, the superego may be over-correcting (creating new problems)."

  # ── Adaptive responsiveness mechanism ─────────────────────────
  - id: paper2.trajectory.learner_positive_slope
    description: "Learner scores show positive trajectory across turns (learning signal)."
    source_keys:
      - "stat|0|learner trajectory slope"
    statement:
      pattern: "learner.*positive.*trajectory"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: trajectory_slope
      side: learner
      dimension: overall
      output: mean_slope
      min_turns: 3
      turn_level: true
      filters:
        not_null: [learner_scores]
        like:
          judge_model: "%claude%"
    assertion:
      op: gte
      expected: 0.0
    remediation:
      - "If mean learner slope is negative, the learning-signal claim needs revision."

  - id: paper2.trajectory.tutor_positive_slope
    description: "Tutor scores show positive trajectory across turns (cumulative adaptation)."
    source_keys:
      - "stat|0|tutor trajectory slope"
    statement:
      pattern: "tutor.*adapt.*cumulatively"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: trajectory_slope
      side: tutor
      dimension: overall
      output: mean_slope
      min_turns: 3
      turn_level: true
      filters:
        not_null: [tutor_scores]
        like:
          judge_model: "%claude%"
    assertion:
      op: gte
      expected: -0.5
    remediation:
      - "Tutor trajectory data is sparse (~57 rows). If slope is negative, acknowledge limitation."
      - "This is a relaxed assertion (>= -0.5) due to limited multi-turn tutor score data."

  - id: paper2.trajectory.recognition_steeper_learner
    description: "Recognition condition produces steeper learner trajectory slopes."
    source_keys:
      - "stat|0|recognition amplifies learner trajectory"
    statement:
      pattern: "recognition.*amplif.*trajectory"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: trajectory_slope
      side: learner
      dimension: overall
      group_by: recognition
      output: cohens_d
      min_turns: 3
      turn_level: true
      filters:
        not_null: [learner_scores]
        like:
          judge_model: "%claude%"
    assertion:
      op: gte
      expected: -0.5
    remediation:
      - "Relaxed assertion due to data sparsity. Update when more multi-turn data is available."

  - id: paper2.trajectory.confusion_adaptation
    description: "Tutors adapt more after learner confusion events (low revision_signals)."
    source_keys:
      - "stat|0|confusion-triggered adaptation"
    statement:
      pattern: "adapt.*learner difficulty"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: conditional_delta
      event_dimension: revision_signals
      event_threshold: 2
      event_direction: below
      response_dimension: overall
      output: mean_delta_event
      min_turns: 3
      turn_level: true
      filters:
        not_null: [tutor_scores, learner_scores]
        like:
          judge_model: "%claude%"
    assertion:
      op: gte
      expected: -1.0
    remediation:
      - "Relaxed assertion — conditional_delta requires both tutor_scores and learner_scores (~57 rows)."
      - "Sufficient for mechanistic demonstration, not robust statistics."

  # ── Section 1: Introduction claims ────────────────────────────
  # These are mostly cross-references to pilot data or verified infrastructure.
  # Theoretical claims are registered for traceability but not machine-checkable.

  - id: paper2.s1.pilot.factorial_d
    description: "Introduction cites pilot factorial recognition effect d=1.11."
    depends_on:
      - paper.modulation.dataset_n350
    source_keys:
      - "stat|5|pilot factorial d=1.11"
    statement:
      pattern: "d=1\\.11"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper.modulation.dataset_n350
    assertion:
      op: exists
      expected: true
    remediation:
      - "If pilot factorial claim is removed from Paper 1.0, update this cross-reference."
    tags: [s1, pilot]

  - id: paper2.s1.pilot.memory_isolation_d
    description: "Introduction cites pilot memory isolation d=1.71."
    source_keys:
      - "stat|5|pilot memory isolation d=1.71"
    statement:
      pattern: "d=1\\.71"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper.abstract.primary_scored_n
    assertion:
      op: exists
      expected: true
    remediation:
      - "If pilot memory isolation numbers change, update §1 citation."
    tags: [s1, pilot]

  - id: paper2.s1.verified.trace_logging
    description: "Introduction claims every ego-superego exchange is logged."
    source_keys:
      - "design|3|trace logging infrastructure"
    statement:
      pattern: "every ego.superego exchange is logged"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: code_path
      file: "../machinespirits-tutor-core/services/tutorDialogueEngine.js"
      pattern: "dialogueTrace\\.push"
      min_matches: 5
    assertion:
      op: gte
      expected: 5
    remediation:
      - "If trace push sites drop below 5, the observability claim may be overstated."
    tags: [s1, verified, architecture]

  - id: paper2.s1.verified.provenance_hashes
    description: "Introduction claims provenance hashes on scored rows."
    source_keys:
      - "design|3|provenance infrastructure"
    statement:
      pattern: "provenance"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: code_path
      file: "services/evaluationStore.js"
      pattern: "dialogue_content_hash|config_hash"
      min_matches: 3
    assertion:
      op: gte
      expected: 3
    remediation:
      - "If provenance columns are removed, update §1 provenance claims."
    tags: [s1, verified, provenance]

  - id: paper2.s1.verified.provable_discourse
    description: "Introduction claims provable discourse framework is operational."
    source_keys:
      - "design|3|provable discourse"
    statement:
      pattern: "provable discourse"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: code_path
      file: "scripts/validate-provable-discourse.js"
      pattern: "validate|audit"
      min_matches: 1
    assertion:
      op: gte
      expected: 1
    remediation:
      - "If validate-provable-discourse.js is removed, this claim and §7 are both invalidated."
    tags: [s1, verified, infrastructure]

  - id: paper2.s1.theoretical.three_mechanisms
    description: "Introduction previews three separable mechanisms (calibration, error correction, adaptive responsiveness)."
    source_keys:
      - "theoretical|1|three-mechanism model"
    statement:
      pattern: "three.*mechanism|calibration.*error correction.*adaptive"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Derived from recognition theory in §3.2; each mechanism generates testable predictions."
      cross_refs: [paper2.calibration.variance_reduction, paper2.taxonomy.corpus_size, paper2.trajectory.tutor_positive_slope]
    assertion:
      op: theoretical
      expected: "All three mechanisms have at least one provable claim registered"
    remediation:
      - "Ensure §3 derives all three mechanisms with explicit observable predictions."
      - "Each mechanism must have at least one provable-discourse entry with a non-theoretical assertion."
    tags: [s1, theoretical, mechanisms]

  - id: paper2.s1.theoretical.asymmetry_explanation
    description: "Introduction claims tutor-learner asymmetry is structurally produced (all mechanisms operate on tutor production)."
    source_keys:
      - "theoretical|2|asymmetry explanation"
    statement:
      pattern: "tutor.*production.*learner.*reception|all.*mechanisms.*operate.*tutor"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "All three mechanisms (calibration, error correction, adaptive responsiveness) modify the tutor generation pipeline; none directly modifies learner reception."
      cross_refs: [paper2.calibration.variance_reduction, paper2.taxonomy.corpus_size, paper2.trajectory.tutor_positive_slope]
    assertion:
      op: theoretical
      expected: "Consistent with pilot data showing large tutor effects, small learner effects"
    remediation:
      - "If new data shows significant learner-side mechanism effects, this explanation needs revision."
    tags: [s1, theoretical, asymmetry]

  - id: paper2.s1.pilot.variance_52_of_55
    description: "Introduction cites 52/55 within-run variance reduction."
    source_keys:
      - "stat|5|variance reduction 52/55"
    statement:
      pattern: "52/55|52 of 55"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper2.calibration.variance_reduction
    assertion:
      op: exists
      expected: true
    remediation:
      - "If the calibration variance claim changes, update the 52/55 citation in §1."
    tags: [s1, pilot, calibration]

  - id: paper2.s1.pilot.architecture_interaction
    description: "Introduction cites 35.9-point architecture x recognition interaction."
    source_keys:
      - "stat|5|architecture interaction Δ=35.9"
    statement:
      pattern: "35\\.9"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper.modulation.dataset_n350
    assertion:
      op: exists
      expected: true
    remediation:
      - "If the factorial interaction numbers change in Paper 1.0, update §1."
    tags: [s1, pilot, error_correction]

  # ── Section 3: Theoretical framework claims ──────────────────
  # These are the core mechanism predictions. Theoretical claims are registered
  # for traceability. PILOT claims cross-reference frozen pilot data.

  - id: paper2.s3.calibration.prediction
    description: "Calibration prediction: recognition narrows output distribution even without superego."
    source_keys:
      - "theoretical|1|calibration operates at prompt level"
    statement:
      pattern: "calibration.*prompt.level|observable.*even without the superego"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Hegel requires response shaped by specific content of other's contribution. This constrains response space at prompt level, independent of architecture."
      cross_refs: [paper2.calibration.variance_reduction]
    assertion:
      op: theoretical
      expected: "Variance reduction in single-agent recognition cells comparable to multiagent"
    remediation:
      - "If single-agent recognition shows NO variance reduction, calibration is not prompt-level."
    tags: [s3, theoretical, calibration]

  - id: paper2.s3.calibration.null
    description: "Calibration null hypothesis: recognition produces mean shift without variance reduction."
    source_keys:
      - "theoretical|1|calibration null hypothesis"
    statement:
      pattern: "null hypothesis.*calibration|variance reduction.*only.*multiagent"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Null: if calibration is not a mechanism, recognition should shift means without narrowing distributions."
    assertion:
      op: theoretical
      expected: "Reject if variance reduction observed in single-agent recognition cells"
    remediation:
      - "Document whether null is rejected or not — both outcomes are informative."
    tags: [s3, theoretical, calibration, null_hypothesis]

  - id: paper2.s3.error_correction.prediction
    description: "Error correction prediction: ego revision is substantive under recognition, cosmetic under baseline."
    source_keys:
      - "theoretical|1|error correction depends on ego receptivity"
    statement:
      pattern: "substantive revision.*cosmetic compliance|ego.*receptive.*critique"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Kamoi et al.: self-correction degrades without external feedback. Hegel's Bildung: subject must be genuinely changed by encounter with other."
      cross_refs: [paper2.taxonomy.corpus_size, paper2.taxonomy.persistence_rate]
    assertion:
      op: theoretical
      expected: "Higher rate of strategic/substantive revisions under recognition vs baseline"
    remediation:
      - "If revision types are indistinguishable between conditions, error correction mechanism is unsupported."
    tags: [s3, theoretical, error_correction]

  - id: paper2.s3.adaptive_responsiveness.prediction
    description: "Adaptive responsiveness prediction: recognition tutors show increasing scores across turns."
    source_keys:
      - "theoretical|1|adaptive responsiveness across turns"
    statement:
      pattern: "increasing.*scores.*across turns|trajectory.*recognition.*increasing"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Hegel's dialectic unfolds through stages; each turn shaped by outcomes of previous turn."
      cross_refs: [paper2.trajectory.tutor_positive_slope, paper2.trajectory.recognition_steeper_learner]
    assertion:
      op: theoretical
      expected: "Positive tutor score slope under recognition; flat/declining under baseline"
    remediation:
      - "If trajectories are parallel or both flat, adaptive responsiveness is not a distinct mechanism."
    tags: [s3, theoretical, adaptive_responsiveness]

  - id: paper2.s3.separability.prediction
    description: "Separability prediction: 2x2 factorial reinterpretable as mechanism isolation matrix."
    source_keys:
      - "theoretical|1|mechanism separability"
    statement:
      pattern: "separab|mechanism isolation|factorial.*reinterpret"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "If mechanisms are separable: recog+single = calibration only, base+multi = attempted error correction, recog+multi = all three."
    assertion:
      op: theoretical
      expected: "Each 2x2 cell shows predicted mechanism signature"
    remediation:
      - "If recog+single shows no calibration, or base+multi shows effective error correction, separability fails."
    tags: [s3, theoretical, separability]

  - id: paper2.s3.failure.cognitive_overload
    description: "Failure prediction: cognitive prosthesis hurts weak models (-12 to -16 pts vs baseline)."
    source_keys:
      - "stat|3|cognitive prosthesis failure"
    statement:
      pattern: "cognitive.*overload|prosthesis.*fail|mechanism stack.*hurts"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: db_count
      filters:
        profile_name_like: "cell_66%"
        not_null: [tutor_first_turn_score]
    assertion:
      op: gte
      expected: 10
    remediation:
      - "If fewer than 10 cognitive prosthesis rows exist, the failure prediction lacks statistical power."
    tags: [s3, pilot, calibration, failure]

  - id: paper2.s3.failure.model_dependent
    description: "Failure prediction: Haiku/Kimi eta^2 reversal (.527 vs .002)."
    source_keys:
      - "stat|3|model-dependent architecture"
    statement:
      pattern: "Haiku.*Kimi.*reversal|eta.*527.*002"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper2.s1.pilot.factorial_d
    assertion:
      op: exists
      expected: true
    remediation:
      - "Cross-model replication (§5.5) should provide mechanistic explanation of the reversal."
    tags: [s3, pilot, model_dependence]

  - id: paper2.s3.asymmetry.structural
    description: "Asymmetry explanation: all three mechanisms operate on tutor production, not learner reception."
    source_keys:
      - "theoretical|2|structural asymmetry explanation"
    statement:
      pattern: "tutor.*production.*learner.*reception|all.*mechanisms.*operate.*tutor"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Calibration constrains tutor generation; error correction filters tutor output; adaptive responsiveness shapes tutor evolution. None modifies learner processing."
      cross_refs: [paper2.s1.theoretical.asymmetry_explanation]
    assertion:
      op: theoretical
      expected: "Consistent with pilot: tutor d=1.03, learner d=0.27"
    remediation:
      - "If new data shows large learner-side mechanism effects, this structural explanation needs revision."
    tags: [s3, theoretical, asymmetry]

  - id: paper2.s3.pilot.strategy_shift_pct
    description: "Strategy_shift tag appears in ~30% of recognition dialogues and 0% of baseline."
    source_keys:
      - "stat|3|strategy shift frequency"
    statement:
      pattern: "strategy.shift.*30%|30%.*recognition.*0%.*baseline"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper2.s1.pilot.factorial_d
    assertion:
      op: exists
      expected: true
    remediation:
      - "This is qualitative coding from eval-2026-02-07-b6d75e87. If replication data differs, update percentage."
    tags: [s3, pilot, adaptive_responsiveness]

  - id: paper2.s3.pilot.stalling_base_bilateral
    description: "Stalling tag (no meaningful evolution) appears in 100% of base bilateral dialogues."
    source_keys:
      - "stat|3|stalling in baseline"
    statement:
      pattern: "stalling.*100%.*base|100%.*base.*bilateral.*stall"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: cross_reference
      ref_claim: paper2.s1.pilot.factorial_d
    assertion:
      op: exists
      expected: true
    remediation:
      - "From qualitative coding eval-2026-02-07-b6d75e87. Update if replication shows different rate."
    tags: [s3, pilot, adaptive_responsiveness]

  - id: paper2.s3.failure.adversary_overdeference
    description: "Adversary over-deference: recognition + adversary underperforms recognition + non-adversary."
    source_keys:
      - "stat|3|adversary over-deference"
    statement:
      pattern: "adversary.*over.deference|adversary.*55\\.8|adversary.*65\\.2"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: db_count
      filters:
        profile_name_like: "cell_24%"
        not_null: [tutor_first_turn_score]
    assertion:
      op: gte
      expected: 5
    remediation:
      - "If adversary cell data is insufficient, expand runs for cells 24-25 / 30-31."
    tags: [s3, pilot, error_correction, failure]

  - id: paper2.s3.failure.advocate_ceiling
    description: "Advocate ceiling: cooperative superego shows smallest recognition delta."
    source_keys:
      - "stat|3|advocate ceiling"
    statement:
      pattern: "advocate.*ceiling|advocate.*minimal|suspicious.*largest.*advocate.*least"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: theoretical
      derivation: "Recognition requires dialectical tension (Hegel's struggle). Cooperative critic provides none."
      cross_refs: [paper2.s3.error_correction.prediction]
    assertion:
      op: theoretical
      expected: "Disposition gradient: suspicious > adversary > advocate recognition delta"
    remediation:
      - "If advocate shows larger recognition delta than suspicious, the struggle-requirement prediction fails."
    tags: [s3, pilot, error_correction, failure]

  - id: paper2.s3.pilot.cells_40_45_architecture
    description: "Cells 40-45 are multiagent (ego + suspicious superego), NOT single-agent."
    source_keys:
      - "design|0|cells 40-45 architecture"
    statement:
      pattern: "cells 40.*multiagent|40.*45.*superego"
      flags: "i"
      min_occurrences: 0
    evidence:
      type: code_path
      file: config/tutor-agents.yaml
      pattern: "cell_40_base_dialectical_suspicious"
      min_matches: 1
    assertion:
