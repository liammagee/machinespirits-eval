    flags: { strategy-ledger: '{"registerPalette":["modern"]}' }
  - label: ledger-palette-r2
    flags: { strategy-ledger: '{"registerPalette":["modern","period"]}' }
  - label: ledger-learner-r2
    flags: { strategy-ledger: '{"registerPalette":["modern"]}', learner-ledger: true }
  - label: baseline-r3
  - label: ledger-r3
    flags: { strategy-ledger: '{"registerPalette":["modern"]}' }
  - label: ledger-palette-r3
    flags: { strategy-ledger: '{"registerPalette":["modern","period"]}' }
  - label: ledger-learner-r3
    flags: { strategy-ledger: '{"registerPalette":["modern"]}', learner-ledger: true }
