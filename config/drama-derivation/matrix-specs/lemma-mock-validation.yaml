# Zero-paid validation matrix for the lemma design (pre-freeze): 3 arms x 2
# repeats on marrick in MOCK mode, driven through the frozen analysis with
# --design lemma before any paid run.
base:
  world: config/drama-derivation/world-005-marrick.yaml
  script: config/drama-derivation/tutor-scripts/marrick-v001.md
  mode: mock
  flags:
    scene-mode: true
    didactic-mode: true
    register: modern
    release-authority: true
    pacing-guard: true
concurrency: 3
arms:
  - label: baseline-r1
    flags: { decay: '{"seed":59,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}' }
  - label: lemma-display-r1
    flags: { decay: '{"seed":59,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}', lemma-layer: '{"display":true}' }
  - label: lemma-bound-r1
    flags: { decay: '{"seed":59,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}', lemma-layer: '{"bind":true}' }
  - label: baseline-r2
    flags: { decay: '{"seed":61,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}' }
  - label: lemma-display-r2
    flags: { decay: '{"seed":61,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}', lemma-layer: '{"display":true}' }
  - label: lemma-bound-r2
    flags: { decay: '{"seed":61,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}', lemma-layer: '{"bind":true}' }
