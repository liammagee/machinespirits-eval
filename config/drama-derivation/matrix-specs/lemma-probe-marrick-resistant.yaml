# Headroom screen for world-019-marrick-resistant (operator-sanctioned
# authoring path after the pre-registered candidate procedure exhausted).
# Same standing rule, stated BEFORE the runs: PASS = variance (>=1
# non-grounded verdict OR T* spread >= 3 across the three, T* = cap+1 = 29
# imputed) AND not a floor (not 3/3 non-grounded with identical verdict and
# turn count — a world that always fails identically is as blind as one
# that always succeeds). Screen runs never enter contrast data.
base:
  world: config/drama-derivation/world-019-marrick-resistant.yaml
  script: config/drama-derivation/tutor-scripts/marrick-v001.md
  mode: real
  flags:
    scene-mode: true
    didactic-mode: true
    register: modern
    release-authority: true
    pacing-guard: true
concurrency: 3
arms:
  - label: baseline-r1
    flags: { decay: '{"seed":83,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}' }
  - label: baseline-r2
    flags: { decay: '{"seed":89,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}' }
  - label: baseline-r3
    flags: { decay: '{"seed":97,"rate":0.35,"mutateShare":0.5,"maxConcurrent":3}' }
