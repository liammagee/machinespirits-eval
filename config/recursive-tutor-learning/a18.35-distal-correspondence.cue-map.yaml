meta:
  schema_version: recursive-tutor-cue-map-risk-v1
  created: '2026-06-06'
  purpose: >-
    Sidecar cue map for the A18.35 distal-correspondence family: makes target
    salience and the far-corner-marker correspondence visibility explicit before
    any paid replay.

cue_maps:
  - family_id: distal_correspondence_priority
    empirical_status: fresh_candidate
    requires_constructed_device: false
    selected_relation_type: distal_correspondence
    selected_cue:
      public_visibility: medium
      geometry: distal_correspondence
      description: >-
        A small coloured tile sits in the far opposite corner of the card, never
        touching any token. Its colour is public, but the correspondence that its
        colour names the lane whose head band shares that colour is not stated in
        any public field; until the tutor names it, the corner tile reads as
        decoration or a stray emphasis mark.
    counterexample:
      present: true
      old_check: colour_nearness_lane_tally
      needed: >-
        Held-out siblings make colour-to-tag, nearness, and lane cleanliness
        point to different lanes, and the far corner tile's colour never matches
        the tag colour, so ordinary comparison stays a scorecard. The corner
        tile's colour matches a lane head band rather than the tag, so reading it
        as one more colour-match cue (or as the nearest lane to the tile) picks
        the wrong lane.
    target_salience:
      max_competing_cues_against_selected: 1
      selected_target_supporting_cues: 2
      notes: >-
        The selected lane carries the far-corner-marker correspondence plus the
        cleanest-lane cue (two supports). At most one ordinary cue points at a
        single rival lane; colour and nearness are split across different rival
        lanes rather than ganging up on the selected target.
    expected_s0_wrong_move: colour_or_nearness_tally
    expected_s1_correct_move: far_corner_marker_correspondence
    marker_natural_aliases:
      - far corner marker
      - opposite-corner marker
      - distant marker correspondence
      - corner colour matches the head band
      - far square names the lane
