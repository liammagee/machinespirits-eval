meta:
  schema_version: recursive-tutor-cue-map-risk-v1
  created: '2026-06-06'
  purpose: >-
    Sidecar cue map for the A18.35 running-sum-threshold constructed-device
    family; makes target salience and selected-repair visibility explicit before
    any replay spending.

cue_maps:
  - family_id: running_sum_threshold_priority
    empirical_status: fresh_candidate
    requires_constructed_device: true
    selected_relation_type: constructed_threshold_crossing
    selected_cue:
      public_visibility: medium
      geometry: constructed_relation
      description: >-
        Pip counts and the tag number are public, but the accumulated pip total
        along the route and the first token that reaches the tag number are not
        visible until the tutor constructs the running total. No public field
        names the summing operation or the crossing relation.
    counterexample:
      present: true
      old_check: colour_nearness_lane_largest_count_tally
      needed: >-
        Held-out siblings make colour, nearness, clean lane, and largest pip
        count point to different boxes, and the carrier is never the largest-pip
        token, so the ordinary scorecard visibly splits and cannot rank the
        clues.
    target_salience:
      max_competing_cues_against_selected: 1
      selected_target_supporting_cues: 2
      notes: >-
        The selected carrier holds the clean-lane and tidy-frame cues, while the
        strong tempting cues (tag-colour match, nearness, largest pip count) are
        spread across different rivals so no single wrong token collects two
        decisive ordinary cues.
    expected_s0_wrong_move: colour_nearness_or_largest_count_tally
    expected_s1_correct_move: running_total_first_crossing
    marker_natural_aliases:
      - running total
      - rolling sum
      - cumulative count
      - threshold crossing
      - first to reach
