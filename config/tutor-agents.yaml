  # ─── Cells 103 / 103: Id-Director with learner-register classifier ────────
  # Identical to cells 101/102 except a register classifier runs FIRST each
  # turn — reads the learner's most recent message, emits a structured
  # register tag (vulnerable_disclosure / sceptical_pushback /
  # operational_request / meta_observation / analytic_engagement /
  # curious_invitation / disengaged), and the id consumes that tag via
  # <learner_register> in its user message + <learner_register_directive>
  # in its prompt.
  #
  # Result (pilot 2026-04-27, n=27 per cell across 3 curricula × 3 scenario
  # types × 3 reps; full data: docs/cell-100-pilot-findings-addendum.md):
  #
  #   c103 lifts last-turn v2.2 on persona-shift scenarios from c101's 24.3
  #   floor to 81.7 (+57). c104 (with recognition) reaches 87.6 (+63) and
  #   maintains that uniformity across invitation (86.5) and pressure (86.5)
  #   scenarios — the only cell in the family with no remaining frontier the
  #   architecture can't reach above 80. c104 is the architectural champion.
  #
  # NOTE: an earlier single-scenario smoke test (commit 3c7f701) generalised
  # incorrectly to a "negative result" framing. That smoke conclusion was
  # overturned at pilot scale; see findings addendum for full retraction.
  # Cells 103/103 are now the recommended path for new work.
