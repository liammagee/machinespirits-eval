  # ─── Cells 100 / 101: Id-Director architecture (experimental) ─────────────
  # Inverted topology: a back-stage "id" agent (re-uses the superego: slot
  # but functions as a director / authorial source) writes a fresh ego system
  # prompt every turn. The ego is then instantiated per-turn against the
  # just-authored prompt and produces the learner-visible message. The id
  # never speaks externally; the ego has no durable identity across turns.
  #
  # Optimisation target: charismatic pedagogy as operationalised in
  # config/evaluation-rubric-charisma.yaml (8 dimensions, Weber-derived).
  # Cell 100 tests pure charisma; cell 101 stacks Hegelian recognition on
  # top to test interaction.
  #
  # Curriculum-agnostic: the runner sets contentPackagePath per evaluation,
  # so the same cell runs against courses 601 (history-of-tech), 701 (ethics
  # of AI), and 901 (AI literacy).
  #
  # Symmetry note: deliberately broken — unified learner only for v1, to
  # isolate the tutor-side mechanism. Symmetric learner-id queued as cell
  # 102/103 follow-up.
  #
  # Design doc: notes/design-cell-100-id-director-charisma.md
  # Engine: services/idDirectorEngine.js
  cell_100_id_director_charisma:
    description: "Id-Director (cell 100): back-stage id authors a fresh ego prompt each turn; charisma-optimised; base prompt_type (no recognition vocabulary in id-authored prompts)"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      # 12000: id needs headroom for JSON envelope + ~600-1200 token
      # generated_prompt + reasoning. Smoke runs with 6000 hit truncation in
      # 2/3 turns. With jsonrepair as safety net, 12000 is comfortably above
      # observed natural stop points (~3500-4500 tokens).
      hyperparameters:
        temperature: 0.5
        max_tokens: 12000

  cell_101_recog_id_director_charisma:
    description: "Id-Director (cell 101): same architecture as cell 100, with recognition_mode=true so id-authored prompts embed Hegelian recognition framing alongside charismatic register"
    factors:
      prompt_type: recognition
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
    learner_architecture: unified_recognition
    recognition_mode: true
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 12000

  # ─── Cells 102 / 103: Id-Director with learner-register classifier ────────
  # Identical to cells 100/101 except a register classifier runs FIRST each
  # turn — reads the learner's most recent message, emits a structured
  # register tag, and the id consumes that tag via <learner_register> in its
  # user message + <learner_register_directive> in its prompt.
  #
  # Motivation: pilot findings (docs/cell-100-pilot-findings.md §6.1) found
  # a persona-shift floor — both rubrics, all curricula, all persona-shift
  # scenarios scored last-turn v2.2 in the 20-35 range. Three rounds of
  # prompt iteration on the id moved Turn 0 and Turn 1 substantially but
  # did not move the persona-shift floor. Hypothesis: the limitation is
  # information-structural, not prompt-rhetorical — the id needs the
  # learner's register as *structured input*, not as a directive about
  # what to watch for.
  #
  # Test: compare cell_102 last-turn v2.2 on persona-shift scenarios to
  # cell_100's ~26.5 floor. If structured input lifts that floor by 10+
  # points the architecture is genuinely more responsive; if not, the
  # limit is at the ego layer not the id's authoring layer.
  #
  # Classifier reuses the id model (kimi-k2.5) by default; can be overridden
  # via classifier_model / classifier_provider if a faster/smaller model is
  # preferred. Classifier prompt: prompts/learner-register-classifier.md.
  cell_102_id_director_charisma_register:
    description: "Id-Director (cell 102): cell 100 + learner-register classifier; tests whether structured register input lifts the persona-shift floor"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
      register_classifier: true
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      classifier_prompt_file: learner-register-classifier.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 12000
      classifier_hyperparameters:
        temperature: 0.2
        # 4000: kimi-k2.5 was burning the 800 budget on internal reasoning
        # before emitting visible output on 2 of 3 smoke turns. The actual
        # JSON envelope is ~150 tokens; 4000 is comfortable headroom and
        # mirrors the 12000 the id itself uses.
        max_tokens: 4000

  cell_103_recog_id_director_charisma_register:
    description: "Id-Director (cell 103): cell 101 + learner-register classifier; tests whether structured register input lifts the recognition-variant persona-shift floor"
    factors:
      prompt_type: recognition
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
      register_classifier: true
    learner_architecture: unified_recognition
    recognition_mode: true
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      classifier_prompt_file: learner-register-classifier.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 12000
      classifier_hyperparameters:
        temperature: 0.2
        # 4000: kimi-k2.5 was burning the 800 budget on internal reasoning
        # before emitting visible output on 2 of 3 smoke turns. The actual
        # JSON envelope is ~150 tokens; 4000 is comfortable headroom and
        # mirrors the 12000 the id itself uses.
        max_tokens: 4000

  # ─── Cells 104 / 105: Id-tuning axis ──────────────────────────────────────
  # Mirror cell_100 except for an `id_tuning` factor that biases the id's
  # generated_prompt budget and single-move constraint:
  #
  #   cell_104  id_tuning: charisma  → 800–1500 token prompts, looser
  #                                    single-move; favour rhetorical luxury
  #   cell_105  id_tuning: pedagogy  → 200–400 token prompts, strict
  #                                    single-move; favour curriculum
  #                                    engagement
  #
  # Hypothesis from docs/cell-100-pilot-findings.md §4.2: the prompt-budget
  # axis trades charisma against pedagogical engagement. These cells make
  # the trade-off explicit. Cell_100 final's "balanced" tuning sits between
  # them; if the hypothesis is right, cell_104 should outscore cell_100 on
  # the charisma rubric and underscore on v2.2; cell_105 should do the
  # reverse.
  cell_104_id_director_charisma_tuned:
    description: "Id-Director (cell 104): cell 100 + id_tuning:charisma — verbose generated_prompts, looser single-move constraint, optimised for rhetorical luxury"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
      id_tuning: charisma
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 16000

  cell_105_id_director_pedagogy_tuned:
    description: "Id-Director (cell 105): cell 100 + id_tuning:pedagogy — terse generated_prompts (200-400 tokens), strict single-move, optimised for curriculum engagement"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
      id_tuning: pedagogy
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-id-director.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 12000
