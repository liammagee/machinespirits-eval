      multi_agent_tutor: true
      multi_agent_learner: false
      id_director: true
      charisma_target: true
      register_classifier: true
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego-actor-skeleton.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 4000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
