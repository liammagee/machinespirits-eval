# Local Tutor Agent Configuration (Eval Repo Override)
#
# This file overrides tutor-core's tutor-agents.yaml for evaluation purposes.
# Model aliases (e.g. "sonnet", "nemotron") are resolved through providers.yaml.
#
# ============================================================================
# MODEL OVERRIDES (optional)
# ============================================================================
# These override ALL profile models when uncommented. Useful for quick testing.
# CLI flags (--model, --ego-model, --superego-model) take precedence over these.
#
# model_override: openrouter.haiku        # Override ALL models (ego + superego)
# ego_model_override: openrouter.nemotron # Override only ego model
# superego_model_override: openrouter.kimi-k2.5  # Override only superego model
#
# ============================================================================
# FACTORIAL EVALUATION DESIGN
# ============================================================================
#
# Three independent variables:
#
#   Factor A: Prompt Type          — base / enhanced / recognition (3 levels)
#   Factor B: Tutor Architecture   — single ego vs ego+superego dialogue (2 levels)
#   Factor C: Learner Architecture — unified vs ego_superego (2 levels)
#
# Factor A levels:
#   - base:        Original Claude-generated prompts (default LLM tutoring)
#   - enhanced:    Matches recognition specificity without recognition theory
#   - recognition: Full recognition-enhanced prompts with Hegelian theory
#   - hardwired:   Base + 5 superego-derived rules (no live superego) [ABLATION]
#
# This design enables isolating:
#   - Base vs Enhanced      = prompt engineering effect
#   - Enhanced vs Recognition = isolated recognition theory effect
#   - Base vs Recognition   = combined effect (original comparison)
#
# All cells use nemotron (free tier) to isolate architectural effects from model cost.
#
# Design Matrix (12 main cells + 2 ablation cells):
#
#   ┌────────────────────┬──────────────────────────┬──────────────────────────┐
#   │                    │   Unified Learner         │   Ego/Superego Learner   │
#   ├────────────────────┼──────────────┬───────────┼──────────────┬───────────┤
#   │                    │ Single Tutor │ E+S Tutor │ Single Tutor │ E+S Tutor │
#   ├────────────────────┼──────────────┼───────────┼──────────────┼───────────┤
#   │ Base               │ cell_1       │ cell_3    │ cell_2       │ cell_4    │
#   ├────────────────────┼──────────────┼───────────┼──────────────┼───────────┤
#   │ Enhanced           │ cell_9       │ cell_11   │ cell_10      │ cell_12   │
#   ├────────────────────┼──────────────┼───────────┼──────────────┼───────────┤
#   │ Recognition        │ cell_5       │ cell_7    │ cell_6       │ cell_8    │
#   └────────────────────┴──────────────┴───────────┴──────────────┴───────────┘
#
#   ABLATION (hardwired = superego rules in ego prompt, no live superego):
#   ┌────────────────────┬──────────────┬──────────────┐
#   │ Hardwired          │ cell_13      │ cell_14      │
#   └────────────────────┴──────────────┴──────────────┘
#
# Ablation comparisons:
#   - cell_1/2 vs cell_13/14 = Do hardwired rules improve single-agent?
#   - cell_3/4 vs cell_13/14 = Can hardwired rules replace live superego?
#
# This allows analyzing:
#   - Main effect of prompt type (base vs enhanced vs recognition)
#   - Main effect of tutor architecture (single agent vs ego + superego dialogue)
#   - Main effect of learner architecture (unified vs ego_superego)
#   - All two-way and three-way interactions
#   - Superego architecture ablation (rules vs dynamic dialogue)
#
# ============================================================================

active_profile: budget

# ============================================================================
# PEDAGOGICAL ORIENTATION TAXONOMY
# ============================================================================
# Metadata about each tutor-ego prompt_type, keyed by the `factors.prompt_type`
# value in each cell profile below. Canonical reference: docs/pedagogical-taxonomy.md.
# Consumed by the chat UI (routes/chatRoutes.js + public/chat/) to group cells by
# pedagogical orientation and surface comparative tooltips. Empirical findings
# from A10/A10b (eval runs eval-2026-04-23-42e7acbe and eval-2026-04-24-e9a785c0,
# paper §7.9 v3.0.48) establish orientation-family as the dominant axis of
# variation: between-family pooled d ≈ 1.38, within-Hegelian pooled d ≈ 0.14,
# within-transmission pooled d ≈ 0.89.

pedagogical_orientations:
  base:
    family: transmission
    short_label: "Base (generic pedagogical)"
    lineage: "Anglo-American teacher-trainer tradition; no single named theorist"
    view_of_learner: "Information recipient; some soft-constructivist framing (engage with input)"
    role_of_tutor: "Provide specific, actionable content suggestions"
    key_mechanism: "Generic pedagogical best practice"
    vocabulary: ["suggest", "explain", "guide", "engage with"]
    prompt_file: tutor-ego.md
    approx_length_words: 1950

  placebo:
    family: neutral
    short_label: "Placebo (length-matched, no theory)"
    lineage: "Authored for Paper 1.0 active control; no specific theorist"
    view_of_learner: "Individual with unique patterns; generic adaptive-teaching framing"
    role_of_tutor: "Adapt guidance to learner state; be responsive"
    key_mechanism: "Responsive calibration without theoretical grounding"
    vocabulary: ["adapt", "calibrate", "respond to learner input", "appropriate challenge"]
    prompt_file: tutor-ego-placebo.md
    approx_length_words: 2390

  recognition:
    family: intersubjective
    subfamily: hegelian_recognition
    short_label: "Recognition (Hegelian mutual-recognition)"
    lineage: "Hegel (Phenomenology, master-slave dialectic); Honneth (Struggle for Recognition); Huttunen and Stojanov on recognition in pedagogy"
    view_of_learner: "Autonomous subject with valid interpretations; co-constitutive partner"
    role_of_tutor: "Recognise learner contributions; engage dialectically with resistance; maintain productive tension; repair after failures to recognise"
    key_mechanism: "Mutual recognition"
    vocabulary: ["recognition", "autonomous subject", "mutual transformation", "dialectical engagement", "productive tension", "repair after misrecognition"]
    prompt_file: tutor-ego-recognition.md
    approx_length_words: 2810
    evaluation_effect_pooled_d_vs_base: 1.21  # A10b pooled

  matched_pedagogical:
    family: intersubjective
    subfamily: hegelian_constructivist
    short_label: "Matched-pedagogical (Hegelian-family constructivism)"
    lineage: "Vygotsky (ZPD); Piaget (assimilation/accommodation); Kapur (productive failure); Chi (ICAP); VanLehn (step-level scaffolding); Graesser (AutoTutor affective dynamics). All Hegelian-descendant."
    view_of_learner: "Active thinking agent with current schema that must be disturbed to learn"
    role_of_tutor: "Diagnose current understanding; scaffold productive struggle at the specific step; prefer minimum effective assistance; push up the ICAP engagement ladder"
    key_mechanism: "Cognitive disequilibrium resolved through scaffolding"
    vocabulary: ["ZPD", "productive struggle", "scaffolding", "disequilibrium", "step-level intervention", "ICAP", "diagnostic question", "minimum effective assistance"]
    prompt_file: tutor-ego-matched-pedagogical.md
    approx_length_words: 2835
    evaluation_effect_pooled_d_vs_base: 1.05  # A10b pooled
    evaluation_note: "Matches recognition within pooled d = 0.14 (A10b) / 0.19 (A10 v2) — density-sufficient within the Hegelian-descendant family."

  matched_behaviorist:
    family: transmission
    subfamily: behaviorist_explicit_instruction
    short_label: "Matched-behaviorist (explicit instruction)"
    lineage: "Skinner (operant conditioning); Gagné (Nine Events of Instruction); Keller (PSI / mastery learning); Thorndike (Laws of Effect/Exercise/Readiness); Rosenshine (Principles of Instruction)."
    view_of_learner: "Organism whose behaviour is shaped by contingencies; a responder to be reinforced toward mastery criterion"
    role_of_tutor: "Manage learning contingencies; break content into smallest teachable units; sequence simple-to-complex via chaining; immediate corrective feedback; reinforce correct performance; require mastery before advancement"
    key_mechanism: "Reinforced repetition toward mastery criterion"
    vocabulary: ["contingency", "reinforcement", "stimulus", "response", "mastery criterion", "feedback cycle", "worked example", "guided practice", "independent practice", "chaining", "fading", "automaticity", "clear objective", "task analysis"]
    prompt_file: tutor-ego-matched-behaviorist.md
    approx_length_words: 2957
    evaluation_effect_pooled_d_vs_base: -0.89  # A10b: substantially BELOW base (transmission-family)
    evaluation_note: "Scores substantially below generic base prompt (pooled d = 0.89). Rigorously-authored prompt in the wrong pedagogical family is counterproductive."

  # ---------------------------------------------------------------------------
  # ARCHITECTURAL / PROMPT-ENGINEERING VARIANTS
  # ---------------------------------------------------------------------------
  # The entries above name distinct pedagogical orientations. The entries below
  # describe variants that are not separate orientations but architectural or
  # prompt-engineering modifications of an underlying orientation. They are
  # registered here so cells using these `prompt_type` values resolve cleanly
  # in the chat UI's family grouping.

  enhanced:
    family: transmission
    subfamily: enhanced_pedagogical
    short_label: "Enhanced (length-matched, no recognition theory)"
    lineage: "Authored as the Paper 1.0 cells 9-12 control to test whether prompt elaboration alone (without Hegelian theory) reproduces recognition's effect."
    view_of_learner: "Individual with patterns and preferences; behaviourally legible through engagement signals"
    role_of_tutor: "Provide concrete, content-tied guidance, calibrated to detected learner state"
    key_mechanism: "Detailed pedagogical heuristics without theoretical grounding"
    vocabulary: ["engagement", "calibrate", "pacing", "personalization", "rapport"]
    prompt_file: tutor-ego-enhanced.md
    approx_length_words: 2979
    evaluation_note: "Paper 1.0 ablation (cells 9-12). Showed that elaboration alone does not reproduce recognition's effect on capable models — and on Kimi K2.5 caused catastrophic context loss (77% hallucination rate)."

  naive:
    family: transmission
    subfamily: minimal_directive
    short_label: "Naive (minimal baseline)"
    lineage: "Constructed as the floor of the prompt-design space — what does an LLM tutor produce with essentially no instruction?"
    view_of_learner: "Implicit; whatever the model's default prior is"
    role_of_tutor: "Suggest the next learning activity given context"
    key_mechanism: "Untrained model defaults"
    vocabulary: ["suggest", "next", "best"]
    prompt_file: tutor-ego-naive.md
    approx_length_words: 200
    evaluation_note: "Cell 71 floor baseline. Used to bound the lower end of prompt-design effect."

  hardwired:
    family: transmission
    subfamily: rules_in_ego
    short_label: "Hardwired rules (superego rules embedded in ego prompt)"
    lineage: "Empirically derived from analysis of 186 superego rejections in pilot data; 5 rules encode what a critic most commonly catches."
    view_of_learner: "Same as base; rules shape tutor output rather than learner model"
    role_of_tutor: "Generate guidance constrained by 5 hardcoded rules; no live superego dialogue"
    key_mechanism: "Single-agent operation with rule-based self-constraint"
    vocabulary: ["base vocabulary plus explicit rule check phrasing"]
    prompt_file: tutor-ego-hardwired.md
    approx_length_words: 2467
    evaluation_note: "Cells 13-14 ablation. Tests whether hardcoded rules can substitute for live superego dialogue. Empirically: partial substitution, not full."

  memory:
    family: transmission
    subfamily: base_with_writing_pad
    short_label: "Memory-enhanced base"
    lineage: "Base orientation plus three-layer Writing Pad memory (conscious / preconscious / unconscious)."
    view_of_learner: "Same as base, with persistent learner model accumulated across turns"
    role_of_tutor: "Same as base; additionally references and updates accumulated learner state"
    key_mechanism: "Cross-turn state persistence (Writing Pad)"
    vocabulary: ["base vocabulary plus memory references"]
    prompt_file: tutor-ego-memory.md
    approx_length_words: 2384
    evaluation_note: "Cells 19-20. Used to disentangle recognition theory from memory mechanism (recognition variants also have Writing Pad enabled)."

  recognition_nomem:
    family: intersubjective
    subfamily: hegelian_recognition
    short_label: "Recognition without memory"
    lineage: "Same as recognition — Hegel, Honneth, Huttunen, Stojanov."
    view_of_learner: "Same as recognition: autonomous subject; co-constitutive partner"
    role_of_tutor: "Same as recognition, but without the Writing Pad memory layer"
    key_mechanism: "Mutual recognition without cross-turn memory accumulation"
    vocabulary: ["recognition", "autonomous subject", "mutual transformation", "dialectical engagement", "productive tension"]
    prompt_file: tutor-ego-recognition-nomem.md
    approx_length_words: 2529
    evaluation_note: "Cells 19-20 paired with `memory` to disentangle recognition theory from memory mechanism. The orientation is identical to `recognition`; the difference is the architectural memory layer."

  # The dialectical_* and divergent_* types are not separate orientations — they
  # name superego dispositions paired with either a standard or a dialectical
  # ego. The cell's actual orientation depends on the paired ego prompt
  # (tutor-ego.md → transmission, tutor-ego-recognition.md → intersubjective).
  # Chat UI consumers should fall back to the cell's `recognition_mode` flag
  # when grouping these by family.

  dialectical_suspicious:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego × suspicious superego"
    lineage: "Hegelian dialectic operationalised as an Aufhebung-trained ego that synthesises with a suspicious superego (questions authenticity of engagement)."
    view_of_learner: "Inherits from paired ego prompt (base or recognition)"
    role_of_tutor: "Defend initial position, extract what is valid in the critique, integrate into a stronger response"
    key_mechanism: "Aufhebung — negation that preserves and elevates"
    vocabulary: ["thesis", "antithesis", "synthesis", "Aufhebung", "what is valid in the objection"]
    prompt_file: tutor-ego-dialectical.md  # paired with tutor-superego-suspicious.md
    approx_length_words: 2813
    evaluation_note: "Cells 28, 30, 32 (paired with base) and 29, 31, 33 (paired with recognition). Architecturally distinct from divergent_suspicious which uses a standard ego."

  dialectical_suspicious_directive:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego (directive) × suspicious superego"
    lineage: "Same as dialectical_suspicious; adds an explicit 'Acting On What You Noticed' rider that instructs the ego to couple self-reflection to the suggestion."
    view_of_learner: "Inherits from paired ego prompt (base only; D3 starts on the base variant before extending to recognition)"
    role_of_tutor: "Same as dialectical_suspicious, plus: name the specific noticing, build the suggestion FROM it, and make the link traceable."
    key_mechanism: "Self-reflection coupled to action by directive (insight-action bridge)"
    vocabulary: ["name what you noticed", "build from", "make the link traceable", "synthesis", "Aufhebung"]
    prompt_file: tutor-ego-dialectical-directive.md
    approx_length_words: 3161
    evaluation_note: "D3 cell 97. Tests whether the insight-action gap (mean coupling 0.42 in cells 40-45) is bridgeable by an explicit directive. Length confound: +348 words / +12.4% vs control. Pre-registered thresholds: d ≥ 0.5 = bridgeable; 0.3 ≤ d < 0.5 = suggestive; d < 0.3 = structural. See notes/design-d3-explicit-directive-bridge.md."

  dialectical_suspicious_two_pass:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego (two-pass) × suspicious superego"
    lineage: "Same as dialectical_suspicious; adds a Phase-1 ego call that produces a plain-text reflection (tutor-ego-reflectonly.md) which is prepended to the next call's user-message context — i.e., reflection seen as content rather than instructed via system prompt."
    view_of_learner: "Inherits from paired ego prompt (base only; D3 Bridge 1 starts on the base variant)"
    role_of_tutor: "Same as dialectical_suspicious; the architectural change is upstream — a Phase-1 reflection is generated separately and fed back as context."
    key_mechanism: "Reflection-as-input via two-pass orchestration (insight-action bridge by architecture, not by prompt)"
    vocabulary: ["prior reflection", "noticing", "two-pass", "reflection-as-content"]
    prompt_file: tutor-ego-dialectical.md
    approx_length_words: 2813
    evaluation_note: "D3 Bridge 1 cell 98. Tests the architectural alternative to cell 97's prompt-rider directive: instead of telling the ego to 'act on what you noticed,' a separate Phase-1 call produces a noticing in plain text, and the existing ego prompt receives it as recent-context input. Cost: +1 cheap LLM call per turn (~10% of total turn cost). Pre-registered thresholds same as cell 97. See notes/design-d3-architectural-bridges.md."

  dialectical_coupling:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego × coupling-targeted superego"
    lineage: "Same as dialectical_suspicious in architecture; the Superego's critique target is retargeted from broad pedagogical / authenticity concerns to the specific question of whether the Ego's message embodies its own reasoning."
    view_of_learner: "Inherits from paired ego prompt (base only; D3 Bridge 2 starts on the base variant)"
    role_of_tutor: "Same as dialectical_suspicious; the architectural change is in critique scope — the superego applies a 3-step coupling test (extract noticing → look for traces in message → assign severity) and demands revision when the message is decoupled from its own stated reflection."
    key_mechanism: "Coupling-targeted error correction (insight-action bridge via critique retargeting)"
    vocabulary: ["coupling auditor", "noticing", "trace the link", "coupling severity", "decoupled reflection"]
    prompt_file: tutor-ego-dialectical.md  # paired with tutor-superego-coupling.md
    approx_length_words: 2813
    evaluation_note: "D3 Bridge 2 cell 99. Reuses the paper's already-strong error-correction mechanism (Mechanism 2, §6.2) but retargets it specifically at coupling. Cost: same as cell 40 (no extra LLM calls; only the superego prompt content differs). Pre-registered thresholds same as cells 97/98. See notes/design-d3-architectural-bridges.md."

  dialectical_adversary:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego × adversary superego"
    lineage: "Aufhebung-trained ego synthesising with an adversary superego (argues for the opposite pedagogical method)."
    view_of_learner: "Inherits from paired ego prompt (base or recognition)"
    role_of_tutor: "Synthesise across an explicitly opposed methodological challenge"
    key_mechanism: "Methodological-opposition synthesis"
    vocabulary: ["dialectic", "opposition", "synthesis", "preserve and transform"]
    prompt_file: tutor-ego-dialectical.md  # paired with tutor-superego-adversary.md
    approx_length_words: 2813
    evaluation_note: "Same architectural pattern as dialectical_suspicious; superego disposition differs."

  dialectical_advocate:
    family: architectural_variant
    subfamily: dialectical_synthesis
    short_label: "Dialectical ego × advocate superego"
    lineage: "Aufhebung-trained ego synthesising with an advocate superego (represents how a real student would experience the response)."
    view_of_learner: "Inherits from paired ego prompt (base or recognition); advocate superego foregrounds learner experience"
    role_of_tutor: "Synthesise across a learner-experiential challenge"
    key_mechanism: "Experiential-perspective synthesis"
    vocabulary: ["learner perspective", "experiential challenge", "synthesis"]
    prompt_file: tutor-ego-dialectical.md  # paired with tutor-superego-advocate.md
    approx_length_words: 2813
    evaluation_note: "Same architectural pattern as dialectical_suspicious; superego disposition differs. D4 finding: in dialectical-ego cells (40-45) the suspicious > adversary > advocate gradient is monotone; in standard-ego cells (22-27) the gradient inverts (D4 §6.6.8)."

  divergent_suspicious:
    family: architectural_variant
    subfamily: divergent_critique
    short_label: "Standard ego × suspicious superego"
    lineage: "Standard ego paired with a divergent superego that questions whether the engagement is genuinely contingent on this learner."
    view_of_learner: "Inherits from paired ego prompt"
    role_of_tutor: "Generate; absorb suspicious critique; revise (no Aufhebung training — capitulation baseline)"
    key_mechanism: "Divergent-critique modulation without synthesis"
    vocabulary: ["modulation", "revision", "critique-and-revise"]
    prompt_file: tutor-ego.md  # paired with tutor-superego-suspicious.md (or tutor-ego-recognition.md for recog cells)
    approx_length_words: 1953
    evaluation_note: "Cells 22-23. Capitulation baseline against which dialectical_suspicious (cells 28-29) tests whether Aufhebung training recovers quality."

  divergent_adversary:
    family: architectural_variant
    subfamily: divergent_critique
    short_label: "Standard ego × adversary superego"
    lineage: "Standard ego paired with an adversary superego (argues for the opposite pedagogical method)."
    view_of_learner: "Inherits from paired ego prompt"
    role_of_tutor: "Generate; absorb adversary critique; revise"
    key_mechanism: "Divergent-critique modulation without synthesis"
    vocabulary: ["modulation", "opposition", "revision"]
    prompt_file: tutor-ego.md  # paired with tutor-superego-adversary.md (or tutor-ego-recognition.md for recog cells)
    approx_length_words: 1953
    evaluation_note: "Cells 24-25. Capitulation baseline against dialectical_adversary (cells 30-31)."

  divergent_advocate:
    family: architectural_variant
    subfamily: divergent_critique
    short_label: "Standard ego × advocate superego"
    lineage: "Standard ego paired with an advocate superego (represents learner experience)."
    view_of_learner: "Inherits from paired ego prompt; advocate superego foregrounds learner experience"
    role_of_tutor: "Generate; absorb advocate critique; revise"
    key_mechanism: "Divergent-critique modulation without synthesis"
    vocabulary: ["modulation", "learner perspective", "revision"]
    prompt_file: tutor-ego.md  # paired with tutor-superego-advocate.md (or tutor-ego-recognition.md for recog cells)
    approx_length_words: 1953
    evaluation_note: "Cells 26-27. Capitulation baseline against dialectical_advocate (cells 32-33)."

# ============================================================================
# CELL PROFILES
# ============================================================================

profiles:
  # ===========================================================================
  # DEVELOPMENT PROFILE (not part of factorial design)
  # ===========================================================================

  budget:
    description: "Budget-friendly single agent - Nemotron (free) via OpenRouter, no dialogue"
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: tutor-ego.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 8000
    superego: null

  # ===========================================================================
  # 2×2×2 FACTORIAL CELLS (Recognition × Tutor Architecture × Learner Architecture)
  # ===========================================================================
  # These 8 profiles support the unified factorial evaluation pipeline.
  # Use: node scripts/eval-cli.js run --factorial --runs 3
  # All use nemotron (free tier) to isolate architectural effects from model cost.

  # Cell 1: Base × Single Agent × Unified Learner
  cell_1_base_single_unified:
    description: "Factorial cell 1: baseline single-agent tutor, unified learner"
    factors:
      prompt_type: base
      multi_agent_tutor: false
      multi_agent_learner: false
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: false
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: tutor-ego.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 8000
    superego: null

  # Cell 2: Base × Single Agent × Ego/Superego Learner
  cell_2_base_single_psycho:
    description: "Factorial cell 2: baseline single-agent tutor, ego/superego learner"
    factors:
      prompt_type: base
      multi_agent_tutor: false
      multi_agent_learner: true
    learner_architecture: ego_superego
    recognition_mode: false
    memory_enabled: false
    dialogue:
      enabled: false
      max_rounds: 0
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: tutor-ego.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 8000
    superego: null

  # Cell 3: Base × Multi-Agent Tutor × Unified Learner
  cell_3_base_multi_unified:
    description: "Factorial cell 3: ego+superego tutor, unified learner"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: false
    learner_architecture: unified
    recognition_mode: false
    memory_enabled: false
    dialogue:
      enabled: true
      max_rounds: 2
      convergence_threshold: 0.8
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 8000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-superego.md
      hyperparameters:
        temperature: 0.2
        max_tokens: 8000

  # Cell 4: Base × Multi-Agent Tutor × Ego/Superego Learner
  cell_4_base_multi_psycho:
    description: "Factorial cell 4: ego+superego tutor, ego/superego learner"
    factors:
      prompt_type: base
      multi_agent_tutor: true
      multi_agent_learner: true
    learner_architecture: ego_superego
    recognition_mode: false
    memory_enabled: false
    dialogue:
      enabled: true
      max_rounds: 2
      convergence_threshold: 0.8
    ego:
      provider: openrouter
      model: nemotron
      staging: front
      prompt_file: tutor-ego.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 8000
    superego:
      provider: openrouter
      model: kimi-k2.5
      staging: back
      prompt_file: tutor-superego.md
      hyperparameters:
        temperature: 0.2
        max_tokens: 8000

  # Cell 5: Recognition × Single Agent × Unified Learner
  cell_5_recog_single_unified:
    description: "Factorial cell 5: recognition single-agent tutor, unified learner"
    factors:
      prompt_type: recognition
      multi_agent_tutor: false
      multi_agent_learner: false
    learner_architecture: unified_recognition
    recognition_mode: true
    memory_enabled: true
    dialogue:
      enabled: false
      max_rounds: 0
