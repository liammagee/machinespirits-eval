  # Classifier reuses the id model (kimi-k2.5) by default; can be overridden
  # via classifier_model / classifier_provider if a faster/smaller model is
  # preferred. Classifier prompt: prompts/learner-register-classifier.md.
  cell_103_id_director_charisma_register:
    description: "Id-Director (cell 103): cell 101 + register classifier. Pilot result: lifts persona-shift floor from 24.3 → 81.7 last-turn v2.2 (+57); strong on charisma too (62.9 mean). One of the family's two recommended cells (with c104). See docs/cell-100-pilot-findings-addendum.md."
    factors:
