  # ===========================================================================
  # A16 (P2) — Superego-Authored Ego-Prompt Rewrite (cells 129-130, §6.3.10)
  # ===========================================================================
  # The decisive S0/S1 contrast in the pre-registered 4-arm F/A/S0/S1 design
  # (paper-full-2.0.md §6.3.10). A superego agent reads the full tutor-ego ↔
  # learner transcript and REWRITES the ego's entire system prompt each turn
  # (the nearest no-retraining analogue to psychoanalytic ego-revision under
  # discursive frustration). Topology mirrors cell_111 (recognition_only, the
  # F floor) with one superegoRevise node inserted BEFORE the ego, so S0/S1 are
  # maximally comparable to F. Both arms share a byte-identical ego node and a
  # byte-identical superegoRevise role prompt; the ONLY difference is rewrite-
  # policy statefulness:
  #   - cell_129 (S0, stateless): superego sees only the current transcript.
  #     Functionally ≈ id-director — each rewrite is independent. Empty
  #     revisionLedger by construction (the graph never returns the channel).
  #   - cell_130 (S1, cumulative): superego additionally threads its OWN prior
  #     per-turn rewrite ledger, so corrective directives can build on prior
  #     ones (continuous-learning analogue). Appends one revisionLedger entry
  #     per turn via the A14 evidenceLogReducer (append-only, replay-stable).
  # Pre-registered prediction: cumulative S1 shows a steeper across-turn
  # adaptation slope than stateless S0; F < {S0,S1} on adaptation. Validity
  # control (ported from prototypes/adversarial-superego-mvp): the superego is
  # NEVER shown the scenario's accepted strategy-shift answer key.
  # claude-code/sonnet to match the F floor (cell_111) — S0 and S1 MUST share
  # provider/model since their contrast is the experiment. counterfactual
  # disabled: like recognition_only there is no learnerProfileUpdate fork point
  # (a deliberate, documented no-op — see services/adaptiveTutor/graph.js).
  # Reachable via: node scripts/eval-cli.js run --profiles cell_129_superego_revise_stateless
  cell_129_superego_revise_stateless:
    description: "A16 (P2) arm S0: superego rewrites the ego's entire system prompt each turn from the current transcript only (stateless rewrite policy, functionally ≈ id-director). recognition_only topology (cell_111 F floor) + one superegoRevise node before the ego. Decisive contrast is vs cell_130 (S1, cumulative ledger) — byte-identical ego and superego role prompt; only rewrite-policy statefulness differs. Empty revisionLedger by construction. Superego never sees the scenario answer key. Pre-registration: paper-full-2.0.md §6.3.10; origin TODO.md A16."
