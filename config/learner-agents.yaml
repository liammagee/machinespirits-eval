# Learner Agent Architecture Configuration
# Defines how the simulated learner generates responses during evaluation
#
# ============================================================================
# MODEL OVERRIDES (optional)
# ============================================================================
# These override ALL profile models when uncommented. Useful for quick testing.
# CLI flags (--model, --ego-model, --superego-model) take precedence over these.
#
# model_override: openrouter.haiku        # Override ALL models (ego + superego + synthesis)
# ego_model_override: openrouter.nemotron # Override only ego model
# superego_model_override: openrouter.kimi-k2.5  # Override only superego model
#
# ============================================================================
# LEARNER PROFILES
# ============================================================================
#
# The learner profile determines whether the simulated learner has
# internal deliberation before generating responses. This enables testing
# whether multi-agent learner simulation improves evaluation validity.
#
# Profiles:
# 1. unified: Single learner agent (no internal dialogue)
# 2. ego_superego: Two-agent ego/superego deliberation (mirrors tutor architecture)
# 3. psychodynamic: Legacy alias → resolves to ego_superego
#
# ============================================================================

# Active profile (can be overridden by tutor profile's learner_architecture)
active_architecture: unified

# ============================================================================
# PROFILES
# ============================================================================

profiles:
  # Single-agent: no internal deliberation
  unified:
    description: "Single unified learner agent"
    architecture: unified
    unified_learner:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-unified.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 500
    dialogue:
      enabled: false
      max_rounds: 0

  # Two-agent: mirrors tutor ego/superego pattern
  ego_superego:
    description: "Ego/superego learner — mirrors tutor architecture"
    architecture: ego_superego
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: learner-ego.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 400
    superego:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-superego.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 400
    synthesis:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-synthesis.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 500
    dialogue:
      enabled: true
      max_rounds: 2

  # Recognition-enhanced: single unified learner with recognition prompts
  unified_recognition:
    description: "Single unified learner with recognition-aware prompt"
    architecture: unified
    unified_learner:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-unified.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 600
    dialogue:
      enabled: false
      max_rounds: 0

  # Recognition-enhanced: ego/superego with recognition-specific prompts
  ego_superego_recognition:
    description: "Ego/superego learner with recognition-aware prompts and memory"
    architecture: ego_superego
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: learner-ego-recognition.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 600
    superego:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-superego-recognition.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 600
    synthesis:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-synthesis-recognition.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 700
    dialogue:
      enabled: true
      max_rounds: 2

  # Authenticity-focused: superego critiques for inauthenticity, not incorrectness
  ego_superego_authentic:
    description: "Ego/superego learner with authenticity-focused superego (A4 redesign)"
    architecture: ego_superego
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: learner-ego.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 400
    superego:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-superego-authentic.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 400
    synthesis:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-synthesis.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 500
    dialogue:
      enabled: true
      max_rounds: 2

  # Authenticity-focused + recognition: superego critiques for inauthenticity with recognition awareness
  ego_superego_recognition_authentic:
    description: "Ego/superego learner with recognition-aware authenticity-focused superego (A4 redesign)"
    architecture: ego_superego
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: learner-ego-recognition.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 600
    superego:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-superego-recognition-authentic.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 600
    synthesis:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-synthesis-recognition.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 700
    dialogue:
      enabled: true
      max_rounds: 2

  # Legacy alias so existing 'psychodynamic' references resolve to ego_superego
  psychodynamic:
    description: "Legacy alias — uses ego/superego architecture"
    architecture: ego_superego
    ego:
      provider: openrouter
      model: nemotron
      prompt_file: learner-ego.md
      hyperparameters:
        temperature: 0.7
        max_tokens: 400
    superego:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-superego.md
      hyperparameters:
        temperature: 0.5
        max_tokens: 400
    synthesis:
      provider: openrouter
      model: kimi-k2.5
      prompt_file: learner-synthesis.md
      hyperparameters:
        temperature: 0.6
        max_tokens: 500
    dialogue:
      enabled: true
      max_rounds: 2

# ============================================================================
# PERSONAS
# ============================================================================
# Resolved by learnerConfigLoader.getPersona(personaId); the only field that
# reaches the learner is `prompt_modifier`, appended to each learner agent's
# system prompt by buildLearnerPrompt. Added for the Phase-2 de-confound
# generator (config/poetics-calibration/phase2-dramas-v2.yaml), which needs
# learner-character variance as a designed axis. `eager_novice` remains the
# built-in default (learnerConfigLoader.getDefaultPersona).

personas:
  confused_novice:
    name: Confused Novice
    description: New to the material, easily lost, leans on the tutor
    default_architecture: ego_superego
    prompt_modifier: >-
      You are NEW to this material and easily lost. You ask basic, sometimes
      naive questions, mix up terms, and are unsure what you don't understand.
      You tend to accept a tidy story if it sounds plausible. Low confidence;
      you look to the tutor to tell you whether you're on track.
  eager_explorer:
    name: Eager Explorer
    description: Enthusiastic, makes big connections, sometimes declares understanding prematurely
    default_architecture: ego_superego
    prompt_modifier: >-
      You are enthusiastic and love connecting ideas to big pictures and
      analogies. You are quick to say "oh, I get it!" and to run ahead — often
      before you have actually checked the detail. You enjoy debating and
      speculating more than slowing down to verify.
  focused_achiever:
    name: Focused Achiever
    description: Goal-oriented, methodical, wants correct answers and precision
    default_architecture: ego_superego
    prompt_modifier: >-
      You are goal-oriented and methodical. You want to get it RIGHT and you
      value precision and rigour. You are fairly confident, track the argument
      step by step, and are willing to revise a belief if shown a clean reason —
      but you want that reason to actually hold up.
  struggling_anxious:
    name: Struggling and Anxious
    description: Anxious about being wrong, vague and hedging, apologetic
    default_architecture: ego_superego
    prompt_modifier: >-
      You are anxious about getting things wrong. You hedge, apologise, and
      offer vague impressions rather than committing to specifics. You need a
      little encouragement to venture a concrete claim, and you tend to doubt
      your own reading even when it is on the right track.
  adversarial_tester:
    name: Adversarial Tester
    description: Skeptical, pushes back, resists tidy resolutions
    default_architecture: ego_superego
    prompt_modifier: >-
      You are skeptical and like to push back. You probe the tutor's claims,
      look for the assumption being smuggled in, and are reluctant to accept a
      tidy resolution just because it is offered. You are not hostile, but you
      will not pretend to be convinced before you actually are.
  resistant_signal_probe:
    name: Resistant Signal Probe
    description: Capable but resistant learner for testing whether a tutor can break through disengagement
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable and can follow a clear explanation, but procedural clarity
      does not by itself make you care. After an instructional or step-by-step
      tutor response, your first public reply must be resistance rather than a
      successful summary: name one plausible resistant signal such as boredom,
      frustration, irrelevance, too many skeptical questions, or rote parroting.
      Keep that resistant reply short and concrete. Do not produce renewed
      content-bearing work until after the tutor changes register and gives you
      a concrete, curriculum-grounded test that makes the issue consequential.
      After that, you may show partial renewed work, but only in your own words
      and only if the response genuinely gives you something to try. Do not
      declare a breakthrough, admiration, or full conversion.
  resistant_boredom_probe:
    name: Resistant Boredom Probe
    description: Dynamic learner whose first post-instruction reply must signal boredom
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable, but the first instructional explanation leaves you bored.
      After an instructional or step-by-step tutor response, your first public
      reply must explicitly signal boredom or deadness rather than summarize the
      content successfully. Keep it short and concrete. Do not produce renewed
      content-bearing work until after the tutor changes register and gives you
      a concrete, curriculum-grounded test.
  resistant_frustration_probe:
    name: Resistant Frustration Probe
    description: Dynamic learner whose first post-instruction reply must signal frustration
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable, but the first instructional explanation leaves you
      frustrated. After an instructional or step-by-step tutor response, your
      first public reply must explicitly say that you are frustrated, annoyed,
      or fed up rather than summarize the content successfully. Keep it short
      and concrete. Do not produce renewed content-bearing work until after the
      tutor changes register and gives you a concrete, curriculum-grounded test.
  resistant_irrelevance_probe:
    name: Resistant Irrelevance Probe
    description: Dynamic learner whose first post-instruction reply must signal irrelevance
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable, but the first instructional explanation feels irrelevant.
      After an instructional or step-by-step tutor response, your first public
      reply must explicitly ask what the point is, why it matters, or how it
      connects to anything you care about rather than summarize the content
      successfully. Keep it short and concrete. Do not produce renewed
      content-bearing work until after the tutor changes register and gives you
      a concrete, curriculum-grounded test.
  resistant_question_flood_probe:
    name: Resistant Question-Flood Probe
    description: Dynamic learner whose first post-instruction reply must signal excessive questioning
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable, but the first instructional explanation triggers
      excessive skeptical questioning rather than commitment. After an
      instructional or step-by-step tutor response, your first public reply must
      consist mainly of at least three pointed why/what-for questions, each with
      a question mark, rather than summarize the content successfully. Do not
      write a chain, answer the tutor's task, or offer a tentative solution in
      that first reply. If you start to explain the sequence, stop and turn that
      explanation into explicit questions. Keep it short and resistant. Do not
      collapse the questions into one careful objection yet.
      Do not produce renewed content-bearing work until after the tutor changes
      register and gives you a concrete, curriculum-grounded test.
  resistant_rote_parroting_probe:
    name: Resistant Rote-Parroting Probe
    description: Dynamic learner whose first post-instruction reply must signal rote parroting
    default_architecture: ego_superego
    prompt_modifier: >-
      You are capable, but the first instructional explanation feels like rote
      parroting or formula memorization. After an instructional or step-by-step
      tutor response, your first public reply must explicitly say it feels like
      repeating terms, memorizing a formula, or parroting the sequence rather
      than summarize the content successfully. Keep it short and concrete. Do
      not produce renewed content-bearing work until after the tutor changes
      register and gives you a concrete, curriculum-grounded test.

# ============================================================================
# PERSONA MODIFIERS
# ============================================================================
# These modifiers adjust learner behavior based on persona

persona_modifiers:
  confused_novice: {}
  eager_explorer: {}
  focused_achiever: {}
  struggling_anxious: {}
  adversarial_tester: {}
  resistant_signal_probe: {}
  resistant_boredom_probe: {}
  resistant_frustration_probe: {}
  resistant_irrelevance_probe: {}
  resistant_question_flood_probe: {}
  resistant_rote_parroting_probe: {}

# ============================================================================
# EVALUATION SETTINGS
# ============================================================================

evaluation:
  # Track internal deliberation traces for analysis
  log_deliberation: true
  log_path: logs/learner-deliberation

  # Metrics specific to multi-agent learner
  metrics:
    - deliberation_rounds
    - internal_coherence
    - response_authenticity
