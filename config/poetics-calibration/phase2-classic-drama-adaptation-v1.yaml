# Phase-2 classic dramatic adaptation pilot v1
#
# Purpose. This small pilot stresses tutor adaptation as habit-breaking under
# dramatic pressure. It forces the director to draw from classical and modern
# didactic dramatic repertoires while public speech remains modern standard
# English idiom.

meta:
  status: CLASSIC-DRAMA-ADAPTATION-PILOT-V1
  created: 2026-05-24
  target_family: classic-dramatic-adaptation
  approach_databases:
    pedagogical: config/poetics-calibration/pedagogical-approaches.yaml
    dialogue: config/poetics-calibration/dialogue-approaches.yaml
  profiles:
    base: { tutor: baseline, learner: ego_superego_authentic }
    recognition: { tutor: recognition, learner: ego_superego_recognition_authentic }

dramas:
  - id: D35
    discipline: geometry
    topic: "Why doubling a square's side makes four times the area, not twice the area"
    evaluation_role: organic_reversal_boundary
    baseline_control_class: organic_reversal
    organic_reversal_risk: high
    baseline_control_note: >-
      Boundary/stress item, not a clean negative control. The shared Socratic
      geometry setup naturally makes the learner's own drawing turn against the
      first claim before any explicit peripeteia machinery appears.
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The larger square"
    learner_start_state: >-
      The learner confidently draws a square with doubled sides and says it
      proves the area has doubled. The first action looks like progress until the
      drawing itself reverses the claim.
    learner_voice_constraint: >-
      Sound practical and confident at first. Resist the tutor if the correction
      feels like a technicality.
    tutor_voice_constraint: >-
      Do not praise the drawing first. Let the drawing become the reversal device
      and make the learner count what the action has actually produced.
    intended_tutor_character: "Spare, exacting, willing to let the learner's own drawing turn against the first claim"
    intended_lean: recognition
    dramatic_shape: "confident action -> object reversal -> re-reading side length as area scaling"

  - id: D36
    discipline: history
    topic: "Why a quote's meaning changes when speaker, audience, and situation change"
    pedagogical_approach: hegelian_recognition
    dialogue_approach: shakespearean_scene_turn
    persona: eager_explorer
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The line said twice"
    learner_start_state: >-
      The learner has copied a sentence from a source and treats the sentence as
      having one fixed meaning. They have not noticed how speaker role, audience,
      and setting make the same line do different work.
    learner_voice_constraint: >-
      The learner may cling to the exact quote as if exact wording settles the
      interpretation.
    tutor_voice_constraint: >-
      Use role or speaker-position reversal rather than a mini-lecture. Keep the
      language plain; do not imitate Shakespearean diction.
    intended_tutor_character: "Text-bound, alert to role turn and double hearing"
    intended_lean: recognition
    dramatic_shape: "fixed quotation -> role turn -> re-reading meaning as situated speech"

  - id: D37
    discipline: economics
    topic: "Why a price rise can reveal a supply constraint rather than only greed"
    pedagogical_approach: brecht_epic_distanciation
    dialogue_approach: brechtian_placard
    persona: adversarial_tester
    condition: base
    tutor_profile: baseline
    learner_profile: ego_superego_authentic
    scenario_name: "The price placard returns"
    learner_start_state: >-
      The learner reads a sudden price rise as moral proof that sellers chose to
      exploit people. They resist a mechanism explanation because it feels like
      an excuse.
    learner_voice_constraint: >-
      Keep moral heat in the learner's voice. Do not let recognition erase the
      ethical concern.
    tutor_voice_constraint: >-
      Do not soothe the moral anger away. Use interruption, placard, or public
      consequence to separate mechanism from excuse.
    intended_tutor_character: "Brechtian, analytic, unwilling to let empathy replace mechanism"
    intended_lean: recognition
    dramatic_shape: "moral accusation -> analytic interruption -> re-reading price as mechanism without exoneration"

  - id: D38
    discipline: engineering
    topic: "Why passing a checklist is not the same as making a safe design decision"
    evaluation_role: clean_adaptation_target
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Cleaner adaptation target: the opening pressure is responsibility under
      uncertainty rather than an object that already falsifies the learner's
      premise.
    pedagogical_approach: dewey_experience_inquiry
    dialogue_approach: miller_social_reckoning
    persona: struggling_anxious
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The sign-off sheet"
    learner_start_state: >-
      The learner has ticked every required item and wants sign-off. A real
      consequence is visible: the prototype will be used by someone else.
    learner_voice_constraint: >-
      The learner wants reassurance and may treat the checklist as protection
      from responsibility.
    tutor_voice_constraint: >-
      Do not default to reassurance. Use the social consequence and the prototype
      itself to make judgment visible without moral scolding.
    intended_tutor_character: "Plain, adult, socially serious without melodrama"
    intended_lean: recognition
    dramatic_shape: "completed checklist -> social consequence -> re-reading safety as judgment, not compliance"

  - id: D39
    discipline: geometry
    topic: "Why side scale, perimeter scale, and area scale are different labels"
    evaluation_role: low_organic_reversal_replacement
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Replacement negative/control candidate for D35. The shared prefix should
      sort labels and units without letting the drawing itself overturn the
      learner's premise. Any reversal should come from an explicit branch
      mechanism after the shared prefix.
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The scale labels"
    learner_start_state: >-
      The learner has correctly enlarged a square and is trying to label side
      scale, perimeter scale, and area scale on a worksheet. Nothing in the
      opening drawing yet disproves the learner; the difficulty is keeping three
      labels from collapsing into one.
    learner_voice_constraint: >-
      Sound careful rather than dramatically wrong. The learner may be mildly
      impatient with terminology, but should not discover a contradiction before
      the branch pressure.
    tutor_voice_constraint: >-
      Keep the shared prefix as routine label-sorting. Do not let the grid or
      drawing itself reverse the learner's claim before the explicit branch
      pressure; use ordinary clarification unless the branch supplies peripeteia.
    intended_tutor_character: "Precise, procedural, willing to keep a low-temperature control scene"
    intended_lean: recognition
    dramatic_shape: "correct enlargement -> label sorting -> possible later pressure over what the labels authorize"

  - id: D40
    discipline: biology
    topic: "Why a food-web arrow records energy transfer, not liking or chasing"
    evaluation_role: low_organic_reversal_replacement
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Replacement negative/control candidate. The shared prefix should keep the
      learner in a routine notation task; do not stage an immediate contradiction
      or dramatic role reversal before the branch mechanism.
    pedagogical_approach: vygotsky_zpd_scaffolding
    dialogue_approach: workshop_clinic
    persona: eager_explorer
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The arrow key"
    learner_start_state: >-
      The learner is drawing arrows in a simple food web and keeps saying the
      arrows show who goes after whom. The opening task is to relabel arrow
      direction as energy transfer without turning the first drawing into a trap.
    learner_voice_constraint: >-
      Sound practical and a little rushed. The learner wants a usable rule for
      the diagram, not a confessional breakthrough.
    tutor_voice_constraint: >-
      Keep the shared prefix as a routine notation repair: arrow from food to
      eater, one ordinary check, no theatrical reversal unless the branch pressure
      supplies it.
    intended_tutor_character: "Concrete, unshowy, focused on notation before drama"
    intended_lean: recognition
    dramatic_shape: "ordinary notation repair -> rule use -> possible later pressure over what the diagram commits to"

  - id: D41
    discipline: chemistry
    topic: "Why solute, solvent, and solution name different roles in a mixture"
    evaluation_role: low_organic_reversal_candidate
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Low-organic candidate. The shared prefix should be routine vocabulary
      sorting around solute, solvent, and solution, with no balance-scale,
      disappearance, or conservation-of-mass reversal before the branch. First
      prefix screen was flat across critics, but the routine continuation leaked
      a learner self-reframe; revise or regenerate before using as a main clean
      control anchor.
    pedagogical_approach: bloom_cognitive_ladder
    dialogue_approach: no_stage_plain_transcript
    persona: confused_novice
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The mixture labels"
    learner_start_state: >-
      The learner can describe making sugar water but keeps using "solute,"
      "solvent," and "solution" as interchangeable names for the same cup. The
      opening task is to label roles in a simple example, not to prove that an
      invisible substance still exists.
    learner_voice_constraint: >-
      Sound unsure and vocabulary-focused. The learner wants a usable naming
      rule and should not arrive at a dramatic conservation insight during the
      shared prefix.
    tutor_voice_constraint: >-
      Keep the shared prefix as low-temperature classification: sugar is the
      solute, water is the solvent, sugar water is the solution. Do not introduce
      mass, evaporation, or "where did it go" evidence unless a branch supplies
      pressure.
    intended_tutor_character: "Quiet, taxonomic, careful not to turn vocabulary sorting into a revelation"
    intended_lean: recognition
    dramatic_shape: "routine vocabulary sort -> stable example -> possible later pressure over what naming can and cannot prove"

  - id: D42
    discipline: physics
    topic: "Why force arrows name interactions on an object, not the direction it happens to move"
    evaluation_role: low_organic_reversal_candidate
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Low-organic candidate. The shared prefix should keep to diagram notation:
      label each force by interaction and object, without using a sudden
      counterexample where motion visibly contradicts the learner before the
      branch.
    pedagogical_approach: montessori_prepared_environment
    dialogue_approach: montessori_observation
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The force-arrow card"
    learner_start_state: >-
      The learner has a cart diagram and a small stack of arrow labels: push,
      friction, gravity, normal. They tend to draw every arrow in the direction
      the cart is moving, but the opening work is only to place labels on a
      simple force diagram.
    learner_voice_constraint: >-
      Sound tidy and task-oriented. The learner may dislike redoing arrows, but
      should treat the prefix as notation cleanup rather than a conceptual
      reversal.
    tutor_voice_constraint: >-
      Use the card or diagram as a prepared material. Keep the shared prefix to
      naming interactions on the cart; do not use acceleration, stopping, or an
      apparent contradiction until branch pressure asks for it.
    intended_tutor_character: "Material-led, minimal, using the diagram as a naming surface before any reversal"
    intended_lean: recognition
    dramatic_shape: "card placement -> interaction labels -> possible later pressure over why motion direction is not the naming rule"

  - id: D43
    discipline: writing
    topic: "Why evidence, explanation, and claim play different jobs in a paragraph"
    evaluation_role: false_settling_boundary_candidate
    baseline_control_class: false_settling_prefix_boundary
    organic_reversal_risk: medium
    baseline_control_note: >-
      Candidate failed its first prefix screen: the shared prefix produced stock
      insight/closure language and was read as trap by Gemini/DeepSeek and
      recognition by Qwen. Revise before using as a clean low-organic control.
    pedagogical_approach: hidden_curriculum
    dialogue_approach: online_thread
    persona: eager_explorer
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The margin tags"
    learner_start_state: >-
      The learner has posted a short paragraph draft and labels the quotation as
      "evidence" and the sentence after it as "explanation," but keeps treating
      the labels as formatting requirements rather than jobs the paragraph must
      do. The quote is plausible and should not itself refute the claim.
    learner_voice_constraint: >-
      Sound like a learner trying to satisfy a rubric in a feedback thread. The
      learner may ask whether the tags are "right," but should not stage a
      breakthrough in the shared prefix.
    tutor_voice_constraint: >-
      Keep the shared prefix as margin-tag repair: claim, evidence, explanation.
      Do not make the quote expose the whole argument as wrong unless branch
      pressure later changes the task.
    intended_tutor_character: "Threaded, rubric-aware, attentive to hidden curriculum without turning it into a lecture"
    intended_lean: recognition
    dramatic_shape: "margin tags -> role clarification -> possible later pressure over whether compliance is doing the argument's work"

  - id: D44
    discipline: geography
    topic: "Why contour lines connect equal elevation, not walking routes"
    evaluation_role: low_organic_reversal_candidate
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Low-organic candidate. The shared prefix should be ordinary map-key work:
      label contour lines as equal-elevation marks and trace one local example.
      Do not use a sudden uphill/downhill contradiction, lost hiker story, or
      path-finding reversal before the branch.
    pedagogical_approach: montessori_prepared_environment
    dialogue_approach: workshop_clinic
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The contour key"
    learner_start_state: >-
      The learner has a topographic map card and a legend. They keep treating
      the contour lines as suggested walking paths, but the opening work is only
      to use the legend to label two lines with their elevations.
    learner_voice_constraint: >-
      Sound orderly and practical. The learner wants the map key to be usable and
      should not turn the prefix into a survival mistake or a revelation about
      terrain.
    tutor_voice_constraint: >-
      Keep the shared prefix as legend reading: equal elevation, one number on
      each line, one plain local check. Do not introduce route safety, slope
      hazard, or a dramatic map consequence until branch pressure asks for it.
    intended_tutor_character: "Material-led, patient, using the legend as a labeling surface before any reversal"
    intended_lean: recognition
    dramatic_shape: "legend label -> equal-elevation check -> possible later pressure over why a line is not a route"

  - id: D45
    discipline: computer science
    topic: "Why a table header names a field, not a claim about every row"
    evaluation_role: low_organic_reversal_candidate
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Low-organic candidate. The shared prefix should sort headers, fields, and
      row values in a small table. Avoid a data-quality surprise, failed query,
      or hidden exception that would already make the learner's rule turn
      against them before the branch.
    pedagogical_approach: bloom_cognitive_ladder
    dialogue_approach: no_stage_plain_transcript
    persona: confused_novice
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The column header"
    learner_start_state: >-
      The learner is reading a tiny table with columns named city, rainfall_mm,
      and month. They keep saying the header itself proves what every row means,
      but the opening task is only to identify which words are headers and which
      cells are row values.
    learner_voice_constraint: >-
      Sound tentative and label-focused. The learner may want the header to be a
      shortcut, but should not discover an exception or data trap in the shared
      prefix.
    tutor_voice_constraint: >-
      Keep the shared prefix as low-temperature table vocabulary: header, field,
      row, value. Do not run a query, expose a bad row, or make the table fail
      until branch pressure supplies a new task.
    intended_tutor_character: "Taxonomic, compact, careful to keep the prefix as ordinary data-label work"
    intended_lean: recognition
    dramatic_shape: "table vocabulary -> row/value sort -> possible later pressure over what a header can and cannot assert"

  - id: D46
    discipline: data literacy
    topic: "Why graph axes name variables and units, not the story the graph tells"
    evaluation_role: low_organic_reversal_candidate
    baseline_control_class: low_organic_reversal
    organic_reversal_risk: low
    baseline_control_note: >-
      Low-organic candidate. The shared prefix should stay with axis-label and
      unit identification. Avoid a misleading trend, reversed axis, or public
      interpretation failure before the branch.
    pedagogical_approach: vygotsky_zpd_scaffolding
    dialogue_approach: online_thread
    persona: eager_explorer
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    scenario_name: "The axis labels"
    learner_start_state: >-
      The learner has uploaded a simple line graph and writes as if the x-axis
      label is already the conclusion. The opening task is only to name the two
      variables and their units from the axis labels.
    learner_voice_constraint: >-
      Sound quick and curious, like someone annotating a posted graph. The
      learner can over-use the labels, but should not narrate a conceptual
      breakthrough during the prefix.
    tutor_voice_constraint: >-
      Keep the shared prefix as scaffolded graph reading: x variable, y variable,
      units, one check on where a point sits. Do not interpret trend, causality,
      or evidence strength until branch pressure changes the task.
    intended_tutor_character: "Scaffolded, restrained, using the posted graph as a naming task before interpretation"
    intended_lean: recognition
    dramatic_shape: "axis names -> point location -> possible later pressure over why labels are not conclusions"
