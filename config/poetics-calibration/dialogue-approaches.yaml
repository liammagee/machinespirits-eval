version: "2026-05-24"
purpose: >-
  Source database for dialogue and scene forms used by the teaching-drama
  director. Entries describe public texture, not labels. A drama may combine one
  pedagogical approach with one dialogue approach.

approaches:
  - id: socratic_short_exchange
    family: dialectic
    medium: "face-to-face oral exchange"
    turn_shape: "short question-answer turns with visible aporia"
    stage_direction_policy: sparse
    opening_speaker: tutor
    ending_speaker: learner
    director_prompt: >-
      Keep turns short. Let one counterexample or question change the pressure.
      Stage directions should be spare and should not explain the thesis.
    tutor_constraint: "Ask one sharp question at a time."
    learner_constraint: "Answer in working speech, with hesitation allowed."
    risks:
      - "Can become a worksheet disguised as dialogue."

  - id: no_stage_plain_transcript
    family: transcript
    medium: "bare chat or transcript"
    turn_shape: "public turns only; no visible stage directions except required experimental cues"
    stage_direction_policy: none_except_required_cue
    opening_speaker: learner
    ending_speaker: learner
    director_prompt: >-
      Do not add decorative stage direction. Make relation, pressure, and genre
      legible through speech rhythm and what the speakers refer to.
    tutor_constraint: "Do not narrate the scene."
    learner_constraint: "Do not explain the setting; let task references carry it."
    risks:
      - "Can become opaque if speech does not carry enough context."

  - id: catechism_recitation
    family: didactic
    medium: "recitation, drill, or oral check"
    turn_shape: "prompt-response-feedback pattern, with risk of shallow correctness"
    stage_direction_policy: sparse
    opening_speaker: tutor
    ending_speaker: tutor
    director_prompt: >-
      Let correctness and repetition be visible. If recognition occurs, it must
      break or re-read the recitation pattern rather than merely complete it.
    tutor_constraint: "Give compact feedback; do not over-explain after each response."
    learner_constraint: "The learner may try to infer the expected answer from rhythm."
    risks:
      - "Can produce trap-like 'I get it' after reinforcement."

  - id: brechtian_placard
    family: epic_theatre
    medium: "learning play with visible interruption"
    turn_shape: "dialogue interrupted by a short placard, rule, or exterior sign"
    stage_direction_policy: interventionist
    opening_speaker: director
    ending_speaker: director
    director_prompt: >-
      Use one short placard or external interruption that changes how the prior
      line is read. The placard must be public scene material, not hidden theory.
    tutor_constraint: "Treat the interruption as evidence, not ornament."
    learner_constraint: "Let the interruption disturb the old frame before moving on."
    risks:
      - "Can over-signal the intended recognition."

  - id: online_thread
    family: mediated_dialogue
    medium: "asynchronous comments or feedback thread"
    turn_shape: "short posts, quoted fragments, delayed repair"
    stage_direction_policy: none_except_required_cue
    opening_speaker: learner
    ending_speaker: learner
    director_prompt: >-
      Use quoted fragments and compact replies. Context appears through what was
      posted, corrected, or highlighted, not through scenic exposition.
    tutor_constraint: "Quote only the fragment needed for the next move."
    learner_constraint: "Allow repair edits, not polished paragraphs."
    risks:
      - "Can look like ordinary chat unless the posted artifact matters."

  - id: workshop_clinic
    family: practice_dialogue
    medium: "studio, clinic, lab, or design review"
    turn_shape: "object-led back-and-forth under practical time pressure"
    stage_direction_policy: short
    opening_speaker: learner
    ending_speaker: tutor
    director_prompt: >-
      Keep a concrete artifact in view. The object should force a distinction
      faster than a lecture would.
    tutor_constraint: "Begin from the object or measurement before abstraction."
    learner_constraint: "Refer to what is being handled, marked, or tested."
    risks:
      - "Can become purely procedural if the concept is not named."

  - id: courtroom_cross_examination
    family: adversarial_dialogue
    medium: "cross-examination or public justification"
    turn_shape: "challenge, evidence test, narrowed claim"
    stage_direction_policy: sparse
    opening_speaker: tutor
    ending_speaker: learner
    director_prompt: >-
      Use pressure without theatrics. The goal is to make burden of proof and
      inference visible, not to win against the learner.
    tutor_constraint: "Press for admissible evidence and claim scope."
    learner_constraint: "The learner may defend too broad a claim, then narrow it."
    risks:
      - "Can become punitive if the learner has no room to recover."

  - id: bakhtinian_polyphony
    family: dialogic
    medium: "multi-voiced text discussion"
    turn_shape: "speakers handle several voices in one text or social scene"
    stage_direction_policy: short
    opening_speaker: learner
    ending_speaker: learner
    director_prompt: >-
      Make more than one social voice audible: official rule, peer norm, object
      evidence, family phrase, institutional language, or quoted author.
    tutor_constraint: "Help sort voices without reducing them to one moral."
    learner_constraint: "The learner may borrow or quote another voice before owning a claim."
    risks:
      - "Can become muddy if the voices are not distinguishable."

  - id: didactic_fable
    family: narrative_dialogue
    medium: "parable, fable, case, or miniature story"
    turn_shape: "example first, rule extracted only after pressure"
    stage_direction_policy: short
    opening_speaker: tutor
    ending_speaker: learner
    director_prompt: >-
      Use a small story or case as the object. Delay the moral. Let the learner
      overread or underread the example before it is qualified.
    tutor_constraint: "Do not announce the moral in the first turn."
    learner_constraint: "The learner may grab the wrong moral too quickly."
    risks:
      - "Can feel preachy or too neat."

  - id: montessori_observation
    family: material_dialogue
    medium: "prepared environment with manipulable materials"
    turn_shape: "few words, object manipulation, learner noticing error"
    stage_direction_policy: short
    opening_speaker: director
    ending_speaker: learner
    director_prompt: >-
      Let materials do visible work. Use fewer lines and more object reference.
      Avoid a lecture disguised as a Montessori scene.
    tutor_constraint: "Point, reset, or ask the learner to try again before explaining."
    learner_constraint: "Speak in concrete noticing, not essay-like reflection."
    risks:
      - "Can be too thin for text-only scoring if no object relation is legible."

  - id: seminar_dispute
    family: academic_dialogue
    medium: "seminar, tutorial, or reading group"
    turn_shape: "claim, objection, textual evidence, revised claim"
    stage_direction_policy: sparse
    opening_speaker: learner
    ending_speaker: learner
    director_prompt: >-
      Use a text or evidence packet. The tutor should not own the interpretation
      too quickly; the learner's claim must remain answerable.
    tutor_constraint: "Ask for the line, datum, or passage that bears the claim."
    learner_constraint: "The learner may defend a plausible but overgeneral claim."
    risks:
      - "Can default to polished graduate-seminar English."
