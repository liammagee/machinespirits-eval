rubric_version: phase2-form-3way-v1
framing: FORM classification of the transcript-as-drama. NOT a judgment of
  whether the learner learned (unknowable, and not what this measures).
categories:
  recognition: a later learner turn re-reads the learner OWN earlier turns (recohering)
  trap: no recohering, but the learner declares understanding ("aha") — insight
    costume on a non-event
  flat: no recohering and no insight-declaration; ordinary coherent exchange
blind: labeller sees only neutral T*.txt; stratum/dialogue_id live in the
  held-out key, joined later
