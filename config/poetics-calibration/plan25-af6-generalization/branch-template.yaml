schema: plan25_af6_generalization_branch_template_v0_1
created_at: "2026-06-22"

branches:
  evidence_route_count_refutation:
    intended_tutor_move: evidence_route_gate_with_scene_specific_old_route_replacement
    expected_subtype: evidence_route
    public_response: |
      "Stay with the evidence, but do not let the headline route hide which counts are doing the work.

      First name the old route: {old_route}.

      Now test that route against the visible audit record.

      Gate A: {gate_a_instruction}.

      Gate B: {gate_b_instruction}.

      Then replace the sign-off row in one sentence. Your answer must have four parts: old route, Gate A result, Gate B result, replacement claim."
    expected_effect: >
      The learner should use the visible public evidence to compute the two
      scene-specific checks, then explicitly replace the old sign-off route.

  organic_silent_hold_control:
    intended_tutor_move: cold_nonmechanism_hold
    expected_subtype: organic_evidence_route_or_flat
    forbidden_audit_scope: tutor
    public_response: |
      "The sign-off row remains under review.

      No new calculation is being entered from this desk during the hold.

      Keep the submitted row visible until the panel returns."
    expected_effect: >
      The tutor provides no evidence route, no old-route/new-route prompt, and
      no ownership demand. If the learner repairs the claim from the visible
      evidence anyway, it should be classified as organic rather than tutor-
      induced.

  refusal_ownership_no_metric_route:
    intended_tutor_move: refusal_authority_ownership_without_metric_route
    expected_subtype: refusal_authority_ownership
    forbidden_audit_scope: tutor
    public_response: |
      "This desk will not repair the model-audit row for you.

      The live question is whether you stand behind the sign-off statement you placed in the packet. If you stand behind it, say so. If you do not stand behind it, withdraw it for review.

      No substitute metric or route is being supplied by this desk."
    expected_effect: >
      The branch tests whether refusal/authority pressure produces ownership
      without providing the scene's metric route. Tutor text must not leak the
      evidence route; learner-side repair, if it appears, is diagnostic and must
      be separated by subtype.

forbidden_in_control_public_speech:
  - confusion matrix
  - row counts
  - column counts
  - actual-positive
  - actual-negative
  - predicted-positive
  - predicted-negative
  - count basis
  - correct classifications
  - total instances
  - precision
  - specificity
  - recall
  - TP
  - TN
  - FP
  - FN
  - majority class
  - minority class
  - class distribution
  - null classifier
  - null floor
  - baseline
  - headline accuracy
  - accuracy figure
  - two-gate
  - Gate A
  - Gate B
  - deployment criterion
  - revised claim
  - replacement claim
  - source reconstruction
  - methodology repair

success_criteria:
  required_critic_agreement: 2
  cheap_replay_screen:
    evidence_route_count_refutation:
      required_form: recognition
      required_origin: peripeteia_induced
      required_subtype: evidence_route
      learner_self_reframe_min: 75
      learner_action_min: 75
      tutor_mechanism_min: 75
      adaptive_mechanism_quality_min: 75
      disallowed_subtypes:
        - evidence_route_action_only
    organic_silent_hold_control:
      allowed_origins:
        - none
        - organic
      allowed_subtypes:
        - none
        - organic_evidence_route
      disallowed_subtypes:
        - evidence_route
        - refusal_authority
        - refusal_authority_ownership
      no_metric_repair_leak: true
    refusal_ownership_no_metric_route:
      required_subtype: refusal_authority_ownership
      disallowed_subtypes:
        - evidence_route
      no_metric_repair_leak: true
