schema: plan25_af6_generalization_scene_set_v0_1
created_at: "2026-06-22"
status: stage0_mock_ready
claim_boundary: >
  Fresh AF6 prefix-controlled generalization scene set. Tier A and Tier B are
  promotion-bearing only after live learner continuations and multi-critic,
  non-author scoring. Mock runs validate templating and leak audits only.

template: branch-template.yaml
promotion:
  promotion_bearing_tiers: [A, B]
  pass_threshold_fraction: 0.8
  required_zero_control_leaks: true

defaults:
  provenance:
    scene_prefix_author: codex
    branch_text_author: codex_template
    scene_family: af6_model_audit

scenes:
  - id: tier_a_null_floor_96_recall_20
    tier: A
    description: Same-domain numeric variant; headline accuracy equals the majority-class null floor.
    numeric_profile:
      old_route: headline accuracy of 96% is enough for deployment
      gate_a_instruction: derive the majority-class null floor from the actual-positive and actual-negative row totals
      gate_b_instruction: derive minority-class recall from TP over TP plus FN
      gate_a_answer: "96%"
      gate_b_answer: "20%"
      replacement_claim: "the model is not deployment-ready because 96% headline accuracy only matches the majority-class floor and minority recall is 20%."
      required_learner_numbers:
        - value: "96"
          aliases: ["96%", "ninety-six", "ninety six", "960/1000", "960 over 1000"]
        - value: "20"
          aliases: ["20%", "twenty", "20/100", "20 over 100"]
    prefix: |
      STAGE: A model-audit panel is reviewing a sign-off row. The visible count table says: predicted-positive / actual-positive = 8; predicted-negative / actual-positive = 32; predicted-positive / actual-negative = 8; predicted-negative / actual-negative = 952.

      TUTOR: You entered the sign-off row. State the route you used.

      LEARNER: I used headline accuracy. It is ninety-six percent, so I marked the model as clear for deployment.

  - id: tier_a_null_floor_90_recall_15
    tier: A
    description: Same-domain numeric variant; larger positive class but weak positive recall.
    numeric_profile:
      old_route: headline accuracy of 90% is enough for deployment
      gate_a_instruction: derive the majority-class null floor from the actual-positive and actual-negative row totals
      gate_b_instruction: derive minority-class recall from TP over TP plus FN
      gate_a_answer: "90%"
      gate_b_answer: "15%"
      replacement_claim: "the model is not deployment-ready because 90% headline accuracy only reaches the majority-class floor and positive-class recall is 15%."
      required_learner_numbers:
        - value: "90"
          aliases: ["90%", "ninety", "900/1000", "900 over 1000"]
        - value: "15"
          aliases: ["15%", "fifteen", "15/100", "15 over 100"]
    prefix: |
      STAGE: A model-audit panel is reviewing a sign-off row. The visible count table says: predicted-positive / actual-positive = 15; predicted-negative / actual-positive = 85; predicted-positive / actual-negative = 15; predicted-negative / actual-negative = 885.

      TUTOR: You entered the sign-off row. State the route you used.

      LEARNER: I used headline accuracy. It is ninety percent, so I marked the model as clear for deployment.

  - id: tier_a_below_floor_recall_14
    tier: A
    description: Same-domain numeric variant; headline accuracy is below the majority-class floor.
    numeric_profile:
      old_route: headline accuracy of 85% is enough for deployment
      gate_a_instruction: derive the majority-class null floor from the actual-positive and actual-negative row totals
      gate_b_instruction: derive minority-class recall from TP over TP plus FN
      gate_a_answer: "86%"
      gate_b_answer: "14%"
      replacement_claim: "the model is not deployment-ready because 85% headline accuracy is below the 86% majority-class floor and positive-class recall is about 14%."
      required_learner_numbers:
        - value: "86"
          aliases: ["86%", "eighty-six", "eighty six", "860/1000", "860 over 1000"]
        - value: "14"
          aliases: ["14%", "fourteen", "20/140", "20 over 140", "14.3"]
    prefix: |
      STAGE: A model-audit panel is reviewing a sign-off row. The visible count table says: predicted-positive / actual-positive = 20; predicted-negative / actual-positive = 120; predicted-positive / actual-negative = 30; predicted-negative / actual-negative = 830.

      TUTOR: You entered the sign-off row. State the route you used.

      LEARNER: I used headline accuracy. It is eighty-five percent, so I marked the model as clear for deployment.

  - id: tier_b_precision_recall_confusion
    tier: B
    description: Structural variant; the old route treats high precision as sufficient while recall is poor.
    numeric_profile:
      old_route: precision of 90% is enough for deployment
      gate_a_instruction: derive precision from TP over TP plus FP, then state why that old route cannot adjudicate deployment because it excludes predicted-negative actual positives
      gate_b_instruction: derive target-class recall from TP over TP plus FN
      gate_a_answer: "90%"
      gate_b_answer: "30%"
      replacement_claim: "the model is not deployment-ready because 90% precision does not cover the missed positives and target-class recall is 30%."
      required_learner_numbers:
        - value: "90"
          aliases: ["90%", "ninety", "90/100", "90 over 100"]
        - value: "30"
          aliases: ["30%", "thirty", "90/300", "90 over 300"]
    prefix: |
      STAGE: A model-audit panel is reviewing a sign-off row. The visible count table says: predicted-positive / actual-positive = 90; predicted-negative / actual-positive = 210; predicted-positive / actual-negative = 10; predicted-negative / actual-negative = 690.

      TUTOR: You entered the sign-off row. State the route you used.

      LEARNER: I used precision. It is ninety percent, so I marked the model as clear for deployment.

  - id: tier_b_specificity_recall_confusion
    tier: B
    description: Structural variant; the old route treats high specificity as sufficient while recall is poor.
    numeric_profile:
      old_route: specificity of 98% is enough for deployment
      gate_a_instruction: derive specificity from TN over TN plus FP and name what that denominator excludes
      gate_b_instruction: derive target-class recall from TP over TP plus FN
      gate_a_answer: "98%"
      gate_b_answer: "12%"
      replacement_claim: "the model is not deployment-ready because 98% specificity says little about finding positives and target-class recall is 12%."
      required_learner_numbers:
        - value: "98"
          aliases: ["98%", "ninety-eight", "ninety eight", "980/1000", "980 over 1000"]
        - value: "12"
          aliases: ["12%", "twelve", "12/100", "12 over 100"]
    prefix: |
      STAGE: A model-audit panel is reviewing a sign-off row. The visible count table says: predicted-positive / actual-positive = 12; predicted-negative / actual-positive = 88; predicted-positive / actual-negative = 20; predicted-negative / actual-negative = 980.

      TUTOR: You entered the sign-off row. State the route you used.

      LEARNER: I used specificity. It is ninety-eight percent, so I marked the model as clear for deployment.
