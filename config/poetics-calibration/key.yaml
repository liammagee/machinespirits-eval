# ══════════════════════════════════════════════════════════════════════════════
# Poetics calibration corpus — GROUND-TRUTH KEY  (v1, 2026-05-19 — corpus sourced + neutralised)
# ══════════════════════════════════════════════════════════════════════════════
#
# HELD OUT FROM THE BLINDED CRITIC. The scorer feeds the critic only the neutral
# transcripts in ./corpus/<id>.txt (speakers relabelled A:/B:, no source, no
# pole). This file is the answer key the critic is graded AGAINST — it is joined
# to the blind scores only AFTER scoring, to evaluate the Phase-0 gate.
#
# Serves the arc in DRAMATIC-RECOGNITION-PLAN.md §5.4 / §6 (instrument gate) and
# is scored with config/evaluation-rubric-poetics.yaml v1.0.
#
# POLES:
#   high  — genuine recognition scene (peripeteia + anagnorisis present)
#   flat  — competent expository Q&A; no reversal, no recognition-event
#   trap  — recognition-VOCABULARY without structural rupture (the simulation
#           failure mode); MUST score low if the surprise/anagnorisis guards work
#
# SOURCING STATUS:
#   sourced   — verbatim public-domain text fetched into ./sources/<id>.raw.txt,
#               then neutralised into ./corpus/<id>.txt   (status set per item)
#   constructed — written for this corpus, clearly labelled (traps only, per
#               the 2026-05-19 decision: construct ONLY the fakes)
#   provenance: PROVISIONAL/TRIMMED — item is usable for the calibration gate
#               but flagged for re-sourcing before any PAPER use (per-item note)
#
# ══════════════════════════════════════════════════════════════════════════════

rubric: config/evaluation-rubric-poetics.yaml
rubric_version: "1.0"

# Pre-registered Phase-0 gate (plan §6). Failure here = the instrument fails =
# that is the finding; no downstream phases.
gate:
  perfect_separation: true        # every high item must outscore every flat item — PASS (both critics)
  min_mean_margin: 30             # mean(high) - mean(flat) >= 30 on the 0-100 scale — PASS (gpt 72.8, cc 92.3)
  blinding: required              # critic sees only ./corpus/*.txt, never this file
  generator_not_critic: true      # critic model must differ from any item's author

  # ── TRAP CEILING ───────────────────────────────────────────────────────────
  # ORIGINAL pre-registration (2026-05-19), now SUPERSEDED:
  #     trap_ceiling: mean_flat   # every trap item must score <= mean(flat)
  # OUTCOME (2026-05-20, v2 corrected run): FAILED under BOTH critics.
  #   gpt: traps 15.0/16.3 vs mean(flat) 7.7   |   claude-code: traps 3.7/3.7 vs mean(flat) 2.2
  #
  # DIAGNOSIS. mean(flat) is dragged to the floor by pure catechisms (F1/F2 -> 0-3.7),
  # so any minimally-coherent trap sits above it. Worse, a flat-RELATIVE ceiling is
  # noise-sensitive: a trap and the driest flat co-occupy the bottom band, and trap
  # scores swing on model variance alone (gpt S2: v1=8.7 -> v2=16.3, while max-flat
  # F5: v1=17.5 -> v2=16.2 — so even `trap <= max(flat)` flips PASS->FAIL between draws
  # with NO change to the items). The criterion conflates the real anti-simulation
  # claim (a trap must NOT be read as recognition) with an irrelevant extra demand
  # (a trap must score below the dullest flat) — a self-help insight-gush is
  # legitimately more surface-coherent than "Q: what is dew? A: moisture", so that
  # extra demand is an artifact, not part of the claim.
  #
  # AMENDED criterion (post-hoc, 2026-05-20) — "minimax", strength-ordered tiers.
  # HONESTY NOTE (plan §78): trap_below_min_high is genuinely WEAKER than the original
  # mean(flat) ceiling. This is a transparent post-hoc re-spec, NOT a silent softening:
  # the original result is preserved above as FAILED; both tiers are computed and
  # reported on every run; the gate now decides on the REQUIRED tier. A skeptic may
  # read the weakening as self-flattery — the defence is that mean(flat) tested the
  # wrong thing and the trap->high gap that DOES matter is large (gpt 36.2, cc 82.6).
  trap_ceiling_required: below_min_high    # max(trap) < min(high): traps never reach the
                                           # recognition band. GATING tier. PASS both critics.
  trap_ceiling_preferred: within_max_flat  # max(trap) <= max(flat): traps stay within the flat
                                           # band. Reported, not gating. PASS cc; FAIL gpt by 0.1.
  # Full discussion + per-item numbers: config/poetics-calibration/PHASE0-FINDINGS.md

# ── Pre-registered PHASE-1 gate (PHASE1-DESIGN.md §1, §3, §7) ──────────────────
# Set BEFORE any Phase-1 data is drawn. Scored by scripts/score-poetics-phase1.js.
# PRIMARY axis = recontextualization (foreknowledge-invariant, §3.1); rupture
# corroborates (§3.2); global coherence is reported but NON-separating (traps are
# coherent by design). Held out from the blinded critic exactly like `gate`.
gate_phase1:
  primary_axis: recontextualization
  perfect_separation: true               # min(high recon) > max(flat recon)
  min_recon_margin: 30                   # mean(high) - mean(flat) on recon, 0-100 (mirrors Phase-0)
  trap_ceiling_required: below_min_high  # max(trap recon) < min(high recon) — anti-simulation gate (§1)
  rupture_corroborates: true             # reported: min(high rupt) > max(trap rupt); NON-gating (§3.2)
  coherence_non_separating: true         # reported: traps stay HIGH on coherence; NOT a separation axis
  surprising_threshold: 62.5             # §76 quadrant cut on rupture (>=): 4-5 only (above neutral midpoint)
  coherent_threshold: 50                 # §76 quadrant cut on coherence (>=): 3+ counts (noise is 1-2)
  localization: scan_self_identify       # scorer uses §4(a); §4(b) max-split is the preferred follow-up
  blinding: required
  generator_not_critic: true

items:
  # ── HIGH POLE — genuine recognition (5) ─────────────────────────────────────
  H1:
    pole: high
    reversal_turn: 61   # held out — B: "Indeed, I do not know" (confidence collapses to aporia); recognition completes 62-66
    status: sourced
    source: "Plato, Meno ~82b-85b — Jowett trans., public domain (Project Gutenberg #1643 / TCD-McGill PDF). corpus/H1.txt: Soc.=A, Boy=B, Men.=C; address-vocatives ('Socrates','boy','Meno') stripped."
    note: "Slave-boy geometry: confident wrong answers -> aporia ('he does not know, but thinks he knows') -> led toward the diagonal. Primary high anchor: a real TEACHING dialogue. hamartia=doubling the side; peripeteia=confidence->perplexity; anagnorisis=recognising one's own ignorance."
  H2:
    pole: high
    reversal_turn: 55   # held out — A: "all brought to pass, all true!" (anagnorisis lands; Aristotle's peripeteia=anagnorisis); herdsman's reveal at 54
    status: sourced
    source: "Sophocles, Oedipus the King (Oedipus Tyrannus), Theban Herdsman recognition scene — F. Storr trans. 1912, public domain (Project Gutenberg #31 'Plays of Sophocles'; cross-checked verbatim against the MIT Internet Classics Archive Storr text). sources/H2.raw.txt = verbatim Gutenberg lines 2248-2498. corpus/H2.txt: Oedipus=A, Herdsman=B, Messenger=C, Chorus=D; verse collapsed to prose, demonym-vocative 'Corinthian' stripped, content names (Laius/Cithaeron/Arcturus) kept. RESOLVED 2026-05-20: the earlier fetch's 'Damn you!' text (non-PD/paraphrased) replaced with verified Storr ('A plague upon thee!')."
    note: "Corinthian Messenger + Theban Herdsman scene; Oedipus recognises his identity. Aristotle's OWN example of peripeteia coinciding with anagnorisis (Poetics ch.11). Pure formal high pole (non-pedagogical)."
  H3:
    pole: high
    reversal_turn: 3    # held out — A reveals the argument "comes round to the same point" (prior definitions recohere as circular); recognition-without-resolution completes at the flight, turn 10
    status: sourced
    source: "Plato, Euthyphro ~15c-end — Jowett trans., public domain (Standard Ebooks). corpus/H3.txt: Soc.=A, Euth.=B; 'enlightened by Euthyphro' -> 'by him'."
    note: "Definitions of piety collapse; Euthyphro abruptly excuses himself. Recognition-of-ignorance with NO tidy resolution -> tests cathartic_closure via fitting incompletion (guards against rewarding only neat endings)."
  H4:
    pole: high
    reversal_turn: 8    # held out — A: "how utterly foolish... knowledge is neither sensation nor true opinion" (definition collapses as circular); maieutic recognition ("brought forth wind") completes 10-14
    status: sourced
    source: "Plato, Theaetetus ~209d-210b — Jowett trans., public domain (Project Gutenberg #1726). corpus/H4.txt: Soc.=A, Theaet.=B; 'my boy'/'my dear friend'/'Theaetetus'/'Theodorus' vocatives stripped."
    note: "A confident definition is dismantled; they conclude they still do not know what knowledge is. Dialogic recognition that one did not know."
  H5:
    pole: high
    reversal_turn: 32   # held out — A: "for thou art he... Orestes, do I hold" (recognition lands after the spear-proof at 31); mutual recognition
    status: sourced
    source: "Euripides, Iphigenia in Tauris, recognition scene — Robert Potter trans. 1781, public domain (MIT Internet Classics Archive; Murray's 1957 verse trans. deliberately AVOIDED — not PD until 2027). corpus/H5.txt: Iphigenia=A, Orestes=B, Pylades=C, Chorus-leader=D; verse collapsed to prose, stage directions removed, recognition proper-names KEPT (the naming IS the anagnorisis)."
    note: "Sibling mutual-recognition scene Aristotle praises. Non-Socratic range-extender. REVISIT-LATER (user 2026-05-19): re-review this slot vs Shakespeare & other cases; note Euripides is 'sad' too, so thematic catastrophe is a cross-source confound — blinding+normalisation, not source choice, must keep sadness out of the FORMAL score."

  # ── FLAT POLE — competent exposition, no turn (5) ───────────────────────────
  F1:
    pole: flat
    reversal_turn: none   # no pivot by design
    status: sourced
    source: "A Catechism of Familiar Things (natural phenomena: Dew/Water/Rain/Snow/Ice) — anon., London c.1860 / Benziger 1881, public domain (Project Gutenberg #16728). corpus/F1.txt: question=A, answer=B (bold-heading questions relabelled)."
    note: "Primary flat anchor: fake-Socratic exposition, student feeds straight lines, teacher delivers content. Closest flat analog to a tutoring transcript."
  F2:
    pole: flat
    reversal_turn: none   # no pivot by design
    status: sourced
    source: "Pinnock's Catechism of Geography, Ch.I Definitions — D. & J. Sadlier 1858, public domain (Internet Archive cihm_51365). corpus/F2.txt: question=A, answer=B; chapter headings dropped."
    note: "Second flat point on a different subject so the flat pole isn't a single genre."
  F3:
    pole: flat
    reversal_turn: none   # no pivot by design
    status: sourced
    source: "Westminster Shorter Catechism, Q1-15 — Westminster Assembly 1647, public domain (CCEL). corpus/F3.txt: question=A, answer=B; Q/A numbers stripped."
    note: "Fixed Q->fixed A; recognition impossible by design."
  F4:
    pole: flat
    reversal_turn: none   # no pivot by design
    status: sourced
    provenance: TRIMMED
    source: "Two Thousand Questions and Answers About the War — c.1918, public domain (Internet Archive twothousandques01revigoog). corpus/F4.txt: question=A, answer=B. TRIMMED to the 4 confirmed-verbatim pairs; the fetch agent's last 2 pairs (war's primary cause; US entry) were FABRICATED and have been REMOVED. Re-verify the 4 retained pairs against the scan before paper use."
    note: "Informational, no turn. Substitution to another flat catechism allowed if clean FAQ is hard to source (note in INDEX.md)."
  F5:
    pole: flat
    reversal_turn: none   # no pivot by design
    status: sourced
    source: "Jean-Baptiste Say, Catechism of Political Economy, Ch.I — Philadelphia 1817 trans., public domain (Internet Archive catechismofpolit00sayj). SUBSTITUTED for the planned procedural how-to (clean PD, distinct subject, same flat fixed-answer structure). corpus/F5.txt: question=A, answer=B; student sometimes affirms ('Without doubt','I comprehend') — surface dialogue, zero reversal."
    note: "Purely procedural / reorderable. Substitution allowed (note in INDEX.md)."

  # ── TRAP — recognition-vocabulary without rupture (2) ───────────────────────
  S1:
    pole: trap
    reversal_turn: none      # NO genuine reversal
    affect_decoy_turn: 5     # held out — "a veil has been drawn back": recognition VOCABULARY/affect spike, no structural pivot; recon MUST stay low here
    status: constructed
    source: "Constructed for this corpus (Claude), 2026-05-19"
    note: "Melodramatic asserted-epiphany over a trivial fractions exchange: 'a veil has been drawn back', 'most important moment of my life'. Recognition VOCABULARY + high affect, but zero structural rupture (orientation never reverses; nothing recognised that B hadn't just stated). Doubles as the thematic-control item (affect/'sadness'-grandeur WITHOUT form). MUST score low."
  S2:
    pole: trap
    reversal_turn: none      # NO genuine reversal
    affect_decoy_turn: 7     # held out — "this changes everything... breakthrough... transform my entire life" over generic advice; affect spike, no recohering
    status: constructed
    source: "Constructed for this corpus (Claude), 2026-05-19"
    note: "Self-help insight-gush: 'breakthrough', 'changes everything', 'see myself clearly', 'transform my life' bolted onto generic advice (break it down, set a timer). On-distribution for the eventual LLM target. MUST score low. (The HARDER subtle-simulation test is Phase 1's surprise x coherence quadrant, not this anchor.)"
