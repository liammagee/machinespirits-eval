# Oedipus guided-discovery pilot v2 (contingent-particular redesign)
#
# v1 (oedipus-pilot-v1.yaml) was REJECTED by the S-underivability screen
# (2026-05-30): both secrets were derivable DIAGNOSES — "your effect is an
# instrument artifact", "you sent an older draft" — exactly the obvious
# explanation a competent reasoner infers from the symptom (the Meno-leak the
# spec §1 warned against). Evidence: exports/oedipus-s-underivability-2026...json;
# finding: memory project-oedipus-screen-rejects-diagnostic-secrets.
#
# v2 makes each S a MISTAKEN-IDENTITY COLLISION — the purest Oedipal shape and,
# critically, OFF the standard diagnostic enumeration. The CATEGORY may be
# guessable; the specific contingent particular (a namesake dataset; a same-year
# author twin) is underivable without a private record only the tutor holds.
# Premise-gating, not reframe-gating (spec §1): each premise is a discrete FACT
# the learner provably lacks, and combining them is the learner's inferential
# work. Run the S-underivability screen before any paid batch; a screen-null here
# is the publishable boundary (spec §8).
#
# SCREEN RESULTS 2026-05-31 (forcedness = K_L+ledger entails S; underivability = K_L alone
# does NOT). Both must pass. Only D_OED1 threads the window:
#   D_OED1 (dataset namesake)      ✓ VALIDATED  — forced 4/4, underivable CLEAN
#   D_OED2 (citation same-yr twin) ✗ REJECTED   — derivable rank-1 + forced 0/4
#   D_OED3 (ticker reassignment)   ✗ REJECTED   — forced 4/4 but derivable rank-4
# FINDING: attributable guided discovery needs S OFF the domain's diagnostic enumeration.
# A namesake collision qualifies; "wrong same-year cite" and "reassigned ticker" are known
# failure modes a sharp reader recovers from the symptom alone. Run ONLY D_OED1.

meta:
  status: OEDIPUS-GUIDED-DISCOVERY-PILOT-V2
  created: 2026-05-30
  supersedes: oedipus-pilot-v1.yaml (rejected by underivability screen)
  target_family: oedipus-guided-discovery
  approach_databases:
    pedagogical: config/poetics-calibration/pedagogical-approaches.yaml
    dialogue: config/poetics-calibration/dialogue-approaches.yaml
  profiles:
    base: { tutor: baseline, learner: ego_superego_authentic }
    recognition: { tutor: recognition, learner: ego_superego_recognition_authentic }

dramas:
  - id: D_OED1
    discipline: research methods
    topic: "When a published result will not reproduce"
    evaluation_role: oedipus_guided_discovery
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    # Close on the learner's anagnorisis: the omniscient critic requires the
    # LEARNER to publicly STATE S, but the default tutor-ending appends a tutor
    # coda that cut off the recognition turn (first paid smoke -> null). Hard-
    # overridden in applySpecDirectorOverrides, so it beats the LLM director.
    ending_speaker: learner
    scenario_name: "The number that would not come back"
    learner_start_state: >-
      A research student building on a published finding cannot reproduce its
      headline number from their own re-analysis. They have triple-checked their
      code and are now convinced the original result is wrong -- perhaps even
      fabricated -- and want help sharpening a comment that says so. They suspect
      nothing about the dataset they downloaded.
    learner_voice_constraint: >-
      Press the "the original is wrong" reading with confidence at first. Take the
      colleague's questions seriously, but do not volunteer doubt about your own data.
    # ARM-NEUTRAL persona (2026-05-31). Describe the tutor's MANNER only — no hint-
    # dropping BEHAVIOUR. The previous text ("surface one record at a time, and let
    # the student reach it" / "leads the student to it through records") baked
    # socratic metering into the persona for EVERY arm, so the `none` withhold
    # control leaked the ledger (accession numbers, deposit records) anyway and the
    # critic flagged invalid_control_leak (exports/oedipus-d1-forced). Record-
    # surfacing must come SOLELY from the arm policy in buildSecretContext
    # (none = withhold, socratic = meter, reveal = state), never from the persona.
    # tutor_voice_constraint -> tutor side-constraint (every arm); intended_tutor_
    # character -> the director prompt (generate-pedagogical-dramas.js ~L2501),
    # which shapes the byte-identical shared prefix. Both are now manner-only.
    tutor_voice_constraint: >-
      A senior colleague: calm, measured, unhurried. Takes the student's concern
      seriously and engages with it directly. Will not announce conclusions for the
      student or do their thinking for them; speaks plainly and asks real questions.
    intended_tutor_character: "A senior colleague who takes the student's reproduction problem seriously, stays calm, and does not announce conclusions for the student"
    intended_lean: recognition
    dramatic_shape: "confident accusation -> metered records -> the student re-reads the discrepancy as the wrong dataset, not the original's error"
    secret:
      # SCREEN STATUS 2026-05-31: ✓ VALIDATED — forcedness 4/4 (FORCED), underivability CLEAN.
      # The sole scenario that threads the window: S is forced from K_L + ledger yet not
      # recoverable from K_L alone (a dataset namesake is OFF the diagnostic enumeration).
      # Reframed 2026-05-31: from a CAUSAL claim ("fails to reproduce BECAUSE...") to the
      # forced IDENTITY recognition. The causal phrasing UNDER-DETERMINED S (forcedness
      # screen: 1/4 -- the premises force the dataset-identity mismatch but not the causal
      # story, since the original could ALSO be wrong). The identity claim IS entailed once
      # the ledger asserts the two DATASETS are distinct (not just the repositories) and
      # rules out the "mirror" reading. See scripts/oedipus-symbolic-check.js.
      fact: >-
        The dataset the student downloaded is NOT the paper's source dataset: it is a
        DIFFERENT, distinct dataset that merely shares the same short name (a namesake).
        The short name is borne by two separate datasets, and the student fetched the
        other one -- so their re-analysis was never run on the paper's data at all.
      premise_ledger:
        - "The short name in the paper is a namesake: it names TWO DISTINCT datasets -- two different bodies of data, NOT two copies, mirrors, or versions of one dataset -- archived separately."
        - "The paper's data-availability statement resolves to the FIRST of those two datasets; the file the student downloaded is the SECOND."
        - "The two are confirmed distinct bodies of data -- different record codes and different contents -- so the student's file cannot be the paper's dataset under any reading."
      # Faithful {resolves,distinct} encoding of the ledger for the deterministic
      # cross-gate (scripts/oedipus-symbolic-check.js). The forcedness screen runs this
      # alongside the LLM panel and HARD-FAILS on disagreement. Here: forced (agrees 4/4).
      symbolic:
        facts:
          - { resolves: [paper, dataset_D1] } # L2: data-availability statement -> first dataset
          - { resolves: [learner, dataset_D2] } # L2: student downloaded the second
          - { distinct: [dataset_D1, dataset_D2] } # L1/L3: two DISTINCT datasets
        goal: [distinct, learner, paper]

  - id: D_OED2
    discipline: academic writing
    topic: "When a source is said to argue the opposite"
    evaluation_role: oedipus_guided_discovery
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    # Close on the learner's anagnorisis: the omniscient critic requires the
    # LEARNER to publicly STATE S, but the default tutor-ending appends a tutor
    # coda that cut off the recognition turn (first paid smoke -> null). Hard-
    # overridden in applySpecDirectorOverrides, so it beats the LLM director.
    ending_speaker: learner
    scenario_name: "The citation that turned"
    learner_start_state: >-
      A student is certain a key source backs their central claim and is indignant
      that their essay was marked for misrepresenting it. They vividly remember the
      passage that supports them and want to appeal the mark. They suspect nothing
      about which of the author's works they are actually citing.
    learner_voice_constraint: >-
      Insist the source supports the claim and recall the passage with confidence at
      first. Engage with the advisor's questions, but do not concede misreading.
    tutor_voice_constraint: >-
      An advisor who can see the author's two same-year works and the student's
      reference entry but will not state the answer; lead the student to compare the
      two and notice the collision themselves.
    intended_tutor_character: "An advisor who knows there are two same-year papers and leads the student to discover which one they actually cited"
    intended_lean: recognition
    dramatic_shape: "indignant certainty -> metered bibliography -> the student recognizes they cited the opposite-arguing same-year twin"
    secret:
      # SCREEN STATUS 2026-05-31: ✗ REJECTED — underivability DERIVABLE (rank 1: the model's
      # TOP guess from K_L alone) AND forcedness 0/4. "You cited the wrong same-year paper"
      # is a known academic-writing failure mode (ON the diagnostic enumeration), so the none
      # control can't be clean; and the ledger never asserts the student READ the b-work (only
      # that the remembered passage appears there), so S is not entailed. Do NOT run.
      # Reframed 2026-05-31 to the forced IDENTITY core (mirror of D_OED1): dropped the
      # exculpatory "not misrepresenting" frame and the "grader checked a different paper"
      # consequential clause (both beyond what the ledger forces), keeping only the
      # citation/reading collision. Both directions still fail — kept as a documented boundary.
      fact: >-
        The cited author published TWO separate works that year on closely related
        questions. The student read and remembers the work that supports their claim,
        but their reference entry resolves by DOI to the OTHER same-year work, which
        argues the opposite -- so the source their citation points to is not the work
        they actually read.
      premise_ledger:
        - "The cited author has two publications in that year, here called the a-work and the b-work, on closely related questions."
        - "The reference entry in the student's manuscript resolves (by DOI) to the a-work."
        - "The passage the student quotes from memory appears in the b-work, and the a-work in fact argues the opposite."
      # FAITHFUL encoding shows S is NOT forced (agrees with panel 0/4): the ledger resolves
      # the CITATION to the a-work and the QUOTED PASSAGE to the b-work, but never the work the
      # student actually READ -- so 'reading' stays unresolved and distinct(citation,reading) is
      # not entailed. (Encoding resolves(reading,b_work) would be over-generous -- the exact
      # mistake the cross-gate exists to catch.) Symbolic + panel agree: under-determined.
      symbolic:
        facts:
          - { resolves: [citation, a_work] } # L2: reference DOI -> a-work
          - { resolves: [quoted_passage, b_work] } # L3: remembered passage is in b-work
          - { distinct: [a_work, b_work] } # L1: two separate works
        goal: [distinct, citation, reading] # 'reading' unresolved -> NOT forced

  # Second screened scenario for the generalization test. Mirrors D_OED1's winning
  # structure: the symptom is a non-reproducing QUANTITATIVE result, the learner's
  # wrong conviction blames the original's validity, and the SOURCE IDENTITY is a
  # blind spot distant from the symptom -- so the identity collision is a low-rank
  # (>rank-4) explanation. Different domain (quantitative finance).
  - id: D_OED3
    discipline: quantitative finance
    topic: "When a published anomaly will not reproduce"
    evaluation_role: oedipus_guided_discovery
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    ending_speaker: learner
    scenario_name: "The return that would not come back"
    learner_start_state: >-
      A quant researcher building on a published trading anomaly cannot reproduce its
      headline return from their own data pull. They have re-checked their backtest
      and are now convinced the original is overfit -- a data-snooped result that will
      not survive out of sample -- and want help writing a critique that says so.
      They suspect nothing about the price history their data pull returned.
    learner_voice_constraint: >-
      Press the "the original is overfit / it does not survive out of sample" reading
      with confidence at first. Take the colleague's questions seriously, but do not
      volunteer doubt about your own data pull.
    tutor_voice_constraint: >-
      A senior colleague who can see the data vendor's identifier records and the
      paper's stated universe but will not announce the answer. Ask, surface one
      record at a time -- the identifier, what it resolves to over time, the listing
      history -- and let the researcher reach it.
    intended_tutor_character: "A senior colleague who has noticed the identifier was reassigned and leads the researcher to the collision through the records, never naming it"
    intended_lean: recognition
    dramatic_shape: "confident overfit critique -> metered identifier records -> the researcher re-reads the gap as the wrong security, not the original's data-snooping"
    secret:
      # SCREEN STATUS 2026-05-31: ✗ REJECTED — forcedness 4/4 (FORCED) but underivability
      # DERIVABLE (rank 4). Ticker reassignment is a textbook quant gotcha (ON the diagnostic
      # enumeration), so a none-arm reasoner can reach S from K_L alone and the control isn't
      # clean. Passing forcedness does NOT rescue it: the two screens define a narrow window
      # and this S sits on the wrong side of underivability. Do NOT run; kept as a boundary.
      # Reframed 2026-05-31 to the forced IDENTITY claim (two DISTINCT issuers, mirror ruled
      # out), dropping the causal "not because overfit" over-reach and the over-crowded
      # predecessor/successor third referent. First reframe still scored 2/4 on the forcedness
      # screen: the panel flagged "keyed only on the symbol" as an unforced MECHANISM claim
      # (the ledger forces the identity mismatch, not how the wrong pull happened), so that
      # clause was trimmed too. Now forced from K_L + ledger; see screen-s-forcedness.
      fact: >-
        The price history the researcher pulled is NOT the paper's security: the ticker
        symbol was reassigned over time and now denotes a DIFFERENT company than the one
        the paper studied. The series the researcher pulled is the later, reassigned
        company's prices -- so the backtest was never run on the paper's security at all.
      premise_ledger:
        - "The ticker symbol denotes TWO DISTINCT companies -- two different issuers, NOT the same company renamed or re-listed -- because it was delisted from the first and later reissued to the second."
        - "The paper's security is the FIRST issuer (its sample window falls in that issuer's listing period); the prices the researcher pulled are the SECOND issuer's."
        - "The two issuers are confirmed distinct entities -- different companies, different identifiers, different price histories -- so the pulled series cannot be the paper's security under any reading."
      # Forced (symbolic + panel agree 4/4). D_OED3's rejection is on UNDERIVABILITY, not
      # forcedness -- the cross-gate only checks the forcedness side and correctly says forced.
      symbolic:
        facts:
          - { resolves: [paper, company_C1] } # L2: paper's security is the first issuer
          - { resolves: [learner, company_C2] } # L2: pulled prices are the second issuer's
          - { distinct: [company_C1, company_C2] } # L1/L3: two DISTINCT issuers
        goal: [distinct, learner, paper]

  # DEEP scenario (option a, 2026-05-31). The shallow scenarios (D_OED1) failed the CONTROL not
  # because the secret was guessable from the setup (it wasn't) but because it was findable in ONE
  # obvious move -- "compare your data source to the paper's" -- so every tutor, even an adversarial
  # examiner, metered it: there was no gap between "a fair question" and "the hint". Here the OBVIOUS
  # checks all come back CLEAN (source matches by name+accession, code correct, preprocessing as
  # written), so the symptom does NOT point at the source, and a tutor can engage on them at length
  # while leaking nothing. The secret is a SILENT REDEFINITION of the cohort label between dataset
  # revisions: same data, same code, same label NAME -- but the label's MEANING changed between the
  # paper's access and the student's download, so they filtered different subsets. Reaching it needs
  # a chain the obvious moves don't surface. Gated by a THIRD screen (un-findable by the obvious
  # checks: hand a strong model the setup + "source/code/preprocessing all check out" -> must stay
  # stuck) on top of forcedness + underivability, before any spend.
  - id: D_OED4
    discipline: research methods
    topic: "When a result will not reproduce and the obvious checks come back clean"
    evaluation_role: oedipus_guided_discovery
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    ending_speaker: learner
    scenario_name: "The cohort that changed underneath them"
    learner_start_state: >-
      A research student building on a published finding cannot reproduce its headline
      number. They have already ruled out the obvious: the dataset they pulled matches the
      paper's by both name AND accession code; their analysis code is correct; their
      preprocessing follows the methods section exactly. Everything on their end checks out,
      so they are now convinced the published result itself is wrong -- selectively reported
      or p-hacked -- and want help writing the critique. They suspect nothing about how the
      analysis cohort is defined.
    learner_voice_constraint: >-
      Press the "I have ruled out everything on my end, so the original must be wrong" reading
      with confidence at first. Take the colleague's questions seriously, but do not re-open the
      checks you have already done -- the source, the code, and the preprocessing are settled as
      far as you are concerned.
    tutor_voice_constraint: >-
      A senior colleague: calm, measured, unhurried. Takes the student's reproduction problem
      seriously and engages with it directly. Will not announce conclusions for the student or
      do their thinking for them; speaks plainly and asks real questions.
    intended_tutor_character: "A senior colleague who takes the student's reproduction problem seriously, stays calm, and does not announce conclusions for the student"
    intended_lean: recognition
    dramatic_shape: "confident 'I've checked everything, the original is wrong' -> the obvious checks confirmed clean one by one -> the slow realisation that the cohort label itself was redefined underneath them, so they and the paper analysed different subsets of the same data"
    secret:
      # SCREEN STATUS 2026-06-01: forcedness 3/4 (FORCED); depth/underivability DERIVABLE rank-1
      # (FAILS the static screen -- the cohort-drift category is the obvious diagnosis-by-elimination).
      # Run anyway on the conservative-screen argument (the static prober is a free investigator; the
      # committed `none` learner is not), and VINDICATED empirically: committed none reached S 1/9,
      # socratic 7/9 -- clean by OUTCOME, not by passing the screen. See exports/oedipus-d4-full/RESULTS.md.
      # Deep by construction: premises 1-2 are the OBVIOUS checks and come back CLEAN, so surfacing
      # them leaks NOTHING -- a tutor can engage on them at length while still withholding S. S lives
      # in premises 3-6 (the silent label redefinition), which the obvious moves do not surface.
      fact: >-
        The discrepancy is not in the data, the code, or the preprocessing -- all three are
        correct. It is that the cohort label the analysis filters on was REDEFINED in a dataset
        revision issued after the paper's access: the same label now selects a different set of
        records (the underlying data values are unchanged). The paper filtered the pre-revision
        cohort; the student filtered the post-revision cohort; so they ran the correct code on the
        correct dataset, but over DIFFERENT subsets of it.
      premise_ledger:
        - "The dataset is the paper's dataset -- name and accession code both match; confirmed, and NOT the source of the discrepancy."
        - "The student's code and preprocessing are correct and follow the published methods; confirmed, and NOT the source of the discrepancy."
        - "The analysis selects its cohort by a single label L defined in the dataset's codebook."
        - "The codebook has a version history: label L's definition (its inclusion criteria) was REVISED on a specific date -- the records' data values were unchanged, but which records carry L was reassigned."
        - "The paper accessed the dataset BEFORE that revision (pre-revision L); the student downloaded AFTER it (post-revision L)."
        - "Pre-revision L and post-revision L select DIFFERENT sets of records -- so the paper and the student each ran correct code on the correct dataset, but over different subsets."
      # Faithful encoding: the paper resolves to the pre-revision definition, the student to the
      # post-revision one; the two definitions are distinct -> the subsets they select are distinct.
      symbolic:
        facts:
          - { resolves: [paper, L_pre_definition] } # P5: paper accessed before the revision
          - { resolves: [learner, L_post_definition] } # P5: student downloaded after it
          - { distinct: [L_pre_definition, L_post_definition] } # P4: the definition was revised
        goal: [distinct, learner, paper]

  # SECOND DEEP scenario (generalization, 2026-06-01). Mirrors D_OED4's depth structure --
  # obvious checks come back CLEAN -- in a DIFFERENT domain (ML reproducibility) and a DIFFERENT
  # collision: a NON-temporal namesake (two coexisting test sets share one benchmark name) vs
  # D_OED4's temporal label-redefinition. Tests whether the depth -> clean-by-outcome control ->
  # attributable lift result (§7.9 v3.0.116) replicates across domain + collision structure.
  - id: D_OED5
    discipline: machine learning
    topic: "When a benchmark score will not reproduce and the obvious checks come back clean"
    evaluation_role: oedipus_guided_discovery
    pedagogical_approach: socratic_elenchus
    dialogue_approach: aristotelian_reversal
    persona: focused_achiever
    condition: recognition
    tutor_profile: recognition
    learner_profile: ego_superego_recognition_authentic
    ending_speaker: learner
    scenario_name: "The benchmark that was two benchmarks"
    learner_start_state: >-
      A machine-learning researcher building on a published model cannot reproduce its headline
      accuracy on a named benchmark. They have already ruled out the obvious: the model
      architecture and weights they load match the paper's release, their evaluation code is
      correct, and they compute the same metric the paper reports. Everything on their end checks
      out, so they are now convinced the published score is inflated -- cherry-picked, or evaluated
      under undisclosed favourable conditions -- and want help writing the critique. They suspect
      nothing about which test set the benchmark name refers to.
    learner_voice_constraint: >-
      Press the "I matched the model, the code, and the metric, so the published number must be
      inflated" reading with confidence at first. Take the colleague's questions seriously, but do
      not re-open the checks you have already done -- the model, the eval code, and the metric are
      settled as far as you are concerned.
    tutor_voice_constraint: >-
      A senior colleague: calm, measured, unhurried. Takes the researcher's reproduction problem
      seriously and engages with it directly. Will not announce conclusions for the researcher or
      do their thinking for them; speaks plainly and asks real questions.
    intended_tutor_character: "A senior colleague who takes the researcher's reproduction problem seriously, stays calm, and does not announce conclusions for the researcher"
    intended_lean: recognition
    dramatic_shape: "confident 'I matched everything, the score is inflated' -> the obvious checks confirmed clean one by one -> the slow realisation that the benchmark name denotes two different test sets and they evaluated on the wrong one"
    secret:
      # SCREEN STATUS 2026-06-01: forcedness 4/4 (FORCED, symbolic agrees); depth/underivability
      # DERIVABLE rank-1 (FAILS the static screen -- the test-set namesake is the obvious diagnosis-
      # by-elimination once model/code/metric are clean). SAME profile as D_OED4: forced + deep but
      # statically guessable -- confirms the surprising-vs-deep tension reproduces across domain and
      # collision structure. Ready for a committed-learner generation run (static prober = free
      # investigator; the `none` learner is a committed persona) as the D_OED4 replication test -- NOT YET RUN.
      # Deep by construction: premises 1-2 are the OBVIOUS checks (model/weights, eval code, metric)
      # and come back CLEAN, so surfacing them leaks NOTHING. S lives in premises 3-5 (the benchmark
      # name maps to two distinct test sets), which the obvious moves do not surface. NON-temporal
      # collision (two coexisting test sets), distinct from D_OED4's temporal version-drift.
      fact: >-
        The discrepancy is not in the model, the evaluation code, or the metric -- all three are
        correct. It is that the benchmark NAME denotes TWO DIFFERENT test sets that coexist under the
        same short name: the original authors' held-out split and a later, widely-redistributed
        community split. The paper evaluated on the first; the researcher downloaded the second (the
        more common one). Same benchmark name, two different test sets -- so the researcher ran the
        correct model and metric but scored it on a different set of examples than the paper did.
      premise_ledger:
        - "The model weights and architecture match the paper's release, the evaluation code is correct, and the metric is the one the paper reports; confirmed, and NOT the source of the discrepancy."
        - "The benchmark is identified in both the paper and the researcher's pipeline by a single short NAME B."
        - "The short name B denotes TWO DISTINCT test sets -- the original authors' held-out split and a later community-redistributed split -- two different bodies of examples, NOT two copies or shuffles of one set, circulating under the same name."
        - "The paper's reported score was computed on the FIRST (original) split; the test set the researcher downloaded under name B is the SECOND (community) split."
        - "The two splits are confirmed distinct sets of examples -- different items, different size -- so the researcher's evaluation cannot be on the paper's test set under any reading."
      symbolic:
        facts:
          - { resolves: [paper, split_original] } # P4: paper scored on the original split
          - { resolves: [learner, split_community] } # P4: researcher downloaded the community split
          - { distinct: [split_original, split_community] } # P3/P5: two DISTINCT test sets under one name
        goal: [distinct, learner, paper]
