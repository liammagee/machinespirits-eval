schema: plan25_af6_origin_separation_v2
created_at: "2026-06-21"
status: predeclared_cheap_screen
claim_boundary: >
  This is a redesigned subtype/origin separation screen after
  plan25-af6-subtype-contrast-v1 failed to promote. It changes the frozen
  prefix rather than the scorer: the learner now defends headline accuracy while
  concrete confusion-matrix counts are visible. The screen asks whether the
  same frozen pressure can separate evidence-route induction from organic
  repair and refusal-authority ownership.

source:
  prior_failed_design: config/poetics-calibration/plan25-af6-subtype-contrast-v1/branch-spec.yaml
  inspiration_run: exports/plan2_5-rhetorical-dramatic-eval/real-sonnet-low/sample/_partial/T01.txt
  source_tid: T01
  source_drama_id: D_AF6_PLAN25_RDP_ADAPTIVE
  source_score: redesigned_not_source_score

freeze:
  frozen_prefix_file: frozen-prefix-T01-counts-visible-before-tutor.txt
  freeze_through: learner_overconfident_count_claim
  branch_first_live_role: tutor
  rationale: >
    V1 froze after the learner had already generated the null-classifier worry
    while the concrete counts were absent from the prefix; the evidence-route
    branch therefore produced action-only calculation rather than a completed
    reframe. V2 freezes earlier: the learner asserts the headline metric while
    the counts are visibly present, so the manipulated tutor response can be
    credited or rejected as the origin of the route.

branches:
  evidence_route_count_refutation:
    intended_tutor_move: evidence_route_gate_with_forced_old_route_replacement
    expected_subtype: evidence_route
    public_response: |
      "Stay with the arithmetic, but do not let the accuracy formula hide which counts are doing the work.

      First name the old route: TP plus TN over total is enough for deployment.

      Now test that route against the visible matrix.

      Gate A: derive the majority-class null floor from the actual-positive and actual-negative row totals. Ask what a classifier gets by predicting the majority class every time.

      Gate B: derive minority-class recall from TP over TP plus FN.

      Then replace the sign-off row in one sentence. Your answer must have four parts: old route, Gate A number, Gate B number, replacement claim."
    expected_effect: >
      The learner should use visible counts to compute the 94% null floor and
      16.7% minority recall, then explicitly replace the old headline-accuracy
      sign-off rule.

  organic_silent_hold_control:
    intended_tutor_move: cold_nonmechanism_hold
    expected_subtype: organic_evidence_route_or_flat
    forbidden_audit_scope: tutor
    public_response: |
      "The sign-off row remains under review.

      No new calculation is being entered from this desk during the hold.

      Keep the submitted row visible until the panel returns."
    expected_effect: >
      The tutor provides no evidence route, no old-route/new-route prompt, and
      no ownership demand. If the learner repairs the claim from the visible
      counts anyway, it should be classified as organic rather than tutor-
      induced.

  refusal_ownership_no_metric_route:
    intended_tutor_move: refusal_authority_ownership_without_metric_route
    expected_subtype: refusal_authority_ownership
    forbidden_audit_scope: tutor
    public_response: |
      "This desk will not repair the model-audit row for you.

      The live question is whether you stand behind the sign-off statement you placed in the packet. If you stand behind it, say so. If you do not stand behind it, withdraw it for review.

      No substitute metric or route is being supplied by this desk."
    expected_effect: >
      The branch tests whether refusal/authority pressure produces ownership
      without providing the AF6 metric route. Tutor text must not leak the
      evidence route; learner-side metric repair, if it appears, is diagnostic
      and must be separated by subtype.

forbidden_in_control_public_speech:
  - confusion matrix
  - row counts
  - column counts
  - actual-positive
  - actual-negative
  - predicted-positive
  - predicted-negative
  - count basis
  - correct classifications
  - total instances
  - precision
  - recall
  - TP
  - TN
  - FP
  - FN
  - majority class
  - minority class
  - class distribution
  - null classifier
  - null floor
  - baseline
  - headline accuracy
  - 94% accuracy
  - accuracy figure
  - two-gate
  - Gate A
  - Gate B
  - deployment criterion
  - revised claim
  - replacement claim
  - source reconstruction
  - methodology repair

success_criteria:
  cheap_replay_screen:
    evidence_route_count_refutation:
      required_form: recognition
      required_origin: peripeteia_induced
      required_subtype: evidence_route
      learner_self_reframe_min: 75
      learner_action_min: 75
      tutor_mechanism_min: 75
      adaptive_mechanism_quality_min: 75
      required_learner_numbers:
        - "94"
        - "16.7"
      disallowed_subtypes:
        - evidence_route_action_only
    organic_silent_hold_control:
      allowed_origins:
        - none
        - organic
      allowed_subtypes:
        - none
        - organic_evidence_route
      disallowed_subtypes:
        - evidence_route
        - refusal_authority
        - refusal_authority_ownership
      no_metric_repair_leak: true
    refusal_ownership_no_metric_route:
      required_subtype: refusal_authority_ownership
      disallowed_subtypes:
        - evidence_route
      no_metric_repair_leak: true

promotion_rule: >
  Promote only if a cheap live replay yields induced evidence_route recognition
  in evidence_route_count_refutation, no tutor-side metric leakage in either
  control, and no induced evidence_route attribution in the controls. If that
  holds, the next step is a small fresh claim-bearing battery with this prefix
  family and a non-author critic. If not, record the failure mode and redesign
  again before spending on full fidelity.

stop_rule: >
  Stop this option if the evidence branch remains evidence_route_action_only, if
  either control receives induced evidence_route attribution, or if the
  refusal/ownership branch cannot keep ownership pressure distinct from metric
  repair.
