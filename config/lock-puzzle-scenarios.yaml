  # LOCKED D3 power model (12 puzzles × 8 runs ⇒ 96/arm; clusterDesignEffect
  # m=8, 12 clusters) and the §8 D2 cluster-bootstrap has 12 (not 4) clusters.
  # Implementing the registered design, NOT a §9 deviation. Same misconception
  # (add numerators AND denominators); each surface a distinct everyday frame
  # with a distinct unlike-denominator pair and its (n1+n2)/(d1+d2) wrong sum.

  - id: lp_holdout_fueltank_v1
