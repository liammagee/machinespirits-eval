      trigger_signal: "1/2 the bed is carrots and 1/3 is beans, so 2/5 of it is planted."
    opening_turns:
      - role: learner
        content: "Half the garden bed is carrots and a third is beans. So 2/5 of the bed is planted, yeah?"
    max_turns: 6

  # ── Held-out stream (continued) — +8 surfaces ──────────────────────────
