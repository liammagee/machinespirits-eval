      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "I walked 3/4 km then 1/6 km, so 4/10 km altogether."
    opening_turns:
      - role: learner
        content: "I walked 3/4 km to the shop and 1/6 km back to the corner. That's 4/10 km in total, isn't it?"
    max_turns: 6

  - id: lp_holdout_battery_v1
    name: "Lock — battery charge (held-out)"
    scenario_type: lock_puzzle
