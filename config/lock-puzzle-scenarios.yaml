      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "The phone charged 1/3 then 2/5 more, so it's at 3/8 now."
    opening_turns:
      - role: learner
        content: "My phone charged 1/3 of the way, then another 2/5. So it's at 3/8 charge now, right?"
    max_turns: 6

  - id: lp_holdout_garden_v1
    name: "Lock — garden beds (held-out)"
    scenario_type: lock_puzzle
