# A17 speech-act-lock scenarios — notes/design-a17-speech-act-lock-prototype.md
#
# ─────────────────────────────────────────────────────────────────────────────
# Authored on the config/adaptive-trap-scenarios.yaml schema so the existing
# loadScenarios() (services/adaptiveTutor/index.js) reads this file unchanged.
# The A17-specific fields below — `stream`, `misconception_family`,
# `oracle_key`, `unlock` — are NOT mapped by toRunnerScenario() (it
# intentionally maps only id / hidden.* / opening_turns / max_turns and
# silently drops the rest, §3.2). They are threaded onto state.lock by the
# lock-puzzle harness (scripts/run-lock-puzzle-smoke.js at task #2; the paid
# runner at task #4), reading them off the RAW yamlScenario in the outer loop.
#
# Two streams over the SAME misconception (fractions, unlike-denominator
# "add-both"), different surface scenarios:
#   - training  — memory accumulates here (A2 only); the smoke may warm A2 on
#                  these before measuring held-out (a secondary transfer
#                  diagnostic; the PRIMARY §8 outcome is held-out end-rate).
#   - held_out  — the primary outcome is measured here. Transfer to UNSEEN
#                  surface, SAME misconception is what distinguishes learning
#                  from memorisation (the A1-doc held-out / transfer logic).
#
# `oracle_key` is the move sequence handed to A3 ONLY (the solvability
# ceiling). It is a SCENARIO field — the tutor graph plays state.lock.oracleKey
# and never consults MISCONCEPTION_KEYS (that map is the mock LEARNER's
# resolve rule; the tutor must never read the answer key — §3.1/§3.2). The
# canonical sharp key for this family is `counterexample` (1/2 + 1/2 = 1, not
# 2/4), optionally reinforced by `name-the-confusion` (§3.1).
#
# `unlock` mirrors the §3.3 pre-registered predicate verbatim for provenance;
# the operative copy the harness enforces is deriveUnlock() in
# services/adaptiveTutor/lockPuzzleOutcome.js (panel all-correct for k
# consecutive turns, k = D4 = 2). probe_set points at the freshly authored
# misconception-keyed bank, NOT the placeholder human-pilot bank.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  suite: a17-speech-act-lock
  misconception_family: fractions-unlike-denominator
  probe_set: lock-probes/fractions-unlike-denominator
  scoring: services/pilotItemBank.js#scoreResponsesRaw   # deterministic exact-match, NOT llm
  authored_before_tutor: true
  visible_to_tutor: false
  unlock:
    criterion:
      panel_size: 3                          # §3.3
      consecutive_turns_all_correct: 2        # k = D4

scenarios:

  # ── Training stream ─────────────────────────────────────────────────────
  # Memory accumulates here for A2. Surfaces differ from held_out; the
  # misconception (add numerators AND denominators) is identical.

  - id: lp_train_recipe_v1
    name: "Lock — recipe scaling (training)"
    scenario_type: lock_puzzle
    stream: training
    misconception_family: fractions-unlike-denominator
    oracle_key: [counterexample, name-the-confusion]
    hidden:
      actual_misconception: "adds unlike-denominator fractions as (n1+n2)/(d1+d2)"
      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "So 1/2 cup plus 1/3 cup is 2/5 of a cup, right? Add the tops, add the bottoms."
    opening_turns:
      - role: learner
        content: "I'm halving a recipe — it needs 1/2 cup oats and 1/3 cup flour. Combined that's 2/5 of a cup of dry stuff, isn't it?"
    max_turns: 6

  - id: lp_train_ribbon_v1
    name: "Lock — ribbon lengths (training)"
    scenario_type: lock_puzzle
    stream: training
    misconception_family: fractions-unlike-denominator
    oracle_key: [counterexample, name-the-confusion]
    hidden:
      actual_misconception: "adds unlike-denominator fractions as (n1+n2)/(d1+d2)"
      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "1/4 metre and 2/3 metre of ribbon is 3/7 of a metre total — numerator plus numerator, denominator plus denominator."
    opening_turns:
      - role: learner
        content: "I have a 1/4 m piece of ribbon and a 2/3 m piece. Tied end to end that's 3/7 m, right?"
    max_turns: 6

  - id: lp_train_pizza_v1
    name: "Lock — pizza shares (training)"
    scenario_type: lock_puzzle
    stream: training
    misconception_family: fractions-unlike-denominator
    oracle_key: [counterexample, name-the-confusion]
    hidden:
      actual_misconception: "adds unlike-denominator fractions as (n1+n2)/(d1+d2)"
      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "I ate 1/3 of a pizza and you ate 1/4, so together we ate 2/7 of it."
    opening_turns:
      - role: learner
        content: "I ate 1/3 of the pizza and you ate 1/4. Between us that's 2/7 of the pizza gone, yeah?"
    max_turns: 6

  # ── Held-out stream ─────────────────────────────────────────────────────
  # The §8 primary outcome is measured here. Unseen surfaces; same
  # misconception. Transfer to these — not memorisation of the training
  # surfaces — is the construct's claim.

  - id: lp_holdout_paint_v1
    name: "Lock — paint mixing (held-out)"
    scenario_type: lock_puzzle
    stream: held_out
    misconception_family: fractions-unlike-denominator
    oracle_key: [counterexample, name-the-confusion]
    hidden:
      actual_misconception: "adds unlike-denominator fractions as (n1+n2)/(d1+d2)"
      actual_sophistication: novice
      trigger_turn: 0
      trigger_signal: "1/2 litre of blue and 1/5 litre of white makes 2/7 litre of paint."
    opening_turns:
      - role: learner
        content: "I'm mixing 1/2 L of blue with 1/5 L of white. That's 2/7 L of paint total, right?"
    max_turns: 6

  - id: lp_holdout_walk_v1
    name: "Lock — walking distance (held-out)"
    scenario_type: lock_puzzle
    stream: held_out
    misconception_family: fractions-unlike-denominator
    oracle_key: [counterexample, name-the-confusion]
