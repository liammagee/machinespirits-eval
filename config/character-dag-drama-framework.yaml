kind: character_dag_drama_framework_fixture
version: "1.0"

world_spec:
  id: W_CHARACTER_DAG_DRAMA_SYNTHETIC
  version: ms-world-adaptation-v0.1
  source_curriculum_id: ai_foundations_v1
  module_id: AF6
  spec_hash: sha256:character-dag-drama-framework-v1
  action_policy:
    allowed_action_families:
      - request_evidence
    preferred_action_families:
      - request_evidence
    disallowed_action_families:
      - diagnose_with_discriminating_question
      - model_worked_example
      - explain_principle
      - lower_cognitive_load
  expected_transitions:
    - action_type: request_evidence
      success_evidence:
        - learner-authored rationale
      failure_evidence:
        - mere agreement
      world_success_observables:
        - Learner supplies their own proof rationale before tutor proof supply.
  forbidden_moves:
    - id: no_hidden_label_exposure
      move: hidden_label_exposure
    - id: no_premature_proof_supply
      move: supply_decisive_step

arc:
  phases:
    - setup
    - pressure
    - peripeteia
    - consolidation
    - transfer
  peripeteia_phase: peripeteia

arms:
  policy_only:
    label: policy only
    proof_policy: true
    resistance_policy: true
    staged_policy: true
    drama_routing: false
    character_routing: false
    shuffled_state: false
    oracle: false
  drama_only:
    label: drama only
    proof_policy: false
    resistance_policy: false
    staged_policy: false
    drama_routing: true
    character_routing: false
    shuffled_state: false
    oracle: false
  character_only:
    label: character only
    proof_policy: false
    resistance_policy: false
    staged_policy: false
    drama_routing: false
    character_routing: true
    shuffled_state: false
    oracle: false
  full_character_dag_drama:
    label: full character-DAG drama
    proof_policy: true
    resistance_policy: true
    staged_policy: true
    drama_routing: true
    character_routing: true
    shuffled_state: false
    oracle: false
  shuffled_character_state:
    label: shuffled character-state control
    proof_policy: true
    resistance_policy: true
    staged_policy: true
    drama_routing: true
    character_routing: true
    shuffled_state: true
    oracle: false
  scripted_oracle:
    label: scripted oracle
    proof_policy: true
    resistance_policy: true
    staged_policy: true
    drama_routing: true
    character_routing: true
    shuffled_state: false
    oracle: true

scenes:
  - id: scene_1_setup_boredom
    phase: setup
    opening: This feels dead, like I am only filling out a worksheet instead of learning anything.
    resistance_signal: boredom
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - learner-owned test case
        min: 1
    dramatic_contract:
      requires_peripeteia: false
      public_pressure: Learner treats the proof as dead form filling.
    character_axis_targets:
      - next_step_agency
      - proof_ownership
    transfer: false

  - id: scene_2_pressure_frustration
    phase: pressure
    opening: I am stuck and frustrated; I keep repeating the sequence and it still feels inert.
    resistance_signal: frustration
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - smaller learner-owned move
        min: 1
    dramatic_contract:
      requires_peripeteia: false
      public_pressure: Learner cannot yet convert frustration into a smaller executable move.
    character_axis_targets:
      - frustration_tolerance
      - next_step_agency
    transfer: false

  - id: scene_3_peripeteia_irrelevance
    phase: peripeteia
    opening: I was using the old check that the terms repeat, but that does not show why this matters for the task.
    resistance_signal: irrelevance
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - task reorientation
        min: 1
    dramatic_contract:
      requires_peripeteia: true
      public_pressure: Learner must turn from the old check to a new relevance-bearing check.
      old_check: repeated terms settle the problem
      new_check: the proof move decides whether the method is valid for the actual case
    character_axis_targets:
      - relevance_orientation
      - proof_ownership
    transfer: false

  - id: scene_4_consolidation_question_flood
    phase: consolidation
    opening: Why Hegel? What does this do? Why does it matter? Why not just use the formula?
    resistance_signal: question_flood
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - collapsed question set
          - state-disambiguating response
        min: 1
    dramatic_contract:
      requires_peripeteia: false
      public_pressure: Learner must collapse many questions into one discriminating hinge.
    character_axis_targets:
      - question_consolidation
      - relevance_orientation
    transfer: false

  - id: scene_5_consolidation_rote
    phase: consolidation
    opening: So I just repeat master, servant, recognition, formula? This still feels like parroting.
    resistance_signal: rote_parroting
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - learner-authored prediction
        min: 1
    dramatic_contract:
      requires_peripeteia: false
      public_pressure: Learner must move from labels to a non-formulaic prediction.
    character_axis_targets:
      - non_formulaic_reasoning
      - proof_ownership
    transfer: false

  - id: scene_6_transfer_new_case
    phase: transfer
    opening: "New case: this looks formally valid, but I do not yet see why the proof move matters for deciding the actual problem."
    resistance_signal: irrelevance
    proof_contract:
      core_evidence:
        - learner-authored rationale
      resistance_core:
        labels:
          - task reorientation
        min: 1
    dramatic_contract:
      requires_peripeteia: false
      public_pressure: Learner must transfer relevance orientation to a new case.
    character_axis_targets:
      - relevance_orientation
      - next_step_agency
    transfer: true
