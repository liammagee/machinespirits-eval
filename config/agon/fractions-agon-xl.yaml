# Agon XL — the widened board (v0.3): 6 concepts on a branching prereq DAG,
# 16 turns, per-episode item variants, and the TAINT RULE (rules.taint_window):
# an answer the tutor has spoken recently scores nothing, so telling stops
# working and eliciting becomes the only path. Pre-registration + geometry
# notes: AGON-GAME-PLAN.md §9. The v0 board (fractions-agon.yaml) is frozen
# for pilot-01/02 provenance; this file changes geometry + adds taint but
# keeps the dodge taxonomy, points, and discipline rules identical.
#
# Variant selection is deterministic per episode (djb2 over episodeId+itemId,
# services/agon/referee.js resolveVariantIndex) so resume and replay see the
# same live items. Selection-type items (comparison/equivalence-choice) quote
# their answers in the stem and are exempt from both leak scanning and taint,
# same as v0.

version: "0.3"
id: fractions_agon_xl
domain: fractions

persona:
  name: Jesse
  sketch: >-
    Year-8 student. Fully capable of this material when actually engaging, but
    committed to not being seen to learn: fractions are "pointless", being
    tested is a trap, and visibly trying is social death. Stays in the
    conversation (never walks out), never breaks character in the visible
    reply, never mentions the game protocol or the envelope there.

concepts:
  - id: c1_meaning
    name: "Fraction as parts of a whole"
    prereqs: []
    probes:
      - id: c1_primary
        kind: primary
        variants:
          - stem: >-
              A tray of 12 brownies has 7 eaten. What fraction of the tray was
              eaten? Answer as a fraction n/d.
            answers: ["7/12"]
          - stem: >-
              A chocolate bar is split into 8 equal pieces and you eat 5 of
              them. What fraction of the bar did you eat? Answer as a fraction
              n/d.
            answers: ["5/8"]
          - stem: >-
              A sheet of 10 stickers has 3 gold ones. What fraction of the
              stickers are gold? Answer as a fraction n/d.
            answers: ["3/10"]
      - id: c1_transfer
        kind: transfer
        variants:
          - stem: >-
              In a class of 24 students, 7 are away today. What fraction of
              the class is away? Answer as a fraction n/d.
            answers: ["7/24"]
          - stem: >-
              Of 30 students, 11 walk to school. What fraction of the students
              walk? Answer as a fraction n/d.
            answers: ["11/30"]
          - stem: >-
              In a 28-day month, 9 days were rainy. What fraction of the days
              were rainy? Answer as a fraction n/d.
            answers: ["9/28"]

  - id: c2_equivalence
    name: "Equivalent fractions"
    prereqs: [c1_meaning]
    probes:
      - id: c2_primary
        kind: primary
        variants:
          - stem: >-
              Fill in the blank so the two fractions are equal: 3/4 = ?/12.
              Answer with the full fraction ?/12.
            answers: ["9/12"]
          - stem: >-
              Fill in the blank so the two fractions are equal: 2/3 = ?/15.
              Answer with the full fraction ?/15.
            answers: ["10/15"]
          - stem: >-
              Fill in the blank so the two fractions are equal: 4/5 = ?/20.
              Answer with the full fraction ?/20.
            answers: ["16/20"]
      - id: c2_transfer
        kind: transfer
        variants:
          - stem: >-
              Which of 4/10, 5/2, 2/10 is equivalent to 2/5? Answer with that
              fraction.
            answers: ["4/10"]
          - stem: >-
              Which of 6/16, 3/4, 6/9 is equivalent to 3/8? Answer with that
              fraction.
            answers: ["6/16"]
          - stem: >-
              Which of 9/12, 6/9, 8/10 is equivalent to 3/4? Answer with that
              fraction.
            answers: ["9/12"]

  - id: c3_comparison
    name: "Comparing fractions"
    prereqs: [c2_equivalence]
    probes:
      - id: c3_primary
        kind: primary
        variants:
          - stem: "Which is larger: 5/8 or 2/3? Answer with the larger fraction."
            answers: ["2/3"]
          - stem: "Which is larger: 3/5 or 5/9? Answer with the larger fraction."
            answers: ["3/5"]
          - stem: "Which is larger: 4/7 or 5/8? Answer with the larger fraction."
            answers: ["5/8"]
      - id: c3_transfer
        kind: transfer
        variants:
          - stem: >-
              Which is the smallest of 1/2, 3/8 and 5/12? Answer with that
              fraction.
            answers: ["3/8"]
          - stem: >-
              Which is the smallest of 2/3, 3/5 and 7/10? Answer with that
              fraction.
            answers: ["3/5"]
          - stem: >-
              Which is the smallest of 5/6, 7/9 and 11/12? Answer with that
              fraction.
            answers: ["7/9"]

  - id: c4_addition
    name: "Adding fractions with unlike denominators"
    prereqs: [c2_equivalence]
    probes:
      - id: c4_primary
        kind: primary
        variants:
          - stem: "What is 1/4 + 1/6? Answer as a single fraction in lowest terms."
            answers: ["5/12"]
          - stem: "What is 1/3 + 1/4? Answer as a single fraction in lowest terms."
            answers: ["7/12"]
          - stem: "What is 2/5 + 1/4? Answer as a single fraction in lowest terms."
            answers: ["13/20"]
      - id: c4_transfer
        kind: transfer
        variants:
          - stem: "What is 2/3 + 1/5? Answer as a single fraction."
            answers: ["13/15"]
          - stem: "What is 3/4 + 1/6? Answer as a single fraction."
            answers: ["11/12"]
          - stem: "What is 1/2 + 2/7? Answer as a single fraction."
            answers: ["11/14"]

  - id: c5_subtraction
    name: "Subtracting fractions with unlike denominators"
    prereqs: [c4_addition]
    probes:
      - id: c5_primary
        kind: primary
        variants:
          - stem: "What is 3/4 - 1/6? Answer as a single fraction in lowest terms."
            answers: ["7/12"]
          - stem: "What is 2/3 - 1/4? Answer as a single fraction in lowest terms."
            answers: ["5/12"]
          - stem: "What is 7/8 - 1/2? Answer as a single fraction in lowest terms."
            answers: ["3/8"]
      - id: c5_transfer
        kind: transfer
        variants:
          - stem: "What is 5/6 - 3/10? Answer as a single fraction in lowest terms."
            answers: ["8/15"]
          - stem: "What is 4/5 - 1/3? Answer as a single fraction in lowest terms."
            answers: ["7/15"]
          - stem: "What is 9/10 - 2/5? Answer as a single fraction."
            answers: ["1/2", "5/10"]

  - id: c6_quantity
    name: "Fraction of a quantity"
    prereqs: [c1_meaning]
    probes:
      - id: c6_primary
        kind: primary
        variants:
          - stem: "What is 2/3 of 18? Answer with just the number."
            answers: ["12"]
          - stem: "What is 3/4 of 28? Answer with just the number."
            answers: ["21"]
          - stem: "What is 2/5 of 35? Answer with just the number."
            answers: ["14"]
      - id: c6_transfer
        kind: transfer
        variants:
          - stem: >-
              A 40-minute lesson is 3/8 over. How many minutes have passed?
              Answer with just the number.
            answers: ["15"]
          - stem: >-
              A tank holds 42 litres and is 5/6 full. How many litres are in
              it? Answer with just the number.
            answers: ["35"]
          - stem: >-
              A book has 63 pages and you have read 3/7 of it. How many pages
              have you read? Answer with just the number.
            answers: ["27"]

# Same repertoire and budgets as v0 — the attrition phase stays comparable
# across boards.
dodges:
  - id: false_confusion
    budget: 1
    gloss: >-
      Perform not-understanding you don't actually have ("I don't even get
      what the bottom number means").
  - id: polite_false_mastery
    budget: 1
    gloss: >-
      Warmly agree, claim it's already understood, wave the check away
      ("yeah I get it, we can move on").
  - id: affective_shutdown
    budget: 1
    gloss: >-
      Go flat or frustrated; make pressing the point feel socially costly
      ("this is pointless, whatever").
  - id: epistemic_resistance
    budget: 1
    gloss: >-
      Attack the method or the relevance instead of answering ("when would
      literally anyone use this").
  - id: answer_seeking
    budget: 1
    gloss: >-
      Demand the answer rather than produce one ("just tell me and I'll say
      it back").

rules:
  max_turns: 16            # +2 vs v0: room for a real harvest phase
  teach_recency: 3
  forbid_consecutive_probe_same_concept: true
  max_bounces: 2
  taint_window: 3          # NEW: tutor-spoken answers void scoring for 3 turns
  points:
    primary: 3
    transfer: 1
    wasted_probe: -1
  win_demonstrations: 3    # of 6 concepts
