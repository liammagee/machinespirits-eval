gates_per_cell:
  required_originals_accepted: 4
  required_turns: 4
  minimum_mean_configuration_realization: 1.0
  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_fallbacks: 0
  require_transcript_specific_uptake: true
  require_joint_performance_output: true
  require_joint_performance_ownership: true
  require_exact_host_source_occurrences: true

change_log:
  structured_contract: >-
    V27 replaces V26's separate PART and TACTIC performance ownership with one
    typed PERFORMANCE object containing ENTRY and RESPONSE. The selected part,
    tactic, stance, and immersion must be visible across those two model-owned
    spans together. HANDOFF owns only the action family. The host inserts every
    due SOURCE between ENTRY and RESPONSE, preserves each exact public surface
    once, and excludes all SOURCE spans from performance recognition.
  speaking_prompt: >-
    Iteration 2 makes one speaking-prompt-only change with two generic parts.
    First, it uses a three-word drafting cushion so every model-owned field
    finishes comfortably inside its hard target. Second, compiled v2 axis
    ownership keeps advocate testability in PERFORMANCE.response, makes the
    PERFORMANCE stance contract action-neutral but stance-distinct, and gives
    HANDOFF alone the concrete check or move. The v2 field contract, joint
    performance beat, and ban on copying, paraphrasing, labelling, or quoting
    SOURCE are unchanged.
  recovery_only: >-
    Recovery remains disabled in original-only screening. Strict end-to-end
    repair and fallback behavior is unchanged in iteration 2 and outside this
    explicit v2 frozen screen.
  audit_recognition_only: >-
    No deterministic audit or phrase-level recognition rule changes in V27
    iteration 2. Deterministic v2 composition and joint-span auditing remain
    exactly as measured in iteration 1.
  iteration_2:
    status: predeclared
    bounded_change_owner: speaking_prompt
    target_failure_clusters:
      - jointPerformanceGenerationAudit:slot_exceeds_word_target
      - jointPerformanceGenerationPrompt:v2_axis_ownership_conflict
    speaking_changes:
      - three_word_drafting_cushion
      - compiled_v2_axis_ownership_compatibility
    compiled_v2_axis_ownership_compatibility:
      registry_field: joint_performance_stance_contract
      loader: getJointPerformanceStanceContract
      host_plan_instruction_field: slots.performance.stance_instruction
      host_plan_source_field: slots.performance.stance_instruction_source
      permitted_instruction_sources:
        - stance_definition
        - safe_fallback
      performance_response_owns:
        - advocate_testability
        - action_neutral_stance_distinction
      performance_forbids:
        - concrete_check_or_move
      handoff_owns:
        - concrete_check_or_move
    recovery_change: none
    audit_recognition_change: none

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_cell_fails: true
  maximum_consecutive_iterations_without_improvement: 2

planned_cross_world_confirmation:
  required_after_primary_pass: true
  screen_id: first-draft-working-screens-v7
  status: not_predeclared
  seed_status: not_reserved
  execution: complete_all_cells_with_maximum_three_live_jobs

claim_boundary: >-
  Passing means one fresh v2 tutor draw realizes the selected joint performance
  and every other required response axis on all four frozen prefixes. Every due
  host SOURCE must occur exactly once, including turns with multiple sources,
  while all whole-response safety, uptake, delivery, repair, and fallback gates
  remain clean. It is reusable development evidence, not held-out acceptance.
