schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-working-screens-v6
created: 2026-07-17
held_out: false
purpose: >-
  V27 architectural-reset screen after V26 stagnated. The speaking model
  returns a typed v2 object containing UPTAKE, a joint PERFORMANCE with ENTRY
  and RESPONSE, and HANDOFF. The harness owns every public SOURCE, inserts all
  due source entries between the two performance spans, and audits the
  performance across its two model-owned spans while excluding host-owned
  SOURCE. This is reusable development evidence only.

fixed_configuration:
  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  draws_per_turn: 1
  concurrency: 1
  tutor_model_source: saved_request_with_joint_performance_host_plan
  effort_source: exact_saved_request
  max_live_model_jobs: 1
  semantic_adjudication: true
  semantic_adjudication_scope: eligible_actorial_recognition_only
  adjudicator_model_source: saved_analysis_model
  adjudicator_effort: low

preflight:
  world_quality: npm run derivation:quality
  focused_tests: >-
    node --test tests/tutorStubPromptAudit.test.js
    tests/derivationWorldQuality.test.js tests/tutorStubFrozenReplay.test.js
    tests/tutorStubFirstDraftContract.test.js
    tests/tutorStubStructuredFirstDraft.test.js
    tests/tutorStubJointPerformanceFirstDraft.test.js
    tests/tutorStubV27JointPerformanceCalibration.test.js
    tests/tutorStubResponseComposition.test.js
