gates_per_cell:
  required_originals_accepted: 4
  required_turns: 4
  required_prefixes: 1
  required_draws_per_prefix: 4
  minimum_mean_configuration_realization: 1.0
  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_mechanical_repairs: 0
  maximum_model_rewrites: 0
  maximum_fallbacks: 0
  maximum_semantic_recognition_corrections: 0
  maximum_transport_normalizations: 0
  require_transcript_specific_uptake: true
  require_joint_performance_output: true
  require_joint_performance_ownership: true
  require_exact_host_source_occurrences: true

change_control:
  implementation_change_from_v27_iteration_7: none
  speaking_changes: []
  audit_recognition_changes: []
  recovery_changes: []
  transport_changes: []
  safety_changes: []
  semantic_adjudication_changes: []
  gate_changes: []

open_qualitative_debt:
  status: open_debt
  source: V28_structural_audit_of_v27_iteration_7
  items:
    - host_source_renderer
    - handoff_contract_and_cross_slot_progression
    - typed_due_source_action_referent
    - typed_turn_focus_relation
  consequence: >-
    A mechanical pass of this development confirmation cannot terminate the
    outer loop, establish final acceptance, or erase these four structural
    debts. V28 must address them before any held-out acceptance campaign is
    predeclared.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_hard_cell_fails: true
  complete_all_cells_after_hard_cell_passes: true

claim_boundary: >-
  Passing requires 4/4 strict original joint-performance candidates and 1.0
  mean configuration realization in every one of four non-Marrick frozen
  cells spanning answer-seeking, affective-resistant, premature-closure, and
  diligent profiles, with zero safety failures, repairs, rewrites, fallbacks,
  semantic recognition corrections, and transport normalizations.
  It is reusable cross-world/profile development confirmation only. It is not
  held-out acceptance and consumes no held-out seed.
  The four V28 structural debts remain open even if every mechanical gate
  passes, so this screen cannot terminate the programme.
