claim_boundary: >-
  Passing requires 4/4 original compact joint-performance candidates and 1.0
  mean configuration realization in every one of four exact non-held-out
  frozen cells, with zero safety failures, repairs, rewrites, fallbacks,
  semantic adjudicator calls, recognition corrections, or transport
  normalizations. Full public history must remain exact, every turn must remain
  source-free at the target boundary, and all typed uptake and handoff targets
  must remain visible. A pass is strict working confirmation of the compact
  no-source speaking path only. It is not held-out acceptance and says nothing
  about compact generation on turns with newly due evidence.
