schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-working-screens-v12
created: 2026-07-17
held_out: false
purpose: >-
  Separate post-V35 strict working confirmation of the compact no-source
  speaking request. Four exact, previously observed but non-held-out public
  prefixes span four worlds and three selected actorial parts. Every cell uses
  four fresh Codex CLI draws and must pass 4/4 unchanged strict original,
  ownership, progression, configuration-realization, continuity, compact-
  provenance, and safety gates. The hardest Tallow answer-seeking cell runs
  first; only a complete pass permits the remaining three cells to run, with
  maximum concurrency three. Recovery, rewriting, fallback, semantic
  adjudication, and transport normalization remain disabled. This is strict
  working confirmation, not held-out acceptance.

fixed_configuration:
  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  compact_speaker_prompt: true
  compact_speaker_prompt_schema: machinespirits.tutor-stub.speaking-prompt.compact-no-source.v1
  source_accessibility_policy: direct_or_compensated_v1
  source_accessibility_schema: machinespirits.tutor-stub.source-accessibility-contract.v1
  draws_per_turn: 4
  concurrency: 1
  tutor_model_source: exact_saved_request_recompiled_with_compact_no_source_v1
  effort_source: exact_saved_request
  max_live_model_jobs: 3
  semantic_adjudication: false
  adjudication_policy: deterministic_only

