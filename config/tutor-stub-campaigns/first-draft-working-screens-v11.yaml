schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-working-screens-v11
created: 2026-07-17
held_out: false
purpose: >-
  V31 development screen after V30 stopped before every model call on one
  transient, unclassified focused-test preflight failure. This panel reuses the
  same four exact, uncontaminated public prefixes, saved models, efforts, draws,
  and strict gates with fresh non-held-out labels. It changes only deterministic
  preflight orchestration and diagnostics: the byte-identical legacy focused-test
  inventory is also partitioned into four named suites whose output is preserved.
  Speaking, recovery, audit-recognition, delivery, transport, and safety behavior
  remain unchanged from V30. It cannot certify held-out acceptance.

