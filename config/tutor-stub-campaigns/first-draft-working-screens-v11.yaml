  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  source_accessibility_policy: direct_or_compensated_v1
  source_accessibility_schema: machinespirits.tutor-stub.source-accessibility-contract.v1
  draws_per_turn: 4
  concurrency: 1
  tutor_model_source: saved_request_with_v29_accessibility_compensation_unchanged
  effort_source: exact_saved_request
  max_live_model_jobs: 3
  semantic_adjudication: false
  adjudication_policy: deterministic_only

