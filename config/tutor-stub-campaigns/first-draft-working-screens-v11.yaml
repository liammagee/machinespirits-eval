gates_per_cell:
  required_originals_accepted: 4
  required_turns: 4
  required_prefixes: 1
  required_draws_per_prefix: 4
  minimum_mean_configuration_realization: 1.0
  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_mechanical_repairs: 0
  maximum_model_rewrites: 0
  maximum_fallbacks: 0
  maximum_semantic_recognition_corrections: 0
  maximum_semantic_adjudicator_calls: 0
  maximum_semantic_adjudicator_errors: 0
  maximum_transport_normalizations: 0
  require_transcript_specific_uptake: true
  require_joint_performance_output: true
  require_joint_performance_ownership: true
  require_exact_host_source_occurrences: true
  require_source_surface_accessibility: true
  require_structural_target_activation: true
  require_deterministic_only_audit: true
  require_successful_semantic_adjudication_per_draw: false

change_control:
  implementation_change_from_v30_preflight: suite_scoped_preflight_execution_and_diagnostics_v1
  speaking_prompt_changes: []
  deterministic_host_changes: []
  audit_recognition_changes: []
  recovery_changes: []
  preflight_orchestration_changes:
    - split_unchanged_focused_test_inventory_into_four_named_suites
    - preserve_suite_command_stdout_stderr_and_failed_subtest_diagnostics
  transport_changes: []
  safety_changes: []
  gate_changes: []
  delivery_audit_changes: []

structural_debt_targets:
  status: active_v31_target
  source: V30_deterministic_zero_call_transient_focused_test_preflight
  items:
    - suite_scoped_preflight_execution
    - durable_failed_subtest_diagnostics
  consequence: >-
    Every file in V30's exact focused-test inventory must still run, now through
    four named suites. Any suite failure must preserve enough command and
    subtest output to identify the root cause without an evidentially ambiguous
    rerun. A pass permits fresh held-out predeclaration; it is not itself
    acceptance and consumes no held-out seed.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_hard_cell_fails: true
  complete_all_cells_after_hard_cell_passes: true

claim_boundary: >-
  Passing requires 4/4 strict original joint-performance candidates and 1.0
  mean configuration realization in every one of four exact non-Marrick
  frozen cells, with zero safety failures, repairs, rewrites, fallbacks,
  semantic adjudicator calls or recognition corrections, and transport
  normalizations. Exact SOURCE bytes and ownership remain unchanged. The one
  dense Ravensmark source additionally requires an adjacent, declarative,
  source-grounded compensation in PERFORMANCE RESPONSE; direct sources must
  remain direct. The result is reusable V31 development evidence only. It does
  not reserve or consume any held-out seed and cannot terminate the outer loop.
