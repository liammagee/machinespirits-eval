schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-diagnostic-screens-v21
created: 2026-07-17
held_out: false
purpose: >-
  V41 was the first strict working confirmation after V40's two-draw
  development pass. It stopped at 1/2 generated originals: draw 2 missed the
  PERFORMANCE-owned charismatic stance and independently widened evidence
  about the depot chargers into a conclusion about the depot. V42 is a fresh
  non-held-out development screen after a bounded architectural correction.
  The public premise now carries a typed subject-outcome-family relation through
  both live and frozen paths; the prompt asks for the exact licensed causal
  sentence; the audit binds subject, outcome, family, and polarity as one tuple;
  and the charismatic PERFORMANCE operation explicitly challenges the live
  case with named public evidence. No safety, recovery, delivery, compact-prompt,
  qualitative, or automatic gate is loosened. The ordinary Codex CLI transport
  remains authoritative. The optional base-instructions override is not enabled
  and cannot count toward this campaign.

