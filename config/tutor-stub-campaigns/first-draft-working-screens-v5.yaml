purpose: >-
  V26 architectural-reset screen after V25 stagnated. The speaking model
  returns exactly four typed host sentences as JSON. The harness validates the
  fields, inserts any exact public SOURCE between PART and TACTIC, composes one
  paragraph, and audits both the owning slot spans and the unchanged whole
  response. This is development evidence only and cannot certify
  generalization.

