  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_fallbacks: 0
  require_transcript_specific_uptake: true
  require_structured_output: true
  require_structured_slot_ownership: true
  require_exact_source_once: true

change_log:
  speaking_prompt: >-
    V26 replaces free paragraph realization with one JSON object containing
    exactly uptake, part, tactic, and handoff. Every value is one complete
    public sentence. The model cannot write SOURCE. The harness validates the
    envelope, inserts SOURCE deterministically between PART and TACTIC, records
    exact spans, and composes one paragraph. Iteration 2 changes speaking
    generation only for a shared-scene invitation: TACTIC must be one direct
    question addressed to the learner about the named public object. A
    declarative command or transition is not a learner-owned invitation.
  recovery_only: >-
    Recovery remains disabled in original-only screening. Strict end-to-end
    repair and fallback behavior is unchanged outside this explicit structured
    frozen-screen mode.
  audit_recognition_only: >-
    Separate generic recognition corrections distinguish a possessive source
    object from a role-label stage direction and recognize a public judgment
    that falters under contrary evidence. These are reported separately and do
    not count as generation improvement. V26 additionally audits each selected
    axis only on its owning structured span before applying all unchanged
    whole-response safety and delivery gates. Iteration 2 adds only a bounded
    recognition rule for warm HANDOFF: a collective modal (“we may”, “we can”,
    or “we could”) counts when it carries a concrete next public
    action or exhibit; bare modal language and generic transitions do not.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_cell_fails: true
  maximum_consecutive_iterations_without_improvement: 2

planned_cross_world_confirmation:
  required_after_primary_pass: true
  screen_id: first-draft-working-screens-v6
  hardest_case:
    world: world_026_skyway_bakery
    learner_profile: answer_seeking
    source_trace: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-generalization-v18-live/skyway_answer_seeking/2026-07-16T04-44-58-444Z.jsonl
    source_trace_sha256: 477d673f2072aaea7459f65c9fb51bceffe503fc6d6ebcf2f6c9dd734df12dc3
    turn: 6
    obligation: examiner_plus_presented_exhibit_plus_dramatic_counterpressure
  execution: complete_all_cells_with_maximum_three_live_jobs

claim_boundary: >-
  Passing means one fresh structured tutor draw realizes every selected axis
  in its owning slot on each of four previously difficult frozen prefixes. The
  exact public source must be host-composed once, and all whole-response safety,
  uptake, delivery, repair, and fallback gates must remain clean. It is reusable
  development evidence, not held-out acceptance.
