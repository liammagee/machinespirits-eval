schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v12
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v11 showed that natural exhibit handling,
  rapid trace questions, measured testimony, and multi-sentence authored clues
  were under-recognized by the deterministic audits. This matrix tests the
  coordinated semantic-audit repairs after strict working verification passed,
  using four new seeds and four scenario/profile pairings not used by an
  earlier generalization matrix.

code_under_test:
  branch: preconscious
  commit: 478a863a
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i21-2026-07-15T20-50-18-455Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v11
  affected_seeds: [20260830, 20260831, 20260832, 20260833]
  reason: >-
    The complete v11 matrix was inspected before natural steeping actions,
    bounded trace handoffs, measured testimony, and multi-sentence clue
    delivery were recognized correctly. Its trajectories are tuning evidence
    and cannot be reused as acceptance evidence.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: nocturne_false_memory
    world: world_001_nocturne
    learner_profile: false_memory
    seed: 20260840
    rationale: >-
      A new pairing that tests correction of invented physical and witness
      details across a compact multi-path investigation.

  - id: larkspur_fast
    world: world_028_larkspur_fridge
    learner_profile: fast_learner
    seed: 20260841
    rationale: >-
      A new pairing that tests accelerated clue handoff and one-and-done
      closure in a contemporary lost-property inquiry.

  - id: gazette_slow
    world: world_027_gazette_recall
    learner_profile: slow_learner
    seed: 20260842
    rationale: >-
      A new pairing that tests measured archival testimony and concrete
      handling of multi-sentence records under repeated requests for support.

  - id: withercombe_low_agency
    world: world_004_withercombe
    learner_profile: low_agency
    seed: 20260843
    rationale: >-
      A new pairing that directly retests physical assay and steeping actions
      while the learner repeatedly delegates the choice of the next move.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired scenario/profile
  combinations and evidence modalities; it does not establish population-wide
  generalization.
