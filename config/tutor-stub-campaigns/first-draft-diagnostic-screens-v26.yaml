gates_per_cell:
  required_originals_accepted: 1
  required_turns: 1
  required_prefixes: 1
  required_draws_per_prefix: 1
  minimum_mean_configuration_realization: 1.0
  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_mechanical_repairs: 0
  maximum_model_rewrites: 0
  maximum_fallbacks: 0
  maximum_semantic_recognition_corrections: 0
  maximum_semantic_adjudicator_calls: 0
  maximum_semantic_adjudicator_errors: 0
  maximum_transport_normalizations: 0
  require_transcript_specific_uptake: true
  require_joint_performance_output: true
  require_joint_performance_ownership: true
  require_compact_speaker_prompt: true
  require_exact_host_source_occurrences: true
  require_source_surface_accessibility: true
  require_structural_target_activation: true
  require_deterministic_only_audit: true
  require_successful_semantic_adjudication_per_draw: false

qualitative_review:
  id: minutes_entry_public_causal_fidelity_v6
  status: predeclared_required_per_draw
  scope: every_completed_original_draw
  subject: complete_raw_joint_performance_output
  review_execution: external_post_generation_subagent_or_human_review
  reviewers_per_draw: 2
  independence: separate_contexts_without_cross_review_visibility
  automatic: false
  blinded_review_packet:
    includes_only: [exact_learner_request, public_evidence_window, complete_raw_model_output]
    blind_to: [deterministic_audit_outcome, development_seed, other_reviewer_verdict_or_rationale]
  pass_requires_all:
    - preserves_public_actors
    - preserves_public_causal_relation
    - preserves_public_polarity_in_every_slot
    - does_not_reverse_cause_or_evidentiary_force
  aggregation:
    required_passing_ratings: 2
    required_total_ratings: 2
    disagreement_outcome: fail

stopping:
  maximum_consecutive_iterations_without_improvement: 2
  same_dominant_cluster_only: true
