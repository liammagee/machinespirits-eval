schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-diagnostic-screens-v26
created: 2026-07-17
held_out: false
purpose: >-
  V46 is one bounded non-equivalent override screen for the concrete causal
  performance-entry contract. It requires the advocate to state a concrete
  first-person case about the exact public subject and outcome, reserves the
  following sentence for the typed causal boundary, and preserves every
  existing delivery and safety gate. Failure on the V45 actor-part cluster
  stops automatic version advancement. A pass permits a separately frozen
  ordinary-Codex diagnostic, but is not itself strict or held-out evidence.

fixed_configuration:
  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  compact_speaker_prompt: true
  compact_speaker_prompt_schema: machinespirits.tutor-stub.speaking-prompt.compact-no-source.v1
  source_accessibility_policy: direct_or_compensated_v1
  source_accessibility_schema: machinespirits.tutor-stub.source-accessibility-contract.v1
  development_codex_instructions_file: config/tutor-stub-codex-speaker-instructions.md
  draws_per_turn: 1
  concurrency: 1
  max_live_model_jobs: 1
  semantic_adjudication: false
  adjudication_policy: deterministic_only

preflight:
  world_quality: npm run derivation:quality
  focused_test_suites:
    - id: concrete_causal_performance_entry
      test_files:
        - tests/tutorStubFirstDraftContract.test.js
        - tests/tutorStubJointPerformanceFirstDraft.test.js
        - tests/tutorStubFrozenReplay.test.js
        - tests/tutorStubCompactSpeakingPrompt.test.js
        - tests/tutorStubRequestedEntryCausality.test.js
    - id: campaign_override_orchestration
      test_files:
        - tests/tutorStubFirstDraftCampaign.test.js
  structural_regression_fixtures:
    - tests/fixtures/tutor-stub-first-draft/tallow-answer-seeking-v27-i8-turn5.json
  model_free_fixtures:
    - tests/fixtures/tutor-stub-first-draft/greyfen-answer-seeking-v19.json
    - tests/fixtures/tutor-stub-first-draft/skyway-answer-seeking-v18.json
    - tests/fixtures/tutor-stub-first-draft/tallow-answer-seeking-v20.json
    - tests/fixtures/tutor-stub-first-draft/nocturne-answer-seeking-v22.json

artifacts:
  root: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-diagnostic-screens-v26
  one_campaign_validation_report: true
  separate_directory_per_cell: true
  qualitative_review_report: qualitative-causal-fidelity-review.json

execution:
  hardest_cell_first: true
  hard_cell: tallow_answer_seeking_concrete_performance_override_1
  hard_cell_must_pass_before_remaining: true
  mandatory_stage_dependency: true
  remaining_cells_execution: concurrent
  maximum_concurrent_remaining_cells: 1
  one_job_per_cell: true
  forbid_duplicate_active_or_completed_cells: true
  complete_all_cells_after_hard_cell_passes: true
  stop_cell_when_gate_mathematically_impossible: true
  preserve_unstarted_seeds_as_unconsumed: true
  require_exact_target_bundle_binding: true
  require_clean_worktree: true

matrix:
