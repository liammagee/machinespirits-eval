gates_per_cell:
  required_originals_accepted: 3
  required_turns: 4
  minimum_mean_configuration_realization: 0.9
  configuration_realization_enforcement: report_only
  maximum_safety_failures: 0
  maximum_fallbacks: 0
  require_transcript_specific_uptake: true

change_log:
  speaking_prompt: >-
    Collapse uptake and actorial work into one ordered opening-development-end
    contract. Bind counterpressure only to an exact non-question public target
    and an independent exact public or due evidence span. When that pair does
    not exist, record a transition to an evidentiary boundary while retaining
    the selected actorial part.
  recovery_only: >-
    Replace paired policy-and-plain recovery draws with one simplified
    public-only plain recovery call. Recovery remains disabled in this
    original-only screen.
  audit_recognition_only: >-
    Centralize issue-level guard dispositions, keep strict delivery as the
    default, record the proposed advisory boundary in shadow, and fail closed
    when a failed audit supplies no findings. Preserve exact counterpressure
    evidence while allowing scene, finding, and learner handoff to use any
    declared public evidence.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_cell_fails: true
  maximum_consecutive_iterations_without_improvement: 2

claim_boundary: >-
  Passing says only that one fresh tutor draw works on at least three of four
  frozen failed prefixes in each development screen. It is not held-out
  evidence and cannot replace a fresh strict end-to-end held-out acceptance.
