schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v15
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v14 completed all four cells and isolated one
  dominant fallback cluster: recovery candidates often expressed a valid
  public-scene action in natural language that the realization checks or
  recovery prompt did not recognize strongly enough. This matrix tests the
  coordinated recovery-cue and semantic-recognition repair only after strict
  working verification passed, using unseen seeds and four pairings absent
  from every earlier generalization matrix.

code_under_test:
  branch: preconscious
  commit: 7bc671d2
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i24-2026-07-15T22-50-44-231Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v14
  affected_seeds: [20260860, 20260861, 20260862, 20260863]
  reason: >-
    The complete v14 matrix was inspected before concrete recovery cues,
    does-or bounded choices, lock-ward exhibit actions, natural skeptical
    boundaries, and public-scene counterpressure were recognized. Its
    trajectories are tuning evidence and cannot be reused for acceptance.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: fengate_false_memory
    world: world_007_fengate
    learner_profile: false_memory
    seed: 20260870
    rationale: >-
      Tests correction of invented evidence in a period inquiry not previously
      paired with the false-memory learner.

  - id: tallow_fast
    world: world_025_tallow_street
    learner_profile: fast_learner
    seed: 20260871
    rationale: >-
      Tests accelerated uptake and rapid handoffs in a public-street inquiry
      not previously paired with the fast learner.

  - id: ravensmark_slow
    world: world_009_ravensmark
    learner_profile: slow_learner
    seed: 20260872
    rationale: >-
      Tests slower scaffolding, explicit choices, and material evidence in a
      setting not previously paired with the slow learner.

  - id: gazette_low_agency
    world: world_027_gazette_recall
    learner_profile: low_agency
    seed: 20260873
    rationale: >-
      Tests tutor-owned public choices and counterpressure in a contemporary
      records inquiry not previously paired with the low-agency learner.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired simulated
  scenario/profile combinations and evidence modalities; it does not establish
  population-wide generalization or human learning effectiveness.
