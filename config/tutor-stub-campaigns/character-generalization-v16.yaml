schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v16
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v15 passed three cells and its Fengate
  false-memory cell exposed two natural charismatic-counterpressure forms that
  the surface auditor undercounted. This matrix tests the coordinated semantic
  recognition repair only after strict working verification passed, using
  unseen seeds, four pairings absent from every earlier matrix, and no Fengate
  trajectory.

code_under_test:
  branch: preconscious
  commit: 16246863
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i25-2026-07-15T23-13-05-374Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v15
  affected_seeds: [20260870, 20260871, 20260872, 20260873]
  reason: >-
    The complete v15 matrix was inspected before public suspicion outrunning
    material evidence and a breakable case against a crowd verdict were
    recognized as charismatic counterpressure. Its trajectories are tuning
    evidence and cannot be reused for acceptance.

fixed_configuration:
