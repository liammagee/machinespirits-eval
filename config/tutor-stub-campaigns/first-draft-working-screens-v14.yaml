  required_turns: 4
  required_prefixes: 1
  required_draws_per_prefix: 4
  minimum_mean_configuration_realization: 1.0
  configuration_realization_enforcement: gate
  maximum_safety_failures: 0
  maximum_mechanical_repairs: 0
  maximum_model_rewrites: 0
  maximum_fallbacks: 0
  maximum_semantic_recognition_corrections: 0
  maximum_semantic_adjudicator_calls: 0
  maximum_semantic_adjudicator_errors: 0
  maximum_transport_normalizations: 0
  require_transcript_specific_uptake: true
  require_joint_performance_output: true
  require_joint_performance_ownership: true
  require_compact_speaker_prompt: true
  require_exact_host_source_occurrences: true
  require_source_surface_accessibility: true
  require_structural_target_activation: true
  require_deterministic_only_audit: true
  require_successful_semantic_adjudication_per_draw: false

qualitative_review:
  id: minutes_entry_public_causal_fidelity_strict_v1
  status: predeclared_required_for_tallow_draws
  scope: every_completed_tallow_answer_seeking_original_draw
  subject: model_owned_uptake_minutes_entry_after_write_prefix
  review_execution: external_post_generation_subagent_or_human_review
  reviewers_per_draw: 2
  independence: separate_contexts_without_cross_review_visibility
  automatic: false
  campaign_repair_call: false
  campaign_adjudication_call: false
  blinded_review_packet:
    includes_only:
      - exact_learner_request
      - public_evidence_window
      - exact_write_minutes_entry_sentence
    blind_to:
      - deterministic_audit_outcome
      - development_seed
      - other_candidate
      - other_reviewer_verdict_or_rationale
  verdicts: [pass, fail]
  pass_requires_all:
    - preserves_public_actors
    - preserves_public_causal_relation
    - preserves_public_polarity
    - does_not_reverse_cause_or_evidentiary_force
  evidence_required:
    - exact_minutes_entry_text
    - public_record_relation_and_polarity
    - brief_independent_verdict_rationale
  aggregation:
    required_passing_ratings: 2
    required_total_ratings: 2
    disagreement_outcome: fail
  storage:
    separate_from_automatic_status: true
    preserve_each_blinded_rating: true
  advancement:
    automatic_strict_pass_alone_sufficient: false
    require_two_recorded_passing_ratings_per_completed_tallow_draw: true
    held_out_acceptance_requires_automatic_and_qualitative_strict_pass: true

