schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-working-screens-v14
created: 2026-07-17
held_out: false
purpose: >-
  Separate post-V52 strict working confirmation after two fresh ordinary-Codex
  Tallow development originals passed every unchanged automatic gate and four
  independent blinded causal-fidelity reviews. Four exact, previously observed
  but non-held-out public prefixes span four worlds and three selected actorial
  parts. Every cell uses four fresh ordinary Codex CLI draws and must pass 4/4
  unchanged strict original, ownership, progression, configuration-realization,
  continuity, compact-provenance, and safety gates. The hardest Tallow
  answer-seeking cell runs first; only a complete pass permits the remaining
  three cells to run, with maximum concurrency three. The guarded
  model_instructions_file transport is disabled and acceptance-ineligible.
  Recovery, rewriting, fallback, semantic adjudication, and transport
  normalization remain disabled. This is strict working confirmation, not
  held-out acceptance.

