schema: machinespirits.tutor-stub.first-draft-generalization-plan.v1
id: first-draft-generalization-v23
created: 2026-07-17

purpose: >-
  Fresh held-out acceptance of the revised public-only speaking boundary after
  the V2 frozen-prefix development screen passed 12/12 original drafts. All
  four exact world/profile pairings and all seeds are absent from every prior
  tutor-stub campaign. The matrix tests whether first-draft uptake, character
  action, and handoff transfer across four production worlds without weakening
  delivery, clue, recovery, or safety gates.

code_under_test:
  branch: preconscious
  commit: fae0411d
  implementation_commit: 0c14c320
  acceptance_accounting_commit: fae0411d
  v22_result: notes/status/2026-07-16-first-draft-generalization-v22.md
  required_working_screen: >-
    The V2 frozen-prefix development screen passed Nocturne, Skyway, and
    Greyfen answer-seeking at 4/4 each: 12/12 strict originals, zero safety
    failures, zero uptake failures, zero repairs, zero rewrites, and zero
    fallbacks. See notes/status/2026-07-16-first-draft-working-screen-v2.md.

fixed_configuration:
  mode: strict
  turns: 10
  safety_turns: 80
  policy: continuous_dynamical_system
  register_palette: all
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  register_overlay_threshold: 0.7
  dag_fact_dropout: 0
  dag_fact_dropout_seed: 1
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

artifacts:
  dry_run_root: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-generalization-v23-dry-run
  live_root: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-generalization-v23-live
  separate_directory_per_cell: true

matrix:
  - id: marrick_answer_seeking
    priority: 1
    world: world_005_marrick
    learner_profile: answer_seeking
    seed: 20261120
    seed_provenance: unused_across_all_tutor_stub_campaigns_and_saved_artifacts
    rationale: >-
      Hard cell. Marrick's arcane mint language and long evidence chain test
      whether the tutor answers clarification requests concretely while making
      its selected part, action, and learner handoff visible.

  - id: fengate_premature_closure
    priority: 2
    world: world_007_fengate
    learner_profile: premature_closure
    seed: 20261121
    seed_provenance: unused_across_all_tutor_stub_campaigns_and_saved_artifacts
    rationale: >-
      Tests accountable resistance to an early accusation across a nine-clue
      quarantine inquiry, including contrary evidence and natural closure.

  - id: lantern_low_trust_skeptic
    priority: 3
    world: world_002_lantern
    learner_profile: low_trust_skeptic
    seed: 20261122
    seed_provenance: unused_across_all_tutor_stub_campaigns_and_saved_artifacts
    rationale: >-
      Tests transcript-specific uptake and public warrant handling in a maritime
      inquiry with several valid proof paths when the learner distrusts an
      asserted connection.

  - id: bitterwell_diligent
    priority: 4
    world: world_003_bitterwell
    learner_profile: diligent
    seed: 20261123
    seed_provenance: unused_across_all_tutor_stub_campaigns_and_saved_artifacts
    rationale: >-
      Tests ordinary first-draft fluency, character variation, and closure in a
      second multi-path period inquiry without a forced learner pathology.

strict_delivery_gates_per_cell:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  quarantine_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

first_draft_gates:
  minimum_accounted_turn_rate: 1
  minimum_aggregate_original_candidate_acceptance_rate: 0.7
  minimum_cell_original_candidate_acceptance_rate: 0.6
  maximum_aggregate_model_rewrite_rate: 0.3
  maximum_model_rewrite_turns_per_cell: 4
  maximum_total_deterministic_fallback_turns: 2
  require_all_four_cells: true

measurement_notes:
  original_acceptance: >-
    Count a strict original only when the delivered source is the original
    candidate and its selected actorial part and performance tactic are
    realized. Report ordinary safe original delivery separately. Do not use
    semantic adjudication or relabel a recovery as an accepted original.
  accounting: >-
    Require exactly 10 completed and guard-accounted turns per cell. Preserve
    original, mechanical repair, model rewrite, deterministic fallback, final
    safety failure, and quarantine as distinct outcomes.
  latency: >-
    Record original-candidate and whole tutor-generation latency for every
    cell. Contended wall-clock latency is descriptive, not an acceptance gate.
  failure_clusters: >-
    Preserve all candidate audits and consolidate repeated original, repair,
    and fallback failures by root cause.

change_control:
  maximum_concurrent_cells: 3
  one_job_per_cell: true
  hardest_cell_first: true
  stop_after_required_hard_cell_failure: true
  tune_between_cells: false
  modify_code_between_cells: false
  complete_all_cells_before_interpretation: false
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true
  reserve_seeds: [20261124, 20261125, 20261126, 20261127]

claim_boundary: >-
  Passing supports transfer of the revised first-draft speaking boundary across
  these four held-out simulated world/profile pairings under one fixed Codex
  model stack. It does not establish model-independent or human-population
  generalization, causal learning benefit, or contention-free latency.
