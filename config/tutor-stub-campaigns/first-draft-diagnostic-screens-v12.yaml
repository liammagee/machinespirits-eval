  audit_recognition_changes: []
  recovery_changes: []
  preflight_orchestration_changes:
    - run_outer_loop_governance_tests_separately_at_frozen_config_and_result_boundaries
    - exclude_outer_loop_governance_tests_from_reusable_speaking_compiler_preflight_certificate
  transport_changes: []
  safety_changes: []
  gate_changes: []
  delivery_audit_changes: []

structural_debt_targets:
  status: active_v32_target
  source: V31_safe_hard_cell_joint_ownership_failure
  items:
    - advocate_performance_initiation_as_concrete_public_proposition_with_same_entry_limit
    - declarative_stage_next_step_handoff_as_concrete_operation_on_named_public_object
  consequence: >-
    Diagnostic 1 must pass 1/1 at full configuration realization before
    diagnostic 2 starts; diagnostic 2 must then pass 1/1 under the same gates.
    Only both passes permit predeclaration of a separate strict V33 four-cell,
    four-draw screen. These are reusable development observations only.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_hard_cell_fails: true
  complete_all_cells_after_hard_cell_passes: true

claim_boundary: >-
  V32 passes only when two staged, independent one-draw diagnostics on the
  exact frozen Tallow prefix each deliver 1/1 strict originals at 1.0
  configuration realization, with zero safety failures, repairs, rewrites,
  fallbacks, adjudication, recognition correction, or normalization. Exact
  public SOURCE bytes, uptake, and joint ownership remain hard gates. V32 is
  diagnostic development evidence only: no strict four-cell/four-draw screen,
  held-out matrix, or acceptance claim is predeclared. Those begin at V33 only
  after both stages pass.
