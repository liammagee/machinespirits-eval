schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-diagnostic-screens-v12
created: 2026-07-17
held_out: false
purpose: >-
  V32 is a bounded two-stage diagnostic after V31's first hard Tallow draw was
  safe but failed advocate initiation and stage-next-step handoff ownership.
  Both stages reuse that exact frozen public prefix, saved tutor model and
  effort. Each generates one original only and must pass every unchanged
  deterministic safety, delivery, source, uptake, and ownership gate before
  the next stage may start. The only implementation change is the speaking
  realization committed at 10409158ce020860786ed47dc8f949611fc1b449.
  Recovery, adjudication, normalization, and held-out work remain disabled.
  A strict four-cell, four-draw screen is not predeclared in V32; it belongs to
  V33 only if both diagnostics pass. Outer-loop governance tests run separately
  at frozen config and result boundaries, so result-metadata-only commits can
  reuse the speaking/compiler preflight certificate.

