schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v14
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v13 passed three cells but its Bitterwell
  low-agency cell exposed two semantic-audit false positives: a concrete answer
  to a which-first choice was treated as generic uptake, and a prospective
  statement about where to trace water was treated as an asserted evidence
  correspondence. This matrix tests the coordinated repairs only after strict
  working verification passed, using four unseen seeds and four pairings absent
  from every earlier generalization matrix.

code_under_test:
  branch: preconscious
  commit: ba004170
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i23-2026-07-15T22-13-55-019Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v13
  affected_seeds: [20260850, 20260851, 20260852, 20260853]
  reason: >-
    The complete v13 matrix was inspected before direct choice uptake and
    prospective trace language were recognized correctly. Its trajectories
    are tuning evidence and cannot be reused as acceptance evidence.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: sealhouse_false_memory
    world: world_008_sealhouse
    learner_profile: false_memory
    seed: 20260860
    rationale: >-
      Tests correction of invented evidence in a compact period inquiry not
      previously paired with the false-memory learner.

  - id: bitterwell_fast
    world: world_003_bitterwell
    learner_profile: fast_learner
    seed: 20260861
    rationale: >-
      Returns to the physical watercourse domain under acceleration rather
      than the low-agency trajectory that informed the repair.

  - id: greyfen_slow
    world: world_023_greyfen_lab
    learner_profile: slow_learner
    seed: 20260862
    rationale: >-
      Tests slower pacing, public laboratory evidence, and character shifts in
      a contemporary technical setting not previously paired with this learner.

  - id: lantern_low_agency
    world: world_002_lantern
    learner_profile: low_agency
    seed: 20260863
    rationale: >-
      Directly retests tutor-owned choices and repeated which-first questions
      in a different branching investigation without reusing Bitterwell.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired scenario/profile
  combinations and evidence modalities; it does not establish population-wide
  generalization.
