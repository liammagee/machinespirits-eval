schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v7
created: 2026-07-15

purpose: >-
  Fresh post-audit-boundary acceptance matrix. This matrix tests whether
  possessive public names, authored source-role stems, ordinary actorial
  language, public evidence correspondence, and bounded tactic auditing
  generalize beyond every world and world/profile pairing observed in v6.

code_under_test:
  branch: preconscious
  commit: c5bf349579d23409a44b76aa8796ea5d67e891e9
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i15-2026-07-15T17-04-12-479Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v6
  affected_seeds: [20260780, 20260781, 20260782, 20260783]
  reason: >-
    The complete v6 matrix was inspected before possessive public-name
    normalization, descriptive source-role recovery, ordinary skeptic and
    scene-partner realization, public job-number attribution, and advisory
    performance-tactic auditing were implemented. Its four trajectories are
    tuning evidence and cannot be reused as acceptance evidence.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: gazette_false_memory
    world: world_027_gazette_recall
    learner_profile: false_memory
    seed: 20260790
    rationale: >-
      Newsroom provenance evidence with a learner who imports plausible but
      absent details; the world was previously paired only with skepticism.

  - id: sealhouse_fast
    world: world_008_sealhouse
    learner_profile: fast_learner
    seed: 20260791
    rationale: >-
      Selector-stress custody evidence with accelerated multi-premise uptake;
      this world/profile pairing is new to the generalization campaign.

  - id: fengate_slow
    world: world_007_fengate
    learner_profile: slow_learner
    seed: 20260792
    rationale: >-
      Selector-stress gate evidence with deliberately narrow clue integration;
      this world/profile pairing is new to the generalization campaign.

  - id: greyfen_low_agency
    world: world_023_greyfen_lab
    learner_profile: low_agency
    seed: 20260793
    rationale: >-
      Laboratory attribution evidence with a learner who delegates selection
      and wording; the world was previously paired only with fast learning.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four freshly paired scenario/profile
  combinations and evidence modalities; it does not establish population-wide
  generalization.
