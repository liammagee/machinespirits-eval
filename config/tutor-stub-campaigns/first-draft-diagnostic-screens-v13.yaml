schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-diagnostic-screens-v13
created: 2026-07-17
held_out: false
purpose: >-
  V33 is a fresh two-stage development diagnostic after V32 improved strict
  first-draft realization but failed one hyphenated turn-focus recognition and
  left separate causal wording debt in its minutes entry. Both stages reuse
  the exact frozen Tallow turn-5 public prefix, saved tutor model, and effort.
  Each generates exactly one original. Diagnostic 2 may start only after
  diagnostic 1 passes its unchanged automatic gates. Every draw also requires
  two independent blinded qualitative ratings of whether the Write: minutes
  entry preserves the public actors, causal relation, and polarity. Automatic
  strict success alone cannot authorize advancement. Recovery, safety, gates,
  adjudication, normalization, and held-out work remain unchanged or disabled.

fixed_configuration:
  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  source_accessibility_policy: direct_or_compensated_v1
  source_accessibility_schema: machinespirits.tutor-stub.source-accessibility-contract.v1
  draws_per_turn: 1
  concurrency: 1
  tutor_model_source: exact_v32_saved_request
  effort_source: exact_saved_request
  max_live_model_jobs: 1
  semantic_adjudication: false
  adjudication_policy: deterministic_only

