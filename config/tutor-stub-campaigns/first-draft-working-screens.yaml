schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-working-screens
created: 2026-07-16
held_out: false
purpose: >-
  Cheap development-only first-draft screening on frozen public prefixes from
  the two answer-seeking trajectories that defeated V18 and V19. These seeds
  are explicitly reusable development labels and can never certify held-out
  generalization.

fixed_configuration:
  original_only: true
  draws_per_turn: 1
  concurrency: 1
  tutor_model_source: exact_saved_request
  effort_source: exact_saved_request
  max_live_model_jobs: 3

preflight:
  world_quality: npm run derivation:quality
  focused_tests: >-
    node --test tests/tutorStubPromptAudit.test.js
    tests/derivationWorldQuality.test.js tests/tutorStubFrozenReplay.test.js
    tests/tutorStubFirstDraftContract.test.js
    tests/tutorStubResponseComposition.test.js
  model_free_fixtures:
    - tests/fixtures/tutor-stub-first-draft/greyfen-answer-seeking-v19.json
    - tests/fixtures/tutor-stub-first-draft/skyway-answer-seeking-v18.json

artifacts:
  root: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-working-screens
  one_campaign_validation_report: true
  separate_directory_per_cell: true

matrix:
  - id: greyfen_answer_seeking
    priority: 2
    world: world_023_greyfen_lab
    learner_profile: answer_seeking
    source_trace: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-generalization-v19-live/greyfen_answer_seeking/2026-07-16T05-50-54-528Z.jsonl
    turns: [2, 3, 7, 10]
    development_seed: 20261001
    seed_status: reusable_non_held_out_development

  - id: skyway_answer_seeking
    priority: 1
    world: world_026_skyway_bakery
    learner_profile: answer_seeking
    source_trace: /Users/lmagee/Dev/.tutor-stub-auto-eval/first-draft-generalization-v18-live/skyway_answer_seeking/2026-07-16T04-44-58-444Z.jsonl
    turns: [3, 4, 6, 7]
    development_seed: 20261002
    seed_status: reusable_non_held_out_development

gates_per_cell:
  required_originals_accepted: 3
  required_turns: 4
  maximum_safety_failures: 0
  maximum_fallbacks: 0
  require_transcript_specific_uptake: true

change_log:
  speaking_prompt: >-
    When the learner asks what to write, require one complete public sentence
    beginning with "Write:" before the selected dramatic beat. Require
    counterpressure to say explicitly that the named contrary evidence breaks
    the easy accusation, expected shortcut, or ready answer.
  recovery_only: >-
    Give answer-seeking repairs a direct-answer instruction and keep their
    alternate realization strategy separate from the first speaking draw.
  audit_recognition_only: >-
    Unchanged in this iteration. All safety, evidence, composition, and
    dramatic-realization gates remain unchanged.

stopping:
  stop_cell_when_gate_mathematically_impossible: true
  stop_campaign_when_required_cell_fails: true
  maximum_consecutive_iterations_without_improvement: 2

claim_boundary: >-
  Passing says only that one fresh tutor draw works on at least three of four
  frozen failed prefixes in each development screen. It is not held-out
  evidence and cannot replace strict end-to-end V20 acceptance.
