  development_codex_instructions_file: config/tutor-stub-codex-speaker-instructions.md
  draws_per_turn: 1
  concurrency: 1
  max_live_model_jobs: 1
  semantic_adjudication: false
  adjudication_policy: deterministic_only

change_control:
  speaking_prompt: unchanged_from_v47
  recovery: unchanged_strict_end_to_end_path_not_invoked
  audit_recognition: >-
    typed PERFORMANCE ENTRY retains the clue, pressure target, subject, and
    outcome head while PERFORMANCE RESPONSE owns the exact full causal tuple
  delivery_and_safety_gates: unchanged

