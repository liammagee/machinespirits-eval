schema: machinespirits.tutor-stub.first-draft-working-screen.v1
id: first-draft-diagnostic-screens-v28
created: 2026-07-17
held_out: false
purpose: >-
  V48 is a two-stage non-equivalent override diagnostic after the model-free
  V47 owner-bound audit reconciliation. The speaking prompt, recovery path,
  safety boundaries, compact request, and replacement instruction file are
  unchanged. PERFORMANCE ENTRY must identify the clue, pressure target,
  subject, and outcome head; PERFORMANCE RESPONSE owns the complete exact
  causal tuple. The second fresh draw may run only after the first passes every
  automatic gate. V47 remains failed and seed 20263700 remains retired.

fixed_configuration:
  original_only: true
  joint_performance_generation: true
  joint_performance_schema: machinespirits.tutor-stub.structured-first-draft.v2
  joint_performance_composition_schema: machinespirits.tutor-stub.structured-first-draft-composition.v2
  joint_performance_audit_schema: machinespirits.tutor-stub.structured-first-draft-joint-performance-audit.v2
  compact_speaker_prompt: true
