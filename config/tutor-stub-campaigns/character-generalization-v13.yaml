schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v13
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v12 exposed narrow semantic-audit failures for
  prospective evidence requirements, bounded imperative choices, natural
  scene-partner and skeptic performances, exhibit tilting, and short questions
  about newly staged evidence. This matrix tests the coordinated repairs only
  after strict working verification passed, using four unseen seeds and four
  scenario/profile pairings absent from every earlier generalization matrix.

code_under_test:
  branch: preconscious
  commit: 5ef69758
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i22-2026-07-15T21-34-43-124Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v12
  affected_seeds: [20260840, 20260841, 20260842, 20260843]
  reason: >-
    The complete v12 matrix was inspected before the coordinated semantic
    recovery repairs. Its trajectories are tuning evidence and cannot be
    reused as acceptance evidence.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: lantern_false_memory
    world: world_002_lantern
    learner_profile: false_memory
    seed: 20260850
    rationale: >-
      Tests correction of invented evidence in a period customs inquiry whose
      clue sources and vocabulary differ from the retired Nocturne trajectory.

  - id: gazette_fast
    world: world_027_gazette_recall
    learner_profile: fast_learner
    seed: 20260851
    rationale: >-
      Tests accelerated handoff and closure in the modern archival scenario
      that exposed the false short-question repetition audit under a different
      learner trajectory.

  - id: nocturne_slow
    world: world_001_nocturne
    learner_profile: slow_learner
    seed: 20260852
    rationale: >-
      Tests patient clue staging, bounded support, and natural character
      performance in a multi-path musical-attribution inquiry.

  - id: bitterwell_low_agency
    world: world_003_bitterwell
    learner_profile: low_agency
    seed: 20260853
    rationale: >-
      Tests explicit choices and tutor-owned forward motion in a new physical
      water-supply investigation without reusing the Withercombe trajectory.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired scenario/profile
  combinations and evidence modalities; it does not establish population-wide
  generalization.
