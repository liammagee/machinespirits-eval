purpose: >-
  Fresh post-recovery breadth verification. This matrix tests whether public
  possessive names remain inside the opening boundary, delegated learner moves
  receive concrete uptake, evidence modality changes the adaptive host part,
  and safe model recoveries keep deterministic fallback dependence bounded.

code_under_test:
  branch: preconscious
  commit: a5edf7865879c7bccbeb523e1840d8ed05c27f33
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i10-2026-07-15T14-46-57-705Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v4
  affected_seeds: [20260760, 20260761, 20260762, 20260763]
  reason: >-
    The complete v4 matrix was inspected before possessive public-token
    normalization, concrete delegated-choice uptake, character-versus-tactic
    measurement separation, and evidence-modality host selection were
    implemented. Its four trajectories are tuning evidence and cannot be
    reused as acceptance evidence.

fixed_configuration:
