  parallelism_per_cell: 1

matrix:
  - id: withercombe_false_memory
    world: world_004_withercombe
    learner_profile: false_memory
    seed: 20260770
    rationale: Period archival proof with a learner who imports plausible but absent evidence.

  - id: hethel_fast
    world: world_006_hethel
    learner_profile: fast_learner
    seed: 20260771
