strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly held-out scenario/profile
  combinations and proof shapes; it does not establish population-wide
  generalization.
