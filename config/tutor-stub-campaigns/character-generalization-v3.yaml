matrix:
  - id: newsroom_skeptic
    world: world_027_gazette_recall
    learner_profile: skeptical
    seed: 20260750
    rationale: Newsroom provenance inquiry with a warrant-demanding learner.

  - id: laboratory_fast
    world: world_023_greyfen_lab
