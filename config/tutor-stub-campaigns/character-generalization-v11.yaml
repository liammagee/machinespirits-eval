schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v11
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v10 exposed possessive answer-name
  normalization, voiced-verdict closure, and low-information future-token
  matching defects. This matrix tests the coordinated repairs after strict
  working verification passed, using four new seeds and four scenario/profile
  pairings not present in earlier matrices.

code_under_test:
  branch: preconscious
  commit: 116309cc
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i20-2026-07-15T20-04-15-526Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v10
  affected_seeds: [20260820, 20260821, 20260822, 20260823]
  reason: >-
    The complete v10 matrix was inspected before possessive public-name
    normalization, voiced-final-derivation assertion, and generic private-token
    filtering were implemented. Its four trajectories are tuning evidence and
    cannot be reused as acceptance evidence.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: skyway_false_memory
    world: world_026_skyway_bakery
    learner_profile: false_memory
    seed: 20260830
    rationale: >-
      A new pairing that directly retests the released proper name Piper's
      Gullet while also challenging the tutor to reject invented glide facts.

  - id: withercombe_fast
    world: world_004_withercombe
    learner_profile: fast_learner
    seed: 20260831
    rationale: >-
      A new pairing expected to reach a multi-premise verdict inside the fixed
      horizon, directly testing one-and-done terminal closure.

  - id: clockwork_slow
    world: world_021_clockwork_tribunal
    learner_profile: slow_learner
    seed: 20260832
    rationale: >-
      A new pairing that tests measured configuration visibility and future
      clue-token filtering under repeated requests for narrower steps.

  - id: sealhouse_low_agency
    world: world_008_sealhouse
    learner_profile: low_agency
    seed: 20260833
    rationale: >-
      A new pairing that tests repeated delegated choices and configured
      recovery in an archival custody inquiry.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired scenario/profile
  combinations and evidence modalities; it does not establish population-wide
  generalization.
