schema: machinespirits.tutor-stub.character-generalization-plan.v2
id: character-generalization-v17
created: 2026-07-15

purpose: >-
  Fresh acceptance matrix after v16 isolated two host-part realization misses
  in its Hethel false-memory cell. The repair now handles a purely stylistic
  missing-part failure mechanically against the already safe public response,
  rather than asking a recovery model to regenerate evidence-bearing content.
  This matrix follows a passing strict working verification and uses four
  previously unseen world/profile pairings and seeds.

code_under_test:
  branch: preconscious
  commit: c4772b9e
  strict_working_result: >-
    .tutor-stub-auto-eval/character-adaptation-loop/
    strict-working-primary-i26-2026-07-15T23-40-16-466Z/character-loop-result.md

prior_acceptance_retirement:
  matrix: character-generalization-v16
  affected_seeds: [20260880, 20260881, 20260882, 20260883]
  reason: >-
    The complete v16 matrix was inspected before isolated selected-host-part
    misses gained a public-only mechanical repair. Its trajectories are tuning
    evidence and cannot be reused for acceptance.

fixed_configuration:
  mode: strict
  turns: 10
  policy: continuous_dynamical_system
  dag_mode: defeasible_human_scaffold
  register_temperature: 0.15
  release_speed: 1
  tutor_model: codex.gpt-5.6-terra
  analysis_model: codex.gpt-5.6-sol
  learner_model: codex.gpt-5.6-terra
  cli_effort: low
  max_tokens: 4096
  history_turns: 4
  parallelism_per_cell: 1

matrix:
  - id: foxtrot_false_memory
    world: world_022_foxtrot_jukebox
    learner_profile: false_memory
    seed: 20260890
    rationale: >-
      Tests correction of invented evidence in a contemporary physical-media
      inquiry not previously paired with the false-memory learner.

  - id: ai_syllabus_fast
    world: world_016_ai_syllabus_af1
    learner_profile: fast_learner
    seed: 20260891
    rationale: >-
      Tests accelerated premise uptake in a non-detective AI curriculum not
      previously paired with the fast learner.

  - id: sealhouse_slow
    world: world_008_sealhouse
    learner_profile: slow_learner
    seed: 20260892
    rationale: >-
      Tests slower public scaffolding in a period administrative inquiry not
      previously paired with the slow learner.

  - id: hethel_resistant_low_agency
    world: world_010_hethel_resistant
    learner_profile: low_agency
    seed: 20260893
    rationale: >-
      Tests tutor-owned choices in a held-out resistant water inquiry whose
      scenario/profile combination has not appeared in an earlier matrix.

strict_gates:
  final_delivery_audit_failures: 0
  maximum_deterministic_fallback_turns: 1
  error_count: 0
  meta_performance_turns: 0
  role_stage_direction_turns: 0
  source_replacement_turns: 0
  duplicate_clue_delivery_turns: 0
  minimum_host_visibility_rate: 1
  minimum_mean_configuration_realization: 0.9
  minimum_distinct_host_parts: 2

change_control:
  maximum_concurrent_cells: 3
  one_job_per_cell: true
  tune_between_cells: false
  complete_all_cells_before_coordinated_fixes: true
  infrastructure_failure_may_retry_same_seed: true
  tuning_after_observation_retires_all_affected_seeds: true
  replacement_seeds_must_be_declared_before_rerun: true

claim_boundary: >-
  Passing supports transfer across these four newly paired simulated
  scenario/profile combinations, including one previously unused resistant
  scenario and a non-detective curriculum. It does not establish
  population-wide generalization or human learning effectiveness.
