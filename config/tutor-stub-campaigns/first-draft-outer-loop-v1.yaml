commit_boundaries:
  before_paid_working_call:
    - commit this outer-loop manifest and the exact working-screen config
    - commit any bounded prompt, recovery, or audit change with focused tests
    - record clean git HEAD and working-screen config hash
  before_first_paid_acceptance_call:
    - record the passing working result and separate recognition corrections from generation gains
    - commit a fresh Vn acceptance config in a separate predeclaration commit
    - validate global seed and world-profile freshness
    - require a clean worktree and freeze git HEAD and config hash
  after_acceptance:
    - commit only a result note with exact artifact paths and hashes
    - do not commit ignored generated model artifacts

claim_boundary: >-
  This manifest governs process integrity. A working-screen pass is reusable
  development evidence, not held-out evidence. Only an unchanged, fully
  predeclared acceptance version that passes every strict gate may terminate in
  accepted. V24, V25, and V26 stagnated before acceptance. V27 iteration 1 is
  reusable frozen-prefix development only; V28+ remain available if a
  development or held-out version fails.
