claim_boundary: >-
  This manifest governs process integrity. A working-screen pass is reusable
  development evidence, not held-out evidence. Only an unchanged, fully
  predeclared acceptance version that passes every strict gate may terminate in
  accepted. V24, V25, and V26 stagnated before acceptance. V27 iteration 1 was
  a safe 2/3 first measurement; iteration 2 improved configuration realization
  from 0.6667 to 0.9443 while remaining 2/3 and isolated typed composite-part
  ownership as the remaining semantic failure. Iteration 3 stopped after a
  transport-only outer-whitespace rejection, before that recognition could be
  exercised. Iteration 4 completed all four prefixes safely at 3/4 originals
  and 0.91675 configuration realization, leaving one contract-complete public
  judgment-falter construction unrecognized. Iteration 5 changed only that
  typed recognition but stopped on a scene-immersion false negative where the
  public world supplied “shillings” and PERFORMANCE used “shilling.” Iteration
  6 changed only world-general regular terminal-s number recognition and then
  safely reached 3/4 originals at 0.95825 configuration realization. Its sole
  failed turn contained three adjudicated typed-recognition false negatives:
  a licensed requested-entry answer plus a same-sentence public judgment
  meeting contrary evidence. Iteration 7 changed only those two deterministic
