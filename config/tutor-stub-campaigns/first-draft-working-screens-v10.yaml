purpose: >-
  V30 development screen after V29 stopped before every model call when the
  model-free corpus found one formerly accepted deterministic fallback that the
  typed progression audit now correctly rejects. This panel reuses the same
  four exact, uncontaminated public prefixes with fresh non-held-out labels. It
  keeps V29's speaking prompt and strict source-accessibility contract unchanged,
  repairs only deterministic recovery, records the saved audit rejection as an
  explicit recognition correction, and requires preflight failures to serialize
  complete zero-call results. It cannot certify held-out acceptance.

