  complete_all_cells_after_hard_cell_passes: true

claim_boundary: >-
  Passing requires 4/4 strict original joint-performance candidates and 1.0
  mean configuration realization in every one of four exact non-Marrick
  frozen cells, with zero safety failures, repairs, rewrites, fallbacks,
  semantic adjudicator calls or recognition corrections, and transport
  normalizations. Exact SOURCE bytes and ownership remain unchanged. The one
  dense Ravensmark source additionally requires an adjacent, declarative,
  source-grounded compensation in PERFORMANCE RESPONSE; direct sources must
  remain direct. The result is reusable V30 development evidence only. It does
  not reserve or consume any held-out seed and cannot terminate the outer loop.
