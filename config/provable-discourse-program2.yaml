version: 1
description: "Program-2 headline claims for Paper 2.0 §6.20–§6.22 — anchored to the checked-in adaptive-tutor-evidence manifests (artifact_json) and the 5b prereg ceiling annotation (code_path). Registered 2026-07-21 after an independent claim audit found no machine-checkable coverage for these sections."

claims:
  # ── §6.20 Phase 4: context-vs-weights fine-tune (program-2-phase4-results.manifest.json) ──

  - id: paper2.program2.phase4.instruct_tuned_0414
    epoch: "2.0"
    description: "§6.20 headline: tuned instruct arm reached 0.414 on held-out greedy grading."
    source_keys:
      - "stat|0|program-2 instruct tunedSFT 0.414"
    statement:
      pattern: "instruct arm reached \\*\\*0\\.414 against its 0\\.310 floor\\*\\*"
      flags: "i"
      min_occurrences: 1
    evidence:
      type: artifact_json
      file: config/adaptive-tutor-evidence/program-2-phase4-results.manifest.json
      path: heldoutGreedy.instruct.tunedSFT
    assertion:
      op: approx
      expected: 0.414
      tolerance_abs: 0.0005
    remediation:
      - "If the Phase 4 manifest changes, re-derive §6.20's instruct-arm rate and update paper + claim together."

  - id: paper2.program2.phase4.instruct_floor_0310
    epoch: "2.0"
    description: "§6.20 headline: instruct arm's same-lineage untuned floor is 0.310."
    source_keys:
      - "stat|0|program-2 instruct floor 0.310"
    statement:
      pattern: "against its 0\\.310 floor"
      flags: "i"
      min_occurrences: 1
