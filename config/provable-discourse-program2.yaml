      file: config/adaptive-tutor-evidence/program-2-phase4-results.manifest.json
      path: heldoutGreedy.instruct.floorSameLineage
    assertion:
      op: approx
      expected: 0.31
      tolerance_abs: 0.0005
    remediation:
      - "Floors are lineage-matched (§6.20's GGUF build-lineage fault); re-floor through the tuned model's own conversion pipeline before updating."

  - id: paper2.program2.phase4.composed_alone_0293
