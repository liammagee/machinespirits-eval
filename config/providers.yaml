# Shared AI Provider Configuration
# Used by both tutor-agents.yaml and evaluation-rubric.yaml
#
# Model IDs are current as of February 2026. Update when new models release.

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1/messages
    default_model: claude-sonnet-4-5
    models:
      haiku: claude-haiku-4-5
      sonnet: claude-sonnet-4-5
      opus: claude-opus-4-6

  # Spawns the local `claude` CLI as a subprocess and uses the user's Claude
  # Code subscription. No API key required; isConfigured is forced true via
  # evalConfigLoader. Use as judge model `claude-code.sonnet` etc.
  #
  # Model aliases are pinned to explicit version IDs so the judge model
  # doesn't drift if the CLI's bare `sonnet` default changes in a future
  # release. The CLI accepts both bare aliases (`sonnet`) and explicit IDs
  # (`claude-sonnet-4-6`); we send explicit IDs for reproducibility.
  claude-code:
    default_model: claude-sonnet-4-6
    models:
      haiku: claude-haiku-4-5
      sonnet: claude-sonnet-4-6
      opus: claude-opus-4-6
      opus-4-8: claude-opus-4-8
      sonnet-4-5: claude-sonnet-4-5
      sonnet-4-6: claude-sonnet-4-6

  # Spawns the local `codex` CLI as a subprocess and uses the user's Codex
  # login. No OpenRouter/OpenAI API key is required. Intended for high-powered
  # eval slices where local CLI routing is part of the experimental condition.
  codex:
    default_model: gpt-5.5
    models:
      gpt-5.5: gpt-5.5
      gpt-5.2-codex: gpt-5.2-codex

  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1/chat/completions
    default_model: gpt-5-mini
    models:
      mini: gpt-5-mini
      standard: gpt-5.2
      gpt_5_2: gpt-5.5

  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1/chat/completions
    default_model: nvidia/nemotron-3-nano-30b-a3b
    # default_model: nvidia/nemotron-3-nano-30b-a3b:free
    models:
      # Budget-friendly options
      nemotron: nvidia/nemotron-3-nano-30b-a3b
      nemotron-ultra: nvidia/nemotron-3-ultra-550b-a55b
      # nemotron-ultra: nvidia/nemotron-3-ultra-550b-a55b:free
      glm47: z-ai/glm-4.7
      glm5: z-ai/glm-5
      glm5_2: z-ai/glm-5.2
      kimi-k2: moonshotai/kimi-k2-thinking
      "kimi-k2.5": moonshotai/kimi-k2.5
      kimi-latest: ~moonshotai/kimi-latest
      deepseek: deepseek/deepseek-v3.2
      deepseek-v4-pro: deepseek/deepseek-v4-pro
      deepseek-v4-flash: deepseek/deepseek-v4-flash
      minimax: minimax/minimax-m2.5
      minimax_m3: minimax/minimax-m3
      haiku: anthropic/claude-haiku-4.5
      gpt-oss: openai/gpt-oss-120b
      qwen3.5-plus: qwen/qwen3.5-plus-02-15
      qwen3.5: qwen/qwen3.5-397b-a17b
      qwen3_7_plus: qwen/qwen3.7-plus
      gemini-flash: google/gemini-3-flash-preview
      gemini-flash-3.1: google/gemini-3.1-flash-lite-preview
      # Mid-tier options
      sonnet: anthropic/claude-sonnet-4.6
      sonnet-5: anthropic/claude-sonnet-5
      gpt-mini: openai/gpt-5-mini
      # Premium options
      opus: anthropic/claude-opus-4.6
      gpt: openai/gpt-5.2
      gpt-5.4: openai/gpt-5.4
      gpt-5.4-pro: openai/gpt-5.4-pro
      gemini-pro: google/gemini-3-pro-preview
      gemini-pro-3.1: google/gemini-3.1-pro-preview

  gemini:
    api_key_env: GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/models
    default_model: gemini-3-flash-preview
    models:
      flash: gemini-3-flash-preview
      pro: gemini-3-pro-preview

  local:
    base_url: http://localhost:1234/v1/chat/completions
    format: openai
    default_model: local-model
    models:
      default: local-model

  lmstudio:
    base_url: http://127.0.0.1:1234/v1/chat/completions
    format: openai
    default_model: qwen3-14b
    context_length: 4096
    models:
      default: qwen3.5-9b
      qwen3.5-4b: qwen3.5-4b
      qwen3.5-9b: qwen3.5-9b
      qwen3-14b: qwen3-14b
      qwen3-vl-4b: qwen/qwen3-vl-4b
      qwen3-vl-8b: qwen/qwen3-vl-8b
      gemma-12b: gemma-3-12b-it
      deepseek-14b: deepseek-r1-distill-qwen-14b
      gpt-oss-20b: openai/gpt-oss-20b
