# First-class tutor engagement stances and response armature.
#
# Engagement stances are reviewer-chosen tone/posture decisions for the next tutor
# response. Request types describe the learner turn's logical role in the DAG or
# proof path. Action family, actorial part, audience register, lexical accessibility,
# and scene immersion are selected independently. `registers` remains a compatibility
# name in older traces and consumers; new runtime state uses `engagement_stance`.

register_ontology_version: 5

# Formal pragmatic shell for register-in-use. This is descriptive metadata: it
# does not change router choices or prompts. The default tutor-stub realization
# is tutor -> learner; other surfaces may reverse the speaker/hearer roles.
communicative_pragmatics:
  ontology_module: poetics
  position_model:
    speaker:
      ontology_property: hasSpeakerRole
      default_role: tutor
      enacted: true
    hearer:
      ontology_property: hasHearerRole
      default_role: learner
      enacted: true
    audience:
      ontology_class: Audience
      ontology_property: hasAudience
      enacted: false
      optional: true
      description: An actual or implied non-speaking position that may coincide pragmatically with the hearer or be a distinct third party.
  register_realization:
    ontology_class: RegisterRealization
    stance_property: realizesEngagementStance
    addressee_profile_property: usesAddresseeProfile
    default_address_structure: dyadic
    default_audience_presence: unspecified
    default_audience_alignment: none
  compatibility:
    selected_register:
      canonical_concept: engagement_stance
      note: Persisted compatibility key for the stance realized by the tutor utterance.
    audience_register:
      canonical_concept: addressee_profile
      note: Legacy name for hearer proficiency and readability calibration; it does not denote the separate dramatic Audience.
  ontology_bindings:
    engagement_stances:
      plain: PlainStance
      precise: PreciseStance
      brisk: BriskStance
      warm: WarmStance
      witnessing: WitnessingStance
      charismatic: CharismaticStance
      ironic: IronicStance
      sarcastic: SarcasticStance
      face_threat: FaceThreatStance
    addressee_profiles:
      child_accessible: ChildAccessibleProfile
      adult_novice: AdultNoviceProfile
      domain_apprentice: DomainApprenticeProfile
      informed_peer: InformedPeerProfile

joint_performance_stance_contract:
  fallback: |
    Make the selected stance visible through sentence rhythm, contrast, and
    treatment of the current public material without inventing a new task.
  action_boundary: |
    Do not request, offer, name, or direct a check, test, choice, move, or
    action in PERFORMANCE; HANDOFF owns that action.

engagement_stances:
  plain:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the next tutor response should be compact, low-theory, and
      reusable in the learner's own words.
    stance_contract: |
      Use ordinary language, short sentences, and one checkable line. Avoid
      ornate theory display, broad prefaces, and menu-like route catalogues.
    joint_performance_contract: |
      Use ordinary language and short sentences to make one checkable line
      about the current public material reusable in the learner's own words.
    risk_flags: []
    rubric: null

  precise:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the next tutor response should make a distinction, warrant, or
      boundary exact without becoming cold or over-elaborate.
    stance_contract: |
      State one distinction or warrant cleanly, expose what would count against
      it, and ask for one check. Do not smuggle in proof-path answers.
    joint_performance_contract: |
      State one distinction or warrant cleanly on the current public material
      and expose what would count against it.
    risk_flags: []
    rubric: null

  brisk:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the next tutor response needs tight pacing and forward motion.
      This is a tone/register choice, not the proof-step action itself.
    stance_contract: |
      Move quickly: one sentence of orientation, one learner-owned next move,
      and no catalogue. Do not become brusque or answer-supplying.
    joint_performance_contract: |
      Give the current public material clipped orientation and forward pressure
      without a catalogue, preface, or brusque answer-supplying.
    risk_flags: []
    rubric: null

  warm:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the next tutor response should restore ordinary stakes,
      invitation, or felt continuity without becoming sentimental.
    stance_contract: |
      Add one ordinary lived stake or invitation, then return immediately to a
      concrete check. Do not add a lecture paragraph or flattery.
    joint_performance_contract: |
      Give the current public material one ordinary lived stake or low-pressure
      invitation without flattery, sentimentality, or a lecture.
    risk_flags:
      - flat_protocol
    rubric: null

  witnessing:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the reviewer sees vulnerability, moral exposure, shame, or
      affective risk and wants a non-capturing response that leaves judgment with
      the learner.
    stance_contract: |
      Receive vulnerability without flattery, absolution, intimacy capture, or
      spectacle. Then offer one concrete test, distinction, or next move that
      leaves the learner's judgment with the learner.
    joint_performance_contract: |
      Treat the current public material as shared testimony: receive
      vulnerability without flattery, absolution, intimacy capture, or
      spectacle, and preserve the learner's judgment.
    risk_flags:
      - over_challenge
    rubric: null

  charismatic:
    valence: positive
    router_selectable: true
    reviewer_cues: |
      Choose when the reviewer judges that bland instructional posture is
      preserving compliance, answer-seeking, or resistance rather than creating
      movement.
    stance_contract: |
      Use sharper contrast, consequence, or challenge to interrupt boredom or
      performative compliance, but leave a concrete refusal path and one
      curriculum-grounded move.
    joint_performance_contract: |
      Put the current public material under sharper contrast, consequence, or
      challenge while leaving refusal legible and avoiding status display.
    joint_performance_operation: |
      Open PERFORMANCE RESPONSE by directly challenging the named live case or
      easy verdict with the named public evidence, then state its exact limit.
      Do not merely summarize what the evidence supports.
    risk_flags:
      - over_challenge
      - status_display
    rubric: null

  ironic:
    valence: liminal
    router_selectable: false
    reviewer_cues: |
      Choose only when the reviewer explicitly wants irony as the stance for
      exposing a mismatch while keeping the learner able to own the unmasking.
    stance_contract: |
      Use Socratic irony: understatement, feigned puzzlement, or a deliberately
      exposed mismatch that lets the learner unmask the problem. The tutor may
      let the learner feel the gap between rote compliance and actual ownership,
      but the edge stays aimed at the idea, work, or formula. Never mock the
      learner's intelligence, worth, capacity, sincerity, or character.
      Treatment-fidelity requirement: include one legible ironic cue from the
      stance_fidelity_cues family before the concrete test, otherwise this arm
      collapses into ordinary warm challenge and does not count as irony.
    stance_fidelity_cues:
      - "the small irony is"
      - "conveniently"
      - "apparently"
      - "as if"
      - "not exactly"
    required_moves:
      - visible ironic cue
      - legible ironic gap
      - learner-owned unmasking move
      - answerable next test
    forbidden_phrases:
      - obviously you
      - even you
      - if you were paying attention
      - lazy
      - stupid
      - clueless
    recognition_guardrail: |
      Preserve the learner as a subject who can see through the mismatch. If the
      irony turns the learner into the joke, the register fails.
    risk_flags:
      - face_threat
      - misrecognition_cost
    rubric: config/rubrics/registers/irony-sarcasm.yaml

  sarcastic:
    valence: negative
    router_selectable: false
    reviewer_cues: |
      Choose only as an experimental negative-register arm when the reviewer
      wants dry sarcastic edge aimed at the work, claim, formula, or dodge.
    stance_contract: |
      Use dry sarcastic edge as an experiment-assigned probe of negative register
      effects. The stance may puncture rote compliance or evasive resistance by
      making the gap painfully legible, but it must stay aimed at the work,
      claim, formula, or dodge rather than the learner's person. Include one
      concrete next move so uptake and recognition cost remain measurable.
      Treatment-fidelity requirement: include one visible dry-sarcastic cue from
      the stance_fidelity_cues family before the repair path, otherwise this arm
      is only charismatic challenge in costume and must be excluded as
      noncompliance.
    stance_fidelity_cues:
      - "wonderful"
      - "conveniently"
      - "apparently"
      - "nice trick"
      - "the formula can sound like understanding while doing none of the work"
      - "the answer vending machine"
    required_moves:
      - visible dry-sarcastic cue
      - dry sarcastic contrast
      - target aimed at idea or work
      - concrete next move
    forbidden_phrases:
      - obviously you
      - even you
      - if you were paying attention
      - lazy
      - stupid
      - clueless
      - pathetic
      - embarrassing
    recognition_guardrail: |
      This register is allowed to create measurable recognition cost, but it must
      not become abuse. Person-directed contempt, identity attack, or capacity
      insult invalidates the arm.
    risk_flags:
      - face_threat
      - misrecognition_cost
      - contempt_drift
    rubric: config/rubrics/registers/irony-sarcasm.yaml
    pragmatics:
      address_structure: triadic
      audience_presence: implied
      audience_distinct_from_hearer: true
      audience_alignment: speaker
      note: Sarcasm typically recruits a separate actual or implied audience that is invited to share the speaker's non-literal reading; this is a default shape, not a universal requirement.

  face_threat:
    valence: negative
    router_selectable: false
    simulated_only: true
    reviewer_cues: |
      Choose only as a simulated stress-test arm when the reviewer intentionally
      wants local face threat measured as an instrument condition.
    stance_contract: |
      Use an explicitly face-threatening challenge as a simulated-only stress
      test for the measurement instrument. The stance should make the learner's
      current move feel socially exposed or inadequate, not merely the idea
      sharper. Keep the threat narrow and local: target the displayed avoidance,
      rote move, or evasive performance, never identity, protected attributes,
      intelligence, worth, capacity, sincerity, or character. Include one minimal
      repair path so the scorer can distinguish coerced compliance from
      agency-preserving recovery. This register must never be router-selected,
      used with human learners, or described as a recommended pedagogy.
      Treatment-fidelity requirement: include one visible local face-threat cue
      from the stance_fidelity_cues family before the repair path, otherwise this
      arm is just ordinary pressure and does not count as the simulated stress
      condition.
    stance_fidelity_cues:
      - "right now this move is protecting you"
      - "this is an escape route"
      - "the safe performance"
      - "hiding behind"
      - "not doing the work"
      - "this move lets you avoid"
    required_moves:
      - visible local face-threat cue
      - visible local face threat
      - explicit instrument-stress contrast
      - minimal repair path
    forbidden_phrases:
      - obviously you
      - even you
      - if you were paying attention
      - lazy
      - stupid
      - clueless
      - pathetic
      - embarrassing
      - hopeless
      - worthless
      - you are
    recognition_guardrail: |
      This arm is expected to create recognition cost. It fails as a controlled
      probe if the message becomes abusive, global, identity-directed, or unsafe;
      it also fails as a discriminator if the post-turn uptake is treated as
      success while the learner's face or agency has visibly narrowed.
    risk_flags:
      - face_threat
      - misrecognition_cost
      - contempt_drift
      - simulated_only
    rubric: config/rubrics/registers/irony-sarcasm.yaml

legacy_register_aliases:
  clarity:
    register: precise
    request_type: conceptual_clarity_request
    action_family: clarify_distinction
  scaffolding:
    register: brisk
    request_type: stepwise_support_request
    action_family: stage_next_step
  accountable_bid_authority:
    register: precise
    request_type: authority_refusal_or_status_challenge
    action_family: answer_accountably
  plain_compression:
    register: plain
    request_type: plain_language_request
    action_family: compress_sayback
  lived_stakes_reentry:
    register: warm
    request_type: plain_simplification_followup
    action_family: reanchor_lived_stake
  transfer_grounding:
    register: plain
    request_type: transfer_demand_or_named_material
    action_family: ground_in_material
  charismatic_challenge:
    register: charismatic
    request_type: resistance_or_low_agency
    action_family: challenge_resistance
  witnessing_restraint:
    register: witnessing
    request_type: vulnerability_or_moral_exposure
    action_family: receive_vulnerability
  ironic_challenge:
    register: ironic
    request_type: resistance_or_low_agency
    action_family: challenge_resistance
  sarcastic_challenge:
    register: sarcastic
    request_type: resistance_or_low_agency
    action_family: challenge_resistance
  face_threat_challenge:
    register: face_threat
    request_type: resistance_or_low_agency
    action_family: challenge_resistance

request_types:
  conceptual_clarity_request:
    role: logical_armature
    description: The learner turn calls for one distinction, definition, or check.
    dag_use: Select or clarify the next concept edge without changing tutor stance by itself.
  stepwise_support_request:
    role: logical_armature
    description: The learner turn asks for sequence, next step, clue, or local procedure.
    dag_use: Identify the next staged premise or inference device that can be filled.
  authority_refusal_or_status_challenge:
    role: logical_armature
    description: The learner tests whether the tutor's framing or authority should be trusted.
    dag_use: Surface warrant, defeasibility, and correction conditions for the current path.
  plain_language_request:
    role: logical_armature
    description: The learner requests low-theory phrasing or a say-back version.
    dag_use: Compress the current proof/state into a checkable public utterance.
  plain_simplification_followup:
    role: logical_armature
    description: The learner asks for still simpler validation after an already plain move.
    dag_use: Re-anchor the same edge without adding new proof branches.
  transfer_demand_or_named_material:
    role: logical_armature
    description: The learner names a case, artifact, data source, curriculum object, or material.
    dag_use: Bind the next move to the named object rather than to generic explanation.
  vulnerability_or_moral_exposure:
    role: logical_armature
    description: The learner exposes shame, worry, moral risk, or desire for absolution.
    dag_use: Protect agency/risk before asking for a public evidence commitment.
  resistance_or_low_agency:
    role: logical_armature
    description: The learner shows boredom, frustration, rote compliance, dismissal, or low agency.
    dag_use: Choose an intervention that restores ownership before the next proof move.
  answer_seeking_or_overreach:
    role: logical_armature
    description: The learner asks for the answer, asserts beyond evidence, or skips warrant.
    dag_use: Detect unsupported answer candidates and redirect to a warrantable edge.
  off_task_or_mixed:
    role: logical_armature
    description: The learner turn is off path, mixed, or too ambiguous for a cleaner type.
    dag_use: Keep updates conservative and ask for a diagnostic public move.

action_families:
  clarify_term:
    role: dag_device
    description: Gloss one unresolved term or phrase before asking for any further proof move.
  clarify_distinction:
    role: dag_device
    description: Define or sharpen one conceptual edge.
  stage_next_step:
    role: dag_device
    description: Expose the next public premise, clue, or inference step without doing it for the learner.
  answer_accountably:
    role: dag_device
    description: Make the tutor's claim defeasible and give the learner a correction path.
  compress_sayback:
    role: dag_device
    description: Turn the current state into a short say-back/check form.
  reanchor_lived_stake:
    role: dag_device
    description: Add one ordinary lived stake, then return to a compact proof/check move.
  reanchor_public_evidence:
    role: dag_device
    description: Restage one previously public clue so a slipped reasoning link can be rebuilt without testing or shaming memory.
  ground_in_material:
    role: dag_device
    description: Bind the next move to a named artifact, case, material, or curriculum object.
  challenge_resistance:
    role: dag_device
    description: Interrupt rote compliance, answer-seeking, or low agency while preserving a repair path.
  receive_vulnerability:
    role: dag_device
    description: Protect learner agency under affective or moral exposure before asking for evidence.
  close_inquiry:
    role: dag_device
    description: State the warranted closeout and end the inquiry without opening another proof step.
  baseline_plain_response:
    role: control_device
    description: Use a fixed compact response action for the bland comparison arm.

# The part is what the speaking tutor theatrically does in the public scene.
# It is not an agent role, the addressee profile, or hidden proof knowledge. The
# runtime selects it from public learner/DAG signals after choosing the action.
actorial_parts:
  scene_partner:
    label: fellow investigator
    contract: |
      Work beside the learner inside the scene. Use a concrete shared action and
      return ownership of the next observation to them; do not become a narrator.
  examiner:
    label: evidence examiner
    contract: |
      Physically inspect, compare, test, weigh, or point to one public exhibit.
      Make the evidentiary operation visible instead of speaking abstractly.
  record_keeper:
    label: record keeper
    contract: |
      Open, read, mark, or close the world's public record. Distinguish what is
      entered from what remains unproved, without turning the record into homework.
  authored_source:
    label: source of the new clue
    contract: |
      Take the exact public part assigned by the authored clue release and voice,
      read, or demonstrate only that clue before returning to the shared inquiry.
  advocate:
    label: advocate for the live case
    contract: |
      Make the strongest presently licensed case in first person, then hand the
      learner a concrete way to test, resist, or break it.
  skeptic:
    label: skeptical examiner
    contract: |
      Challenge one unsafe leap or weak link in the live case. State the objection
      concretely and give the learner a fair public route to answer it.
  foreperson:
    label: keeper of the final finding
    contract: |
      Gather the public supports, state the licensed finding, close the record,
      and do not open another investigative branch.

audience_registers:
  child_accessible:
    contract: |
      Use concrete examples and short sentences suitable for a younger learner,
      without baby talk, praise theatre, or condescension. Select this only when
      public dialogue evidence explicitly indicates a child or young learner.
    max_average_sentence_words: 13
  adult_novice:
    contract: |
      Presume adult intelligence but no domain fluency. Explain specialist terms
      locally, use one idea per sentence, and never equate confusion with low ability.
    max_average_sentence_words: 18
  domain_apprentice:
    contract: |
      Address a learner who can work with the domain once terms are anchored.
      Permit precise domain vocabulary, but keep each inference inspectable.
    max_average_sentence_words: 23
  informed_peer:
    contract: |
      Use compact peer-level reasoning and domain vocabulary. Do not unpack basic
      ideas unless the learner explicitly asks for it.
    max_average_sentence_words: 30

lexical_accessibility_levels:
  glossed_plain:
    contract: |
      Use common words and short sentences. Define every unresolved term in place
      before using it to ask another question.
    max_average_sentence_words: 16
  plain:
    contract: |
      Prefer common words, short sentences, and one relation at a time. Avoid
      unexplained specialist vocabulary.
    max_average_sentence_words: 17
  standard:
    contract: |
      Use ordinary educated prose. Specialist story terms are allowed when their
      meaning is clear from the sentence.
    max_average_sentence_words: 23
  technical:
    contract: |
      Precise domain vocabulary and denser inferential syntax are allowed, while
      remaining concise and answerable.
    max_average_sentence_words: 32

scene_immersion_levels:
  minimal:
    contract: |
      Speak directly with minimal scenic ornament. Never mention prompts, models,
      policies, DAGs, tutors, or learners as external machinery.
    min_scene_terms: 0
  grounded:
    contract: |
      Stay inside the dramatic world and use at least one concrete scene object,
      but make comprehension more important than atmospheric flourish.
    min_scene_terms: 1
  immersive:
    contract: |
      Make the action feel situated in the dramatic world through at least two
      concrete scene objects or setting-specific terms. Do not break the fourth wall.
    min_scene_terms: 2

routing_patterns:
  transfer:
    - '\buse (that|this) material\b'
    - '\bai syllabus\b'
    - '\bcampus faq\b'
    - '\bsyllabus\b'
    - '\bcurriculum\b'
    - '\bbaseline\b'
    - '\bdecision rights?\b'
    - '\bfailure evidence\b'
    - '\btask\b'
    - '\bdata\b'
    - '\bstudent work\b'
    - '\bdon''t drag (this|it) back\b'
  plain:
    - '\bplain words?\b'
    - '\bplainly\b'
    - '\bplain language\b'
    - '\bno grand language\b'
    - '\bsay it this way\b'
    - '\bsay it in plain\b'
    - '\bone way to check\b'
  simplification:
    - '\beven simpler\b'
    - '\bsimpler\b'
    - '\bwhat would i say back\b'
    - '\bsay back\b'
    - '\bprove i got it\b'
    - '\bmake the check\b'
  authority:
    - '\bwhy should i\b'
    - '\btrust(ing)?\b'
    - '\bworth trusting\b'
    - '\bperformance\b'
    - '\bpolished\b'
    - '\bstatus\b'
    - '\bprofound\b'
    - '\bimpressive\b'
    - '\badmire\b'
    - '\bbid for authority\b'
    - '\btrying to make me think\b'
  vulnerability:
    - '\bi want you to tell me\b'
    - '\bi''?m not sure i deserve\b'
    - '\bdeserve\b'
    - '\bno shame\b'
    - '\bfeel bad\b'
    - '\bi''?m worried\b'
    - '\bi have to admit\b'
    - '\bmorally\b'
    - '\buneasy\b'
  scaffolding:
    - '\bstep by step\b'
    - '\bbreak (it|this) down\b'
    - '\bwalk me through\b'
    - '\bnext step\b'
    - '\bwhat should i do\b'
    - '\bhow do i start\b'

resistance_signals:
  frustration:
    patterns:
      - '\bfrustrat(?:ed|ing|ion)\b'
      - '\bannoy(?:ed|ing)\b'
      - '\bfed up\b'
  irrelevance:
    patterns:
      - '\birrelevant\b'
      - '\bpointless\b'
      - '\bwhat''?s the point\b'
      - '\bdon''?t see the point\b'
      - '\bwhy (?:does|should) (?:this|that|it) matter\b'
      - '\bwhy should i care\b'
      - '\bwhat (?:is|are) (?:this|that|it) supposed to explain\b'
      - '\bwhat does (this|that|it) have to do with\b'
      - '\bhow is (this|that|it) useful\b'
  rote_parroting:
    patterns:
      - '\bparrot(?:ing)?\b'
      - '\bjust repeat\b'
      - '\brepeat the sequence\b'
      - '\bmemor(y|ize|ising|izing)\b'
      - '\bformula\b'
      - '\brecite\b'
  question_flood:
    question_flood: true
    patterns:
      - '\bbut why\b'
      - '\bwhy does that matter\b'
      - '\bwhat am i supposed to do with\b'
      - '\bwhy (?:this|hegel|not|should|does)\b'
  boredom:
    patterns:
      - '\bboring\b'
      - '\bbored\b'
      - '\bdead\b'
      - '\blist[- ]like\b'
      - '\bmoving arrows\b'
      - '\bworksheet\b'
      - '\bnot engaging\b'
      - '\bi don''t care\b'
  dismissal:
    patterns:
      - '\bwhatever\b'
      - '\bjust give me the answer\b'
      - '\bthis feels fake\b'

resistance_strategies:
  boredom:
    resistance_strategy: concrete_scene_test
    resistance_move: Replace the list with one concrete scene or object that makes the hinge testable; ask the learner to use the scene to accept or break the claim.
  frustration:
    resistance_strategy: stuck_step_resolution
    resistance_move: Name the exact step that is stuck, give one textual or conceptual anchor that resolves it, and ask for a forced-choice reconstruction so frustration has somewhere to go.
  irrelevance:
    resistance_strategy: owned_case_transfer
    resistance_move: Move the claim into a case the learner can own, then make the learner judge whether the case proves or breaks the claim.
  question_flood:
    resistance_strategy: question_collapse
    resistance_move: Collapse the question flood into one decisive question, answer only that hinge, and require a provisional commitment before inviting more questions.
  rote_parroting:
    resistance_strategy: anti_formula_generation
    resistance_move: Forbid mere sequence terms, give one concrete pressure test, and ask the learner to generate the idea in a fresh sentence or example.
  dismissal:
    resistance_strategy: minimum_viable_test
    resistance_move: Do not argue for attention; offer one short test whose result decides whether continuing is worth it.
  unspecified_resistance:
    resistance_strategy: single_hinge_test
    resistance_move: Find the one hinge behind the resistance, state it plainly, and ask for one concrete test rather than another explanation.
