        - learner first grants the old vividness warrant enough for it to be a live public error
        - learner later distinguishes vividness or quote form from the evidence role required by the claim
      anti_conditions:
        - learner already fully states the role-specific warrant before trying the vivid quote
        - the vivid quote directly supports the same relation named by the claim
      repair_type: name_warrant
    plausible_repairs:
