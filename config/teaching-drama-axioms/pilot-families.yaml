meta:
  schema_version: teaching-drama-axiom-families-v0.1
  protocol_id: A19
  protocol_version: a19-drama-axiom-transfer-v0.1
  prompt_version: a19-fixture-v0.1
  source_plan: notes/adaptive_2_0/teaching_drama_learning_plan.html
  fixture_only: true
  no_model_calls: true

families:
  - family_id: counter_warrant_scope
    title: Counter-warrant mistaken as confusion
    domain: philosophy_argument
    learner_resistance_type: counter_warrant
    tutor_infelicity_type: validation_without_engagement
    training_seed:
      seed_id: counter_warrant_scope_seed
      public_setup: >-
        The learner objects that the example still works under a narrower
        condition, but the tutor treats the objection as confusion.
      learner_resistance: >-
        I am not confused about the example. I am saying your rule only works
        when the exception is absent.
      expected_failure: validation_without_engagement
      old_rule_decoy: validate_then_redirect
    target_policy:
      policy_id: scope_test_before_redirect
      trigger: learner offers a counter-warrant rather than a request for reassurance
      avoid_move: validate the learner and return to the planned explanation
      preferred_move: revoice the warrant, ask a scope test, then introduce a complication
      applicability_conditions:
        - learner offers a substantive warrant or counterexample
      anti_conditions:
        - learner asks only for vocabulary or procedural clarification
      repair_type: ask_scope_test
    plausible_repairs:
      - validate_then_redirect
      - explain_more_slowly
      - scope_test_before_redirect
    cue_map:
      selected_relation_type: warrant_scope
      requires_constructed_device: true
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: abstract_philosophy_argument
      leakage_risks:
        - target_policy_marker_in_public_setup
        - no_headroom_if_s0_also_asks_scope_test
    heldout_siblings:
      - sibling_id: counter_warrant_scope_a
        public_setup: >-
          The learner says the tutor's distinction fails only when the exception
          condition is present.
        headroom_prediction: s0_likely_validates_and_redirects
        target_aliases: [scope test, warrant boundary, exception condition]
        decoy_aliases: [validate then redirect, explain more slowly]
        selected_policy_markers: [scope test, warrant boundary]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: counter_warrant_scope_b
        public_setup: >-
          The learner frames the objection as a boundary case and asks whether
          the example still counts.
        headroom_prediction: s0_may_self_solve_because_boundary_language_is_explicit
        target_aliases: [scope test, boundary case]
        decoy_aliases: [reassure and continue, define the term again]
        selected_policy_markers: [scope test, condition split]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling

  - family_id: surface_agreement_uptake
    title: Surface agreement mistaken as uptake
    domain: math_explanation
    learner_resistance_type: surface_agreement
    tutor_infelicity_type: premature_resolution
    training_seed:
      seed_id: surface_agreement_uptake_seed
      public_setup: >-
        The learner says okay after an explanation but immediately repeats the
        old rule in the next applied example.
      learner_resistance: >-
        Okay, I get it. So I should still just add the two pieces first and then
        apply the operation.
      expected_failure: premature_resolution
      old_rule_decoy: treat_okay_as_mastery
    target_policy:
      policy_id: action_gate_before_closure
      trigger: learner gives agreement while reusing the old rule
      avoid_move: accept the agreement and close the explanation
      preferred_move: require a concrete action gate that makes the learner apply the new rule
      applicability_conditions:
        - agreement co-occurs with old-rule language
      anti_conditions:
        - learner independently applies the new rule correctly to a fresh case
      repair_type: transfer_control
    plausible_repairs:
      - praise_and_close
      - repeat_the_explanation
      - action_gate_before_closure
    cue_map:
      selected_relation_type: uptake_test
      requires_constructed_device: false
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: math_explanation
      leakage_risks:
        - false_positive_if_learner_parrots_action_words
    heldout_siblings:
      - sibling_id: surface_agreement_uptake_a
        public_setup: >-
          The learner says yes, then describes a next step that repeats the
          old algorithm.
        headroom_prediction: s0_likely_accepts_surface_agreement
        target_aliases: [action gate, apply the new rule, concrete test]
        decoy_aliases: [praise and close, repeat explanation]
        selected_policy_markers: [action gate, concrete test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: surface_agreement
            artifact_flags: []
          s1:
            committed_option_class: decoy
            basis_label: repeated_explanation
            artifact_flags: []
          expected_card_verdict: policy_failure
      - sibling_id: surface_agreement_uptake_b
        public_setup: >-
          The learner repeats the exact phrase "action gate" from a leaked
          planning note before the tutor responds.
        headroom_prediction: invalid_due_to_alias_leak
        target_aliases: [action gate, concrete test]
        decoy_aliases: [praise and close, repeat explanation]
        selected_policy_markers: [transfer check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: visible_alias
            artifact_flags: [cue_leak]
          s1:
            committed_option_class: target
            basis_label: visible_alias
            artifact_flags: [cue_leak]
          expected_card_verdict: cue_leak
      - sibling_id: surface_agreement_uptake_c
        public_setup: >-
          The learner gives a polite assent and immediately describes using the
          old order of operations on a different symbolic expression.
        learner_resistance: >-
          Yes, I get it. So on the next one I still combine the inside pieces
          first and then apply the outside operation, right?
        headroom_prediction: s0_may_explain_again_or_accept_the_assent_instead_of_requiring_public_transfer
        target_aliases: [fresh case, public check, discriminating test, next example]
        decoy_aliases: [praise and close, repeat explanation, accept the yes]
        selected_policy_markers: [uptake-gate, public-transfer-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: surface_agreement
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom

  - family_id: skeptical_pushback_hostility
    title: Skeptical pushback mistaken as hostility
    domain: ethics_discussion
    learner_resistance_type: skeptical_pushback
    tutor_infelicity_type: moral_flattery
    training_seed:
      seed_id: skeptical_pushback_hostility_seed
      public_setup: >-
        The learner challenges the premise of a moral example, and the tutor
        responds by praising the learner's concern rather than testing the claim.
      learner_resistance: >-
        I am not trying to be difficult. I think the premise changes who has the
        obligation.
      expected_failure: moral_flattery
      old_rule_decoy: praise_the_concern
    target_policy:
      policy_id: claim_test_not_character_read
      trigger: learner challenges a premise without attacking the tutor
      avoid_move: soften with moral praise and bypass the premise
      preferred_move: name the claim, test the premise, and hand the next distinction back
      applicability_conditions:
        - learner's resistance is a premise challenge
      anti_conditions:
        - learner uses abusive language or refuses the task entirely
      repair_type: name_warrant
    plausible_repairs:
      - praise_the_concern
      - restate_the_norm
      - claim_test_not_character_read
    cue_map:
      selected_relation_type: premise_warrant
      requires_constructed_device: false
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: ethics_discussion
      leakage_risks:
        - s0_may_infer_premise_test_from_public_challenge
    heldout_siblings:
      - sibling_id: skeptical_pushback_hostility_a
        public_setup: >-
          The learner disputes whether the premise assigns responsibility to
          the same person.
        headroom_prediction: s0_may_independently_test_the_premise
        target_aliases: [premise test, claim test, warrant test]
        decoy_aliases: [praise the concern, restate the norm]
        selected_policy_markers: [premise test, warrant test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: registered_relation_without_policy
            self_solve: true
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: self_solve
      - sibling_id: skeptical_pushback_hostility_b
        public_setup: >-
          The learner gives no stable answer and both arms close without a
          testable repair.
        headroom_prediction: neither_arm_likely_commits
        target_aliases: [premise test, warrant test]
        decoy_aliases: [praise the concern, restate the norm]
        selected_policy_markers: [premise test, warrant test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: [arbiter_disagreement]
          s1:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: [arbiter_disagreement]
          expected_card_verdict: arbiter_disagreement

  - family_id: frustration_rupture_repair
    title: Frustration mistaken as refusal
    domain: writing_feedback
    learner_resistance_type: frustration
    tutor_infelicity_type: failure_to_repair_rupture
    training_seed:
      seed_id: frustration_rupture_repair_seed
      public_setup: >-
        The learner says the feedback keeps moving the target, and the tutor
        treats the frustration as unwillingness to revise.
      learner_resistance: >-
        I am not refusing to revise. I just cannot tell which part of the draft
        you want me to change first.
      expected_failure: failure_to_repair_rupture
      old_rule_decoy: insist_on_effort_before_clarifying
    target_policy:
      policy_id: repair_rupture_before_next_step
      trigger: learner frustration names uncertainty about the task target
      avoid_move: insist on effort before clarifying the requested revision
      preferred_move: repair the rupture, name the target, and offer one bounded next step
      applicability_conditions:
        - frustration includes task-target uncertainty rather than task refusal
      anti_conditions:
        - learner refuses all revision or asks to end the session
      repair_type: repair_misalignment
    plausible_repairs:
      - insist_on_effort_before_clarifying
      - restate_the_rubric
      - repair_rupture_before_next_step
    cue_map:
      selected_relation_type: rupture_before_strategy
      requires_constructed_device: false
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: writing_feedback
      leakage_risks:
        - no_headroom_if_s0_also_repairs_rupture
        - reject_if_frustration_becomes_task_refusal
    heldout_siblings:
      - sibling_id: frustration_rupture_repair_a
        public_setup: >-
          The learner says the comments feel inconsistent and then stops
          proposing any specific revision.
        headroom_prediction: neither_arm_likely_commits
        target_aliases: [repair rupture, name the target, bounded next step]
        decoy_aliases: [insist on effort, restate the rubric]
        selected_policy_markers: [rupture-first revision, relation-to-task repair]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: []
          s1:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: []
          expected_card_verdict: neither_correct
      - sibling_id: frustration_rupture_repair_b
        public_setup: >-
          The learner asks to stop the activity and refuses to choose any next
          revision target.
        headroom_prediction: reject_before_adjudication
        protocol_reject: true
        protocol_reject_reason: anti_condition_triggered
        expected_card_verdict: protocol_reject
        target_aliases: [repair rupture, name the target]
        decoy_aliases: [insist on effort, restate the rubric]
        selected_policy_markers: [rupture-first revision, relation-to-task repair]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"

  - family_id: fraction_common_unit_counterexample
    title: Fraction addition wrong unit counterexample
    domain: math_fractions
    learner_resistance_type: counter_warrant
    tutor_infelicity_type: validation_without_engagement
    training_seed:
      seed_id: fraction_common_unit_counterexample_seed
      public_setup: >-
        The tutor tells the learner to add numerators and denominators, but the
        learner points to pizza slices of different sizes.
      learner_resistance: >-
        If I add 1/2 and 1/3 by adding top and bottom, I get 2/5, but half a
        pizza plus a third is bigger than two fifths.
      expected_failure: validation_without_engagement
      old_rule_decoy: add_numerators_and_denominators
    target_policy:
      policy_id: common_unit_before_fraction_sum
      trigger: learner gives a concrete fraction counterexample to a shortcut
      avoid_move: reassure and repeat the numerator-denominator recipe
      preferred_move: compare equivalent same-sized pieces before adding fractions
      applicability_conditions:
        - learner gives unlike denominators or differently sized parts
      anti_conditions:
        - fractions already share the same denominator and the learner applies it correctly
      repair_type: ask_scope_test
    plausible_repairs:
      - add_numerators_and_denominators
      - repeat_fraction_vocabulary
      - common_unit_before_fraction_sum
    cue_map:
      selected_relation_type: common_unit_counterexample
      requires_constructed_device: true
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: concrete_fraction_arithmetic
      leakage_risks:
        - no_headroom_if_s0_immediately_uses_common_denominator
        - false_positive_if_tutor_only_mentions_denominators_without_action
    heldout_siblings:
      - sibling_id: fraction_common_unit_counterexample_a
        public_setup: >-
          The learner says 2/3 plus 1/4 cannot be 3/7 because the pieces are
          thirds and fourths.
        headroom_prediction: s0_likely_repeats_fraction_recipe_or_vocabulary
        target_aliases: [common denominator, same-sized pieces, common unit]
        decoy_aliases: [add numerators and denominators, repeat fraction vocabulary]
        selected_policy_markers: [commensurate-unit-gate, denominator-equivalence-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: fraction_common_unit_counterexample_b
        public_setup: >-
          The learner explicitly asks whether both fractions should be renamed
          into twelfths before adding.
        headroom_prediction: s0_may_self_solve_because_common_unit_is_prompted
        target_aliases: [common denominator, twelfths, same-sized pieces]
        decoy_aliases: [add tops and bottoms, repeat the recipe]
        selected_policy_markers: [commensurate-unit-gate, denominator-equivalence-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling
      - sibling_id: fraction_common_unit_counterexample_c
        public_setup: >-
          The learner challenges a shortcut answer for two unlike fractional
          amounts but does not name a denominator strategy or an equivalent-form
          procedure.
        learner_resistance: >-
          I tried your shortcut on 3/5 plus 1/2 and got 4/7. That feels too
          small, but I cannot say exactly which part of the shortcut is lying.
        headroom_prediction: s0_may_repeat_or_explain_the_shortcut_because_the_counterexample_names_no_unit_strategy
        target_aliases: [equal-sized units, common-size unit, same-size pieces, denominator benchmark, tenths, fifteenths]
        decoy_aliases: [add tops and bottoms, trust the shortcut]
        selected_policy_markers: [commensuration-gate, unit-benchmark-test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom

  - family_id: temperature_unit_conversion_aggregation
    title: Temperature averages with incompatible units
    domain: science_measurement
    learner_resistance_type: counter_warrant
    tutor_infelicity_type: redirect_after_resistance
    training_seed:
      seed_id: temperature_unit_conversion_aggregation_seed
      public_setup: >-
        The tutor averages two temperature readings by averaging their displayed
        numbers, but the readings use Celsius and Fahrenheit.
      learner_resistance: >-
        20 degrees Celsius and 68 degrees Fahrenheit are the same temperature,
        so averaging the numbers 20 and 68 gives 44 even though nothing changed.
      expected_failure: redirect_after_resistance
      old_rule_decoy: average_displayed_numbers
    target_policy:
      policy_id: normalize_units_before_aggregation
      trigger: learner shows a numeric operation changes when units or scales differ
      avoid_move: repeat the averaging formula on the displayed numbers
      preferred_move: convert readings to a shared scale before comparing or averaging
      applicability_conditions:
        - quantities share a physical dimension but use different units or scales
      anti_conditions:
        - all quantities already use the same unit and scale
      repair_type: name_warrant
    plausible_repairs:
      - average_displayed_numbers
      - explain_the_formula_again
      - normalize_units_before_aggregation
    cue_map:
      selected_relation_type: unit_scale_incompatibility
      requires_constructed_device: true
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: concrete_measurement_units
      leakage_risks:
        - no_headroom_if_s0_immediately_converts_units
        - false_positive_if_tutor_mentions_units_without_normalizing
    heldout_siblings:
      - sibling_id: temperature_unit_conversion_aggregation_a
        public_setup: >-
          The learner says averaging 10 degrees Celsius and 50 degrees Fahrenheit
          as the numbers 10 and 50 treats the same scale as if it were shared.
        headroom_prediction: s0_likely_repeats_average_formula
        target_aliases: [convert units, same scale, unit conversion]
        decoy_aliases: [average the numbers, explain the formula again]
        selected_policy_markers: [unit-normalization-gate, scale-compatible-aggregation]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: temperature_unit_conversion_aggregation_b
        public_setup: >-
          The learner already converts 50 degrees Fahrenheit into 10 degrees
          Celsius before asking whether the average is just 10.
        headroom_prediction: s0_may_self_solve_because_conversion_is_explicit
        target_aliases: [convert units, Celsius scale, same scale]
        decoy_aliases: [average displayed numbers, repeat average formula]
        selected_policy_markers: [unit-normalization-gate, scale-compatible-aggregation]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling
      - sibling_id: temperature_unit_conversion_aggregation_c
        public_setup: >-
          The learner objects that the computed average changes when the same
          room reading is written with a different thermometer convention, but
          does not state a conversion formula.
        learner_resistance: >-
          If one thermometer writes the room as 25 and another writes that same
          room as 77, averaging those labels gives 51. That feels like the label
          changed the room instead of measuring it.
        headroom_prediction: s0_may_explain_averaging_or_measurement_language_without_normalizing_the_readings
        target_aliases: [normalize units, compatible scale, converted readings]
        decoy_aliases: [average the labels, explain averaging again]
        selected_policy_markers: [scale-normalization-gate, compatible-aggregation-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
