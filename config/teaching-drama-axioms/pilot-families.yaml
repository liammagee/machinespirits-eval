  - family_id: claim_evidence_role_mismatch_staged
    title: Vivid evidence mistaken for role-matched evidence
    domain: writing_feedback
    evaluation_design:
      s0_baseline_stratum: recursive_full_no_policy_memory
      s0_claim_boundary: no_policy_memory_counterfactual_replay
      s0_escalation_rule: stronger claims require recursive_full_no_policy_memory stability before panels or sidecar prose
    learner_resistance_type: counter_warrant
    tutor_infelicity_type: validation_without_engagement
    training_seed:
      seed_id: claim_evidence_role_mismatch_staged_seed
      public_setup: >-
        The tutor tells the learner to choose the evidence with the most vivid
        student quote. The learner initially accepts that warrant, then discovers
        that the vivid quote supports attitude evidence rather than the causal
        claim they are trying to draft.
      learner_resistance: >-
        I started with the quote because it sounds strongest, but when I put it
        after "waste increased because," it only says students disliked the
        food. I cannot tell if that counts as proof for my cause claim.
      baseline_tutor_attempt: |-
        TUTOR: Use the student quote about the cafeteria food being "gross" because direct student voices are vivid and persuasive.
        LEARNER: That quote does sound strongest, so I can start the paragraph there.
        TUTOR: Good. A vivid quote gives the reader something concrete, so make it the main evidence for your claim that waste increased because of the new pickup schedule.
        LEARNER: Wait, the quote says students disliked the food. It does not show that the pickup schedule caused more trays to be thrown away.
        TUTOR: A quote from a student is more persuasive than a dry schedule detail, so keep the quote at the center.
        LEARNER: But then my claim turns into "students disliked lunch," not "the pickup schedule caused waste." I need to know what the quote can prove.
        TUTOR: Readers trust direct voices, so do not lose the quote.
      expected_failure: validation_without_engagement
      old_rule_decoy: choose_the_most_vivid_quote_as_strongest_evidence
    target_policy:
      policy_id: evidence_role_match_after_vivid_quote_pull
      trigger: learner initially accepts vivid evidence as strongest, then notices it supports a different role than the causal claim
      avoid_move: keep treating vividness, quote form, or reader interest as enough to make the evidence support the causal claim
      preferred_move: >-
        name the warrant failure as a role mismatch, separate hook or attitude
        evidence from causal proof, ask the learner to test the evidence in the
        claim's because-frame, and carry the resulting role boundary forward in
        the next tutor commitment
