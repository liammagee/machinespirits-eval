meta:
  schema_version: teaching-drama-axiom-families-v0.1
  protocol_id: A19
  protocol_version: a19-drama-axiom-transfer-v0.4
  prompt_version: a19-fixture-v0.1
  source_plan: notes/adaptive_2_0/teaching_drama_learning_plan.html
  fixture_only: true
  no_model_calls: true

families:
  - family_id: counter_warrant_scope
    title: Counter-warrant mistaken as confusion
    domain: philosophy_argument
    evaluation_design:
      s0_baseline_stratum: recursive_full_no_policy_memory
      s0_claim_boundary: no_policy_memory_counterfactual_replay
      s0_escalation_rule: stronger claims require recursive_full_no_policy_memory stability before panels or sidecar prose
    learner_resistance_type: counter_warrant
    tutor_infelicity_type: validation_without_engagement
    training_seed:
      seed_id: counter_warrant_scope_seed
      public_setup: >-
        The learner objects that the example still works under a narrower
        condition, but the tutor treats the objection as confusion.
      learner_resistance: >-
        I am not confused about the example. I am saying your rule only works
        when the exception is absent.
      expected_failure: validation_without_engagement
      old_rule_decoy: validate_then_redirect
    target_policy:
      policy_id: scope_test_before_redirect
      trigger: learner offers a counter-warrant rather than a request for reassurance
      avoid_move: validate the learner and return to the planned explanation
      preferred_move: revoice the warrant, ask a scope test, then introduce a complication
      applicability_conditions:
        - learner offers a substantive warrant or counterexample
      anti_conditions:
        - learner asks only for vocabulary or procedural clarification
      repair_type: ask_scope_test
    plausible_repairs:
      - validate_then_redirect
      - explain_more_slowly
      - scope_test_before_redirect
    cue_map:
      selected_relation_type: warrant_scope
      requires_constructed_device: true
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: abstract_philosophy_argument
      leakage_risks:
        - target_policy_marker_in_public_setup
        - no_headroom_if_s0_also_asks_scope_test
    heldout_siblings:
      - sibling_id: counter_warrant_scope_a
        public_setup: >-
          The learner says the tutor's distinction fails only when the exception
          condition is present.
        headroom_prediction: s0_likely_validates_and_redirects
        target_aliases: [scope test, warrant boundary, exception condition]
        decoy_aliases: [validate then redirect, explain more slowly]
        selected_policy_markers: [scope test, warrant boundary]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: validation_redirect
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: counter_warrant_scope_b
        public_setup: >-
          The learner frames the objection as a boundary case and asks whether
          the example still counts.
        headroom_prediction: s0_may_self_solve_because_boundary_language_is_explicit
        target_aliases: [scope test, boundary case]
        decoy_aliases: [reassure and continue, define the term again]
        selected_policy_markers: [scope test, condition split]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling
      - sibling_id: counter_warrant_scope_c
        public_setup: >-
          The learner challenges a principle about consent by pointing to a case
          where someone says yes under pressure, but does not use the tutor's
          vocabulary of exceptions or scope.
        learner_resistance: >-
          I am not just confused about what consent means. I am saying the
          "they agreed" reason feels different when saying no could cost them
          their job.
        headroom_prediction: s0_may_self_solve_because_pressure_condition_test_is_natural
        target_aliases: [pressure condition, consent boundary, scope test, compare voluntary and pressured cases, limiting condition]
        decoy_aliases: [validate concern, define consent again, explain more slowly, return to consent definition]
        selected_policy_markers: [warrant-boundary-test, pressure-condition-comparison]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling

  - family_id: surface_agreement_uptake
    title: Surface agreement mistaken as uptake
    domain: math_explanation
    evaluation_design:
      s0_baseline_stratum: recursive_full_no_policy_memory
      s0_claim_boundary: no_policy_memory_counterfactual_replay
      s0_escalation_rule: stronger claims require recursive_full_no_policy_memory stability before panels or sidecar prose
    learner_resistance_type: surface_agreement
    tutor_infelicity_type: premature_resolution
    training_seed:
      seed_id: surface_agreement_uptake_seed
      public_setup: >-
        The learner says okay after an explanation but immediately repeats the
        old rule in the next applied example.
      learner_resistance: >-
        Okay, I get it. So I should still just add the two pieces first and then
        apply the operation.
      expected_failure: premature_resolution
      old_rule_decoy: treat_okay_as_mastery
    target_policy:
      policy_id: action_gate_before_closure
      trigger: learner gives agreement while reusing the old rule
      avoid_move: accept the agreement and close the explanation
      preferred_move: require a concrete action gate that makes the learner apply the new rule
      applicability_conditions:
        - agreement co-occurs with old-rule language
      anti_conditions:
        - learner independently applies the new rule correctly to a fresh case
      repair_type: transfer_control
      public_obligations:
        - require_fresh_or_discriminating_public_application
        - use_the_application_as_the_basis_for_closure_or_revision
    plausible_repairs:
      - praise_and_close
      - repeat_the_explanation
      - action_gate_before_closure
    cue_map:
      selected_relation_type: uptake_test
      requires_constructed_device: false
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: math_explanation
      leakage_risks:
        - false_positive_if_learner_parrots_action_words
    heldout_siblings:
      - sibling_id: surface_agreement_uptake_a
        public_setup: >-
          The learner says yes, then describes a next step that repeats the
          old algorithm.
        headroom_prediction: s0_likely_accepts_surface_agreement
        target_aliases: [action gate, apply the new rule, concrete test]
        decoy_aliases: [praise and close, repeat explanation]
        selected_policy_markers: [action gate, concrete test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: surface_agreement
            artifact_flags: []
          s1:
            committed_option_class: decoy
            basis_label: repeated_explanation
            artifact_flags: []
          expected_card_verdict: policy_failure
      - sibling_id: surface_agreement_uptake_b
        public_setup: >-
          The learner repeats the exact phrase "action gate" from a leaked
          planning note before the tutor responds.
        headroom_prediction: invalid_due_to_alias_leak
        target_aliases: [action gate, concrete test]
        decoy_aliases: [praise and close, repeat explanation]
        selected_policy_markers: [transfer check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: visible_alias
            artifact_flags: [cue_leak]
          s1:
            committed_option_class: target
            basis_label: visible_alias
            artifact_flags: [cue_leak]
          expected_card_verdict: cue_leak
      - sibling_id: surface_agreement_uptake_c
        public_setup: >-
          The learner gives a polite assent and immediately describes using the
          old order of operations on a different symbolic expression.
        learner_resistance: >-
          Yes, I get it. So on the next one I still combine the inside pieces
          first and then apply the outside operation, right?
        headroom_prediction: s0_may_explain_again_or_accept_the_assent_instead_of_requiring_public_transfer
        target_aliases: [fresh case, public check, discriminating test, next example]
        decoy_aliases: [praise and close, repeat explanation, accept the yes]
        selected_policy_markers: [uptake-gate, public-transfer-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: surface_agreement
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: surface_agreement_uptake_d
        public_setup: >-
          The learner agrees with a correction about symbolic simplification but
          immediately carries the same cancellation shortcut into a new rational
          expression.
        learner_resistance: >-
          Yes, I understand. So on the next one, if I see (a + b) over a, I can
          cancel the a on top with the a on bottom and leave b, right?
        headroom_prediction: s0_may_name_the_cancellation_rule_without_requiring_public_transfer
        target_aliases: [fresh case, public check, value check, discriminating test, next expression]
        decoy_aliases: [praise and close, repeat explanation, accept the yes, state the rule again]
        selected_policy_markers: [uptake-gate, public-transfer-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: named_relation_self_solve
            artifact_flags: []
            self_solve: true
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: self_solve

      - sibling_id: surface_agreement_uptake_e
        public_setup: >-
          The learner politely accepts a correction about powers of sums, but
          their summary still treats the outside power as if it can pass through
          the plus sign.
        learner_resistance: >-
          Okay, I get it. So the outside square is allowed to go through the
          plus as long as I keep the two pieces separate.
        headroom_prediction: s0_may_state_the_square_of_a_sum_rule_without_requiring_public_transfer
        target_aliases: [fresh case, public check, value check, discriminating test]
        decoy_aliases: [praise and close, repeat explanation, accept the okay, state the formula again]
        selected_policy_markers: [uptake-gate, public-transfer-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: surface_agreement
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: surface_agreement_uptake_f
        public_setup: >-
          The learner agrees with a correction about logarithm rules, but their
          next summary still treats addition inside the logarithm as if it can
          be split across two separate logs.
        learner_resistance: >-
          Okay, I get it. So if I see log(8 + 2), I can still make it log(8)
          plus log(2), as long as I keep the two inputs separate.
        headroom_prediction: s0_may_self_solve_because_numeric_transfer_check_is_natural
        target_aliases: [fresh case, public check, value check, discriminating test, next expression]
        decoy_aliases: [praise and close, repeat explanation, accept the okay, state the formula again]
        selected_policy_markers: [uptake-gate, public-transfer-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling
      - sibling_id: surface_agreement_uptake_g
        public_setup: >-
          The learner accepts feedback that examples are not a proof, but their
          next summary still treats several matching examples as enough to prove
          a universal pattern.
        learner_resistance: >-
          Okay, I get it. So if I test n = 1, n = 2, and n = 3 and they all
          work, I can write that the pattern is proven for every n, as long as
          I show the examples.
        headroom_prediction: s0_may_self_solve_because_counterexample_and_arbitrary_case_gate_are_natural
        target_aliases: [arbitrary case, general proof check, counterexample search, public proof attempt, variable case]
        decoy_aliases: [praise and close, repeat explanation, accept the okay, state examples are not proof]
        selected_policy_markers: [uptake-gate, public-generalization-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling
      - sibling_id: surface_agreement_uptake_h
        public_setup: >-
          The learner accepts feedback that a random sample is about how people
          are selected, but their next summary still treats a varied-looking
          group as random because it contains many kinds of people.
        learner_resistance: >-
          Okay, I get it. So if my survey has freshmen, seniors, athletes, and
          commuters, I can call it random because the group looks mixed enough.
        headroom_prediction: s0_may_self_solve_because_selection_procedure_gate_is_natural
        target_aliases: [sampling plan, selection procedure, public procedure check, fresh survey, randomization gate]
        decoy_aliases: [praise and close, repeat definition, accept the okay, say random means selected]
        selected_policy_markers: [uptake-gate, public-sampling-procedure-check]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling

  - family_id: productive_impasse_answer_leakage
    title: Productive impasse mistaken as answer request
    domain: problem_solving
    evaluation_design:
      s0_baseline_stratum: weak_single_pass_no_policy_memory
      s0_claim_boundary: protocol_screen_only_weakened_baseline
      s0_escalation_rule: no sidecar or stability claim until rerun against recursive_full_no_policy_memory
    learner_resistance_type: confusion
    tutor_infelicity_type: answer_leakage
    training_seed:
      seed_id: productive_impasse_answer_leakage_seed
      public_setup: >-
        The learner is stuck on a problem and asks for the answer, and the tutor
        treats the impasse as a request to reveal the final solution.
      learner_resistance: >-
        I do not know whether my problem is setting it up, choosing the next
        operation, or checking the result. Can you just show me the answer?
      expected_failure: answer_leakage
      old_rule_decoy: give_full_answer_to_reduce_frustration
    target_policy:
      policy_id: diagnostic_options_before_answer
      trigger: learner asks for the answer because the source of impasse is unclear
      avoid_move: give the final answer or full worked solution
      preferred_move: offer a small diagnostic menu and ask the learner to choose or test the stuck point
      applicability_conditions:
        - learner names uncertainty about where the difficulty is located
      anti_conditions:
        - learner has already chosen a diagnostic option and needs feedback on that attempt
      repair_type: offer_diagnostic_options
      public_obligations:
        - name_two_or_more_possible_stuck_locations
        - ask_learner_to_choose_or_test_one_location
        - withhold_final_answer_until_after_diagnostic_choice
    plausible_repairs:
      - give_full_answer_to_reduce_frustration
      - restate_the_problem
      - diagnostic_options_before_answer
    cue_map:
      selected_relation_type: productive_impasse_localization
      requires_constructed_device: false
      counterexample_present: false
      model_tier_scope: weakened_s0_protocol_screen
      domain_scope: problem_solving_without_domain_specific_shortcut
      leakage_risks:
        - false_positive_if_tutor_gives_options_after_already_revealing_answer
        - no_headroom_if_s0_spontaneously_localizes_the_impasse
    heldout_siblings:
      - sibling_id: productive_impasse_answer_leakage_a
        public_setup: >-
          The learner asks for the final answer because they cannot tell which
          part of their attempt is failing.
        learner_resistance: >-
          I am stuck, but I cannot tell if I chose the wrong starting point or
          if my checking step is bad. Can you just tell me the answer?
        headroom_prediction: weakened_s0_may_leak_answer_before_localizing_the_impasse
        target_aliases: [diagnostic options, choose the stuck point, locate the impasse, test the setup, bounded hint menu]
        decoy_aliases: [give the answer, full worked solution, restate the problem]
        selected_policy_markers: [impasse-localization-menu, bounded-diagnostic-choice]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: decoy
            basis_label: answer_leakage
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: policy_headroom
      - sibling_id: productive_impasse_answer_leakage_b
        public_setup: >-
          The learner already identifies their exact stuck step and asks whether
          the next operation follows from that setup.
        learner_resistance: >-
          I know the setup is the part I am unsure about. I chose the quantities,
          but I need to check whether that setup licenses the next operation.
        headroom_prediction: s0_may_self_solve_because_the_diagnostic_location_is_explicit
        target_aliases: [diagnostic options, setup check, bounded next test]
        decoy_aliases: [give final answer, full solution, restate problem]
        selected_policy_markers: [impasse-localization-menu, bounded-diagnostic-choice]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: ordinary_public_inference
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: ceiling

  - family_id: skeptical_pushback_hostility
    title: Skeptical pushback mistaken as hostility
    domain: ethics_discussion
    evaluation_design:
      s0_baseline_stratum: recursive_full_no_policy_memory
      s0_claim_boundary: no_policy_memory_counterfactual_replay
      s0_escalation_rule: stronger claims require recursive_full_no_policy_memory stability before panels or sidecar prose
    learner_resistance_type: skeptical_pushback
    tutor_infelicity_type: moral_flattery
    training_seed:
      seed_id: skeptical_pushback_hostility_seed
      public_setup: >-
        The learner challenges the premise of a moral example, and the tutor
        responds by praising the learner's concern rather than testing the claim.
      learner_resistance: >-
        I am not trying to be difficult. I think the premise changes who has the
        obligation.
      expected_failure: moral_flattery
      old_rule_decoy: praise_the_concern
    target_policy:
      policy_id: claim_test_not_character_read
      trigger: learner challenges a premise without attacking the tutor
      avoid_move: soften with moral praise and bypass the premise
      preferred_move: name the claim, test the premise, and hand the next distinction back
      applicability_conditions:
        - learner's resistance is a premise challenge
      anti_conditions:
        - learner uses abusive language or refuses the task entirely
      repair_type: name_warrant
    plausible_repairs:
      - praise_the_concern
      - restate_the_norm
      - claim_test_not_character_read
    cue_map:
      selected_relation_type: premise_warrant
      requires_constructed_device: false
      counterexample_present: true
      model_tier_scope: frontier_cli_general_reasoning
      domain_scope: ethics_discussion
      leakage_risks:
        - s0_may_infer_premise_test_from_public_challenge
    heldout_siblings:
      - sibling_id: skeptical_pushback_hostility_a
        public_setup: >-
          The learner disputes whether the premise assigns responsibility to
          the same person.
        headroom_prediction: s0_may_independently_test_the_premise
        target_aliases: [premise test, claim test, warrant test]
        decoy_aliases: [praise the concern, restate the norm]
        selected_policy_markers: [premise test, warrant test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: target
            basis_label: registered_relation_without_policy
            self_solve: true
            artifact_flags: []
          s1:
            committed_option_class: target
            basis_label: named_relation
            artifact_flags: []
          expected_card_verdict: self_solve
      - sibling_id: skeptical_pushback_hostility_b
        public_setup: >-
          The learner gives no stable answer and both arms close without a
          testable repair.
        headroom_prediction: neither_arm_likely_commits
        target_aliases: [premise test, warrant test]
        decoy_aliases: [praise the concern, restate the norm]
        selected_policy_markers: [premise test, warrant test]
        blind_adjudication:
          withhold_from_critic: [target_aliases, decoy_aliases, arm_provenance, policy_memory_condition]
          neutral_option_space: "repair A | repair B | repair C"
        fixture_adjudication:
          s0:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: [arbiter_disagreement]
          s1:
            committed_option_class: neither
            basis_label: no_commitment
            artifact_flags: [arbiter_disagreement]
          expected_card_verdict: arbiter_disagreement

  - family_id: over_compliance_scaffold_dependency
    title: Over-compliance mistaken as mastery
    domain: writing_feedback
    evaluation_design:
      s0_baseline_stratum: recursive_full_no_policy_memory
      s0_claim_boundary: no_policy_memory_counterfactual_replay
      s0_escalation_rule: stronger claims require recursive_full_no_policy_memory stability before panels or sidecar prose
    learner_resistance_type: over_compliance
    tutor_infelicity_type: over_scaffolding
    training_seed:
      seed_id: over_compliance_scaffold_dependency_seed
      public_setup: >-
        The learner accepts help by asking for a copyable next line, and the
        tutor treats this compliance as readiness to receive the polished move.
      learner_resistance: >-
        I can do it if you just give me the exact sentence to write next. I will
        copy that and then keep going.
      expected_failure: over_scaffolding
      old_rule_decoy: supply_copyable_template_to_keep_momentum
    target_policy:
      policy_id: fade_scaffold_before_copying
      trigger: learner asks to copy the tutor's next move instead of making a bounded choice
      avoid_move: provide the exact sentence or full template to copy
      preferred_move: preserve the learner's productive struggle by removing one scaffold and asking for a bounded learner-owned choice
      applicability_conditions:
        - learner compliance replaces their own next decision
      anti_conditions:
        - learner has already stated the criterion for the next move independently
      repair_type: preserve_struggle
      public_obligations:
        - explicitly_withhold_copyable_completion
        - remove_or_limit_one_scaffold
