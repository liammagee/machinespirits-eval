meta:
  schema_version: a19-generalization-loops-v0.1
  protocol_id: A19
  loop_version: a19-generalization-loop-v0.1
  created_at: 2026-06-08
  source_plan: notes/adaptive_2_0/teaching_drama_learning_plan.html
  status: automated_controlled_positive_search_exhausted_no_claim
  claim_boundary: simulated_teacher_as_learner_not_human_learning
  does_not_claim:
    - human_learning
    - deployed_adaptive_tutor
    - model_weight_learning
    - main_harness_rate_effect
    - pooled_a19_rate
    - paid_blind_panel_result
    - sidecar_empirical_claim

global_stop_rules:
  - stop_before_generation_if_protocol_validation_fails
  - stop_before_paper_or_atlas_if_fewer_than_two_stability_confirmed_cards
  - stop_if_three_attempts_in_a_track_collapse_to_the_same_failure_mode
  - stop_if_adjudication_packet_leaks_target_or_decoy_aliases_outside_public_transcripts
  - stop_if_result_requires_human_or_paid_panel_not_available

tracks:
  - track_id: non_collapsing_repair_family
    title: Repair families whose public obligations cannot collapse into transfer-control
    track_type: repair_family_design
    status: automated_controlled_positive_search_exhausted_no_claim
    rationale: >-
      A19 v0.3-v0.5 repeatedly collapsed distinctive repairs into
      transfer-control because the public repair still asked the learner to
      choose, apply, test, or own a task move before closure. This track designs
      families where the distinctive act is primarily a tutor-side withdrawal,
      re-addressing, or status repair rather than a learner application gate.
    known_result:
      distinct_result_known: true
      current_boundary: >-
        Existing A19 branches have one stable instructional-contract card. The
        v0.6 claim-address candidate failed the real attempt-1 recursive gate.
        The v0.7 public-commitment candidate yielded one noisy
        policy-headroom card with target-granularity risk and two recursive-full
        S0 ceilings. The v0.8 learner-standing candidate survived attempt-1 and
        produced one local policy-headroom card with target-granularity risk,
        one S0 ceiling with target-granularity risk, and one clean S0 ceiling.
        A19 v0.9 preregistered strategy_reversal_repair from the automated
        A19R screen's two A18-native peripeteia_error_spotting positives, but
        the real attempt-1 gate rejected it on recursive dyadic update. That
        made the existing-schema over-compliance ethopoeia variant warranted as
        the next automated fallback. That fallback was preregistered under
        preserve_struggle and run through real attempt-1, but it also blocked
        before S0/S1 on device specificity and recursive tutor-learning. A
        stronger over-compliance copy/import variant later survived attempt-1
        and admitted one bounded axiom, but failed stability (0/2 and 1/2
        mixed/unstable). Four productive-impasse recursive variants and three
        public-commitment recursive variants then blocked before axiom induction
        or S0/S1. The v0.10 public-warrant evidence-role branch found one staged
        attempt-1 survivor and one admitted bounded axiom, but stability was
        still 0/2 and 1/2 mixed/unstable. The taxonomy-aligned
        public_commitment_evidence_role_boundary branch also survived attempt-1
        and admitted one bounded axiom, but recursive-full S0 reached the target
        on the first stability seed. Compact S1 axiom-memory rendering did not
        rescue the staged held-out cards. The v0.11 role-separated harness then
        removed the coordinated-transcript confound by generating tutor and
        learner moves separately. The evidence-role staged branch produced no
        role-separated headroom, and the commitment-boundary branch produced one
        local role-separated headroom seed that failed immediate k=2 stability as
        mixed/unstable. No recursive-full or role-separated systemic S0/S1
        difference, stability, paper, atlas, sidecar, human-panel, or
        human-learning claim is licensed.
      result_label: automated_controlled_positive_search_exhausted_no_claim
    success_condition:
      - at_least_two_heldout_siblings_stable_policy_headroom_under_recursive_full_s0
      - s1_extracted_as_registered_non_transfer_repair_type_on_all_stability_seeds
      - s0_target_count_below_required_stability_threshold
      - no_target_granularity_risk_on_decisive_cards
    failure_conditions:
      - repeated_transfer_control_collapse
      - repeated_s0_self_solve
      - repeated_s1_non_target
      - cue_or_alias_leakage
    loop_steps:
      - preregister_repair_type_obligations
      - add_family_with_training_seed_and_three_or_more_heldout_siblings
      - run_attempt1_failure_elicitation
      - induce_one_bounded_axiom
      - run_s0_first_headroom_screen
      - run_s1_only_when_s0_non_target
      - run_k2_stability_on_local_policy_headroom_cards
      - stop_or_escalate_by_stability_threshold
    candidate_queue:
      - candidate_id: strategy_reversal_error_spotting
        proposed_repair_type: strategy_reversal_repair
        source_from_plan: A19R automated packet screen; two A18-native peripeteia_error_spotting positives
        noncollapse_hypothesis: >-
          The tutor reverses the learner from continuing a failing solve path
          into spotting the wrong strategy family or wrong turn before any
          answer-selection or fresh transfer check. The decisive public act is
          local error identification in the current attempt, not applying a
          corrected rule to prove closure.
        required_public_obligations:
          - reverse_from_solving_to_error_spotting
          - name_the_wrong_strategy_family_or_wrong_turn
          - require_local_error_identification_before_solution_continuation
        excludes:
          - continuing_the_same_solution_path_with_a_hint
          - revealing_the_correct_strategy_or_answer_before_error_identification
          - generic_encouragement_without_wrong_turn_localization
        likely_training_seed: learner keeps using visible cues after that strategy has produced unstable answers
        status: real_attempt1_blocked_recursive_update
        observed_result:
          protocol_version: a19-drama-axiom-transfer-v0.10
          family_id: strategy_reversal_error_spotting
          materialized_scaffold: exports/a19/materialized-attempts-v09
          attempt1_dir: exports/a19/real-attempt1-v09/strategy-reversal-error-spotting
          attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-strategy-reversal.md
          gate_status: reject
          blocking_metric: recursive_dyadic_update
          observed_score: 0.62
          threshold: 0.7
          source_summary: exports/a19r/reports/automated-adjudication-2026-06-09.json
          source_result_label: systemic_s1_mini_drama_greater_than_s0_shadow
          source_s1_supported_count: 5
          source_s0_preferred_count: 0
          source_unclear_count: 0
          source_mean_score_delta: 0.42
          claim_status: real_attempt1_blocked_no_s0s1
          next_action: stop_before_s0s1_run_option2_fallback
      - candidate_id: over_compliance_ethopoeia_preserve_struggle_variant
        proposed_repair_type: preserve_struggle
        source_from_plan: A19R option map fallback; over-compliance scaffold-dependency packet
        noncollapse_hypothesis: >-
          The tutor voices the learner's copy-dependency position, refuses a
          copyable completion path, and hands back one bounded learner-owned
          choice. This is now warranted because the v0.9 strategy-reversal
          candidate failed its real attempt-1 gate before S0/S1.
        required_public_obligations:
          - explicitly_withhold_copyable_completion
          - remove_or_limit_one_scaffold
          - require_bounded_learner_owned_decision
        excludes:
          - completing_the_answer_for_the_learner
          - generic_encouragement_without_preserving_struggle
          - learner_application_gate_extracted_as_transfer_control
        likely_training_seed: learner asks for the tutor to show exactly what to write next
        status: real_attempt1_blocked_device_specificity_and_recursive_learning
        observed_result:
          family_id: over_compliance_ethopoeia_copy_dependency
          source_option: existing_a19_over_compliance_ethopoeia_variant
          source_packet: mini_drama_v01__a19_over_compliance_scaffold_dependency_a__e877da7fd98e
          materialized_scaffold: exports/a19/materialized-attempts-v09-option2
          attempt1_dir: exports/a19/real-attempt1-v09-option2/over-compliance-ethopoeia-copy-dependency
          attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-over-compliance-ethopoeia.md
          gate_status: reject
          blocking_metrics:
            device_specificity: 0.45
            tutor_learning_signal: 0.55
            resistance_diagnosis: 0.6
            strategy_revision_accountability: 0.6
            strategic_timing: 0.5
            recursive_dyadic_update: 0.6
          threshold: 0.7
          claim_status: real_attempt1_blocked_no_s0s1
          next_action: stop_before_s0s1_revise_seed_or_preregister_next_candidate
      - candidate_id: addressed_claim_withdrawal
        proposed_repair_type: claim_address_repair
        source_from_plan: public drama ontology; learner commitments and warrants
        noncollapse_hypothesis: >-
          The tutor publicly withdraws the misaddressed claim and replaces the
          addressed object before any learner application. The decisive act is a
          tutor speech-act retraction, not a learner test.
        required_public_obligations:
          - identify_the_claim_or_warrant_the_tutor_misaddressed
          - withdraw_the_prior_tutor_framing_as_misaddressed
          - restate_the_learner_claim_as_the_next_addressed_object
        excludes:
          - fresh_application_or_discriminating_case_as_committed_repair
          - generic_validation_then_return_to_original_task
          - diagnostic_menu_without_tutor_retraction
        likely_training_seed: learner says the tutor answered a different concern than the one they raised
        status: real_attempt1_blocked_recursive_update
        observed_result:
          attempt1_dir: exports/a19/real-attempt1-v06/addressed-claim-withdrawal
          report: notes/adaptive_2_0/a19-attempt1-real-gate-report-addressed-claim.md
          gate_status: revise_again
          blocking_metric: recursive_dyadic_update
          observed_score: 0.65
          threshold: 0.7
          next_action: stop_before_s0s1
      - candidate_id: moral_disclosure_standing_repair
        proposed_repair_type: learner_standing_repair
        source_from_plan: morally ambiguous disclosure mistaken as simple sympathy request
        noncollapse_hypothesis: >-
          The tutor repairs the learner's standing as an accountable speaker
          before offering sympathy or advice. The public obligation is status
          repair and permission to withhold disclosure, not transfer of a
          content rule.
        required_public_obligations:
          - name_the_misrecognition_or_moral_flattening
          - restore_the_learner_as_author_of_the_disclosure_boundary
          - offer_a_non_content_continuation_or_stop_option
        excludes:
          - advice_or_sympathy_as_the_committed_repair
          - fresh_reflection_prompt_as_transfer_check
          - moral_flattery_without_boundary_control
        likely_training_seed: learner objects that the tutor turned a morally mixed disclosure into easy reassurance
        status: resolved_below_claim_threshold
        observed_result:
          attempt1_dir: exports/a19/real-attempt1-v08/moral-disclosure-standing-repair
          attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-learner-standing.md
          screen_report: notes/adaptive_2_0/a19-v08-learner-standing-screen-2026-06-08.md
          result_summary: >-
            one_policy_headroom_with_target_granularity_risk_one_s0_ceiling_with_target_granularity_risk_one_clean_s0_ceiling
          local_policy_headroom_card: moral_disclosure_standing_repair_a
          s0_ceiling_cards:
            - moral_disclosure_standing_repair_b
            - moral_disclosure_standing_repair_c
          adjudication_packet: exports/a19/adjudication-packets/moral-disclosure-standing-repair-a.packet.json
          coder_merge_report: exports/a19/adjudication-reports/moral-disclosure-standing-repair-a.coders.json
          visible_alias_hits_in_public_transcripts: 1
          next_action: hold_human_coding_run_automated_screen_or_new_preregistered_candidate
      - candidate_id: public_commitment_contradiction_repair
        proposed_repair_type: commitment_ledger_repair
        source_from_plan: public-state modeling over hidden learner interior
        noncollapse_hypothesis: >-
          The tutor repairs a contradiction among its own public commitments by
          naming the ledger conflict and choosing which commitment it retracts.
          No learner application is required for the repair to be visible.
        required_public_obligations:
          - cite_two_conflicting_public_tutor_commitments
          - retract_or_rank_one_commitment_before_continuing
          - state_the_new_commitment_boundary
        excludes:
          - asking_learner_to_apply_a_rule_to_prove_the_boundary
          - apology_without_commitment_retraction
          - rubric_restatement_without_public_commitment_accounting
        likely_training_seed: learner points out that two tutor directions cannot both govern the next turn
        status: partial_diagnostic_no_claim
        observed_result:
          attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-public-commitment.md
          screen_report: notes/adaptive_2_0/a19-v07-public-commitment-screen-2026-06-08.md
          result_summary: one_policy_headroom_with_target_granularity_risk_two_recursive_full_ceilings
          adjudication_packet: exports/a19/adjudication-packets/public-commitment-contradiction-a.packet.json
          next_action: hold_human_coding_run_automated_screen_or_preregister_next_family
      - candidate_id: claim_evidence_role_mismatch_public_warrant
        proposed_repair_type: name_warrant
        source_from_plan: public claim/evidence warrant roles without weakening recursive-full S0
        noncollapse_hypothesis: >-
          The tutor must distinguish evidence vividness from evidence role-fit
          using only public learner claims and public evidence use. The repair is
          naming which warrant is being misused, not testing a new transfer case.
        required_public_obligations:
          - name_the_claim_evidence_role
          - distinguish_vividness_from_warrant_fit
          - revise_the_tutor_question_before_continuing
        excludes:
          - treating_concrete_detail_as_sufficient_support
          - asking_for_more_evidence_without_naming_role_mismatch
          - hidden_learner_intention_or_human_coder_judgment
        likely_training_seed: learner offers vivid examples that support the wrong claim role
        status: blocked_then_staged_survived_below_stability
        observed_result:
          raw_family_id: claim_evidence_role_mismatch
          raw_attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-claim-evidence-role-mismatch.md
          bounded_continuation_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-claim-evidence-role-mismatch-bounded-continuation.md
          staged_family_id: claim_evidence_role_mismatch_staged
          staged_attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-claim-evidence-role-mismatch-staged.md
          admitted_axiom: exports/a19/axioms/claim-evidence-role-mismatch-staged/axiom.json
          stability_summary: exports/a19/stability-v20-claim-evidence-role-mismatch-staged/a19-stability-summary.json
          stability_result: staged_a_0_of_2_staged_b_1_of_2_mixed_unstable
          compact_memory_summary: exports/a19/stability-v22-compact-memory-claim-evidence-role-mismatch-staged-k1/a19-stability-summary.json
          compact_memory_result: 0_of_1_on_both_siblings_s1_neither_or_transfer_control
          role_separated_summary: exports/a19/role-separated-v23-claim-evidence-role-mismatch-staged-k1/a19-role-separated-summary.json
          role_separated_result: no_policy_headroom_a_neither_correct_b_ceiling
          next_action: stop_before_claim_escalation_make_new_protocol_level_decision
      - candidate_id: public_commitment_evidence_role_boundary
        proposed_repair_type: commitment_ledger_repair
        source_from_plan: taxonomy-aligned repair after evidence-role branch drifted toward public commitment accounting
        noncollapse_hypothesis: >-
          The tutor must account for two incompatible public commitments about
          what evidence will be accepted, retract or rank one, and state the new
          boundary before returning to content.
        required_public_obligations:
          - cite_two_conflicting_public_tutor_commitments
          - retract_or_rank_one_commitment_before_continuing
          - state_the_new_commitment_boundary
        excludes:
          - generic_apology_without_commitment_accounting
          - learner_application_gate_extracted_as_transfer_control
          - human_or_hidden_state_adjudication
        likely_training_seed: learner exposes a conflict between the tutor's evidence promises
        status: attempt1_survived_but_recursive_full_s0_target_on_first_stability_seed
        observed_result:
          attempt1_report: notes/adaptive_2_0/a19-attempt1-real-gate-report-public-commitment-evidence-role-boundary.md
          admitted_axiom: exports/a19/axioms/public-commitment-evidence-role-boundary/axiom.json
          partial_stability_artifact: exports/a19/stability-v21-public-commitment-evidence-role-boundary/public-commitment-evidence-role-boundary-a/seed1/blind-adjudication.free-text.json
          first_seed_result: policy_failure_s0_target_s1_neither
          role_separated_summary: exports/a19/role-separated-v24-public-commitment-evidence-role-boundary-k1/a19-role-separated-summary.json
          role_separated_result: sibling_b_1_of_2_mixed_unstable_after_one_local_headroom_seed
          next_action: stop_because_role_separated_k2_is_mixed_unstable
    next_actions:
      - stop_before_s0s1_for_all_blocked_v11_v19_variants
      - stop_before_claim_escalation_for_v10_and_v20_because_stability_failed
      - stop_v21_because_recursive_full_s0_already_reaches_target
      - treat_v22_as_implementation_hardening_and_negative_k1_diagnostic_only
      - treat_v23_as_negative_role_separated_evidence_role_confirmation
      - treat_v24_as_one_local_role_separated_headroom_seed_that_failed_k2_stability
      - make_new_protocol_level_evidence_unit_or_model_stratification_decision_before_any_further_near_neighbor_loop
      - keep_human_coding_deferred_until_automated_unit_is_stable

  - track_id: adjudication_infrastructure
    title: Multi-critic and human adjudication infrastructure for ambiguous repair boundaries
    track_type: adjudication_infrastructure
    status: human_coding_deferred_automated_packet_only
    rationale: >-
      We are not currently running a paid panel or human double-coding, but the
      infrastructure must exist before stronger claims. The same artifact must
      be readable by independent critics without target aliases, arm provenance,
      or policy-memory condition.
    known_result:
      distinct_result_known: true
      current_boundary: >-
        Infrastructure-only: packet builder can prepare blinded packet/private-key
        artifacts, but human coding is intentionally deferred while the interface
        and coder-selection path remain fragile. Current merge reports with zero
        or one coder remain diagnostics, not panel results. Automated packet
        generation and model adjudication may continue after deterministic gates.
      result_label: human_coding_deferred_automated_packet_only
    success_condition:
      - coder_packet_contains_neutral_arm_labels_only
      - private_key_contains_target_decoy_mapping
      - alias_leak_audit_is_reported
      - packet_schema_can_support_llm_or_human_double_coding
    failure_conditions:
      - target_or_decoy_alias_leaked_in_coder_metadata
      - arm_provenance_visible_to_coder
      - policy_memory_condition_visible_to_coder
      - no_span_evidence_field_for_coder_response
    loop_steps:
      - build_blinded_packet_from_existing_s0_s1_artifacts
      - audit_visible_packet_for_alias_hits
      - collect_two_or_more_independent_coder_json_files_when_available
      - merge_coder_files_without_overwriting_raw_judgments
      - report_agreement_on_the_same_artifact_not_similar_artifacts
    required_artifacts:
      - scripts/build-a19-adjudication-packet.js
      - scripts/merge-a19-adjudication-codes.js
      - config/teaching-drama-axioms/a19-adjudication-panel.yaml
    next_actions:
      - do_not_collect_more_human_coder_json_until_automated_branch_stabilizes
      - use_blinded_packets_for_automated_or_model_adjudication_only

  - track_id: alternate_s0_condition
    title: Different learner/tutor conditions where S0 is less recursively self-repairing
    track_type: baseline_condition_design
    status: diagnostic_plan_exhausted_no_claim
    rationale: >-
      Recursive-full S0 is intentionally strong and often self-solves. This
      track separates mechanism diagnosis from strong empirical claims by
      exploring weaker or stratified S0 conditions while preserving the rule
      that sidecar claims require recursive-full confirmation.
    known_result:
      distinct_result_known: true
      current_boundary: >-
        Existing recursive-full S0 tests are too strong for many near-neighbor
        cards. Weak S0 can reveal whether policy memory is useful for a less
        reflective tutor, but cannot license Paper 2.0, atlas, or sidecar
        claims without recursive-full rerun. The current plan is resolved as a
        protocol-screen diagnostic only: weak and debug baselines do not become
        claims, model-tier screens must be separately preregistered and reported
        by tier, and no current candidate justifies spending on a weakened S0
        claim path. The copied A19R mini-drama/rhetorical battery has now
        produced a bounded automated S1-over-S0 proxy result; the next step is
        preregistered recursive-full confirmation on selected candidates.
      result_label: baseline_diagnostic_design_resolved_no_claim
    candidate_conditions:
      - condition_id: weak_single_pass_no_policy_memory
        status: already_registered_protocol_screen_only
        s0_shape: no policy memory, no recursive tutor-learning gate
        claim_status: protocol_screen_only
        use: distinguish S1 failure from S0 ceiling before spending on recursive-full stability
      - condition_id: decoy_continuation_no_revision
        status: already_registered_fixture_or_debug_only
        s0_shape: old-rule decoy continuation with no revision
        claim_status: fixture_or_debug_only
        use: debug target/decoy alias separability and obvious cue leakage
      - condition_id: model_stratified_recursive_full
        status: preregister_before_any_run
        s0_shape: recursive-full S0 run separately by weak, mid, and strong generator tier
        claim_status: local_headroom_screen_if_each_tier_is_reported_separately
        use: test the teaching-plan hypothesis that policies may overconstrain strong models but help weaker ones
      - condition_id: critic_ablation_no_policy_memory
        status: mechanism_diagnosis_only_not_current_claim_path
        s0_shape: same generator, policy memory withheld, recursive checker disabled or lowered
        claim_status: mechanism_diagnosis_only
        use: isolate whether S0 self-solve comes from the recursive checker rather than the base tutor
    success_condition:
      - weak_condition_finds_candidate_where_recursive_full_later_also_has_headroom
      - all_reports_label_weak_s0_as_protocol_screen_only_until_recursive_full_confirmation
    failure_conditions:
      - weak_only_effect_without_recursive_full_confirmation
      - model_tier_not_reported
      - scenario_or_prompt_payload_differs_between_arms
    loop_steps:
      - run_debug_decoy_or_weak_s0_first
      - promote_only_non_artifact_non_ceiling_candidates_to_recursive_full_s0
      - run_s1_and_stability_only_after_recursive_full_headroom
      - report_weak_s0_outcomes_as_mechanism_diagnostic_not_empirical_transfer
    required_artifacts:
      - scripts/a19r-mini-drama.js
      - scripts/adjudicate-a19r-mini-drama.js
      - services/miniDramaMachines.js
      - config/rhetoric/mini-drama-ontology.v0.1.json
      - config/rhetoric/a18-a19-rhetorical-battery.v0.1.json
    next_actions:
      - hold_weakened_s0_diagnostics_until_a_real_attempt1_survivor_exists
      - preserve_model_stratified_recursive_full_as_later_preregistered_diagnostic_only
