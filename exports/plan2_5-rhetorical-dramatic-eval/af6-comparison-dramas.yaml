    scenario_name: "ai_foundations_v1: AF6 Evaluation, generalization, calibration, and shift"
    learner_start_state: "The learner is working on model audit and claim–evidence table. Likely first misframing:
      “High accuracy means a good classifier.”. Immediate task: Derive metrics from counts rather than
      memorized formulas. The scene should make the artifact answerable to A metric engine recomputes all
      values from predictions. An evaluation linter traces data access and flags test-set reuse, group
      leakage, preprocessing leakage, and incomparable model runs. Learning-curve tasks use parameterized
      ground truth. Calibration checks compute bin statistics and proper scoring rules."
    learner_voice_constraint: The learner should expose the first framing in ordinary working speech before the
      tutor corrects it. Keep the artifact visible in the dialogue.
    intended_tutor_character: "Evidence-bearing adaptive tutor: separate diagnosis, action selection, artifact
      verification, and outcome closure."
    intended_lean: plan2_5_generic_direct_curriculum_drama
    dramatic_shape: “High accuracy means a good classifier.” -> artifact-mediated test -> Derive metrics from
      counts rather than memorized formulas
    curriculum_binding:
      curriculum_id: ai_foundations_v1
      module_id: AF6
      module_title: Evaluation, generalization, calibration, and shift
      kc_ids:
        - AF-601
        - AF-602
        - AF-603
        - AF-604
        - AF-605
        - AF-606
        - AF-607
        - AF-608
        - AF-609
        - AF-610
        - AF-611
      main_artifact: model audit and claim–evidence table
      primary_verifier: metric engine and evaluation linter
      misconceptions:
        - “High accuracy means a good classifier.”
        - Precision and recall are interchangeable.
        - Cross-validation removes the need for a final test.
        - A smaller training error means a better deployed model.
        - Calibration and discrimination are the same property.
        - Average performance guarantees acceptable subgroup performance.
