      world_adaptation_spec_version: ms-world-adaptation-v0.1
      world_adaptation_spec_hash: sha256:b9e1a9bd0ddc74c4b6d51a8a0bd3a9abfcfe63786fe0d6aba551484c669df558
      world_locked_at_compile_time: true
      world_public_constraints:
        artifact: model audit and claim–evidence table
        primary_verifier: metric engine and evaluation linter
        verifier_evidence:
          - A metric engine recomputes all values from predictions. An evaluation linter traces data access
            and flags test-set reuse, group leakage, preprocessing leakage, and incomparable model runs.
            Learning-curve tasks use parameterized ground truth. Calibration checks compute bin statistics and
            proper scoring rules
          - >-
            Audit a persuasive but invalid model-performance report. The learner must identify each
            unsupported claim, reconstruct a valid evaluation, and predict which conclusions may change.


            ---
        preferred_action_families:
          - repair_overconfidence
          - request_evidence
          - contrast_models
          - challenge_without_telling
        disallowed_action_families:
          - model_worked_example
        success_observables:
          - Learner identifies which part of "Derive metrics from counts rather than memorized formulas" is
            uncertain.
          - Learner gives a reason that can be checked by A metric engine recomputes all values from
            predictions. An evaluation linter traces data access and flags test-set reuse, group leakage,
            preprocessing leakage, and incomparable model runs. Learning-curve tasks use parameterized ground
            truth. Calibration checks compute bin statistics and proper scoring rules.
          - Learner contrasts the misconception with an artifact-testable alternative.
          - Learner chooses the next check for model audit and claim–evidence table.
          - Learner makes a bounded attempt before receiving validation.
        forbidden_public_moves:
          - Do not expose curriculum misconception labels, answer keys, or verifier internals to the learner.
          - Do not supply the decisive proof or artifact repair before the learner commits to a testable move.
          - Do not replace the learner-authored artifact or plan with a tutor-authored finished answer.
        boundary: Public-safe projection for drama generation; hidden misconception IDs and answer keys are not
          included.
