name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch managed archive branches and tags
        run: >-
          git fetch origin
          '+refs/heads/archive/*:refs/remotes/origin/archive/*'
          '+refs/tags/*:refs/tags/*'
          --prune

      - name: Validate ref and version registry
        run: npm run refs:check

      - run: npm run lint
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Create data directory and initialize empty database
        run: mkdir -p data && node --input-type=module -e "import './services/evaluationStore.js'"

      - run: npm test

  pty-concurrency:
    name: PTY / loopback concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Run the concurrent terminal lane without forced exit
        run: npm run test:pty:ci

  risk-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run test:coverage:risk

      - name: Upload risk coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-coverage
          path: coverage/risk
          if-no-files-found: error
