# Fly.io configuration for the static /findings/ deploy.
# Build from project root: flyctl deploy --config deploy/findings/fly.toml --dockerfile deploy/findings/Dockerfile

app = "machinespirits-findings"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
