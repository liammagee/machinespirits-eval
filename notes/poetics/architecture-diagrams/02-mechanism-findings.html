<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>Mechanism Findings</title>
<style>
  :root {
    --paper: #f4eedd;
    --paper-2: #fbf6e8;
    --ink: #14100c;
    --ink-2: #2c241b;
    --ink-3: #5c5040;
    --rule: rgba(20, 16, 12, 0.18);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--paper);
    color: var(--ink-2);
    font-family: Georgia, Cambria, "Times New Roman", serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(140% 90% at 50% 0%, transparent 55%, rgba(20, 16, 12, 0.08)),
      radial-gradient(80% 70% at 8% 92%, rgba(165, 62, 46, 0.06), transparent 70%);
  }

  main {
    width: min(96rem, calc(100vw - 2rem));
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 3rem) 0;
  }

  .kicker {
    margin: 0 0 0.5rem;
    color: var(--ink-3);
    font: 0.75rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  h1 {
    max-width: 62rem;
    margin: 0 0 0.75rem;
    color: var(--ink);
    font-size: clamp(2rem, 1.25rem + 3vw, 4.4rem);
    line-height: 1;
    letter-spacing: 0;
  }

  .intro {
    max-width: 54rem;
    margin: 0 0 1.5rem;
    color: var(--ink-3);
    font-size: 1.05rem;
    line-height: 1.55;
  }

  .panel {
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: rgba(251, 246, 232, 0.88);
    padding: clamp(0.8rem, 2vw, 1.4rem);
  }
</style>
</head>
<body>
<main>
  <p class="kicker">Mermaid HTML render</p>
  <h1>Mechanism Findings</h1>
  <p class="intro">
    This page is generated from <code>02-mechanism-findings.mmd</code>.
    The diagram renders through the reusable <code>mermaid-file-viewer</code>
    component and embeds the Mermaid source for review.
  </p>
  <section class="panel">
    <mermaid-file-viewer
      title="Mechanism Findings"
      caption="Supported mechanisms, nulls, and interpretation boundaries from Paper 2.0."
      src="02-mechanism-findings.mmd"
    >
      <script type="text/plain" data-mermaid-source>flowchart TB
  question["Research question: through what architecture-level mechanisms does recognition-oriented tutoring improve output?"]:::state

  question --> m1["M1: prompt-level calibration"]:::mechanism
  question --> m2["M2: architecture-level error correction"]:::mechanism
  question --> m3["M3: interaction-level adaptive responsiveness"]:::mechanism

  m1 --> m1Evidence["Recognition narrows output variance, lifts weak dimensions, and works without a superego"]:::support
  m1Evidence --> m1Read["Supported: intersubjective orientation constrains the ego from the first turn"]:::read

  m2 --> m2Base["Base prompt + superego: critic catches failures and improves output"]:::support
  m2 --> m2Recog["Recognition + superego: marginal benefit collapses on strong models"]:::mixed
  m2Base --> substitution["Universal substitution: calibration pre-empts errors the superego would catch"]:::read
  m2Recog --> substitution
  substitution --> residual["Residual architecture benefit is model-dependent, largest when the ego is weaker"]:::mixed

  m3 --> slopes["Turn-by-turn slopes, deltas, trajectory curves, and learner-side slopes"]:::instrument
  slopes --> null["Null at the fixed-rubric rate level: recognition raises levels, not rates"]:::null
  null --> scope["Scope: this does not prove rich adaptation impossible; it bounds the measured slope proxy"]:::caveat

  question --> extensions["Architectural extension arcs"]:::mechanism
  extensions --> idDirector["Id-director charisma family: operationalizable, scenario-conditional"]:::mixed
  extensions --> adaptiveRunner["Adaptive runner: trap apparatus works; rich state and ToM mostly do not pay"]:::mixed
  extensions --> derivation["Dramatic derivation: conduct governance works through criterial guards"]:::support

  adaptiveRunner --> apparatus["Durable contribution: apparatus, not richer learner-state machinery"]:::read
  derivation --> boundary["No universal hidden or visible guard; proof-debt and world geometry matter"]:::caveat

  m1Read --> human["Human learning outcomes remain open"]:::frontier
  substitution --> human
  scope --> human
  apparatus --> human
  boundary --> human

  classDef state fill:#e0f2fe,stroke:#0369a1,color:#082f49,stroke-width:2px;
  classDef mechanism fill:#dbeafe,stroke:#2563eb,color:#0f172a,stroke-width:2px;
  classDef support fill:#dcfce7,stroke:#16a34a,color:#052e16,stroke-width:2px;
  classDef mixed fill:#fef3c7,stroke:#d97706,color:#422006,stroke-width:2px;
  classDef null fill:#fee2e2,stroke:#dc2626,color:#450a0a,stroke-width:2px;
  classDef caveat fill:#f3f4f6,stroke:#6b7280,color:#111827,stroke-width:2px;
  classDef read fill:#ede9fe,stroke:#7c3aed,color:#2e1065,stroke-width:2px;
  classDef instrument fill:#fce7f3,stroke:#be185d,color:#500724,stroke-width:2px;
  classDef frontier fill:#ecfccb,stroke:#65a30d,color:#1a2e05,stroke-width:2px;</script>
    </mermaid-file-viewer>
  </section>
</main>
<script src="../../../public/components/mermaid-file-viewer.js"></script>
</body>
</html>
