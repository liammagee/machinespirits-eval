<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>Conduct Governance Boundary</title>
<style>
  :root {
    --paper: #f4eedd;
    --paper-2: #fbf6e8;
    --ink: #14100c;
    --ink-2: #2c241b;
    --ink-3: #5c5040;
    --rule: rgba(20, 16, 12, 0.18);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--paper);
    color: var(--ink-2);
    font-family: Georgia, Cambria, "Times New Roman", serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(140% 90% at 50% 0%, transparent 55%, rgba(20, 16, 12, 0.08)),
      radial-gradient(80% 70% at 8% 92%, rgba(165, 62, 46, 0.06), transparent 70%);
  }

  main {
    width: min(96rem, calc(100vw - 2rem));
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 3rem) 0;
  }

  .kicker {
    margin: 0 0 0.5rem;
    color: var(--ink-3);
    font: 0.75rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  h1 {
    max-width: 62rem;
    margin: 0 0 0.75rem;
    color: var(--ink);
    font-size: clamp(2rem, 1.25rem + 3vw, 4.4rem);
    line-height: 1;
    letter-spacing: 0;
  }

  .intro {
    max-width: 54rem;
    margin: 0 0 1.5rem;
    color: var(--ink-3);
    font-size: 1.05rem;
    line-height: 1.55;
  }

  .panel {
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: rgba(251, 246, 232, 0.88);
    padding: clamp(0.8rem, 2vw, 1.4rem);
  }
</style>
</head>
<body>
<main>
  <p class="kicker">Mermaid HTML render</p>
  <h1>Conduct Governance Boundary</h1>
  <p class="intro">
    This page is generated from <code>04-conduct-governance-boundary.mmd</code>.
    The diagram renders through the reusable <code>mermaid-file-viewer</code>
    component and embeds the Mermaid source for review.
  </p>
  <section class="panel">
    <mermaid-file-viewer
      title="Conduct Governance Boundary"
      caption="Proof-world stage, pacing guards, proof debt, and the no-universal-single-channel boundary."
      src="04-conduct-governance-boundary.mmd"
    >
      <script type="text/plain" data-mermaid-source>flowchart TB
  subgraph stage["Dramatic derivation stage"]
    world["Proof world: rules, background, secret, release schedule"]:::state
    director["Director declares movement; does not speak in scene"]:::agent
    tutor["Tutor drafts public teaching move plus metadata"]:::agent
    learner["Learner adopts released facts, voices derivations, may assert S"]:::agent
    checker["Mechanical checker: grounded anagnorisis only if S is forced"]:::score
    world --> director
    director --> tutor
    tutor --> learner
    learner --> checker
    checker --> world
  end

  subgraph guards["Checkable conduct guards"]
    hidden["Hidden pacing guard H: reads derivation distance and release solvency"]:::guard
    visible["Visible pacing guard V: reads page-level uptake and visible drift"]:::guard
    proofDebt["Proof-debt guard: restores decayed released premises that improve D"]:::guard
    runtime["Runtime monitor: release adherence, leaks, overreach, aporia"]:::guard
  end

  world --> hidden
  learner --> visible
  learner --> proofDebt
  tutor --> runtime
  hidden --> tutor
  visible --> tutor
  proofDebt --> tutor
  runtime --> checker

  subgraph boundary["Boundary found by the research"]
    linear["Linear coupled chain: page tracks proof distance"]:::case
    fork["Forked AND-join: page can look complete while latent depth remains"]:::case
    distractor["Linear distractor: visible drift to a true but wrong side finding"]:::case
    linear --> both["V and H both pace well"]:::support
    fork --> hOnly["H works; V fails"]:::mixed
    distractor --> vOnly["V works; H fails"]:::mixed
    both --> noUniversal["No universal single-channel guard"]:::caveat
    hOnly --> noUniversal
    vOnly --> noUniversal
  end

  proofDebt --> baseline["hidden + proofDebt becomes the reliability baseline for production derivation runs"]:::support
  noUniversal --> selector["Selector route tests do not establish adaptive representation selection"]:::caveat
  selector --> baseline

  classDef state fill:#e0f2fe,stroke:#0369a1,color:#082f49,stroke-width:2px;
  classDef agent fill:#dbeafe,stroke:#2563eb,color:#0f172a,stroke-width:2px;
  classDef score fill:#ffe4e6,stroke:#be123c,color:#4c0519,stroke-width:2px;
  classDef guard fill:#fef3c7,stroke:#d97706,color:#422006,stroke-width:2px;
  classDef case fill:#f8fafc,stroke:#64748b,color:#0f172a,stroke-width:2px;
  classDef support fill:#dcfce7,stroke:#16a34a,color:#052e16,stroke-width:2px;
  classDef mixed fill:#fde68a,stroke:#b45309,color:#422006,stroke-width:2px;
  classDef caveat fill:#fee2e2,stroke:#dc2626,color:#450a0a,stroke-width:2px;</script>
    </mermaid-file-viewer>
  </section>
</main>
<script src="../../../public/components/mermaid-file-viewer.js"></script>
</body>
</html>
