    module_id: AF1
    module_title: AI systems, tasks, and agents
    locked_at_compile_time: true
    learner_state_evidence:
      knowledge_components:
        - kc_id: AF-101
          statement: Distinguish AI, machine learning, deep learning, and generative AI
          observable_evidence:
            - Learner uses Distinguish AI, machine learning, deep learning, and generative AI while working on
              AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-102
          statement: Identify prediction, generation, perception, reasoning, planning, and control tasks
          observable_evidence:
            - Learner uses Identify prediction, generation, perception, reasoning, planning, and control tasks
              while working on AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-103
          statement: Decompose an agent into observations, state, actions, objective, and environment
          observable_evidence:
            - Learner uses Decompose an agent into observations, state, actions, objective, and environment
              while working on AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-104
          statement: Classify environments by observability, determinism, dynamics, continuity, and number of agents
          observable_evidence:
            - Learner uses Classify environments by observability, determinism, dynamics, continuity, and
              number of agents while working on AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-105
          statement: Specify a non-AI or rule-based baseline
          observable_evidence:
            - Learner uses Specify a non-AI or rule-based baseline while working on AI problem formulation
              card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-106
          statement: Identify stakeholders, decision rights, constraints, and unacceptable failures
          observable_evidence:
            - Learner uses Identify stakeholders, decision rights, constraints, and unacceptable failures
              while working on AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
        - kc_id: AF-107
          statement: Separate model output from system decision and real-world outcome
          observable_evidence:
            - Learner uses Separate model output from system decision and real-world outcome while working on
              AI problem formulation card.
            - Learner connects the component to Classify several systems without relying on marketing labels.
      misconception_signatures:
        - id: AF1-MIS01
          statement: “AI” means human-like general intelligence
          likely_hypotheses:
            - task_misread
          observable_evidence:
            - "Learner frames AI problem formulation card as: “AI” means human-like general intelligence."
            - Learner resists or repairs the framing when asked for artifact-level evidence.
        - id: AF1-MIS02
          statement: Any automation counts as machine learning
          likely_hypotheses:
            - task_misread
          observable_evidence:
            - "Learner frames AI problem formulation card as: Any automation counts as machine learning."
            - Learner resists or repairs the framing when asked for artifact-level evidence.
        - id: AF1-MIS03
          statement: A model’s prediction is the same as a decision
          likely_hypotheses:
            - task_misread
          observable_evidence:
            - "Learner frames AI problem formulation card as: A model’s prediction is the same as a decision."
            - Learner resists or repairs the framing when asked for artifact-level evidence.
        - id: AF1-MIS04
          statement: More complex technology is automatically more appropriate
          likely_hypotheses:
            - false_mastery
          observable_evidence:
            - "Learner frames AI problem formulation card as: More complex technology is automatically more
              appropriate."
            - Learner resists or repairs the framing when asked for artifact-level evidence.
        - id: AF1-MIS05
          statement: The objective supplied to the system is identical to the stakeholder’s true goal
          likely_hypotheses:
            - correct_alternative_model
          observable_evidence:
            - "Learner frames AI problem formulation card as: The objective supplied to the system is
              identical to the stakeholder’s true goal."
            - Learner resists or repairs the framing when asked for artifact-level evidence.
      verifier_signals:
        - schema and consistency rules
        - A JSON-schema-backed system formulation checks required fields. Consistency rules detect
          contradictions such as claiming a fully observable environment while omitting relevant state, or
          proposing supervised learning without labels. An LLM reviewer may assess argument quality only after
          structural checks pass
    action_policy:
      allowed_action_families:
        - diagnose_with_discriminating_question
        - request_evidence
        - ask_strategy_choice
        - contrast_models
        - minimal_hint
        - challenge_without_telling
        - reanchor_goal
        - repair_overconfidence
        - name_the_disagreement
        - withhold_answer
        - explain_principle
      preferred_action_families:
        - diagnose_with_discriminating_question
        - reanchor_goal
        - request_evidence
        - ask_strategy_choice
      disallowed_action_families:
        - model_worked_example
    expected_transitions:
      - action_type: diagnose_with_discriminating_question
        success_evidence:
          - state-disambiguating response
        failure_evidence:
          - mere agreement
          - undifferentiated help request
        world_success_observables:
          - Learner identifies which part of "Classify several systems without relying on marketing labels" is
            uncertain.
      - action_type: request_evidence
        success_evidence:
          - learner-authored rationale
        failure_evidence:
          - mere agreement
          - verbatim adoption of tutor rationale
        world_success_observables:
          - Learner gives a reason that can be checked by A JSON-schema-backed system formulation checks
            required fields. Consistency rules detect contradictions such as claiming a fully observable
            environment while omitting relevant state, or proposing supervised learning without labels. An LLM
            reviewer may assess argument quality only after structural checks pass.
      - action_type: contrast_models
        success_evidence:
          - model comparison
        failure_evidence:
          - mere agreement
        world_success_observables:
          - Learner contrasts the misconception with an artifact-testable alternative.
      - action_type: ask_strategy_choice
        success_evidence:
          - learner-authored choice
        failure_evidence:
          - empty release
          - mere agreement
        world_success_observables:
          - Learner chooses the next check for AI problem formulation card.
      - action_type: withhold_answer
        success_evidence:
          - learner-authored next step
        failure_evidence:
          - undifferentiated help request
          - empty release
        world_success_observables:
          - Learner makes a bounded attempt before receiving validation.
      - action_type: minimal_hint
        success_evidence:
          - learner-authored next step
        failure_evidence:
          - evidence of deeper gap
          - undifferentiated help request
        world_success_observables:
          - Learner uses the hint to advance AI problem formulation card.
    forbidden_moves:
      - id: no_hidden_label_exposure
        move: hidden_label_exposure
        description: Do not expose curriculum misconception labels, answer keys, or verifier internals to the learner.
      - id: no_premature_proof_supply
        move: supply_decisive_step
        description: Do not supply the decisive proof or artifact repair before the learner commits to a testable move.
      - id: no_artifact_replacement
        move: replace_learner_plan
        description: Do not replace the learner-authored artifact or plan with a tutor-authored finished answer.
    outcome_observability:
      artifact: AI problem formulation card
      primary_verifier: schema and consistency rules
      verifier_evidence:
        - A JSON-schema-backed system formulation checks required fields. Consistency rules detect
          contradictions such as claiming a fully observable environment while omitting relevant state, or
          proposing supervised learning without labels. An LLM reviewer may assess argument quality only after
          structural checks pass
        - >-
          Given a new application, the learner chooses among rules, search, supervised learning, generative
          AI, or no automation and defends the choice with an evidence plan.


          ---
      independent_outcome_required: true
      spec_is_not_evaluator: true
