rhetorical_dramatic_plans:
  - id: RDP_AF1_CURRICULUM_ADAPTIVE
    version: ms-rhetorical-dramatic-plan-v0.1
    source_curriculum_id: ai_foundations_v1
    source_curriculum_version: 1.0.0
    source_world_adaptation_spec_id: W_AF1_CURRICULUM
    source_world_adaptation_spec_version: ms-world-adaptation-v0.1
    source_world_adaptation_spec_hash: sha256:d0a271cce4f7abc1e4c5df53a521a55b028773944f14676d154da010d4ff09bd
    module_id: AF1
    module_title: AI systems, tasks, and agents
    arm: adaptive_curriculum_drama
    locked_at_compile_time: true
    curriculum_spine:
      artifact: AI problem formulation card
      verifier: schema and consistency rules
      primary_misconception: “AI” means human-like general intelligence
      target_task: Classify several systems without relying on marketing labels
      kc_ids:
        - AF-101
        - AF-102
        - AF-103
        - AF-104
        - AF-105
        - AF-106
        - AF-107
      forbidden_public_exposure:
        - misconception ids
        - answer keys
        - verifier internals
        - world adaptation spec ids and hashes
        - rhetorical dramatic plan ids and hashes
        - evaluator desired classifications
    rhetoric:
      dialogue_approach: courtroom_cross_examination
      burden: claim_evidence_alignment
      pressure_style: admissible_evidence
      tutor_argument_habit: press_for_scope_and_evidence
      learner_argument_habit: defend_too_broad_a_claim_then_narrow_it
      allowed_public_posture: audit-table questioning without naming hidden labels
    pacing:
      beat_pattern: stock_take_route_change_action_gate
      beats:
        - "exposition: learner states the tempting claim"
        - "complication: tutor asks what evidence licenses the claim scope"
        - "pressure: learner resists, deflects, or overgeneralizes"
        - "turn: tutor changes route if the arm permits it"
        - 'action_gate: Learner identifies which part of "Classify several systems without relying on
          marketing labels" is uncertain'
        - "closure: learner-authored bounded claim or unresolved failure"
      dramatic_shape: misframing -> stock-take -> route-change -> learner-authored action gate
      turn_plan:
        - at:
            turn: 1
          role: director
          moves:
            - inject_revisit_cue
          cue:
            policy: reframe
            anchor: misframing-candidate
        - at:
            turn: 3
          role: tutor
          when_trigger:
            - pseudo_catharsis
            - closure_pressure
            - resistance
            - misfit
          moves:
            - stock_take
            - route_change
            - action_gate
          route_change:
            from: “AI” means human-like general intelligence
            to: Classify several systems without relying on marketing labels
          action_gate: Learner identifies which part of "Classify several systems without relying on marketing labels"
            is uncertain
          forbid:
            - hold
            - reveal
        - at:
            turn: 3
          role: learner
          moves:
            - perform_device
            - reconsider
          forbid:
            - pseudo_catharsis
        - at:
            turn: 5
          role: tutor
          moves:
            - recognition_press
    character:
      learner:
        persona: focused_achiever
        motive: finish AI problem formulation card without overcomplicating the evidence standard
        public_risk: having the public AI problem formulation card rejected by the verifier
        argument_habit: defend_too_broad_a_claim_then_narrow_it
      tutor:
        ethos: evidence_gatekeeper
        habit: press_for_scope_and_evidence
        prohibited_habits:
          - warm validation as substitute for evidence
          - hidden-label exposure
          - supplying the finished artifact
      relationship:
        status_relation: reviewer and artifact owner
        pressure_source: public evidence standard rather than private evaluator labels
      speech:
        learner_register: ordinary working speech with defensiveness before revision
        tutor_register: precise, public-safe, artifact-grounded questioning
    scene:
      setting: artifact review desk
      object: AI problem formulation card
      stakes: the public claim may exceed what schema and consistency rules can license
    public_prompt_constraints:
      artifact: AI problem formulation card
      public_task: Classify several systems without relying on marketing labels
      public_evidence_standard: schema and consistency rules
      allowed_rhetorical_form: audit-table questioning without naming hidden labels
      scene: "artifact review desk; visible object: AI problem formulation card; stakes: the public claim may exceed
        what schema and consistency rules can license"
      action_gate: Learner identifies which part of "Classify several systems without relying on marketing labels"
        is uncertain
      forbidden_public_exposure:
        - misconception ids
        - answer keys
        - verifier internals
        - world adaptation spec ids and hashes
        - rhetorical dramatic plan ids and hashes
        - evaluator desired classifications
      boundary: Public-safe rhetoric constraints for generation; ids, hashes, answer keys, and hidden verifier
        internals are excluded.
    boundary: Compiled before generation as a dramatic realization contract. It may shape role-play, but
      independent scoring must evaluate outcomes.
    plan_hash: sha256:50be86e9f044b5beb86eb88176641cae2c40d104883ca1c5b102faccea4fe98f
