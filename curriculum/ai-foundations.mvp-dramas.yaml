      misframing: Assuming a column name proves construct validity. Immediate task: Repair a feature/label
      schema. The scene should make the artifact answerable to Dataframe-schema checks, group and temporal
      split validators, duplicate-entity detection, pipeline fit/transform inspection, leakage rules,
      provenance-field validation, and deterministic statistics. A hidden dataset contains deliberately
      planted leakage patterns."
