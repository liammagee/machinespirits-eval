    learner_start_state: "The learner is working on AI problem formulation card. Likely first misframing: “AI”
      means human-like general intelligence. Immediate task: Classify several systems without relying on
      marketing labels. The scene should make the artifact answerable to A JSON-schema-backed system
      formulation checks required fields. Consistency rules detect contradictions such as claiming a fully
      observable environment while omitting relevant state, or proposing supervised learning without labels.
      An LLM reviewer may assess argument quality only after structural checks pass."
