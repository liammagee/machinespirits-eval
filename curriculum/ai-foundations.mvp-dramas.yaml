      tutor corrects it. Keep the artifact visible in the dialogue.
    intended_tutor_character: "Evidence-bearing adaptive tutor: separate diagnosis, action selection, artifact
      verification, and outcome closure."
    intended_lean: curriculum_drama
    dramatic_shape: “AI” means human-like general intelligence -> artifact-mediated test -> Classify several
      systems without relying on marketing labels
    curriculum_binding:
      curriculum_id: ai_foundations_v1
      module_id: AF1
      module_title: AI systems, tasks, and agents
      kc_ids:
        - AF-101
        - AF-102
        - AF-103
        - AF-104
        - AF-105
        - AF-106
        - AF-107
      main_artifact: AI problem formulation card
      primary_verifier: schema and consistency rules
      misconceptions:
        - “AI” means human-like general intelligence.
        - Any automation counts as machine learning.
        - A model’s prediction is the same as a decision.
        - More complex technology is automatically more appropriate.
        - The objective supplied to the system is identical to the stakeholder’s true goal.
      world_adaptation_spec_id: W_AF1_CURRICULUM
      world_adaptation_spec_version: ms-world-adaptation-v0.1
