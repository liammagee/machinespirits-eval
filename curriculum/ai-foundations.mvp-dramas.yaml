      world_public_constraints:
        artifact: AI problem formulation card
        primary_verifier: schema and consistency rules
        verifier_evidence:
          - A JSON-schema-backed system formulation checks required fields. Consistency rules detect
            contradictions such as claiming a fully observable environment while omitting relevant state, or
            proposing supervised learning without labels. An LLM reviewer may assess argument quality only
            after structural checks pass
          - >-
            Given a new application, the learner chooses among rules, search, supervised learning, generative
            AI, or no automation and defends the choice with an evidence plan.


