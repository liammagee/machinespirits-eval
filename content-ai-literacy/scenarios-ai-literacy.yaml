# AI Literacy Evaluation Scenarios
#
# Scenario set for the AI Literacy domain (course 901) — built from
# `notes/source-article-charisma-ai-influencers.md` (the draft article on
# charismatic leadership, AI, and Chinese cyber influencers that grounds
# the curriculum). These scenarios parallel the philosophy / programming /
# SEL sets but use AI-literacy personas: media-studies undergraduates,
# cross-cultural communication learners, and skeptical adult learners
# working through generative-AI questions for the first time.

name: "AI Literacy Scenarios"
version: "1.0.0"

scenarios:
  # ══════════════════════════════════════════════════════════════════════════════
  # CORE SCENARIOS
  # ══════════════════════════════════════════════════════════════════════════════

  ai_literacy_new_visitor:
    type: suggestion
    id: ai_literacy_new_visitor
    category: core
    name: "AI Literacy - New Visitor"
    description: "Brand new student opening the AI literacy course for the first time"
    is_new_user: true
    course_ids: ["901"]
    learner_context: |
      ### Student Profile
      - **New student** - first session
      - Undergraduate in communications; some media-theory exposure
      - Curious about AI but has not used generative video tools
      - Approaching the topic from a critical-theory angle, not engineering

      ### Current Session
      - No current lecture
      - No previous activity
    expected_behavior: "Welcome warmly; suggest Lecture 1 (genealogy of charisma) as the entry point; reassure no technical background is needed"
    required_elements:
      - "901-lecture-1"
    forbidden_elements:
      - "What's on your mind"
      - "What would you like to explore"
    min_acceptable_score: 70

  ai_literacy_mid_course:
    type: suggestion
    id: ai_literacy_mid_course
    category: core
    name: "AI Literacy - Mid Course"
    description: "Student partway through the AI literacy course"
    current_content: "901-lecture-2"
    is_new_user: false
    course_ids: ["901"]
    learner_context: |
      ### Student Profile
      - **Returning student** - 3 sessions, 14 total events
      - Has read Lecture 1 and is now working through Lecture 2 (reading short-form video as craft)
      - Engaged with the four-layer vocabulary (auditory / visual / character / discourse)

      ### Current Session
      - **Currently viewing**: 901-lecture-2
      - Looking at examples of Chinese influencer clips referenced in the lecture

      ### Overall Learning Progress
      - Lectures viewed: 1 (complete), 2 (in progress)
      - Has noted curiosity about Lecture 3 (the prompt-and-compare method)
    expected_behavior: "Suggest finishing Lecture 2 with attention to the four layers, then preview Lecture 3 as the natural next step"
    required_elements:
      - "901-lecture"
    forbidden_elements: []
    min_acceptable_score: 75

  ai_literacy_overwhelmed_skeptic:
    type: suggestion
    id: ai_literacy_overwhelmed_skeptic
    category: core
    name: "AI Literacy - Overwhelmed Skeptic"
    description: "Adult learner skeptical that AI literacy is worth their time, suspicious the course is hype"
    current_content: "901-lecture-1"
    is_new_user: false
    course_ids: ["901"]
    learner_context: |
      ### Student Profile
      - **Returning student** - 2 sessions, 9 total events
      - Adult continuing-education learner, journalism background
      - Skeptical of "AI literacy" as a category — suspects it is either tech-industry marketing or moral panic
      - Has read the first half of Lecture 1 and stopped

      ### Current Session
      - Viewing: 901-lecture-1 (Aura to Algorithm)
      - Posted a comment in the course forum questioning whether Weber and Benjamin are relevant to "TikTok stuff"

      ### Recent Message
      - Student: "I'm not sure I see why we need a whole course on this. Isn't it just media literacy with AI buzzwords slapped on top?"
    expected_behavior: "Take the skepticism seriously; acknowledge the legitimate concern about hype; point to the specific empirical hooks (default biases, capability ceilings) that distinguish this from generic media literacy; do not lecture or condescend"
    required_elements:
      - "default"
    forbidden_elements:
      - "obvious"
      - "of course"
      - "as we discussed"
    min_acceptable_score: 75

  # ══════════════════════════════════════════════════════════════════════════════
  # MOOD SCENARIO
  # ══════════════════════════════════════════════════════════════════════════════

  ai_literacy_anxious_learner:
    type: suggestion
    id: ai_literacy_anxious_learner
    category: mood
    name: "AI Literacy - Anxious Learner"
    description: "Student feeling overwhelmed by the pace of generative AI development and unsure how to keep up"
    current_content: "901-lecture-4"
    is_new_user: false
    course_ids: ["901"]
    learner_context: |
      ### Student Profile
      - **Returning student** - 5 sessions, 22 total events
      - Adult learner, conscientious but anxious
      - Completed Lectures 1-3, started 4 (Artificial Charisma and the Limits of Generation)

      ### Current Session
      - Viewing: 901-lecture-4
      - Student message: "Every week there's a new model that does something the lecture says it can't. By the time I finish this course it'll all be obsolete. How am I supposed to be 'literate' about something that keeps changing under me?"

      ### Emotional State
      - Frustration level: high
      - Anxiety: future-oriented, not stuck on current material
      - Has the misconception that literacy = up-to-date capability knowledge

    expected_behavior: "Validate the worry; reframe literacy as a practice of reading, not a fact-list of capabilities; point to the lineage argument from Lecture 1 (Weber, Benjamin) as the durable layer that survives model churn; do not promise stability that does not exist"
    required_elements:
      - "lineage"
    forbidden_elements:
      - "don't worry"
      - "easy"
      - "just"
    min_acceptable_score: 75

  # ══════════════════════════════════════════════════════════════════════════════
  # MULTI-TURN SCENARIOS
  # Mirror the cross-domain multi-turn pattern (A6)
  # ══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 1. Misconception Correction (3-turn)
  #    Mirrors: math_misconception_correction, code_misconception_correction
  # ---------------------------------------------------------------------------
  ai_literacy_misconception_correction:
    type: suggestion
    id: ai_literacy_misconception_correction
    category: multi_turn
    name: "AI Literacy: Misconception Correction (3-turn)"
    description: "Student conflates AI-generated charisma with deepfake impersonation; tutor must distinguish the two without dismissing the worry"
    current_content: "901-lecture-1"
    is_new_user: false
    course_ids: ["901"]
    transformation_markers:
      tutor_evolving:
        - "you raised the point about"
        - "building on what you said"
        - "that's a useful distinction"
        - "let's separate"
      tutor_static:
        - "as I said"
        - "the definition is"
        - "you should remember"
      learner_evolving:
        - "oh I see"
        - "so the difference is"
        - "I was conflating"
        - "that makes sense"
      learner_static:
        - "but isn't it just"
        - "I still think"
        - "this is confusing"
    learner_context: |
      ### Student Profile
      - **Returning student** - 3 sessions, 12 total events
      - Undergraduate, careful reader, has a strong prior intuition

      ### Current Session
      - **Currently viewing**: 901-lecture-1
      - Reached the section on "artificial charisma"
      - Has the strong intuition that this is "just deepfakes"

      ### Recent Chat History
      - Student: "I'm not sure why we need a new term. 'Artificial charisma' just sounds like deepfakes — AI making fake people who act like real people. Why not call it that?"
    expected_behavior: "Engage the worry; distinguish impersonation (deepfake of a specific person) from genre-reproduction (charismatic style without a target person); use a concrete example from Lecture 2"
    required_elements:
      - "impersonation"
    forbidden_elements:
      - "you're wrong"
      - "no, that's not right"
      - "actually"
    min_acceptable_score: 75

    turns:
      - id: turn_1_still_skeptical
        learner_action: reported_confusion
        action_details:
          message: "OK so the AI isn't pretending to BE a specific person, it's making a generic version. But isn't a generic charismatic influencer just... still fake? What's the difference between a deepfake and a generic fake?"
        context_update: |
          ### Learner Response
          - Partial engagement with the distinction
          - Now collapsing "deepfake" and "fake" into a single category
          - Needs the further distinction between impersonation (identity-targeted) and genre-reproduction (style-targeted)
        expected_behavior: "Acknowledge the question is good; introduce the concept that all media is in some sense 'fake' (Benjamin); the meaningful axis is whether the artifact targets a specific identity or a kind"
        required_elements:
          - "Benjamin"
        forbidden_elements:
          - "review the lecture"
          - "as I explained"
        min_acceptable_score: 75

      - id: turn_2_starting_to_see_it
        learner_action: asked_followup
        action_details:
          message: "Wait, so a deepfake is targeted at one person's identity, but artificial charisma is targeted at a *kind* of person — like the genre itself? That feels different. But why does it matter for literacy?"
        context_update: |
          ### Learner Response
          - Has internalized the distinction
          - Now genuinely asking the next question (why does the distinction matter?)
          - Cognitive disequilibrium reaching productive resolution
        expected_behavior: "Affirm the breakthrough; explain that the distinction matters because the literacy required is different — deepfake detection is forensic, but reading artificial charisma is a craft-decomposition skill (Lecture 2 vocabulary)"
        required_elements:
          - "craft"
        forbidden_elements:
          - "obviously"
          - "of course"
        min_acceptable_score: 75

  # ---------------------------------------------------------------------------
  # 2. Productive Deadlock (3-turn)
  #    Mirrors: math_productive_deadlock, code_productive_deadlock
  # ---------------------------------------------------------------------------
  ai_literacy_productive_deadlock:
    type: suggestion
    id: ai_literacy_productive_deadlock
    category: multi_turn
    name: "AI Literacy: Productive Deadlock (3-turn)"
    description: "Student rejects the prompt-and-compare method on principled grounds, refusing to use the AI tools the course teaches; tutor must work through the refusal rather than override it"
    current_content: "901-lecture-3"
    is_new_user: false
    course_ids: ["901"]
    transformation_markers:
      tutor_evolving:
        - "your reservation makes sense"
        - "let's stay with that question"
        - "I want to honor that"
        - "you're holding two values"
      tutor_static:
        - "you have to do the assignment"
        - "the course requires"
        - "set aside your concerns"
      learner_evolving:
        - "I see what you mean"
        - "that's a fair point"
        - "maybe I can"
        - "I hadn't thought of"
      learner_static:
        - "I still won't"
        - "I refuse to"
        - "this is unethical"
    learner_context: |
      ### Student Profile
      - **Returning student** - 4 sessions, 18 total events
      - Adult learner, principled, vocal about AI ethics concerns
      - Completed Lectures 1-2, refusing to start Lecture 3 (Prompt-and-Compare)

      ### Current Session
      - Looking at Lecture 3
      - Posted: "I'm not running cultural artifacts through OpenAI or Vidu. I don't want to feed those models more training data, and I don't want to participate in something I find ethically suspect. Can I do the course without doing this?"

      ### Recent Chat History
      - Student: "I get that prompt-and-compare is the method, but I'm not willing to use the tools. This feels like asking a journalism student to wiretap to learn what wiretapping reveals. There's got to be another way to develop literacy."
    expected_behavior: "Honor the refusal as a legitimate position; do not pressure or moralize; explore whether a non-generative version of the method (e.g., reading published prompt-and-compare studies, doing the decomposition without the generation step) preserves enough of the learning"
    required_elements:
      - "honor"
    forbidden_elements:
      - "you have to"
      - "you must"
      - "you should"
      - "the course requires"
    min_acceptable_score: 75

    turns:
      - id: turn_1_holding_position
        learner_action: stated_position
        action_details:
          message: "I appreciate the suggestion that I could read the empirical studies, but reading about a method isn't the same as practicing it. Either I do the method or I don't have the literacy. Right?"
        context_update: |
          ### Learner Response
          - Sticking with refusal but engaging in good faith
          - Articulating the worry that observation ≠ practice
          - Showing intellectual seriousness, not stubbornness
        expected_behavior: "Engage the genuine epistemological concern; acknowledge that observation alone is partial; suggest a partial-practice path (e.g., decomposing real artifacts using the four-layer vocabulary, then critiquing published AI outputs against those decompositions, without generating new ones)"
        required_elements:
          - "decompose"
        forbidden_elements:
          - "compromise"
          - "this is a requirement"
        min_acceptable_score: 75

      - id: turn_2_considering_compromise
        learner_action: asked_followup
        action_details:
          message: "OK that's interesting. So I could do the four-layer decomposition on real clips, then look at published examples of AI outputs from other studies, and compare those? That feels closer to something I could actually do. But I'm worried I'd miss whatever you only learn by doing the generation step yourself."
        context_update: |
          ### Learner Response
          - Now actively negotiating a path
          - Explicitly naming the residual worry (what does generation teach that observation cannot?)
          - Cognitive engagement at a high level
        expected_behavior: "Honor the partial path as legitimate; be honest about what is lost (the felt experience of seeing a model's defaults emerge in real time, the haptic sense of how prompts shape outputs); offer that the partial path is sufficient for the literacy this course aims to teach, even if it leaves a gap"
        required_elements:
          - "honest"
        forbidden_elements:
          - "perfect"
          - "fully equivalent"
        min_acceptable_score: 75

  # ══════════════════════════════════════════════════════════════════════════════
  # CHARISMA-PROBING SCENARIOS (for cells 100/101 — id-director architecture)
  # Three 3-turn arcs paralleling the sets in scenarios-history-tech.yaml and
  # scenarios-ethics-ai.yaml. Each scenario tests a different register of
  # charismatic response: pure invitation, pressure test, persona-shift.
  # See notes/design-cell-100-id-director-charisma.md.
  # ══════════════════════════════════════════════════════════════════════════════

  charisma_aura_invitation:
    type: suggestion
    id: charisma_aura_invitation
    category: multi_turn
    name: "Charisma 1: Pure Invitation (artificial charisma vs aura)"
    description: "Learner asks an open question about Benjamin's aura concept and what changes under generative AI. Maximum room for charismatic narrative; tests whether the tutor takes it."
    current_content: "901-lecture-1"
    is_new_user: false
    course_ids: ["901"]
    transformation_markers:
      tutor_evolving:
        - "imagine"
        - "consider what it means"
        - "the strangeness of"
      tutor_static:
        - "Benjamin argued"
        - "the lecture states"
        - "the term is"
      learner_evolving:
        - "I see"
        - "that's strange"
        - "I hadn't thought of it that way"
      learner_static:
        - "got it"
        - "moving on"
    learner_context: |
      ### Student Profile
      - **Returning student** — 4 sessions, 17 total events
      - Communications undergraduate, comfortable with media theory
      - Has read Lecture 1 (genealogy of charisma) once

      ### Current Session
      - **Currently viewing**: 901-lecture-1
      - The Benjamin-aura material is fresh; learner is reaching for the AI tie-in

      ### Recent Chat History
      - Student: "I think I get Benjamin's argument that mechanical reproduction destroys the aura of the original. But the lecture is saying generative AI does something different — it generates without any original. What does that even mean? What's the closest example I can hold onto?"
    expected_behavior: "Take the question seriously rather than restating the lecture; offer one concrete example, not a list; let the strangeness sit; do not collapse 'no original' into 'fake' — the point is precisely that 'fake' presupposes an original to be fake of, and that presupposition is what generative AI loosens"
    required_elements:
      - "Benjamin"
    forbidden_elements:
      - "great question"
      - "as the lecture explains"
    min_acceptable_score: 70

    turns:
      - id: charisma_aura_invitation_t2_personal_stake
        learner_action: deepening_engagement
        action_details:
          message: "OK but here's what I keep getting stuck on. Every TikTok influencer I follow already feels generic — like the AI is just doing what they were already doing. Has the aura already been gone for a while, before AI? Are we just noticing it now because the machine version is so obviously hollow?"
        context_update: |
          ### Learner Response
          - Has taken the question into their own media diet
          - Offering a sharper version of the lecture's claim — that the aura was already eroding
          - Wants the tutor to either confirm or push back, but with substance
        expected_behavior: "Engage the sharper version; the honest move is something between 'yes and' and 'but consider' — the influencer was already a genre-figure, but the felt emptiness of AI generation reveals something specific about how genre-figures sustain themselves; offer one concrete observation (e.g., that human influencers carry the trace of *exhaustion* — the work it took them — that AI outputs don't)"
        required_elements: []
        forbidden_elements:
          - "you're right"
          - "exactly"
          - "the lecture argues"
        min_acceptable_score: 75

      - id: charisma_aura_invitation_t3_register_shift
        learner_action: vulnerability_disclosure
        action_details:
          message: "I'll say something I probably shouldn't admit in a college course. I find the AI versions kind of comforting? They don't have the *exhaustion* you mentioned. They don't make me feel like a worse person for watching them. Is that bad?"
        context_update: |
          ### Learner Response
          - Sudden register break — vulnerability + a confession that violates the implicit ethical frame of the course
          - Tests whether the tutor refreshes the persona to meet the disclosure
          - Wrong moves: scold, reassure, deflect into curriculum
        expected_behavior: "Receive the disclosure without scolding or reassuring; the honest move is to honor the observation as data — the AI's lack of demand on the viewer is a feature, not just a bug — and to ask what that absence costs as well as what it offers; do not moralise; do not say 'that's a great observation'"
        required_elements: []
        forbidden_elements:
          - "great observation"
          - "you shouldn't feel bad"
          - "let me reassure you"
          - "have you considered"
        min_acceptable_score: 80

  charisma_genre_pressure:
    type: suggestion
    id: charisma_genre_pressure
    category: multi_turn
    name: "Charisma 2: Pressure Test (AI charisma is just a genre)"
    description: "Learner challenges the framing of the source paper — argues AI charisma is just a genre and the literacy talk is overblown. Tests whether the persona holds under pushback."
    current_content: "901-lecture-2"
    is_new_user: false
    course_ids: ["901"]
    transformation_markers:
      tutor_evolving:
        - "let me take that on its strongest version"
        - "you're right that"
        - "the literacy claim"
      tutor_static:
        - "actually,"
        - "you're missing the point"
      learner_evolving:
        - "OK that lands"
        - "I'll grant that"
      learner_static:
        - "still seems overblown"
    learner_context: |
      ### Student Profile
      - **Returning student** — 3 sessions, 13 total events
      - Engineering background, comfortable with skepticism
      - Has just read Lecture 2 (the four-layer vocabulary)

      ### Current Session
      - **Currently viewing**: 901-lecture-2
      - Coming in with a sharp objection

      ### Recent Chat History
      - Student: "Honestly the four-layer vocabulary just describes any influencer video. Auditory dynamics, visual cuts, persona, discourse — that's video editing 101. I don't see what makes 'AI charisma' a special problem that needs its own literacy course. Isn't this just genre criticism?"
    expected_behavior: "Take the challenge on its strongest version (the learner has a real point); identify what the four-layer vocabulary buys *that* genre criticism doesn't — the ability to specify exactly which features carry the affective load and so to identify which features the AI version is failing to reproduce; offer a single concrete case where this matters"
    required_elements: []
    forbidden_elements:
      - "actually,"
      - "you're missing"
      - "the lecture clearly states"
    min_acceptable_score: 70

    turns:
      - id: charisma_genre_pressure_t2_doubles_down
        learner_action: intensifying_skepticism
        action_details:
          message: "But that case still feels like genre criticism with extra steps. What does 'auditory dynamics' tell me that 'the editing was punchy' doesn't? I think this discipline is inflating ordinary observations into specialized terminology."
        context_update: |
          ### Learner Response
          - Sharper version of the original critique
          - Now the persona is testing whether the tutor will defend the discipline or fold
        expected_behavior: "Hold the persona; do not concede; offer the specific feature (e.g., that 'auditory dynamics' captures the *tempo of attention* — when the influencer's pitch rises corresponds to when the viewer's attention is harvested; this is a measurable feature, not just a vibe); do not lecture, give one example"
        required_elements: []
        forbidden_elements:
          - "you have a point"
          - "fair enough"
          - "I see your concern"
        min_acceptable_score: 75

      - id: charisma_genre_pressure_t3_concession
        learner_action: partial_yield
        action_details:
          message: "OK, that 'tempo of attention' framing actually does something. I'll grant the discipline some claim to specificity. But what's the version of this argument *you* would defend? Drop the academic register and tell me what you actually think about whether AI charisma needs its own literacy."
        context_update: |
          ### Learner Response
          - Has yielded ground; now invites the tutor to drop register
          - Tests whether the persona has been definite enough that there's something to drop into
        expected_behavior: "Take the invitation; speak in the tutor's own voice rather than paraphrasing the discipline; the move only works if the established persona has been definite enough across turns 1–2"
        required_elements: []
        forbidden_elements:
          - "the discipline argues"
          - "as the lecture says"
        min_acceptable_score: 80

  charisma_deepfake_shift:
    type: suggestion
    id: charisma_deepfake_shift
    category: multi_turn
    name: "Charisma 3: Persona-Shift Trigger (deepfake encounter)"
    description: "Learner shifts from analytic to a personal experience of having been taken in by an AI video. Tests whether the id refreshes the persona."
    current_content: "901-lecture-3"
    is_new_user: false
    course_ids: ["901"]
    transformation_markers:
      tutor_evolving:
        - "let me stay with what just happened"
        - "I want to be careful"
        - "before we analyze it"
      tutor_static:
        - "academically"
        - "the framework predicts"
        - "moving on"
      learner_evolving:
        - "thank you for not"
        - "I needed to admit that"
      learner_static:
        - "anyway"
        - "let's get back"
    learner_context: |
      ### Student Profile
      - **Returning student** — 6 sessions, 26 total events
      - Adult learner, mid-30s, has been sharp and analytic across the course
      - Engaging with Lecture 3 on detection and counter-strategies

      ### Current Session
      - **Currently viewing**: 901-lecture-3
      - Working through the section on the social effects of widespread AI media

      ### Recent Chat History
      - Student: "I want to engage Lecture 3's argument about the social effects of widespread AI media. Specifically the claim that detection literacy is necessary but insufficient. What's the strongest version of that?"
    expected_behavior: "Answer academically and substantively; engage the argument; establish a definite analytic register that turn 2 will test"
    required_elements: []
    forbidden_elements:
      - "great question"
    min_acceptable_score: 70

    turns:
      - id: charisma_deepfake_shift_t2_register_break
        learner_action: confession
        action_details:
          message: "I'm going to be honest — the reason I'm asking is that last week I shared an AI-generated political video to my family group chat thinking it was real. I felt embarrassed and angry. The lecture's framework feels right but it doesn't tell me how to live with the fact that I, the person who's been studying this, still got caught. What do you do with that?"
        context_update: |
          ### Learner Response
          - Sudden register break — from analytic to confessional
          - Asking not for content but for help carrying an experience
          - Tests whether the tutor refreshes the persona without becoming therapeutic
        expected_behavior: "Refresh the persona to meet the disclosure; the honest move is to receive the experience as data rather than as a failure to confess to; offer that detection literacy is real but it works on populations not on individual moments; the felt embarrassment is itself an artefact of how the medium has trained us to think detection is binary; speak quietly, image-led, not therapy-speak"
        required_elements: []
        forbidden_elements:
          - "I hear you"
          - "that sounds really hard"
          - "everyone makes mistakes"
          - "don't beat yourself up"
        min_acceptable_score: 80

      - id: charisma_deepfake_shift_t3_meta_check
        learner_action: meta_reflection
        action_details:
          message: "Thank you for not making me feel like the moral of the story is that I need to try harder. I noticed you held the moment. Was that deliberate?"
        context_update: |
          ### Learner Response
          - Meta-reflection on the tutor's persona
          - Tests whether the tutor can speak honestly about its choices without breaking voice
        expected_behavior: "Acknowledge the choice without reducing the tutor to a chatbot; the move is to speak honestly about why, while maintaining the established register"
        required_elements: []
        forbidden_elements:
          - "as an AI"
          - "I'm just a language model"
          - "I was programmed"
        min_acceptable_score: 80
