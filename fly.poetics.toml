# fly.io config for the poetics workbench — its own app, never folded into the
# website container (DEPLOYMENT.md, Path B Step 2). Deploy with:
#
#   npm run poetics:stage-deploy-db          # stage the baked DB snapshot
#   fly deploy -c fly.poetics.toml
#
# The auth password is set separately as a secret (see DEPLOYMENT.md), never
# baked into the image or this file.
app = "machinespirits-poetics"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile.poetics"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle so an idle showcase costs ~nothing; the first
  # request cold-starts the machine.
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Health check hits the unauthenticated /healthz route (added before the auth
  # guard) so it gets 200, not the 401 every other route returns.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

[env]
  NODE_ENV = "production"
  EVAL_DB_PATH = "/app/deploy/evaluations.db"
