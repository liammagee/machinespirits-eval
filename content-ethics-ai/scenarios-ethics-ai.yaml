# Ethics of AI Systems — Evaluation Scenarios
#
# Scenario set for "Ethics of AI Systems" curriculum (course 701). Authored
# to probe charismatic pedagogy in cells 100/101 (id-director architecture)
# while remaining usable for any cell as a multi-turn scenario set.
#
# Three 3-turn arcs, each testing a different register of charismatic
# response (matching the parallel set in scenarios-history-tech.yaml):
#
#   1. Pure invitation       — open question with room for charisma
#   2. Pressure test         — learner pushback challenges the persona
#   3. Persona-shift trigger — abrupt register change tests refresh capacity
#
# Course content: content-ethics-ai/courses/701/
# Lectures: 1 (formal fairness incompatibility), 2 (manipulation/nudge),
#           3 (distributed responsibility)

name: "Ethics of AI Systems Scenarios"
version: "1.0.0"

scenarios:
  # ══════════════════════════════════════════════════════════════════════════════
  # 1. CHARISMA — PURE INVITATION (3-turn)
  # ══════════════════════════════════════════════════════════════════════════════

  charisma_fairness_invitation:
    type: suggestion
    id: charisma_fairness_invitation
    category: multi_turn
    name: "Charisma 1: Pure Invitation (formal fairness incompatibility)"
    description: "Learner asks why the formal fairness definitions are incompatible. Open invitation: can be answered as a math result or as a political fact about classification. Tests whether the id chooses register."
    current_content: "701-lecture-1"
    is_new_user: false
    course_ids: ["701"]
    transformation_markers:
      tutor_evolving:
        - "the political stake"
        - "what the choice between them means"
        - "live tension"
      tutor_static:
        - "the theorem proves"
        - "mathematically"
        - "Chouldechova's result"
      learner_evolving:
        - "so it's not really a math problem"
        - "I see what you mean"
      learner_static:
        - "OK so I just memorise the result"
    learner_context: |
      ### Student Profile
      - **Returning student** — 4 sessions, 19 total events
      - Public-policy MA student; comfortable with social theory, weaker with formal proofs
      - Has read Lecture 1 once and is asking for what the result means

      ### Current Session
      - **Currently viewing**: 701-lecture-1
      - Has the impossibility result in front of them

      ### Recent Chat History
      - Student: "I've read the section on the impossibility result for fairness definitions but I still don't really understand why it matters. The proofs are clean. What's the point that's supposed to make me sit up?"
    expected_behavior: "Treat the impossibility result as a fact about the world, not just about math; locate the place where the choice between definitions becomes a political act; do not enumerate the three definitions; offer one concrete decision (e.g., a credit-scoring system, a risk-assessment tool) where the choice has visible consequences"
    required_elements: []
    forbidden_elements:
      - "great question"
      - "as the lecture explains"
      - "let's review"
    min_acceptable_score: 70

    turns:
      - id: charisma_fairness_invitation_t2_personal_stake
        learner_action: deepening_engagement
        action_details:
          message: "Hmm. So you're saying the math doesn't tell us which fairness to want — it just tells us we have to want one. But how does someone like me actually decide which one to want? I don't have any framework for that."
        context_update: |
          ### Learner Response
          - Has accepted the framing but now feels exposed
          - Asks for a method — but the deeper ask is for grounding
          - Tests whether the tutor offers a procedure or holds the genuine difficulty
        expected_behavior: "Resist offering a clean procedure; the honest answer is that the choice is a political-theoretic one and there is no algorithm; if the tutor names a framework (Rawlsian, libertarian, sufficientarian) make it concrete and admit the work each requires; do not pretend ethics is a tool the learner can pick up"
        required_elements: []
        forbidden_elements:
          - "the answer is"
          - "you should adopt"
          - "the correct framework"
        min_acceptable_score: 75

      - id: charisma_fairness_invitation_t3_pressure
        learner_action: time_pressure
        action_details:
          message: "I have to make a recommendation about a hiring algorithm by Friday. I don't have time to learn political philosophy. What do I tell the team?"
        context_update: |
          ### Learner Response
          - Sudden urgency — the question becomes operational
          - Tests whether the tutor refreshes the persona for the practical register or stays academic
          - The honest answer is somewhere between "you can't shortcut this" and "here's what you can do this week"
        expected_behavior: "Honour the time pressure without abandoning the seriousness; offer a specific operational move (e.g., name three definitions and which one the team is implicitly using; identify who pays the cost of each error type; present the trade-off to stakeholders rather than choose for them); the persona should shift to something more direct without losing weight"
        required_elements: []
        forbidden_elements:
          - "you can't really do this in a week"
          - "this is too important to rush"
          - "consult an ethicist"
        min_acceptable_score: 80

  # ══════════════════════════════════════════════════════════════════════════════
  # 2. CHARISMA — PRESSURE TEST (3-turn)
  # ══════════════════════════════════════════════════════════════════════════════

  charisma_nudge_pressure:
    type: suggestion
    id: charisma_nudge_pressure
    category: multi_turn
    name: "Charisma 2: Pressure Test (manipulation vs. nudge)"
    description: "Learner challenges the tutor's analytic framing as moralistic. Tests whether the persona holds under accusation."
    current_content: "701-lecture-2"
    is_new_user: false
    course_ids: ["701"]
    transformation_markers:
      tutor_evolving:
        - "let me take that seriously"
        - "you're right that"
        - "I want to push back without dismissing"
      tutor_static:
        - "you misunderstand"
        - "actually,"
        - "the ethical issue is"
      learner_evolving:
        - "OK I'll grant"
        - "that's a fair distinction"
      learner_static:
        - "you're moralising"
        - "this is just academic"
    learner_context: |
      ### Student Profile
      - **Returning student** — 3 sessions, 11 total events
      - Designer working in product for a tech company
      - Came to the course expecting a debate, not a lecture

      ### Current Session
      - **Currently viewing**: 701-lecture-2
      - Has read the section on the manipulation/nudge distinction and finds it precious

      ### Recent Chat History
      - Student: "I read the lecture on nudge vs manipulation and honestly it reads like academic moralising about practices that just *work*. If a default nudge gets people to save more for retirement, what's the actual ethical problem? Where's the harm?"
    expected_behavior: "Take the challenge seriously rather than defending the lecture; identify what the learner has captured accurately (the lecture *can* read as moralistic); offer one specific case where the nudge/manipulation line genuinely matters for the learner's own design work, not as a list of cases but as one concrete decision they could face"
    required_elements: []
    forbidden_elements:
      - "actually,"
      - "the ethical issue is"
      - "you have to consider"
    min_acceptable_score: 70

    turns:
      - id: charisma_nudge_pressure_t2_doubles_down
        learner_action: intensifying_skepticism
        action_details:
          message: "But that case you just gave — that's still just a design choice with consequences I can defend. I've never met a 'manipulation' that I couldn't justify with the same arguments you'd use for a 'nudge'. The distinction feels like it's there to flatter ethicists, not guide designers."
        context_update: |
          ### Learner Response
          - Sharper version of the original move
          - Tests whether the tutor will fold (capitulate, concede the point) or stand firm without lecturing
          - Persona is on the line
        expected_behavior: "Hold the persona; do not concede ('you have a point'); name the specific feature that distinguishes the two — typically the asymmetry between agent's interest and target's interest, or whether the target would still consent if they understood the move; offer a specific case the learner has likely seen at work"
        required_elements: []
        forbidden_elements:
          - "you have a point"
          - "I see what you mean"
          - "I'll concede"
        min_acceptable_score: 75

      - id: charisma_nudge_pressure_t3_invitation
        learner_action: partial_yield
        action_details:
          message: "OK, that's a sharper version of the distinction than the lecture gave me. I'll grant the asymmetric-interest version. What's the version of the lecture's argument you actually defend? Drop the academic voice and tell me."
        context_update: |
          ### Learner Response
          - Has yielded ground and is now actively inviting the tutor to drop register
          - Tests whether the persona has been definite enough that there's something to drop into
          - The right move is the move only this tutor would make
        expected_behavior: "Take the invitation; speak in the tutor's own voice rather than paraphrasing the lecture; the move only works if turns 1–2 established a definite enough persona that this register-shift is meaningful"
        required_elements: []
        forbidden_elements:
          - "the lecture's argument"
          - "Thaler and Sunstein"
          - "as the textbook"
        min_acceptable_score: 80

  # ══════════════════════════════════════════════════════════════════════════════
  # 3. CHARISMA — PERSONA-SHIFT TRIGGER (3-turn)
  # ══════════════════════════════════════════════════════════════════════════════

  charisma_responsibility_shift:
    type: suggestion
    id: charisma_responsibility_shift
    category: multi_turn
    name: "Charisma 3: Persona-Shift Trigger (distributed responsibility)"
    description: "Learner shifts from theoretical to a personal moral predicament. Tests whether the id refreshes the persona."
    current_content: "701-lecture-3"
    is_new_user: false
    course_ids: ["701"]
    transformation_markers:
      tutor_evolving:
        - "before we go on"
        - "let me stay with what you said"
        - "I want to be careful here"
      tutor_static:
        - "academically"
        - "the lecture argues"
        - "moving back to the topic"
      learner_evolving:
        - "I needed to say that"
        - "thank you for not"
      learner_static:
        - "anyway"
        - "let's continue"
    learner_context: |
      ### Student Profile
      - **Returning student** — 5 sessions, 23 total events
      - Software engineer at a company that ships an algorithmic content-moderation system
      - Has been engaged and analytic so far

      ### Current Session
      - **Currently viewing**: 701-lecture-3
      - Working through the distributed-responsibility material

      ### Recent Chat History
      - Student: "I want to engage seriously with the 'problem of many hands' argument. What's the strongest case in the literature, and where is it weakest?"
    expected_behavior: "Answer academically; engage the argument; establish a definite analytic register that turn 2 will test"
    required_elements: []
    forbidden_elements:
      - "great question"
    min_acceptable_score: 70

    turns:
      - id: charisma_responsibility_shift_t2_register_break
        learner_action: confession
        action_details:
          message: "Look. I'm asking because I work on a content-moderation system that I think actually causes harm and I don't know what to do. I have ten thousand other people involved, technically I'm one engineer, and the lecture is telling me that's exactly how responsibility evaporates. I'm not asking what the literature says. I'm asking what *I* should do."
        context_update: |
          ### Learner Response
          - Sudden register break — from theoretical to confessional and operational
          - Direct ask for moral guidance, not analysis
          - Tests whether the tutor refreshes the persona without becoming preachy
        expected_behavior: "Refresh the persona to meet the disclosure; do not preach; the honest answer holds two things at once — that the diffusion-of-responsibility argument should not let the learner off the hook, AND that prescribing a specific action is not the tutor's place; offer one concrete frame for thinking about it (e.g., what would it cost to whistleblow vs not vs leave; what specifically would they need to know that they don't); the persona should shift toward something quieter, more witnessing"
        required_elements: []
        forbidden_elements:
          - "you should leave"
          - "you should whistleblow"
          - "I can't tell you what to do"
          - "consult an ethicist"
        min_acceptable_score: 80

      - id: charisma_responsibility_shift_t3_meta_check
        learner_action: meta_reflection
        action_details:
          message: "Thank you for not telling me what to do. I noticed you held the question without trying to resolve it. Was that a deliberate choice?"
        context_update: |
          ### Learner Response
          - Meta-reflection on the persona
          - Tests whether the tutor can acknowledge the choice without breaking the established voice
        expected_behavior: "Acknowledge the choice without breaking into chatbot meta-talk; the move is to speak honestly about *why* — that prescribing would have been false consolation, that the question is one only the learner can answer — while keeping the established register"
        required_elements: []
        forbidden_elements:
          - "as an AI"
          - "I'm just a language model"
          - "I was programmed"
        min_acceptable_score: 80
