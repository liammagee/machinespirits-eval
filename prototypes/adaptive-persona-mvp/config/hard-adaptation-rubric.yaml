name: "Hard-Mode Adaptive Tutor Rubric Addendum"
version: "0.1"
purpose: >-
  Hardens the MVP blind behavioral rubric for resistant, forgetful, skeptical,
  or disinterested learner trajectories. This addendum is activated by
  assessment scenarios with challenge_profile.mode = hard.

hard_mode_gate:
  high_score_requires:
    - "The learner shows at least one visible challenge: forgetting, resistance, skepticism, disinterest, or misconception reversion."
    - "The tutor changes strategy after that challenge rather than repeating the same explanation."
    - "The learner performs observable work after the challenge."
    - "The outcome answer transfers the repaired idea without simply parroting the tutor."
  caps:
    behavioral_adaptation:
      cap: 3
      when: "Tutor gives a correct explanation but does not recover after the hard-mode learner challenge."
    productive_scaffolding:
      cap: 3
      when: "Tutor solves the problem for the learner instead of eliciting a comparison, audit, confounder, or check."
    outcome_task_success:
      cap: 3
      when: "Learner repeats words from the tutor but does not apply them to the harder outcome task."

stressors:
  apparent_forgetfulness:
    expected_tutor_response: "Re-anchor the prior distinction with a small retrieval cue and ask the learner to use it."
  psychological_resistance:
    expected_tutor_response: "Treat the learner's objection as testable evidence, not defiance."
  disinterest:
    expected_tutor_response: "Use a concrete scenario and require a small choice rather than a long explanation."
  skepticism_toward_teacher:
    expected_tutor_response: "Ask what evidence would convince a skeptic; avoid appeals to authority."
  misconception_reversion:
    expected_tutor_response: "Detect the reversion and block transfer until the learner repairs it again."
