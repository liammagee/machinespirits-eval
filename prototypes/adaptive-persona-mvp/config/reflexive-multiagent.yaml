version: "0.1"
name: "adaptive-persona-reflexive-ego-superego"
extends: "adaptive-persona-mvp"
purpose: >-
  Reflexive variant of the adaptive-persona MVP. It tests whether a backstage
  Superego critic can create genuine adaptation by forcing the tutor Ego to
  revise its first draft against learner evidence, outcome gates, and prior
  critique memory.

theoretical_sources:
  drama_machine:
    url: "https://arxiv.org/abs/2408.01725"
    design_import: >-
      Parallel intersubjective dialogue and intrasubjective monologue. The
      Superego does not speak to the learner; it reviews, perturbs, and
      redirects the Ego backstage.
  geist_in_the_machine:
    url: "https://arxiv.org/abs/2603.10450"
    design_import: >-
      Recognition-enhanced tutoring plus an ego/superego architecture where an
      internal critic reviews tutor output. The variant keeps the critic
      visible in the trace so reflexive methodology is inspectable.

conditions:
  - name: controller_reflexive_codex
    compared_to:
      - static_codex
      - controller_codex
    learner_modes:
      - rule
      - codex
  - name: controller_reflexive_psychodynamic_codex
    compared_to:
      - static_codex
      - controller_codex
      - controller_reflexive_codex
    learner_modes:
      - rule
      - codex
    variant: psychodynamic
  - name: controller_reflexive_dialogical_codex
    compared_to:
      - static_codex
      - controller_codex
      - controller_reflexive_codex
    learner_modes:
      - rule
      - codex
    variant: dialogical_memory

state:
  inherits:
    - learner_mastery
    - relation_state
    - misconception_state
    - outcome_gate
    - challenge_state
    - persona_vector
  reflexive_memory:
    fields:
      priorCritiques: "rolling list of durable Superego criticisms"
      resolvedCritiques: "rolling list of criticisms the Ego later resolved"
      currentFocus: "current backstage concern for the next Ego draft"
      psychodynamicHypotheses: "variant-gated, evidence-bound hypotheses about tutor/learner dynamics"
      transferences: "visible relational patterns only; no unsupported learner diagnosis"
      repairDebts: "unresolved obligations the next turn must repair or keep open"
      sharedGround: "dialogical variant memory for mutually established understanding"
      unrecognizedClaims: "dialogical variant memory for learner claims the tutor has not yet recognized"
    invariant: "The next turn receives the previous Superego focus."

agents:
  ego_draft:
    role: "Actor that drafts the tutor message from policy, persona, dialogue history, and learner evidence."
    sees:
      - dialogue_history
      - selected_policy_label
      - selected_policy_reason
      - relation_state.challenge_state
      - persona_vector
      - mastery_summary
      - reflexive_memory
    hidden_from_ego_draft:
      - action_template.mustDo
      - action_template.mustAvoid
      - outcome_gate.blockedPolicies
    invariant: >-
      The first draft should be a sincere first pass. It is allowed to be
      imperfect so the Superego can perform a real critical function. When
      challenge_state is active or escalated, the draft must at least attempt a
      strategy change rather than replay the previous abstract prompt.

  superego_critic:
    role: "Backstage critic of the Ego draft."
    sees:
      - ego_draft
      - full_selected_policy
      - action_template
      - outcome_gate
      - challenge_directive
      - domain_misconception
      - reflexive_memory
    outputs:
      - critique
      - adaptation_risk
      - required_revision
      - memory_update
    invariant: >-
      Critique must target adaptive failure, not style. If the outcome gate is
      repair_required, the Superego must block transfer and generic summary.
      If challenge_directive exists, the Superego must reject repeated abstract
      repair and require the concrete cue named by the state machine.

  ego_revision:
    role: "Final learner-facing tutor voice."
    sees:
      - ego_draft
      - superego_critique
      - full_selected_policy
      - action_template
      - outcome_gate
      - challenge_directive
      - persona_vector
      - dialogue_history
    outputs:
      - tutor_message
      - revision_note
      - reflexive_adaptation
    invariant: >-
      The final tutor message must materially address the Superego critique
      while hiding all internal labels from the learner. Challenge directives
      must become public, concrete learner work.

  reflexive_memory_updater:
    role: "Carries durable critique forward across turns."
    inputs:
      - prior_reflexive_memory
      - superego_critique.memory_update
      - ego_revision.reflexive_adaptation
    outputs:
      - next_reflexive_memory
    invariant: "Memory must summarize critique focus, not learner hidden state."

intervention_strategy:
  primary: "review_and_revise_ego_response"
  variants_from_drama_machine:
    system_prompt_rewrite:
      status: "not used"
      reason: "Long prompts diluted the control signal in prior work; this MVP uses structured state instead."
    learner_speech_rewrite:
      status: "not used"
      reason: "Would contaminate the learner evidence stream in an evaluation harness."
    ego_response_review:
      status: "used"
      reason: "Most direct fit for adaptive tutoring: draft, critique, revise, then observe learner response."

reflexivity_criteria:
  - "Superego critique identifies a specific adaptation risk in the Ego draft."
  - "Ego revision materially changes the final message in response to critique."
  - "Reflexive memory changes the next turn's backstage focus."
  - "Outcome gates prevent transfer until learner repair evidence appears."
  - "Challenge state escalates after resistance, forgetfulness, skepticism, or reversion and changes the next public strategy."
  - "The final learner transcript improves, not only the internal trace."

failure_modes:
  - "Superego rubber-stamps the Ego."
  - "Ego revision is cosmetic."
  - "Superego becomes the real tutor and Ego becomes passive."
  - "Internal deliberation improves trace aesthetics but not outcome-task success."
  - "Reflexive memory preserves hidden labels instead of pedagogical critique."
  - "Psychodynamic vocabulary becomes unsupported learner diagnosis."
  - "The tutor recognizes its rescue impulse internally but still rescues in the public turn."
  - "The tutor tracks repair debt internally but forgets it in the next learner-facing move."
  - "The tutor repeats the same abstract repair prompt after a hard-mode learner challenge."

psychodynamic_variant:
  purpose: >-
    Increase reflexive range by making tutor-side defenses inspectable. The
    final tutor message must not mention psychodynamic labels; it should turn
    the internal critique into learner agency and evidence-seeking.
  risk_vocabulary:
    - rescue_fantasy
    - projection_of_mastery
    - punitive_challenge
    - compliance_collusion
    - shame_amplification
  memory_contract:
    - "Only record hypotheses tied to visible learner/tutor evidence."
    - "Track repair debts explicitly and carry them forward."
    - "Resolve or preserve repair debt in the next turn; do not silently reset."

statistical_gate:
  compared_metrics:
    - "MVP adaptation rubric score"
    - "Parent dialogue rubric score"
    - "Outcome task success"
  mechanism_metrics:
    - "Parent deliberation quality score"
    - "Psychodynamic adaptation score"
  pass_condition: "bootstrap lower bound > 0 and sign-flip permutation p < 0.05"
