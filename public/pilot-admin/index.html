<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<meta name="robots" content="noindex" />
<title>Pilot · Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<style>
  :root {
    --paper:    #fafaf7;
    --paper-2:  #f1efe7;
    --paper-3:  #e8e4da;
    --ink:      #1a1a1a;
    --ink-2:    #3d3d3d;
    --ink-3:    #6f6f6f;
    --ink-4:    #9a9a9a;
    --rule:     #d8d4ca;
    --accent:   #2d5d6e;
    --accent-2: #1f4252;
    --warn:     #b35c1a;
    --good:     #3a6a3a;
    --bad:      #a43a2e;
    --shadow:   rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 0.85em; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.04em; }
  header .meta { font-size: 0.78rem; color: var(--ink-3); }
  main { padding: 1.25rem 1.5rem 4rem; max-width: 1400px; margin: 0 auto; }
  h2 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.6rem; }
  h3 { font-size: 0.95rem; font-weight: 600; margin: 1.2rem 0 0.4rem; color: var(--ink-2); }

  /* token field */
  .auth-box {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 1rem;
  }
  .auth-box input {
    flex: 1; padding: 0.4rem 0.6rem; border: 1px solid var(--rule); border-radius: 3px;
    font: inherit; background: white;
  }
  button {
    padding: 0.4rem 1rem; border: 1px solid var(--accent); background: var(--accent);
    color: white; font: inherit; border-radius: 3px; cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--accent-2); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: white; color: var(--accent); border: 1px solid var(--rule);
  }
  button.secondary:hover:not(:disabled) { background: var(--paper-2); border-color: var(--accent); }

  /* error / info banner */
  .error-banner {
    background: rgba(164,58,46,0.08); border: 1px solid var(--bad);
    color: var(--bad); padding: 0.6rem 0.9rem; border-radius: 4px; margin: 0.5rem 0;
  }
  .info-banner {
    background: rgba(45,93,110,0.08); border: 1px solid var(--accent);
    color: var(--accent); padding: 0.6rem 0.9rem; border-radius: 4px; margin: 0.5rem 0;
  }

  /* counts grid */
  .counts {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem;
    margin: 0.5rem 0 1rem;
  }
  .count-card {
    background: white; border: 1px solid var(--rule); border-radius: 4px;
    padding: 0.75rem 1rem; box-shadow: 0 1px 2px var(--shadow);
  }
  .count-card .name { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; color: var(--ink-3); margin-bottom: 0.3rem; word-break: break-all; }
  .count-card .total { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
  .count-card .breakdown {
    margin-top: 0.4rem; font-size: 0.75rem; color: var(--ink-3);
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.8rem;
  }
  .count-card .breakdown span strong { color: var(--ink); font-weight: 600; }

  /* status filters */
  .filter-row {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0;
    align-items: center;
  }
  .filter-row label {
    font-size: 0.78rem; color: var(--ink-3); margin-right: 0.5rem;
  }
  .filter-row .pill {
    padding: 0.25rem 0.7rem; border: 1px solid var(--rule); border-radius: 99px;
    font-size: 0.78rem; cursor: pointer; background: white; color: var(--ink-2);
  }
  .filter-row .pill.is-active {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  /* table */
  table.sessions {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
    background: white; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden;
  }
  table.sessions thead th {
    text-align: left; padding: 0.5rem 0.75rem;
    background: var(--paper-2); color: var(--ink-2); font-weight: 600; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--rule);
  }
  table.sessions tbody td {
    padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--rule);
  }
  table.sessions tbody tr { cursor: pointer; }
  table.sessions tbody tr:hover { background: var(--paper-2); }
  table.sessions tbody tr.is-selected { background: rgba(45,93,110,0.08); }

  /* status badges */
  .badge {
    display: inline-block; padding: 0.1rem 0.5rem; border-radius: 99px;
    font-size: 0.72rem; font-weight: 500; text-transform: lowercase;
  }
  .badge--completed   { background: rgba(58,106,58,0.15); color: var(--good); }
  .badge--abandoned   { background: rgba(154,154,154,0.2); color: var(--ink-3); }
  .badge--timed_out   { background: rgba(164,58,46,0.15); color: var(--bad); }
  .badge--enrolled,
  .badge--consented,
  .badge--intake_done,
  .badge--pretest_in_progress,
  .badge--pretest_done,
  .badge--tutoring,
  .badge--tutoring_done,
  .badge--posttest_in_progress,
  .badge--posttest_done       { background: rgba(45,93,110,0.12); color: var(--accent); }

  /* condition badge */
  .cond {
    font-family: "JetBrains Mono", monospace; font-size: 0.75rem;
    color: var(--ink-2);
  }
  .cond--cell_5_recog_single_unified { color: var(--accent); font-weight: 600; }
  .cond--cell_1_base_single_unified  { color: var(--ink-2); }

  /* session detail panel */
  .detail {
    margin-top: 1.5rem; background: white; border: 1px solid var(--rule);
    border-radius: 4px; padding: 1rem 1.25rem;
  }
  .detail .meta-grid {
    display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem;
    font-size: 0.85rem; margin-bottom: 1rem;
  }
  .detail .meta-grid dt { color: var(--ink-3); }
  .detail .meta-grid dd { margin: 0; }

  .turn {
    border: 1px solid var(--rule); border-radius: 4px; padding: 0.6rem 0.8rem;
    margin: 0.4rem 0; font-size: 0.88rem;
  }
  .turn.turn--learner { background: var(--paper-2); }
  .turn.turn--tutor   { background: white; }
  .turn .turn-header {
    display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--ink-3);
    margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .turn .turn-content { line-height: 1.5; }
  .turn .turn-content p { margin: 0.3em 0; }

  table.items { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin: 0.5rem 0; }
  table.items th, table.items td { padding: 0.3rem 0.5rem; text-align: left; border-bottom: 1px solid var(--rule); }
  table.items th { background: var(--paper-2); color: var(--ink-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .correct-yes { color: var(--good); font-weight: 600; }
  .correct-no  { color: var(--bad); }

  details > summary { cursor: pointer; padding: 0.3rem 0; font-weight: 500; color: var(--ink-2); }

  .empty { color: var(--ink-3); font-style: italic; padding: 1rem 0; }

  .actions { display: flex; gap: 0.5rem; margin: 0.6rem 0; }
  .small { font-size: 0.78rem; color: var(--ink-3); }
  [x-cloak] { display: none !important; }
</style>
</head>
<body x-data="adminApp()" x-init="init()" x-cloak>
  <header>
    <h1>Pilot · Admin</h1>
    <div class="meta">
      <span x-show="lastFetched">refreshed <span x-text="lastFetchedAgo"></span></span>
      <button class="secondary" style="margin-left: 0.5rem;" @click="reloadAll()" :disabled="loading">↻ refresh</button>
    </div>
  </header>

  <main>
    <!-- AUTH -->
    <div class="auth-box">
      <strong>Token</strong>
      <input type="password" x-model="token" placeholder="x-pilot-admin-token (from PILOT_ADMIN_TOKEN env var)" autocomplete="off" />
      <button @click="saveTokenAndLoad()" :disabled="!token || loading">Connect</button>
      <button class="secondary" @click="forgetToken()" x-show="hasStoredToken">Forget</button>
    </div>

    <template x-if="errorMessage">
      <div class="error-banner" role="alert" x-text="errorMessage"></div>
    </template>

    <!-- COUNTS -->
    <section x-show="counts" x-cloak>
      <h2>Condition counts</h2>
      <div class="counts">
        <template x-for="[cell, stats] in Object.entries(counts || {})" :key="cell">
          <div class="count-card">
            <div class="name" x-text="cell"></div>
            <div class="total" x-text="stats.total ?? 0"></div>
            <div class="breakdown">
              <template x-for="[k, n] in Object.entries(stats || {}).filter(([k]) => k !== 'total')" :key="k">
                <span><strong x-text="n"></strong> <span x-text="k"></span></span>
              </template>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- SESSIONS -->
    <section x-show="sessions" x-cloak>
      <h2>Sessions</h2>
      <div class="filter-row">
        <label>filter:</label>
        <template x-for="opt in statusOptions" :key="opt">
          <span class="pill"
                :class="{'is-active': statusFilter === opt}"
                @click="setStatusFilter(opt)"
                x-text="opt || 'all'"></span>
        </template>
        <span class="small" style="margin-left: auto;" x-text="`${filteredSessions.length} of ${sessions.length}`"></span>
      </div>

      <table class="sessions">
        <thead><tr>
          <th>id</th>
          <th>condition</th>
          <th>status</th>
          <th>enrolled</th>
          <th>tutoring</th>
          <th>duration</th>
          <th>turns</th>
        </tr></thead>
        <tbody>
          <template x-for="s in filteredSessions" :key="s.id">
            <tr @click="loadSession(s.id)" :class="{'is-selected': selectedSessionId === s.id}">
              <td class="mono" x-text="s.id.slice(0, 8)"></td>
              <td><span class="cond" :class="`cond--${s.condition_cell}`" x-text="conditionLabel(s.condition_cell)"></span></td>
              <td><span class="badge" :class="`badge--${s.status}`" x-text="s.status"></span></td>
              <td class="mono" x-text="fmtTime(s.enrolled_at)"></td>
              <td class="mono" x-text="s.tutoring_started_at ? fmtTime(s.tutoring_started_at) : '—'"></td>
              <td class="mono" x-text="fmtMs(s.total_tutoring_ms)"></td>
              <td class="mono" x-text="s.turn_count ?? '—'"></td>
            </tr>
          </template>
          <template x-if="filteredSessions.length === 0">
            <tr><td colspan="7" class="empty">no sessions match filter</td></tr>
          </template>
        </tbody>
      </table>
    </section>

    <!-- DETAIL -->
    <section x-show="selectedSession" x-cloak>
      <div class="detail">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <h2 style="margin-top: 0;">Session detail</h2>
          <button class="secondary" @click="closeDetail()">close</button>
        </div>

        <dl class="meta-grid" x-show="selectedSession">
          <dt>id</dt>           <dd class="mono" x-text="selectedSession?.session?.id"></dd>
          <dt>condition</dt>    <dd class="mono" x-text="selectedSession?.session?.condition_cell"></dd>
          <dt>status</dt>       <dd><span class="badge" :class="`badge--${selectedSession?.session?.status}`" x-text="selectedSession?.session?.status"></span></dd>
          <dt>scenario</dt>     <dd x-text="selectedSession?.session?.scenario_lecture_ref"></dd>
          <dt>enrolled</dt>     <dd class="mono" x-text="fmtTime(selectedSession?.session?.enrolled_at)"></dd>
          <dt>tutoring</dt>     <dd class="mono" x-text="`${fmtTime(selectedSession?.session?.tutoring_started_at)} → ${fmtTime(selectedSession?.session?.tutoring_completed_at)}`"></dd>
          <dt>duration</dt>     <dd class="mono" x-text="fmtMs(selectedSession?.session?.total_tutoring_ms)"></dd>
          <dt>completed</dt>    <dd class="mono" x-text="fmtTime(selectedSession?.session?.exit_completed_at)"></dd>
        </dl>

        <h3>Pretest <span class="small" x-text="testSummary('pretest')"></span></h3>
        <table class="items">
          <thead><tr><th>#</th><th>item</th><th>response</th><th>correct?</th><th>rt</th></tr></thead>
          <tbody>
            <template x-for="t in testItems('pretest')" :key="t.id">
              <tr>
                <td x-text="t.item_position + 1"></td>
                <td class="mono" x-text="t.item_id"></td>
                <td class="mono" x-text="t.response_value || '—'"></td>
                <td :class="t.is_correct ? 'correct-yes' : 'correct-no'" x-text="t.is_correct ? '✓' : '✗'"></td>
                <td class="mono" x-text="fmtMs(t.response_ms)"></td>
              </tr>
            </template>
          </tbody>
        </table>

        <h3>Tutoring transcript <span class="small" x-show="selectedSession?.turns?.length" x-text="`(${selectedSession?.turns?.length} turns)`"></span></h3>
        <template x-for="turn in (selectedSession?.turns || [])" :key="turn.id">
          <div class="turn" :class="`turn--${turn.role}`">
            <div class="turn-header">
              <span x-text="`turn ${turn.turn_index} · ${turn.role}`"></span>
              <span class="mono" x-text="turn.role === 'tutor' ? `${fmtMs(turn.latency_ms)} · ${turn.input_tokens}→${turn.output_tokens} tok` : ''"></span>
            </div>
            <div class="turn-content" x-html="renderTurnContent(turn)"></div>
          </div>
        </template>

        <h3>Posttest <span class="small" x-text="testSummary('posttest')"></span></h3>
        <table class="items">
          <thead><tr><th>#</th><th>item</th><th>response</th><th>correct?</th><th>rt</th></tr></thead>
          <tbody>
            <template x-for="t in testItems('posttest')" :key="t.id">
              <tr>
                <td x-text="t.item_position + 1"></td>
                <td class="mono" x-text="t.item_id"></td>
                <td class="mono" x-text="t.response_value || '—'"></td>
                <td :class="t.is_correct ? 'correct-yes' : 'correct-no'" x-text="t.is_correct ? '✓' : '✗'"></td>
                <td class="mono" x-text="fmtMs(t.response_ms)"></td>
              </tr>
            </template>
          </tbody>
        </table>

        <details x-show="selectedSession?.session?.intake_data">
          <summary>Intake</summary>
          <pre class="mono" style="background: var(--paper-2); padding: 0.5rem; border-radius: 3px; font-size: 0.78rem; overflow: auto;" x-text="prettyJson(parseMaybe(selectedSession?.session?.intake_data))"></pre>
        </details>
      </div>
    </section>

  </main>

<script>
function adminApp() {
  return {
    token: '',
    hasStoredToken: false,
    counts: null,
    sessions: null,
    selectedSessionId: null,
    selectedSession: null,
    loading: false,
    errorMessage: '',
    lastFetched: null,
    statusFilter: '',
    statusOptions: ['', 'completed', 'tutoring', 'enrolled', 'abandoned', 'timed_out'],

    async init() {
      const stored = localStorage.getItem('pilot_admin_token');
      if (stored) {
        this.token = stored;
        this.hasStoredToken = true;
        await this.reloadAll();
      }
      // tick the "refreshed Xs ago" label
      setInterval(() => { /* trigger getter recompute */ this.lastFetched = this.lastFetched; }, 5000);
    },

    get lastFetchedAgo() {
      if (!this.lastFetched) return '';
      const s = Math.floor((Date.now() - this.lastFetched) / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s/60)}m ago`;
      return `${Math.floor(s/3600)}h ago`;
    },

    async fetchJson(url) {
      if (!this.token) throw new Error('Token required');
      const res = await fetch(url, { headers: { 'x-pilot-admin-token': this.token } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `${res.status}`);
      return data;
    },

    setError(msg) {
      this.errorMessage = msg || '';
      if (msg) setTimeout(() => { this.errorMessage = ''; }, 6000);
    },

    saveTokenAndLoad() {
      localStorage.setItem('pilot_admin_token', this.token);
      this.hasStoredToken = true;
      this.reloadAll();
    },

    forgetToken() {
      localStorage.removeItem('pilot_admin_token');
      this.token = '';
      this.hasStoredToken = false;
      this.counts = null;
      this.sessions = null;
      this.selectedSession = null;
      this.selectedSessionId = null;
    },

    async reloadAll() {
      if (!this.token) return;
      this.loading = true;
      try {
        const [c, s] = await Promise.all([
          this.fetchJson('/api/pilot/admin/counts'),
          this.fetchJson('/api/pilot/admin/sessions?limit=200'),
        ]);
        this.counts = c.counts;
        // attach turn_count for the table — admin sessions endpoint doesn't
        // include it natively, but the detail endpoint does. For overview,
        // leave undefined; user can drill in.
        this.sessions = s.sessions;
        this.lastFetched = Date.now();
        if (this.selectedSessionId) await this.loadSession(this.selectedSessionId);
      } catch (err) {
        this.setError(err.message);
      } finally {
        this.loading = false;
      }
    },

    setStatusFilter(opt) {
      this.statusFilter = opt;
    },

    get filteredSessions() {
      if (!this.sessions) return [];
      if (!this.statusFilter) return this.sessions;
      return this.sessions.filter((s) => s.status === this.statusFilter);
    },

    async loadSession(id) {
      this.selectedSessionId = id;
      this.loading = true;
      try {
        const data = await this.fetchJson(`/api/pilot/admin/session/${id}`);
        this.selectedSession = data;
        this.$nextTick(() => {
          // smooth scroll to detail section
          document.querySelector('.detail')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      } catch (err) {
        this.setError(err.message);
      } finally {
        this.loading = false;
      }
    },

    closeDetail() {
      this.selectedSession = null;
      this.selectedSessionId = null;
    },

    fmtTime(ms) {
      if (!ms) return '—';
      const d = new Date(ms);
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      if (sameDay) {
        return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    },

    fmtMs(ms) {
      if (ms == null) return '—';
      if (ms < 1000) return `${ms}ms`;
      if (ms < 60000) return `${(ms/1000).toFixed(1)}s`;
      const m = Math.floor(ms / 60000);
      const s = Math.round((ms % 60000) / 1000);
      return `${m}m${String(s).padStart(2, '0')}s`;
    },

    conditionLabel(cell) {
      if (!cell) return '—';
      // condense — strip cell number + "_unified" suffix for at-a-glance reading
      return cell.replace(/^cell_\d+_/, '').replace(/_unified$/, '');
    },

    parseMaybe(v) {
      if (typeof v === 'string') {
        try { return JSON.parse(v); } catch { return v; }
      }
      return v;
    },

    prettyJson(v) {
      if (v == null) return '';
      try { return JSON.stringify(v, null, 2); } catch { return String(v); }
    },

    testItems(phase) {
      return (this.selectedSession?.tests || []).filter((t) => t.phase === phase);
    },

    testSummary(phase) {
      const items = this.testItems(phase);
      if (items.length === 0) return '';
      const correct = items.filter((t) => t.is_correct).length;
      return `${correct}/${items.length} (${Math.round(100 * correct / items.length)}%)`;
    },

    renderTurnContent(turn) {
      const text = turn?.content || '';
      if (turn?.role === 'tutor') {
        try { return marked.parse(String(text), { breaks: true, gfm: true }); }
        catch { return String(text).replace(/</g, '&lt;'); }
      }
      // learner — escape but preserve newlines
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');
    },
  };
}
</script>
</body>
</html>
